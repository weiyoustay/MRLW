<script>

/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

// 如果是编辑模式，不跳转；否则已创建过身份则直接去大厅

const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let w,h,particles=[];
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 0.8 + 0.2;
    this.speedY = Math.random() * 0.3 + 0.1;
    this.speedX = (Math.random() - 0.5) * 0.25;
    this.opacity = Math.random() * 0.5 + 0.15;
    this.color = Math.random() > 0.35
      ? `hsla(${220 + Math.random()*30}, 90%, 60%, ${this.opacity})`
      : `hsla(${90 + Math.random()*30}, 90%, 60%, ${this.opacity})`;
  }
  update(){
    this.y += this.speedY;
    this.x += this.speedX;
    if(this.y > h) this.y = 0;
    if(this.x < 0 || this.x > w) this.x = Math.random() * w;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(/[^,]+(?=\))/, '0.08');
    ctx.fill();
  }
}
function init(){
  particles = [];
  for(let i=0;i<Math.floor(w*h/2200);i++){
    particles.push(new Particle());
  }
}
init();
window.addEventListener('resize',()=>{init();});
function anim(){
  ctx.clearRect(0,0,w,h);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(anim);
}
anim();

const citySelect = document.getElementById('citySelect');

// 初始化省份选项
Object.keys(cityData).forEach(function(province) {
  var opt = document.createElement('option');
  opt.value = province;
  opt.textContent = province;
  provinceSelect.appendChild(opt);
});

// 省份切换 → 更新城市列表
provinceSelect.addEventListener('change', function() {
  var province = provinceSelect.value;
  citySelect.innerHTML = '';
  if (province && cityData[province]) {
    cityData[province].forEach(function(city) {
      var opt = document.createElement('option');
      opt.value = city;
      opt.textContent = city;
      citySelect.appendChild(opt);
    });
    // 直辖市/特别行政区只有一个城市时自动选中
    if (cityData[province].length === 1) {
      citySelect.value = cityData[province][0];
    }
  } else {
    var opt = document.createElement('option');
    opt.value = '';
    opt.disabled = true;
    opt.selected = true;
    opt.textContent = '请先选择省份';
    citySelect.appendChild(opt);
  }
});

// 从 localStorage 恢复已保存的省/市
(function() {
  var savedProvince = localStorage.getItem('playerProvince');
  var savedCity = localStorage.getItem('playerCity');
  if (savedProvince && cityData[savedProvince]) {
    provinceSelect.value = savedProvince;
    provinceSelect.dispatchEvent(new Event('change'));
    if (savedCity) {
      // 等待城市列表填充后设置
      setTimeout(function() { citySelect.value = savedCity; }, 50);
    }
  }
})();

const input = document.getElementById('nickname');
const charCount = document.querySelector('.char-count');
const createBtn = document.getElementById('createBtn');
const errorTip = document.getElementById('errorTip');
input.addEventListener('input', () => {
  const val = input.value.trim();
  const len = val.length;
  charCount.textContent = `还能输入 ${22 - len} 字`;
  
  if (len >= 2 && len <= 22) {
    createBtn.disabled = false;
    errorTip.style.display = 'none';
  } else {
    createBtn.disabled = true;
    if (len > 0) errorTip.style.display = 'block';
    else errorTip.style.display = 'none';
  }
});

// 编辑模式：激活按钮
if (isEdit) {
  var el = document.getElementById('nickname');
  el.dispatchEvent(new Event('input'));
  // 兜底：直接确保按钮可点击
  var btn = document.getElementById('createBtn');
  btn.disabled = false;
  var cc = document.querySelector('.char-count');
  if (cc) cc.textContent = '还能输入 ' + (22 - el.value.trim().length) + ' 字';
}

// ===== 头像选择 =====
var selectedAvatar = (localStorage.getItem('playerAvatar') || '').replace('.png','.webp');
var currentGender = '男';
var avatarGrid = document.getElementById('avatarGrid');
var genderBtns = document.querySelectorAll('.gender-btn');

function renderAvatars(gender) {
  avatarGrid.innerHTML = '';
  var list = gender === '男' ? [1,6,7,10,15,18,19] : [4,8,10,11,14,15,18];
  for (var i = 0; i < list.length; i++) {
    var filename = gender + list[i] + '.webp';
    var item = document.createElement('div');
    item.className = 'avatar-item';
    item.style.backgroundImage = 'url(' + filename + ')';
    item.dataset.avatar = filename;
    if (filename === selectedAvatar) item.classList.add('selected');
    item.addEventListener('click', function() {
      avatarGrid.querySelectorAll('.avatar-item').forEach(function(el) { el.classList.remove('selected'); });
      this.classList.add('selected');
      selectedAvatar = this.dataset.avatar;
      localStorage.setItem('playerAvatar', selectedAvatar);
    });
    avatarGrid.appendChild(item);
  }
}

genderBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    genderBtns.forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    currentGender = this.dataset.gender;
    renderAvatars(currentGender);
  });
});

// 初始化：如果已保存头像，恢复对应性别
if (selectedAvatar) {
  if (selectedAvatar.indexOf('女') === 0) {
    currentGender = '女';
    genderBtns.forEach(function(b) { b.classList.remove('active'); });
    document.querySelector('.gender-btn[data-gender="女"]').classList.add('active');
  }
}
renderAvatars(currentGender);

// 已修改：返回到 shouye.html
function back(){location.href='shouye.html';}

function create(){
  const name = input.value.trim();
  if (name.length < 2 || name.length > 22) {
    errorTip.style.display = 'block';
    return;
  }
  const pid='DK-'+Math.random().toString(36).substr(2,8).toUpperCase();
  localStorage.setItem('playerName',name);
  localStorage.setItem('playerId',pid);
  // 保存省/市
  var province = provinceSelect.value;
  var city = citySelect.value;
  if (province) localStorage.setItem('playerProvince', province);
  if (city) localStorage.setItem('playerCity', city);
  // 编辑模式不重置解锁进度
  if (!isEdit) {
    localStorage.setItem('unlockedDays',JSON.stringify([1]));
  }

  const toast = document.getElementById('successToast');
  if (isEdit) {
    toast.innerText = '名字已更新！正在返回成长大厅...';
  }
  toast.classList.add('show');

  setTimeout(()=>{
    document.body.style.opacity=0;
    document.body.style.transition='opacity 0.5s ease';
  }, 600);
  setTimeout(()=>{location.href='hall.html';},1100);
}
