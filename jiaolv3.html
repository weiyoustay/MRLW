/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你把今天的复习计划完成，合上书，闭上眼睛，觉得明天又是同样的一天——同样的知识点，同样的题，同样的焦虑。你觉得自己像那个每天推石头上山的西西弗，石头推到山顶又滚下来，周而复始。加缪写《西西弗神话》时，世界刚经历战争，所有人都在问：活着有什么意义。他的回答不是“有意义”，而是你必须相信西西弗是幸福的。不是因为石头终于留在了山顶，是因为他在推石头的每一步里都清醒地知道自己在推。这份清醒是他的自由，也是你的。你每一次翻开书都不是毫无意义的重复，是你比上一次更清楚自己在做什么。今天你推的石头和昨天的重量一样，但你的手已经比昨天更稳。你不是被惩罚的人，你是那个在重复里依然保持清醒的推石者。石头会滚下来，但你每一次重新开始，都已经不是昨天那个推石头的人。这就是你的幸福——不是到达，是还在推。',

    '你被内心的矛盾撕扯着——一边想拼尽全力，一边想躺平放弃；一边想追上所有人，一边觉得自己无论如何也追不上。你觉得自己是一团解不开的乱麻。黑塞在《悉达多》里让他的主人公在河边顿悟。河水从来没有矛盾——它同时是源头和入海口，是湍急和平缓，是蒸发和降落。水从不问来路，也不问归途，它只是流。你的矛盾不是你的分裂，是你这条河在流经不同的河段。你不需要在“拼命”和“躺平”之间选一个，你只需要继续流。今天，把你内心矛盾的两种声音都放在一张纸上，不选任何一个，只是承认它们都在。它们是同一条河的两岸。河不需要选左边还是右边，河只是往前。你也是。在矛盾中继续流动，这就是你完整的全部证明。别人有别人的河道，你有你的流域。继续流，你的海在等你。',

    '你被一场考试风暴困住了。考前焦虑，考中紧张，考后反复回想那道做错的题。你被卷在风暴中间，觉得快要被撕碎了。茨威格经历了两次世界大战，从欧洲最辉煌的文化中心被赶到流亡的路上。他在绝笔信里写，他见过了所有光和暗。他不是在歌颂苦难，他是在说：风暴本身就是活着的证明。你在风暴里感受到的不是你的失败，是你还没有麻木的证据。今天，不要在风暴里挣扎。找到风暴的中心——那个在狂风里反而最安静的点。可能是一次深呼吸，可能是你手边一杯温水，可能是你此刻读到的这句话。风暴会过去，但你在风暴眼里学到的那份定力，会留到你以后每一次被考试搅动的时候。茨威格说，经历过一切才算活过。你的考试风暴也是你活过的章节。不要跳过它，也不要被困在它里面。在风暴眼里坐一会儿。风在转，你在静。',
    '你觉得今天和昨天一样沉重。起床的时候，复习的压力已经压在胸口，像一块提前送达的石头。你觉得这一天还没有开始就已经输了。法国诗人雅克·普雷维尔写超现实主义的诗，把最日常的东西变成陌生的奇迹。他说，在巴黎的每一个早晨，我都要重新发明一次早餐。他不是在写创造，他是在写抵抗。你不需要在今天把全部书都读完，你只需要在今天重新发明一次你的学习——把笔记从黑笔换成蓝笔，在背单词时自己给自己编一个故事，在图书馆找一个你以前没有坐过的位置。这些动作很小，小到它们不会改变你今天的全部复习量，但它们是你对自己说的第一句话：今天不是昨天的复制。我还在。普雷维尔的早餐不需要是盛宴，它只需要是新的。你的今天也不需要全部学完，它只需要在今天早上，被你重新发明过一次。这就是你的抵抗。石头还在，但你没有被它定义。今天从你重新发明的第一个动作开始。',
    '你把自己的每一分钟都填满——背单词、刷题、看网课。你不敢停下来，怕一停下来就会被别人超过，怕空白就是浪费。梅·萨顿一个人住在新罕布什尔的海边，写日记，种花，对着冬天的雪发呆。她说，独处不是孤独，是和自己漫长的约会。独处是一种丰收。你的学习也需要空白。大脑不是硬盘，不能一直写入。它需要时间去消化、去连接、去把那些碎片拼成完整的图谱。你今天给自己留的空白不是浪费，是给你学过的所有东西一个沉淀的机会。今天，在你的学习计划里，刻意留出十分钟的空白。不看书，不看手机，就坐在那里，或者去窗外看看。你会在那十分钟里发现，之前怎么也想不通的一个点，忽然通了。萨顿说，独处是丰收。你的空白也是。丰收不在你继续往脑子里塞更多东西的时候，在你停下来、让它们自己沉淀的时候。给自己十分钟丰收的时间。',
    '你被各种声音裹挟着——父母叫你考公，同学叫你考研，社交媒体叫你多考几个证。每一个声音听起来都对，但你每跟着一个声音走一段，就觉得离自己更远了一点。你觉得自己被撕碎了。以赛亚·伯林把自由分成两种：不被别人强迫的消极自由，和知道自己该做什么并且有能力去做的积极自由。你缺的不是自由的权利，是自由的坐标。那些声音不是来指引你的，是来让你迷失的。今天，把所有的建议放在一边，问自己一个问题：如果没有人在看，如果没有人会失望，我今天最想做的一件和学习有关的小事是什么。不是人生方向，就只是今天。可能只是把一本读了一半的专业书读完，可能是去了解一个你真正感兴趣的领域。伯林说，自由是知道什么是必须做的。你的必须不在任何人的嘴里，在你安静下来之后那个最微弱但最不会被误认的声音里。找到它，哪怕只是一件小事。它是你重建自己废墟的第一块砖。',
    '你一直在等自己准备好——等状态更好，等基础更扎实，等不再焦虑。你觉得只有准备好了才能开始，可你永远觉得还没有准备好。斯坦贝克在写《愤怒的葡萄》时，每天在日记里和自己对话。他写：我不完美，今天写的也不完美，但我写完了今天的部分。现在不完美，以后也不会完美，但我们现在可以开始。你不需要等到不焦虑了再去学习，不需要等到基础补好了再去刷题。你可以带着全部的不确定、全部的自卑、全部还没有解决的旧问题，在今天翻开书，做今天该做的那一页题。不是因为你终于准备好了，是因为你决定不再等了。斯坦贝克的手稿上全是修改痕迹，你的学习也是。今天，用你不完美的状态做一件不完美的事——写一篇不够好的论文提纲，做一套错误率很高但你能从中学到东西的题。不完美的开始比完美的等待多走了一步，这一步就是你全部需要的勇气。',
    '你被一种看不见的加速度推着走——课业要赶在截止日前完成，论文要赶在毕业前发表，人生要赶在三十岁之前全部搞定。你觉得自己慢不下来，一慢就焦虑，一停就恐慌。昆德拉在《慢》里写：速度是技术革命送给人类的迷醉礼物。当一切都变快时，慢变成了一种罪过。但速度与记忆成反比——越快的东西，忘得越快。你今天在高速运转中反复内耗的那些焦虑，它们之所以反复出现，恰恰是因为你从不停下来真正面对它们。今天，试着做一件慢到极致的事：用十分钟读一页书，用半小时写一段你真正想写的笔记，用一整个晚上只复习一个知识点，把它弄透而不是弄完。昆德拉说，慢下来是为了让记忆追上你。学习不是外卖，不需要半小时送达。知识需要时间才能从短期记忆变成你身体里的一部分。慢是你的权利，也是你对抗遗忘最朴素、最有效的武器。',
    '你觉得自己的学业像一座没有出口的迷宫。选专业时迷路了，复习时迷路了，在考研和就业的岔路口更是完全不知道该往哪走。你觉得自己在迷宫里浪费了太多时间。博尔赫斯用一生写迷宫，但他说迷宫不是为了困住人，是为了让人在其中不断发现新的房间。迷宫是唯一让人不迷路的地方，因为在那里每一条路都是正确的。你的迷茫不是走错了路，是你还在探索。你今天在专业里绕的弯路，可能正是你以后比所有人都更了解这个领域的原因；你今天读的那本和考试无关的书，可能正是你以后比同行多一层视角的根基。今天，不要再用“迷路”这个词描述自己的学业。你不是困在迷宫里，你是在里面发现只有你才能找到的房间。博尔赫斯说，迷宫就是天堂。你的探索不是浪费时间，是你正在为自己绘制一张独一无二的地图。',
    '你把所有精力都花在脑子里——想很多，计划很多，把每一个可能性都分析到精疲力竭。但你的身体还停在原地，书本还合着，笔还放在桌上没有拿起。阿伦特在《人的境况》里区分了劳动、工作和行动。行动不需要任何中介，它只需要你开始。你今天在脑子里反复修改的那份论文提纲，只需要你写下一个字，它就开始了；你今天反复纠结要不要问老师的那道题，只需要你发出那条消息，它就开始了。学习里最消耗你的不是学不会，是还在想“我能不能学会”。今天，从你脑子里那台空转的机器里走出来，做一个不需要任何准备的动作：翻开书，写第一个字，发那条你编辑了好几次的学习请教消息。阿伦特说，行动是人的第二次出生。你的内耗不是因为你不行，是因为你还没有开始。用行动重新出生一次。不在脑子里，在手上。',
    '你被这个时代的教育观裹挟着——学历贬值，知识无用，所有人都在追求快速变现的技能。你在深夜怀疑自己：我读这些书，学这些理论，到底有什么用。英国诗人、批评家阿诺德在《文化与无政府状态》里写：文化是，或者说应该是，对完美的研究和追求。他说的完美不是功利主义的目的，是甜与光——是让人生变得甘甜、内心变得明亮的那些东西。你今天学的知识，有一部分永远不会变成工资单上的数字，但它们是让你在焦虑时还能保持清醒的锚。是你读文学时感受到的人性深度，是你在实验室里看到的世界的秩序。今天，不要只用“能不能找到工作”衡量你学的一切。阿诺德说，文化的目标是甜与光。你的学业里也有甜与光的部分，不是因为它能变现，是因为它让你在还没被完全功利化的年纪里，还能保有对完美的追求。这份追求是你以后漫长职业生涯里不会再有的奢侈品。今天，珍惜它。',
    '你在学习里总是笨拙的——别人一点就通，你要反复读好几遍才能理解；别人写论文下笔千言，你憋了一晚上还在改第一段。你觉得自己是唯一一个在这种笨拙里挣扎的人。村上春树笔下的每一个人都笨拙。他们不会社交，不会表达，在这个世界上找不到自己的位置。但他们一直在跑，在听爵士，在井底孤独地和自己对话。你年轻时，以为自己是唯一笨拙的人，后来发现所有人都笨拙，只是不同形式。你羡慕的那些学霸，他们在你看不见的地方也有自己的笨拙。可能是社交上的笨拙，可能是某门课上的笨拙。今天，不要再用别人的表面和自己的内里比较。你笨拙的节奏不是你的劣势，是你深入理解一样东西必须付出的时间。村上笔下的主人公从不因为笨拙就停止生活，他们跑得更慢，但更远。你的笨拙也是。它不是你的障碍，是你独特的步伐。继续走，用你自己的节奏。',
    '你被标准答案和考试大纲压得喘不过气。你觉得学习就是记住别人告诉你的东西，没有任何属于你自己的空间。布莱希特在纳粹上台后流亡，他的书被禁，他的戏不能演。但他用戏剧作武器，提出“间离效果”——不让观众沉浸在故事里，而是让他们保持距离，保持质疑。学习不是只接受别人告诉你的东西。你今天在课本上发现的那个问题，你在论文里提出的那个不一样的视角，你在讨论课上没有说出口但心里一直存着的那个疑问——那就是你的间离效果，是你从被动的知识接收者变成主动思考者的第一步。布莱希特说，黑暗时代需要歌声。你的提问就是你在标准答案的缝隙里唱出的歌。今天，把你心里的那个疑问写下来，哪怕它暂时没有答案。你不需要在今天就推翻什么，你只需要在今天开始质疑。质疑不是不服，是你对自己独立思考能力的第一个肯定。',
    '你觉得自己卡在两个状态之间——不再是新生，还没有变成自己想象中的那个厉害的人。你在过渡期里煎熬，觉得哪里都靠不上。美裔墨西哥作家安扎尔杜阿一辈子生活在语言和文化的边境上。她说，边境不是被遗弃的地方，是新事物的诞生地。她在那片没有人认为是中心的土地上，写出了改变无数人思考方式的《边境地带》。你现在的学业过渡期也是你的边境。你不是被卡住了，你是在两片已知大陆之间，发现只有你才能命名的新大陆。今天，不要再用“卡住了”描述自己。你在边境上，这里不属于任何已经定义好的领域，这意味着你可以定义它。安扎尔杜阿说，边境是创可贴，也是伤口。它让你的不适是真的，但它里面正在孕育的东西也是真的。你不是在浪费时间，你是在边境里等待你自己的新事物诞生。那片新大陆不需要任何人的批准，它只属于你。',
    '你觉得自己的专业是一片荒野——什么都不会，什么都陌生，每一步都踩在不确定上。你羡慕那些好像天生就属于这个领域的人。薇拉·凯瑟写美国中西部的拓荒者，写他们从欧洲来到陌生的草原，把荒野变成了家乡。拓荒者不是在寻找新的土地，他们是在把陌生的变成自己的。你的专业不是一片需要你天生就会的领地，是你正在用每一天的学习把它从陌生变成家乡的荒野。你今天背的每一个陌生词汇，都是一块被你翻过来的新土；你今天弄懂的每一个概念，都是一棵被你种下的树苗。今天，不要再用“我不属于这里”否定自己。拓荒者最初都不属于他们脚下的土地，他们是用了全部力气把它变成了家乡。你也是。你的专业现在还陌生，但你已经在把它变成你自己的领地。继续开垦，继续种树。家乡不是找到的，是垦出来的。',
    '你被学业的深度吓到了。越学越觉得自己的知识太浅，越读越觉得自己什么都不懂。你觉得自己像一只只能在浅水区扑腾的旱鸭子，不敢往深处潜。凡尔纳在《海底两万里》里写尼摩船长潜入深海，在那里发现了沉没的大陆和发光的生物。海洋不属于任何人，但它属于所有敢于潜入的人。你现在的学业也不是一片只属于天才的海域。它属于所有敢于潜入的人——包括你。你今天读的那篇论文，今天想通的那个难点，今天在深夜里还在查资料的那个问题，就是你往深处潜的每一次下潜。深海没有你以为的那么可怕，真正可怕的是你一直站在岸边。今天，潜下去一次。不是把整片海都探完，是在你最好奇的那一个点上，潜到比以前更深的地方。凡尔纳说，海底有两万里的宝藏。你的学业也有。那些宝藏不是留给天才的，是留给敢于下潜的人。你已经到了海边，潜下去。',
    '你被一次考试失败定义了很久。被一个老师的不认可定义了很久。被“你不是学习的料”这句话定义了很久。你觉得这些都是你学业里无法被改变的污点。荣格说：我不是发生在我身上的事，我是我选择成为的人。他不是在否定过去对你的影响，他是在告诉你：你的身份不是被动的结果，是主动的选择。你今天被成绩单上的数字定义，不是因为它真的能定义你，是因为你选择了把它当成全部证据。你今天也可以选择，把它只当成众多证据中的一个——而且不是最重要的那个。今天，把你被贴上的所有标签写在纸上。然后在旁边写上：这些是发生在我身上的事，不是我。荣格说，自我是炼金术的产物。你是那个炼金的人。那些污点不是你的成品，是你坩埚里的原料。继续炼，你还没有烧出你真正的成色。今天的你，是你选择成为的那个人，不是那些分数和评语把你变成的那个人。',
    '你看着别人一个个出成果——论文发表了，竞赛获奖了，保研成功了。你在自己的学业里还没有看到任何曙光，觉得自己被落下了整整一个季节。斯坦贝克在写出《愤怒的葡萄》之前，做过导游、记者、农场工人，在无数个不被看见的日子里写着没有人读的文字。他在日记里对自己说：所有伟大的事物，都是在沉默中生长的。你的学业也有自己的季节。别人开花的时候，你可能还在土里；别人结果的时候，你可能还在长根。沉默不是停滞，是你还没有到破土的时间。今天，在你坚持了很久却还没有看到回报的那件事上，再多做一点。不是为了马上有结果，是为了让你以后回头看时，能看到自己在这段沉默里把根扎了多深。斯坦贝克的种子在冬天沉默了很久，春天来时，它长成了整片葡萄园。你的春天还在路上，但你已经在土里了。沉默不是被遗忘，是还在长。',
    '你在学业里被各种声音裹挟着——考研还是工作，本专业还是跨专业，坚持还是放弃。每一个选择都带着一堆人的期待和一堆人的反对，你被架在中间，动弹不得。伯林在《两种自由概念》里区分了消极自由和积极自由：消极自由是不被别人干涉，积极自由是知道自己该做什么并且有能力去做。你需要的不是所有人都闭嘴，是你自己在这些噪音里找到自己的声音。今天，把那些不属于你的期待暂时放在一边，问自己一个问题：如果没有人会对我失望，我会选哪条路。不需要立刻有答案，但你得开始听自己的声音。伯林说，自由是知道什么是必须做的。你的必须不在任何人的期待里，在你安静下来之后那个最微弱但最不会被误认的声音里。今天，找到那个声音，哪怕它只说了一句话。它是你所有自由的起点。',
    '你想换专业，想从头学一门新技能，想彻底离开现在这条你觉得走错了的路。但你觉得自己已经走得太远了，沉没成本太大，从零开始太晚了。萨义德是巴勒斯坦裔学者，他的身份被流亡、被边缘化、被多重文化撕扯。但他没有把自己定位成一个“失去故乡的人”，他用东方学的批判重新定义了整个学术领域。开始不是从零开始，是从你已有的全部碎片开始。你现在的专业、你学过的所有东西、你走过的所有弯路，它们不是你需要甩掉的包袱，是你重新开始时最独特的资源。今天，把你已有的全部碎片列出来——你学过什么，你擅长什么，你对什么比别人多一点了解。萨义德用他的碎片重新拼出了属于自己的学术版图，你也可以。你不需要从零开始，你只需要从你已有的全部碎片开始。它们是你唯一不需要重新积累的资本。',
    '你把未来想得太确定了——考不上研究生就完了，找不到好工作就完了，这一步走错就完了。你把未来当成了一条只有一条岔路的死胡同。波普尔是科学哲学家，他提出“开放社会”的概念。他说，未来是开放的，因为它还没有被决定。历史不是一条被规定好的轨道，你的学业也不是。你今天的每一步都在创造你的未来，而不是在兑现一个已经写好的预言。你今天学的每一个知识点、做的每一个选择，都是你正在用自己的行动决定的未来。今天，把你最害怕的那个“如果考不上就完了”写下来，然后在旁边写：这只是我目前想象出来的一种可能，不是唯一的可能。波普尔说，开放的未来需要开放的心态。你不需要在今天就把所有退路堵死，你只需要在今天做一件让你离自己更近的事。未来还没有被决定，你还有今天可以行动。',
    '你把一整天都给了书本、作业、论文和考试。你的脑子被知识点塞满，你的身体被忽略，你的呼吸越来越浅。你觉得自己像一台永不停机的机器。一行禅师教人最简单的呼吸：吸气，我回到我自己；呼气，我放下。他说的“回到自己”，是把注意力从那些把你往外拉扯的东西里收回来。学习需要专注，但专注不是把自己榨干。你今天需要一次彻底的呼吸，不是为了学得更多，是为了让已经学进去的东西在你身体里沉淀。今天，在复习和复习之间，给自己两分钟真正属于自己的呼吸。不碰手机，不看笔记，只是吸气，呼气。一行禅师说，呼吸是连接身体和心灵的桥。你的内耗有一半来自你太久没有回到这座桥。今天，用一次呼吸回来。吸，回到你还在呼吸的身体；呼，放下你今天背了一整天的焦虑。你不是学习的机器，你是需要呼吸的人。',
    '你盯着自己刚写完的论文初稿，觉得它是一坨不可回收的废料。你觉得别人写得又好又快，你写的东西连自己都看不下去。海明威说过：所有的初稿都是垃圾。他不是在骂你，他是在告诉你：每一个你看到的好作品，都是从垃圾里改出来的。他的《永别了，武器》结尾改了三十九遍。初稿是垃圾，修改才是写作。你的这篇论文也不是你的终稿，是你把想法摊在纸上、还没有开始修剪的草稿。垃圾不可怕，可怕的是因为它是垃圾就不修改了。今天，不要用初稿的质量审判自己。初稿只是用来被打磨的原料，不是用来被展示的成品。把你的初稿放一放，然后拿起笔，只改一个地方——一个句子，一个词，一个段落顺序。海明威说，修改是写作。你的学习也是。你不是写得不好，你是还没有开始改。初稿的权利，就是它有权不完美。你的初稿也是。',
    '你被过去的失败一直追赶着——上次考试的名次，那次丢人的课堂发言，那个被老师批得一无是处的论文。你觉得它们已经过去了，但它们还活在你的现在，影响着你对每一场新考试的判断。福克纳在《喧哗与骚动》里写：过去从未死去，它甚至还没有过去。他不是让你被过去困住，他是告诉你：过去对你的影响，取决于你现在怎么讲述它。你今天仍然用“那次失败之后我就完了”的语调讲那件事，它就会继续在你现在的学业里发挥作用。今天，试着用另一种语调重讲一次那件旧事——不是“那次失败证明我不行”，是“那次失败之后我还在继续”。福克纳说，过去还没有过去。你可以让它继续追着你，也可以把它变成你故事里一个转折的章节。重讲一次，你现在的学业会因为你重讲的语调，开始不一样的走向。',
    '你被眼前的每一次小考压得喘不过气，觉得这一次考砸了就等于全部学业都完了。布罗代尔把历史分成短时段、中时段和长时段。短时段是事件，中时段是周期，长时段是结构。你今天考砸的那次小考是事件，这个学期的成绩波动是周期，你这个人——你的学习习惯、你的思维深度、你在失败里还没有熄灭的韧劲——是长时段。历史不取决于某一天发生的事，你的学业也是。今天，用布罗代尔的眼睛看你现在的焦虑：这次考试只是事件，它不能定义你的长时段。你的结构——你还在学，你还没有放弃，你比上学期多懂了好几个以前完全不懂的概念——才是你学业真正的底层。事件会过去，长时段会留下来。你不是被一次考试定义的，你是被你还在继续学习的全部日子定义的。长时段在你这边。',
    '你觉得自己在学业里是全世界最笨的人——实验搞砸，演讲忘词，考试把最简单的题都做错。你在这些笨拙时刻里觉得自己活着就是一场尴尬的悲剧。卓别林在最穷最苦的时代，用一个小流浪汉的形象，把悲剧变成了喜剧。人生近看是悲剧，远看是喜剧。你今天在实验室里搞砸的那个操作，在考场上写错的那道题，在课堂上说错的那句话——你以后会在某个饭局上，把它们当成笑话讲给朋友听。但现在不需要急着笑。你只需要知道，你现在看的这些悲剧，在更远的距离上，都会变成你人生故事里最生动的情节。今天，把你今天最尴尬的一个学业瞬间写下来，不是用来检讨，是用来存档。卓别林从悲剧里提炼了全世界的笑声，你也可以在你今天的笨拙里，埋下以后讲故事的种子。近看是悲剧，远看是喜剧。你还在近处，但远处已经在等你。',
    '你每天都在后悔当初的选择。如果选了那个专业，如果去了那个学校，如果那次考试多对一道题。你把现在所有的不顺利都归咎于当初选错了路。弗罗斯特写《未选择的路》，诗的标题不是“人少的路”，是“未选择的路”。他在意的不是自己选的路，是那条永远没有办法回去验证的路。你后悔的不是当初的选择，是你想象中那条没有选的路。那条路没有被你走过，所以它在你的想象里全是平坦的。它不是好，是你没有走过。今天，停止美化那条你没有选的路。把你现在这条路的好和坏都写下来——真实的好，真实的坏。弗罗斯特说，选择人少的路改变了一切。但他没有说变得更好了还是更坏了，他只是说它改变了一切。你的这条路也改变了你。你不是走错了，你只是走了。那条没有选的路只是你的想象，这条路才是你真实活过的全部学业。继续走，你还没有走到最精彩的那一段。',
    '你昨天复习得好好的，今天起床却觉得什么都不记得了。你昨天还觉得自己可以面对这场考试，今天却连翻开书的勇气都没有。你觉得这种反复是退步，是昨天的一切都白费了。E.B.怀特写了《夏洛的网》，也写了《风格的要素》。他每天早晨在纽约客的办公室坐下来，都要重新说服自己一次。不是因为他昨天写得不好，是因为每一天的写作都是新的开始，昨天的自信不能原封不动地用到今天。你的学习也是。今天忘了昨天背的东西，不代表你昨天白背了，只代表你今天需要重新激活它。你今天没有勇气翻开书，不代表你昨天建立起来的全部信心都作废了，只代表你今天需要重新说服自己一次。今天，不要用“我又回到了原点”否定自己。怀特每天早上都在同一个原点重新开始，但他从来没有真的回到原点。你也是。你只是需要今天早上的这一次重新说服。说服完了，继续。',
    '你越学越觉得自己无知。每弄懂一个问题，就发现背后还有十个你不懂的问题等着你。你觉得自己的知识像一个越挖越大的坑，永远也填不满。卡尔维诺在写《帕洛马尔》时，让主人公用一整本书观察海浪、星星、一只在草坪上发情的乌龟。他想用百科全书式的细致去穷尽世界，然后发现世界是穷尽不完的。百科全书式的知识不是用来炫耀的，是用来让你在浩瀚中保持谦逊的。你现在的无知感不是你学得不够好，是你终于学到了能看见自己无知的程度。这不是退步，是进步。今天，不要为自己不知道的东西感到恐慌。把它们列在一张纸上，这张纸不是你无知的罪证，是你下一步可以探索的地图。卡尔维诺说，谦逊是浩瀚面前唯一合适的姿态。你的知识缺口不是你的缺陷，是你还在这片浩瀚里继续航行的全部理由。',
    '你在学业里被无数次否定——被分数否定，被排名否定，被那些比你成绩更好的人的光芒否定。你开始怀疑自己是不是根本就不该走这条路。塞万提斯让堂吉诃德在所有人都笑他疯癫的时候，举起长矛冲向风车。他没有打赢，但他从头到尾都知道自己是谁：我是堂吉诃德，我要成为骑士。你的学业也需要一次堂吉诃德式的自我确认。不是确认你一定能考上，不是确认你一定能成功，是确认你选择了这条路，并且还在走。今天，把你当初选择这个专业、这个方向的理由写下来。不是为了给别人看，是为了在所有人都否定你的时候，你还有自己写给自己的这份证明。堂吉诃德没有打败风车，但他每一次冲向风车的时候，都比那些从来没有冲过的人更清楚自己是谁。你也是。继续冲你的风车。你知道你是谁，也知道你想成为谁。这就够了。',
    '你受不了学习里的不确定性。不知道这次考试会考什么，不知道自己能不能过线，不知道付出那么多努力以后会不会有回报。你急着要一个答案，一个能让你安心的保证。济慈在给弟弟的信里提出“消极感受力”这个概念。他说，莎士比亚拥有一种能力——能停留在不确定、神秘和怀疑中，而不急于追求事实和理由。学习里绝大部分时间，你都需要这种能力。不是因为你不能知道答案，是因为在答案到来之前，你需要在不确定里继续学下去。今天，把你最焦虑的那个“万一”写下来。然后对自己说：这个答案我现在还不知道，但我不需要现在就知道。济慈说，消极感受力是一种成熟。你的学业也需要这份成熟。不确定不会因为你焦虑就变成确定，但你能在不焦虑中，继续做今天该做的事。这就是你学业的消极感受力。',
    '你把焦虑当成学业的头号敌人，花大量精力去对抗它，压制它，结果越对抗越耗竭。阿兰·德波顿把哲学从学院里搬到日常生活中。他写焦虑、写工作、写旅行。他说，焦虑不是你的敌人，是你还没有被翻译成行动的潜力。你今天的心跳加速、手心冒汗、脑子里停不下来的念头，是你身体在告诉你：我有能量，但这能量还没有找到出口。你的焦虑不是一堆需要被倒掉的垃圾，是一堆还没有被分类的资源。今天，把让你焦虑的学业任务列出来，然后挑一件最小的，把它翻译成行动——翻开书，写下第一个字，把一个知识点用你自己的话复述一遍。翻译不需要完美，只需要开始。德波顿说，焦虑是潜力的另一种形态。你不需要消灭它，你只需要在今天把它翻译出来。焦虑是你的原文，行动是你的译文。今天，把第一句译出来。',
    '你觉得自己在学业里已经耗尽了全部力气，再也挤不出一丝韧性。你觉得自己不配谈坚持，因为坚持需要力气，而你已经没有力气了。帕斯捷尔纳克在斯大林时期的苏联写《日瓦戈医生》，书在国内被禁，被迫拒绝诺贝尔奖，在监视和孤立里继续写作。他没有被打倒，不是因为他还剩很多力气，是因为他每一天都在用仅剩的力气继续活。活着，仅仅活着，就是最伟大的冒险。你的学业也是。你今天不需要比别人更努力，你只需要在今天翻开书，读一行，写一个字。仅剩的力气，就是今天全部需要的力气。帕斯捷尔纳克用仅剩的力气写出了一部巨著。你不需要今天就写出巨著，你只需要在今天，用你仅剩的力气，把今天该看的那一页看完。冒险不是赢，是还在。你还在，这就是你今天全部需要的韧性。',
    '你觉得自己的起点比别人低——学校不如人，基础不如人，资源不如人。你觉得自己在学业这场竞争里还没开始就输了。简·爱对罗切斯特先生说：我贫苦，卑微，不美，但当我们的灵魂穿过坟墓站在上帝面前时，我们是平等的。她不是在否认自己的贫苦和卑微，她是在说，这些外在的不平等，不影响她灵魂的完整和尊严。你的学校、基础、资源，是你起跑线的客观条件，但它们不影响你学习时的全部投入，不影响你把一个问题弄懂时的那份满足，不影响你今天比昨天多学了一点时的那份踏实。今天，不要再用起点衡量终点。简·爱没有因为自己穷就停止争取自己的位置，你也不需要因为起跑线靠后就觉得自己不配跑完全程。跑道不一样长，但你在你的跑道上全力以赴，和你前面的任何一个人一样值得被尊重。',
    '你被一些固定表述困住了：“我不是学这个的料。”“这门课我不可能学会。”“我天生就不擅长逻辑。”这些句子像墙一样把你围在里面。维特根斯坦说：语言的边界就是世界的边界。他用一生探索语言能说什么、不能说什么。他晚年推翻了自己早年的体系，因为他发现语言不是只有一种逻辑。你的边界也是。你说“我不是学这个的料”，这句话就是你给自己筑的墙。它不是事实，是你学会的一种表述。今天，试着重述你学业的困境。不用“我不是学这个的料”，用“我还需要更多时间”；不用“我永远学不会”，用“我还没有找到适合我的方法”。维特根斯坦说，语言的边界就是世界的边界。重述你的语言，就是在拓展你的世界。你今天不能用所有词汇，但你可以换一个词。换了词，墙就会变成路。',
    '你急着想让今天种下的东西明天就发芽。今天背的单词，明天就想在阅读里认出它；今天弄懂的概念，明天就想在考试里用上它。你看不到立竿见影的回报就觉得自己的努力白费了。美国农民诗人温德尔·贝里一辈子在肯塔基种地。他写，耕种一片土地，就是信任它。你不知道今年会不会有虫害，会不会下雨，但你还是把种子种下去。你的学习也是一片需要被耕种的土地。你今天种下的知识点不会明天就发芽，但它们在地下的根系正在你意识不到的地方往下扎。今天，不要用今天的收获衡量昨天的播种。贝里说，耕种是信任。信任你播下的种子不会欺骗你，信任土地在你看不见的地方还在工作。你今天翻开书背下的每一个词，都是种下去的一粒种子。它还在土里，但它没有死。继续播，继续浇。你的信任不会辜负你，只是它需要比你的焦虑更长的时间。',
    '你觉得自己被学业的局限包围了——时间不够，精力不够，天赋不够。你觉得这些局限是你无法翻越的高墙。加缪在二战期间写《鼠疫》，写人被围困在封城里的绝望。他在冬天的正中心，在自己心里发现了一个不可战胜的夏天。你的局限不是你的囚牢。时间不够，是你发现自己可以在有限时间里变得更专注；精力不够，是你开始学会在重要的地方用力，在不重要的地方放手；天赋不够，是你终于意识到，走得更远的人不都是天赋更高的人，是更能和局限共处的人。今天，把你最觉得无法翻越的那个局限写下来，然后在旁边写：这是我心里的冬天，但它不是全部的我。加缪说，夏天在冬天里。你的夏天也是。在你心里最深的某个地方，有一份不被任何局限压垮的生命力。你不需要今天就把它找出来，你只需要在今天承认它的存在。冬天还在，但夏天在你心里。',
    '你被各种学业任务和别人的期待挤占了全部空间。你没有时间想自己真正想学什么，没有空间整理自己的思绪。你觉得自己的大脑是所有人的停车场。伍尔夫说：女人要有一间自己的房间。她不是在说物理空间，她是在说，内心必须有一块不被任何人打扰的自留地。你的学业也需要一间属于自己的房间。不是宿舍里的那张书桌，是你每天留给自己不被任何课程表占据的半小时。在这半小时里，你不是学生，不是谁的期待，你就是你自己。今天，在你的日程表上划出半小时属于你自己的房间。不做作业，不复习，只做一件你自己想做的、和学业有关但和考试无关的事——读一本你想读的书，学一个你想学的技能，写一段你真正想写的笔记。伍尔夫说，房间是自由的前提。你的学业自由也需要这半小时。它是你在所有被安排的日子里，唯一由你自己安排的空间。',
    '你给自己的学业讲了一个单一的故事：我是一个失败者，我考不好，我比不上别人。你把所有不符合这个故事的证据都过滤掉了——那次你考得还不错的科目，那个你弄懂了别人没弄懂的知识点，那个你帮同学讲明白的问题。尼日利亚作家阿迪奇在TED演讲里说：单一故事的危险在于，它不是不真实，而是不完整。你不是在编造你的失败，你只是漏掉了太多你成功的局部。今天，把你过滤掉的那些证据找回来。写下三件你在学业里做到过的事——不是比所有人都好的事，是你自己本来做不到但后来做到了的事。阿迪奇说，故事有力量。你不是失败者，你是一个被自己讲得太单薄的人。从今天起，给你的学业故事加回那些被你漏掉的章节。完整的故事不是没有失败，是同时有失败和你还在继续的全部证据。',
    '你觉得自己做的都是最基础的事——背单词，做习题，整理笔记。你觉得这些事毫无技术含量，任何人都能做。桑内特写了一本《匠人》，他在书里写木匠、石匠、玻璃吹制工，也写程序员、医生、学生。匠人不是职业的标签，是一种态度：把一件事情做到好的愿望。你背单词可以背得比别人更扎实，你整理笔记可以整理得比别人更清晰，你做习题可以做到每一道错题都真正弄懂。这些小事没有人会夸你，但它们是你在学业里唯一可以完全掌控的东西。今天，在你最基础的一项学习任务里，用匠人的标准要求自己一次——不是和别人比，是和你自己比。桑内特说，匠人的回报不在别人的表扬里，在做完一件让自己满意的事之后那个瞬间的安静里。你不是在浪费时间，你是在做你自己的匠人。那份把一件事做到好的愿望，是你学业里最不会被任何人夺走的尊严。',
    '你把学业当成一片需要被征服的荒野。你要驯服每一门课，攻克每一场考试，把你不会的东西全部踩在脚下。你把自己逼成了一台不停战斗的机器。加里·斯奈德是垮掉派诗人，也是一位禅宗修行者，他一辈子在北加州的山林里做护林员。他说，自然不是要被征服的，是要被理解的。你的学业也不是荒野，是一片需要被你理解的生态。那门你一直攻不下来的课，不是你该仇恨的敌人，是你还没有找到和它相处方式的一片森林。今天，换一种态度对待你最难的那门课——不是“我要攻克你”，是“我要理解你”。斯奈德说，理解自然的人不会被自然伤害。你的学业也是。当你不再把它当敌人，它会从一片需要被你征服的荒野，变成一片你可以自由探索的森林。你不是来打仗的，你是来理解的。',
    '你在学业里被来自不同地方、不同背景的同学包围。你觉得自己的口音、基础、眼界都不如他们，你每天都在下意识解释自己。凯瑟写美国中西部的拓荒者，那些从欧洲来的移民在荒原上扎下根，把陌生的土地变成家乡。她说，在你的家乡，你永远不需要解释自己。你的学业也需要一个不需要解释自己的家乡。它可能不是你的出生地，是你心里那片不因为任何外在条件而怀疑自己价值的地方。今天，在你觉得自己不如别人的时候，回到你的家乡——回到你最初选择这个专业时的那个理由，回到你第一次对某个知识感到好奇的那个瞬间。在那里，你不用解释你的基础够不够好，你只需要记得你为什么要出发。凯瑟说，家乡不需要解释。你的学业也有属于你自己的家乡。回到那里，待一会儿。你不需要解释给任何人听，你只需要记得你从哪里来。',
    '你在学业里太关注别人——别人的进度，别人的成绩，别人的评价。你把别人的目光当成了自己价值的唯一镜子。米沃什在流亡中写下：爱意味着学会注视你自己。他不是在写自恋，他是在写一种把你从外部评价里解放出来的能力。你的学业也需要你学会注视你自己——不是通过别人的眼睛，是通过你自己的眼睛。今天，不要去看别人的进度，不要去比较。注视一次你自己的学习——你今天学到了什么，你比上个月多懂了什么，你在哪里花了最多的时间，你在哪里找到了最真实的满足。米沃什说，注视你自己是爱的起点。你在学业里，也需要从注视自己开始，而不是从注视别人开始。你不是别人的影子，你是你自己的全部光源。今天，把你的目光从别人身上收回来，认认真真看一次你自己。那个人还在学，还在走，还在乎。他值得被你注视。',
    '你被别人的意见左右着——这个专业他们说没前途，那个方向他们说不现实。你每一次想坚持自己的决定，都被他们的声音压回来。莱辛在非洲长大，没有受过正规教育，做过保姆、接线员，三十岁带着孩子独自离开婚姻，写作。她得了诺贝尔奖。无论你做什么，只要是你自己决定的，就是对的。不是因为你的决定一定对，是因为是你做的。你的人生不需要被别人的意见投票通过。今天，在你最被质疑的那个学业选择上，对自己说：这是我自己的决定。莱辛说，自己决定的事就是对的。不是因为不会后悔，是因为你终于把人生的方向盘从别人手里拿了回来。你的学业方向不需要所有人理解，它只需要是你自己选的。选了，就继续开。路上的风景是你的，不是任何人的。',
    '你一个人在图书馆里坐到闭馆，一个人在深夜的走廊里背书，一个人在考试失败后收拾散落一地的笔记。你觉得这种孤独是无法被理解的。帕蒂·史密斯是朋克教母，也是诗人。她年轻时在纽约，穷得睡在公园长椅上，用捡来的纸写诗。她的朋友罗伯特·梅普尔索普在临终前对她说：我们只是孩子，但我们有力量。你的孤独也是你的力量。那些一个人熬过的夜晚，那些没有人看见的坚持，那些你没有向任何人解释的放弃和重新开始，它们是你正在积蓄的全部力量。今天，不要用“孤独”这个词描述你的处境，用“一个人的蓄力”。帕蒂·史密斯说，孩子有力量。你也是。你一个人的力量不来自任何人的见证，来自你还在一个人继续。你不是在孤独里沉没，你是在孤独里积蓄。等有一天你从这片孤独里出来，你会比从来没有独自熬过的人，更有力量握住属于你的东西。',
    '你被学习里的重复消耗着——同样的题型，同样的公式，同样的背书。你觉得学习就是不断重复别人已经知道的东西，没有任何属于你自己的创造。玛丽·雪莱在十八岁那年，和几个朋友在暴风雨的夜晚比赛写恐怖故事。她梦见一个科学家用电流造出了活人，然后写出了《弗兰肯斯坦》。创造是孤独的解药。学习不只是重复已有的知识，也是你用自己的方式重新组织它们、重新发现它们的过程。你今天整理的那份笔记，你用自己话复述的那个概念，你把两个看似不相关的知识点连起来时那个刹那的灵光，都是你的创造。今天，在你的复习里找一次可以创造的机会——画一张只有你自己看得懂的知识结构图，写一段你自己的学习心得，把一道题的解法用你自己的思路重新走一遍。雪莱说，创造是解药。你的创造不会改变人类的知识总量，但它会改变你和知识的关系。从被动的接收者，变成主动的创造者。',
    '你被学业的长期战耗尽了全部热情。刚入学时的兴奋没有了，对知识的好奇没有了，只剩下每天必须完成的硬性任务。斯坦贝克在写《伊甸之东》时，每天在日记里和自己对话。他写到崩溃，写到怀疑自己，但他每天在日记里写同一句话：我现在还活着，这就是全部。他不是在自我麻醉，他是在提醒自己：只要活着，就还没有结束。你的学业热情可以被耗尽，但你没有耗尽。你今天还坐在书桌前，还在翻书，还在看这段话。斯坦贝克说，只要还活着，就还有可能。你今天不需要恢复刚入学时的全部热情，你只需要在今天，收集今天发生的所有微光——你今天弄懂了一个小问题，你今天多坚持了十分钟，你今天的笔记比昨天写得更整齐。把这些微光收集起来，它们不是用来照亮未来的，是用来让你今晚能安心闭上眼睛的。你现在还活着，还在继续，这就是你今天全部需要的胜利。',
    '你被日复一日的复习淹没了。每一天都像复印机里吐出来的同一页，今天和昨天没有区别，明天也不会和今天有区别。你觉得这些被重复填满的日子，是不值得被记住的。马尔克斯在《百年孤独》里让失眠症蔓延，人们开始遗忘事物的名字。但他们发现，对抗遗忘的办法不是记住全部，是选择记住那些值得的日子。生命不是我们活过的日子，而是我们记住的日子。你今天觉得毫无意义的重复，正是你以后会记住的日子——不是因为它精彩，是因为它构成了你这段全力以赴的岁月。你在这里面流过的汗、忍过的困、咽下去的焦虑，以后会被你反复拿出来，用另一种语调讲述。今天，在你的日历上画一个记号。不是为了纪念什么成就，是告诉未来的自己：这一天我活过，我在这里。马尔克斯说，记忆是生命的重量。你今天埋下的每一粒时间的种子，都会在以后长成你回头时能看见的路标。',
    '你觉得自己被一道门挡住了——那道门叫“考研”“考公”“上岸”。你以为它是唯一的出口，但它关着，你敲了很久也没有开。卡夫卡写《城堡》，土地测量员K用尽一生想进入那座近在咫尺却永远无法抵达的城堡。他写《审判》，约瑟夫·K在等待一场永远不会开始的审判。卡夫卡的人物永远在被什么东西挡着，但他们从来没有停止过试图穿越。道路是无穷的。你今天盯着的那道门，不是你唯一的出口。卡夫卡的门不是用来通过的，是逼你找到门旁边的那些你以前从来没有注意到的墙、窗、裂缝。今天，在你敲了很久的那道门旁边，找一扇你以前没有注意过的窗。不是放弃，是拓宽。卡夫卡说，门是无穷的，道路也是。你没有被困住，你只是暂时还在找门。继续找，你的方向不只有别人规定的那一个。',
    '你被学业的压力挤压到觉得自己已经不再是自己了——你好久没有读闲书，好久没有和朋友无所事事地度过一个下午，好久没有做和学习无关但让你快乐的事。你觉得自己的生命被学业征用了。狄更斯在《双城记》里写，得到生命时附带有一个条件：我们应当勇敢地保护它。保护生命不是保护你每一次考试的成绩，是保护你在最忙最累的时候，仍然记得你不是一个学习的机器。你今天可以因为学业暂时放下很多事，但你不能把自己也放掉。今天，在复习的间隙，做一件保护你生命的事——听一首你喜欢的歌，去阳台吹一会儿风，给一个你很久没联系但很想念的人发一条不关于考试的消息。狄更斯说，保护生命是勇敢的。你在最忙的时候还能为自己做一件与学习无关的事，不是浪费时间，是你在保护属于自己的那部分生命。继续学，也继续活。',
    '你把学习搞得太复杂了——报各种班，买各种资料，用各种方法论把每一天切得支离破碎。你觉得自己在努力，但大脑里像一间堆满杂物的房间，什么都有，什么都找不到。托尔斯泰晚年放弃贵族生活，追求一种极致的简单。他写短篇小说、民间故事，把最深的道理放在最朴素的语言里。他说，最伟大的真理是最简单的。你今天需要托尔斯泰式的简化——把你桌上的资料减到只剩最核心的那几本，把你今天的任务减到只剩三件真正重要的事。不是学得越多越好，是学得越精越好。今天，从你堆满桌面的资料里挑出三样，把其余的暂时放进抽屉。你的大脑不是仓库，是一间需要留出空地才能走动的房间。托尔斯泰用最简单的文字写尽了人生的全部真相，你也可以用最简单的计划，完成你今天最核心的任务。简化不是偷懒，是找到真正重要的东西。',
    '你被学习的功利主义压得透不过气。你选这门课是因为它好过，你读这本书是因为它会在考试里出现，你做的每一件事都必须有用。你已经很久没有为一首诗的某一行停下来过，没有为一个公式的美感触动过。陀思妥耶夫斯基说：美将拯救世界。他不是在写诗意的逃避，他是在写：在一切都被功利的泥沼拖住的时候，对美的敏感是你保持清醒的最后一块阵地。你今天在学习里也可以被美拯救一次——在你的专业里找一个让你觉得美的东西，可以是一个证明的优雅，可以是一段代码的简洁，可以是历史叙事里某个让人心动的瞬间。不是为了考试，就是为了提醒你自己：你学的东西不止是工具，也是人类几千年文明里留下来的美。陀思妥耶夫斯基说，美可以拯救。你今天不需要被拯救世界，只需要被美从功利里拯救出来片刻。那个片刻会让你重新想起，你为什么当初选了这个专业。',
    '你被套话包围着——论文要写“创新点”，简历要写“综合素质”，面试要说“对这个行业有深厚热情”。你觉得自己在不停的包装里越来越不认识自己。奥威尔一生都在反对套话。他在《一九八四》里创造了“新话”，在《政治与英语语言》里说：陈腐的语言会腐蚀思想。在谎言遍地的时代，说真话就是革命行为。你的学业也需要一次奥威尔式的语言清洗。今天，试着用最直白的语言重新描述你的学业——不写“我深入掌握了理论知识”，写“我把这个概念弄懂了”；不写“我有较强的学习能力”，写“我花了两个星期终于啃完了一本以前看不懂的书”。把你简历里、论文里、自我介绍里那些被用滥的词替换成只有你才会说的句子。奥威尔说，语言腐败会带来思想腐败。你的诚实不是不包装，是拒绝用虚假的包装欺骗自己。革命从你下一次用自己话写下的第一句开始。',
    '你羡慕那些可以轻轻松松对待学业的人——他们不在乎成绩，不在乎未来，不在乎自己有没有在浪费时间。你觉得他们比你快乐，而你在痛苦里挣扎。赫胥黎在《美丽新世界》里让“野人”约翰在快乐药丸和痛苦自由之间选择了后者。他说：我宁愿做痛苦的苏格拉底，也不愿做快乐的猪。你在学业里感受到的不是你的惩罚，是你还没有麻木的证明。苏格拉底在被审判时还在追问真理，你的痛苦也是你还在追问的表现。你在乎成绩，是因为你还有期待；你在乎未来，是因为你还没有放弃自己。今天，不要再用别人的轻松否定自己的痛苦。赫胥黎说，清醒的痛苦是人的尊严。你的痛苦不是你的缺陷，是你还在用清醒的眼睛看着自己的学业，还在为值得的事焦虑。继续做苏格拉底。猪的快乐是廉价的，你的痛苦是昂贵的。它证明你还在乎，而还在乎是改变一切的前提。',
    '你反复回想自己在考场上的那个失误，在论文里写下的那个错误论点，在课堂上说错的那句话。你觉得这些错误像洗不掉的墨水渍，把自己的学业染花了。乔伊斯用整本《尤利西斯》写一个普通人在都柏林一天之内全部的意识——混乱、错误、不体面的念头。他没有把这些东西当成污点，他让它们成为文学。错误是发现新大陆的入口。你的错误不是你的终审判决，是你还没有被发掘的新大陆。今天，拿出一个你反复自责的错误，用乔伊斯的眼光重新看它一次——不是作为需要被删除的错误，是作为你了解自己的一个入口。这个错告诉了你什么？是你太着急，是你在那一刻做出了当时最好的决定，还是你发现了一个以前从来不注意的知识盲区。乔伊斯把最混乱的一天变成了不朽的文学，你也可以把你最混乱的错误，变成你学业地图上被新标注出来的航道。错误不是你的终点，是你偏航后发现的新大陆。',
    '你每天都在羡慕别人——他比我聪明，她的基础比我好，他们好像天生就适合这个专业。你觉得自己被分配了一双最差的眼睛，只能看到自己的不足。普鲁斯特哪里都没有去，只是躺在一个密不透风的房间里，用全新的眼睛重新看了一遍自己全部的一生。真正的发现之旅不在于寻找新的风景，而在于拥有新的眼睛。你不需要换专业、换方向、换天赋才能发现你学业的价值。你需要的是把你那副看惯了自己不足的眼睛，换一副能看见你已经走了多远的新眼镜。今天，用这副新眼镜看一次你正在学的专业——不是看别人比你强在哪里，是看你比昨天多懂了一点什么。普鲁斯特从一块玛德莱娜蛋糕里发现了整个童年，你也可以从你今天弄懂的一个小问题里，发现你正在慢慢变好的全部证据。新眼睛不在别人那里，在你决定换一种方式看自己的时候。',
    '你总觉得自己不行——还没考试就觉得自己会考砸，还没开始就觉得自己不是这块料。你把这种自我怀疑当成清醒，当成你比别人更现实的表现。契诃夫是医生，也是作家，他见过了太多被生活打倒的人，但他笔下的小人物从来不是完全放弃希望的。他说：人相信自己是什么，自己就是什么。你的“我不行”不是预言，是你反复对自己重复的一句台词。你今天相信自己是学不会的，你今天就会在翻开书之前就已经放弃了一半。今天，试着换一句台词：不是“我能行”，那太远了；是“我还在学”。契诃夫说，相信自己是什么就是什么。你不是在假装成功，你是在塑造你的起点。把“我不行”改成“我还在学”，你就已经从放弃的那一边，挪到了还在走的这一边。还在走的人，比已经停在原地的人多了一切可能性。',
    '你在学业受挫时到处找人倾诉——找同学抱怨考试太难，找家人抱怨压力太大，在社交媒体上转发各种“学习太难了”的段子。你说出来会好受一点，但说完之后压力还在那里。马克·吐温用幽默对抗了一生的荒诞。他说：不要到处抱怨你上了当，因为别人能为你做的，只是同情。他写《哈克贝利·费恩历险记》，让一个孩子在密西西比河上独自面对所有道德难题。没有人能替他做决定。你的学业也是。别人可以同情你，但没有人能替你背下那些单词，替你解出那道方程。今天，不要再把倾诉当成解决问题的替代品。马克·吐温的方法是把苦难写成笑话，你可以在今天用幽默把你最焦虑的那件事重讲一遍——不是用它来解决，是用它来和你拉开距离。当你开始笑的时候，你已经从被压着的人，变成了站在旁边看它的人。幽默不是逃避，是你重新夺回主导权的第一步。',
    '你觉得自己在学业里已经变成了一具行尸走肉——每天重复同样的事，没有任何热情，没有任何期待。艾米莉·勃朗特在约克郡荒原上写出了《呼啸山庄》，那里面的希斯克利夫和凯瑟琳，用一生的时间爱和恨，燃烧到生命最后一刻。她最怕的不是死亡，是生不如死。你现在最怕的也不是考试失败，是你已经很久没有感觉到“活着”这件事了。今天，在你被学业压得麻木的时候，找一件让你重新觉得“我还在活着”的事——去外面淋一场雨，在操场上跑到喘不过气，把一首诗用最大声念出来。不是为了考试，不是为了成绩，是为了让你重新听见自己还有心跳。勃朗特说，生不如死是最可怕的。你还在呼吸，但你忘了你的灵魂也需要氧气。今天，给它一口不是来自课本的空气。',
    '你觉得自己现在的学习没有任何价值——你只是在消费知识，在为了分数而学习，在做别人做过的事。歌德在《浮士德》的结尾让主人公在填海造地的劳动中找到了满足。他说：你若要喜爱你自己的价值，你就得给世界创造价值。你的学业现在可能只是在消费——消费课本、消费讲义、消费别人发现的定理。但你可以从今天开始创造：把你今天学的知识用你自己的话讲给别人听，把你整理的那份笔记分享给需要的同学，把你对某个问题的理解写成一篇只有几百字的心得。歌德说，价值是创造出来的。你不需要等到毕业才能创造价值，你现在就可以。今天，在你学过的内容里找一个你真正理解了的东西，把它创造性地输出一次——不是抄，是用你的方式。那份输出是你今天能给自己最实在的价值。',
    '你被各种外部枷锁捆绑着——家庭的期待、学校的规则、社会对成功的定义。你觉得自己的学业不是自己的，是替别人完成的。卢梭说：人是生而自由的，却无往不在枷锁中。他不是让你把枷锁全部砸掉，他是在让你在枷锁中找到属于你自己的自由。你的学业里也有你可以控制的自由——不是选不选这个专业，是今天你用什么态度面对它。是你自己选择把这篇论文写好，是你自己选择把那道难题弄懂，是你自己选择在别人都敷衍时认真。今天，在你觉得最不自由的学业里，找到一件你完全自主决定的事——你怎么做，你做到什么程度，你给它注入什么样的态度。卢梭说，枷锁无处不在，但自由也是。你的自由不在枷锁外面，在你对待枷锁的方式里。今天，用一次自主的选择，在你的枷锁里行使自由。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
