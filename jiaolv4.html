(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '入职第三个月，你发现自己变成了办公室里最沉默的那个人。不是不想说话，是不知道该说什么——方案被否了三次，你在会议室里笑着点头，把修改意见一条一条记下来。笔记本写满了，心里也塞满了。你想起海明威说过，写作就是把那些不需要的东西删掉。他在《午后之死》里谈斗牛，说斗牛士在生死之间的动作没有一下是多余的。你现在也在斗牛场里。那些被否掉的方案不是你的失败，是你删掉的冗余。每一次修改都在去掉多余的动作，让你更接近那个最简洁、最有力的表达。世界以痛吻我，要我报之以歌——泰戈尔这句诗不是让你硬挤笑容，是让你把疼痛本身变成你唱出来的东西。你笔记本上那些修改意见，就是你正在写的歌。继续写，继续改，继续删掉多余的东西。等到你站在下一次提案的会议室里，你会发现自己的动作已经像斗牛士一样干净利落。简洁不是天生的，是删出来的。你正在变锋利。',
    '加班到深夜，你一个人坐在空荡荡的办公室里，忽然想起入职前那个暑假——那时候你对职场充满期待，觉得自己可以改变世界。现在你坐在格子间里，做着琐碎的表格，回复没完没了的邮件，觉得离那个自己越来越远。普鲁斯特用一卷又一卷的文字追回逝去的时光，他不是要回到过去，他是在重建——用记忆的碎片拼出一个比现实更真实的自己。凡是过往，皆为序章——莎士比亚在《暴风雨》里写的这句话，不是让你否定现在，是让你把过去当成起点，而不是终点。你当初那个想要改变世界的自己并没有消失，他只是被这三个月的疲惫暂时埋住了。把他挖出来。在今晚下班之前，在便利贴上写一句话：我今天做的哪件小事，和当初那个愿望还有一点点关系。把它贴在你明天一抬头就能看到的地方。你不是离他越来越远，你是在绕一条更长的路去接近他。那条路上的每一步，包括今晚的加班，都不是白走的。',
    '你犯了一个错误。不是那种小到可以忽略的笔误，是一个真正让领导皱眉、让同事侧目的错误。你坐在工位上，感觉自己像在等待一场审判。卡夫卡写《审判》，约瑟夫·K不知道自己犯了什么罪，却被一层一层地审判。但你和他不一样——你知道自己错在哪里。这就是你比他幸运的地方，也是你能够翻盘的地方。卡夫卡的另一面不是绝望，是一种近乎偏执的认真：他在保险公司当小职员时，写得一手好报告，深得上司信任。他把审判变成了日常的严谨。人可以被毁灭，但不可以被打败——海明威这句话说的是：败不是摔倒，是摔倒之后不爬起来。你今天摔的这一跤很重，但你还没有被打败。明天早到十分钟，把那个错误拆开来看：哪里出的问题，下次该怎么避免。把它写成一份只有自己看的复盘。审判你的不是领导，不是同事，是你自己。当你做了自己的法官，你就赦免了自己。把那份复盘放在抽屉里，重新开始。你没有被审判，你只是经历了一场提前交卷的考试。下次，你会考得更好。',
    '你觉得这份工作没有意义。每天重复同样的事，填同样的表格，开同样的会，说同样的话。你觉得自己像那个每天推石头上山的西西弗，石头推到山顶又滚下来，第二天再推，周而复始。加缪说，西西弗是幸福的。因为他在推石头的过程中找到了属于自己的节奏，他在荒诞里选择了反抗——不是拒绝推石头，是清醒地知道石头会滚下来，依然推。重要的不是治愈，而是带着病痛活下去——加缪这句话不是让你习惯麻木，是让你在重复里找到属于自己的意义。也许意义不在工作本身，在你用工作的收入支撑的生活——你给家人发的红包，你周末去上的那个兴趣班，你在深夜翻开的书。石头是推不完的，但你可以在推石头的间隙里抬起头，看看天，看看远处的海，看看身边和你一起推石头的人。你们相视一笑，这就是反抗。继续推石头，但要清醒地推。你不是机器，你是在荒诞里依然保持清醒的人。这就够了。',
    '你觉得自己在工作中总是差那么一点点。方案做得不够漂亮，汇报时表达不够流畅，和客户沟通时反应不够快。你看着那些做得好的同事，觉得他们拥有你永远追不上的天赋。福楼拜写《包法利夫人》时，经常为一句话反复修改好几天，他说：魔鬼藏在细节里。他不是要你变成完美主义者，是要你学会把一个大问题拆成无数个可以逐个击破的小问题。你的差距不是天赋的差距，是细节的差距。把那个让你自卑的同事的方案拿来，和自己的对比。不是比谁更好，是比哪里不一样。他的结构怎么搭的，他的数据怎么呈现的，他的开场白怎么写的。把差距拆成一张清单——不是用来打击自己，是用来逐个攻克的。每攻克一个细节，你就离他近了一步。魔鬼藏在细节里，天使也是。你不必在天赋上和任何人比，你只需要在细节上，一个接一个地追。今天改进一个细节，明天再改进一个。那些被你修正的细节，会累积成你日后让别人仰望的功底。',
    '每周一早上，你都在地铁里被一阵莫名的焦虑淹没。脑子里像有一条没有堤岸的河：本周的汇报还没准备好，上周的邮件还没回复，那个难缠的客户又要来找你。这些念头无头无尾，横冲直撞，让你的心跳比地铁还快。乔伊斯用四十页写一个人一天之内的全部意识，那些混乱的、琐碎的、跳跃的念头，恰恰构成了一个完整的、真实的人。你的焦虑不是你的软肋，是你对工作的责任感在尖叫。我们唯一需要恐惧的，是恐惧本身——罗斯福这句话不是让你消灭焦虑，是让你别怕自己的焦虑。焦虑是你还在乎的证明。把那些乱窜的念头从脑子里搬到纸上——本周要做的三件事，上周没回的邮件该怎么回，那个客户要怎么应对。写下来，它们就不再是失控的洪流，而是你可以逐条处理的任务清单。在地铁到站之前，你已经有了今天的第一份成果。焦虑还在，但你已经在驾驭它，而不是被它驾驭。',
    '你在团队协作里被夹在中间。领导说往东，同事说往西，你觉得两边都有道理，但你必须选一边。你怕选错了得罪人，怕选对了也里外不是人。陀思妥耶夫斯基的小说里永远充满了互相冲突的声音——没有哪一个声音是绝对正确的，真正的智慧在声音与声音的对话之间。你不是要选边站，你是要当这些声音之间的调解人。兼听则明——把领导的意见和同事的意见都放在同一张桌子上，不是让你评谁对谁错，是让你找到它们之间那个可以接合的点。那个点才是你该站的地方。你不是夹心饼干里的奶油，你是把两片饼干连在一起的那层东西——没有你，它们就散架了。今天，把两边的话都听完，然后在纸上写下：他们之间有没有一个共同的目标，哪怕是用不同的方式在表达。找到那个共同目标，你就找到了你的立场。你不是在选边，你是在缝合。这是你在团队里最有价值的能力。',
    '你在职场上被情绪裹挟。被领导批评了一句，你可以沮丧一整天；被同事夸了一句，你又觉得自己什么都能做。你的情绪像过山车，别人随便按一个钮，你就跟着上上下下。契诃夫当了一辈子医生兼作家，他看人有一种临床的冷静——不煽情，不审判，只是观察。他说，事实是神圣的，解释是自由的。领导批评你的那句话是事实，你对那句话的解释是自由的。你可以解释成“我完蛋了”，也可以解释成“他在给我指出一个改进的方向”。把事实和解释分开。今天，把一件让你情绪波动的事写在纸上：左边写事实，右边写你脑子里冒出来的解释。然后问自己：右边的解释是不是唯一可能的解释。你会发现，你给自己的很多解释，比事实本身更糟糕。把那些过于糟糕的解释划掉，换一种更冷静的解释。你不是在自欺欺人，你是在练习客观地看自己。这是职场里最稀缺的能力——情绪稳定不是没有情绪，是能把自己的情绪放在解剖台上看清楚。',
    '你觉得现在的工作就是一份折磨。加班太多，薪水太少，领导太难伺候，同事太卷。你觉得自己掉进了一个不想待的坑里，每天都想辞职。坎贝尔研究了全世界所有的神话，发现所有英雄都走过同一条路：被召唤、拒绝召唤、遇到导师、跨越门槛、经历磨难、带着宝藏回来。你现在就在磨难那一段——最黑、最长、最想放弃的那一段。那些杀不死我的，会让我更强大——尼采这句话不是让你硬扛，是让你在扛的过程中长出新的肌肉。你不需要在这份工作里待一辈子，但你可以把它当成你英雄旅程里的一站。把你不喜欢的每一项任务，都当成一个你要打败的怪物。怪物的另一边，是你从这份工作里能带走的能力——抗压能力、沟通能力、对一个行业的了解。你不是在浪费时间，你是在攒宝藏。攒够了，带着它们去下一个冒险。但在此之前，先好好打怪。每一个怪物都是你经验值的一部分。',
    '你在职场里觉得自己像一颗随时可以被替换的螺丝钉。每天做着重复的事，没有人关注你，没有人认可你，你觉得自己可有可无。梭罗一个人跑到瓦尔登湖边，自己盖房子、种地、劈柴。他说：我走进森林，是因为我希望有意识地生活，吸取生命中所有的精华。你不是螺丝钉，你是一个人——一个可以在格子间里进行内心修行的人。梭罗在湖边两年，写出的书影响了无数人。他不需要观众，他只需要全神贯注地活。你现在的工作或许不够耀眼，但你可以把它当成你的瓦尔登湖——在这里，练习专注，练习认真，练习把手头的小事做到极致。没有人关注你的时候，正是你可以不被任何人干扰地打磨自己的时候。今天，选一件你平时觉得没有意义的小事——整理一份表格，归档一堆文件，回复一批邮件——用你全部的注意力去做它。不是因为它有意义，是因为你赋予了它意义。有意识地活，就是在最平凡的劳作里，活出你自己的深度。',
    '办公室里流言四起，说部门要裁人。每个人都在交头接耳，有人开始偷偷刷新简历，有人四处打听内幕，整个办公室像一艘在风暴里乱转的船。你也慌，但你告诉自己：先把手头这份报告写完。吉卜林在《如果》里写：如果你能保持头脑清醒，当周围所有人都失去理智时……这首诗是一个父亲写给儿子的全部人生智慧。风暴里最稀缺的不是信息，是镇静。你不是不害怕，你是选择不被恐惧牵着走。写完那份报告，做好今天该做的事。裁员不是你说了算的，但手头这份工作的质量是你说了算的。当风暴过去，那些在风暴里依然保持航向的人，会被记住。不是因为勇敢，是因为他们在所有人都乱的时候，还守住了自己的舵。今天，做那个守住舵的人。你的镇静不是冷漠，是你给自己，也是给身边人最稳的一块压舱石。',
    '你被同事塞了一堆不是你分内的活。他说得那么诚恳，你说不出“不”字，于是你加班到深夜，做着一份没有署名的工作，看着朋友圈里别人早就下班的生活。简·奥斯汀写客厅里的社交，写那些被期待捆绑的女性如何在一句话、一个眼神里守住自己最后的边界。她的女主角从不粗暴拒绝，但她们知道如何用礼貌划出一条线。一半的热情，是为了不让另一半毁掉自己——你的善良必须有边界，不是因为你自私，是因为你的精力有限。今天，试着用一句礼貌但清晰的话拒绝一个额外的请求：“我很想帮你，但我手头也有几件必须在今天完成的事。”不需要道歉，不需要解释太多。你拒绝的是那件事，不是那个人。当你开始保护自己的时间，别人也会开始尊重你的边界。这不是冷漠，是你终于学会了在帮别人之前，先帮自己。你的边界不是墙，是门。你决定什么时候开，什么时候关。',
    '你在公司年会上举着酒杯微笑，和每个人点头致意，说着“辛苦了”“新年快乐”“新的一年继续努力”。你觉得这些笑脸都像戴着面具，包括你自己的。皮兰德娄一生都在写面具——每个人在社会里都有一个被分配的角色，但角色不是真实的人。你以为你了解我，其实你只看到了我的面具。你不是虚伪，你是在完成职场社交的必要仪式。面具不可怕，可怕的是你戴久了忘记摘下来。今晚回到家里，把门关上，把面具摘掉，在镜子前看看自己。那个人还在，他没有被面具闷死。年会结束了，那些社交应酬是必要的，但它们不是你生活的全部。你是那个回到家还能感受到疲惫、还想读两页书、还知道自己在为什么而努力的人。面具是工具，不是你的脸。用完了，就放回抽屉里。明天上班再拿出来戴上，但今晚，你属于你自己。',
    '你入职一年，同期进来的同事升了职，你还在原来的位置。你在茶水间听到这个消息，端着杯子回到工位，坐在椅子上，觉得自己被落下了。斯坦贝克写《愤怒的葡萄》，一家人在大萧条里一路向西，土地贫瘠，前路茫茫，但他们一直在走，一直在长。他在日记里对自己说：所有伟大的事物，都是在沉默中生长的。你的成长不需要被升职通知来证明。你现在做的那些基础工作——整理数据、对接客户、写好每一份不起眼的文档——都是在沉默中扎根。根不是用来被看见的，根是用来在暴风雨里抓住泥土的。别人先开了花，不代表你的根比他们浅。继续沉默地生长，在你的节奏里，不在别人的升职邮件里。当你觉得落后时，低头看看自己的根，它们还在往下钻。等到你开花的时候，你会比那些早开的花更不容易被风吹倒。沉默不是没有声音，是你的力量还没有到需要被展示的时候。',
    '你在职业选择上站到了十字路口。一条路是稳定的、大家都会选的，另一条是你想走但没什么人走过的。所有人都劝你选第一条，你自己想选第二条。弗罗斯特写过一首只有二十行的诗，诗里那个人站在岔路口，选了人迹更少的那条路。他说，那个选择改变了一切。他没有说那条路更好走，他只是说，那是他自己选的。林中有两条路，我选择了人迹更少的那一条——选哪条路都会有遗憾，选哪条路都会在深夜里怀疑自己当初是不是该走另一条。但至少，当你走在那条人少的路上，每一步都是你自己的脚印。你不必现在就做出完美的选择，但你可以先往那条你想走的方向迈一小步——做一个相关的项目，学一项那个方向需要的技能，认识一个已经在那条路上的人。每一步小步子都会给你更多信息。到最后你会发现，不是路决定了你，是你走路的姿势决定了那条路的样子。选一条让你愿意认真走的路，然后走好每一步。',
    '你从早到晚被会议填满，从一个会议室赶去另一个会议室，一天下来什么事也没做，但累得像被抽干了力气。你没有时间思考，没有时间整理，没有时间问自己：我今天到底在忙什么。伍尔夫说，女人要有一间自己的房间。她不只是在说物理空间，她是在说心灵必须有一块不被任何人打扰的自留地。一个人能使自己成为自己，比什么都重要——你在职场里被各种人的需求撕扯，但你每天至少要留出半个小时，谁也不能占用。不是午休，不是通勤，是一段你完全属于自己的时间——关掉消息通知，不去想KPI，只做一件让你觉得“我是我”的事：读几页书，写几行日记，或者就只是发呆。这半小时是你职场的肺，没有它，你会在连续不断的会议里窒息。从今天开始，在你的日程表上每天划出半个小时的“房间”。雷打不动。你不是在偷懒，你是在保护那个能让你在所有撕扯里仍然保持完整的自己。',
    '你被领导当众批评了一句，一整天都在反复回想那句话。你在心里想象了一百种后果：领导对我失望了、这个月的绩效悬了、同事肯定在背后笑我。你越想越真，像真的已经发生了。马可·奥勒留是罗马皇帝，也是斯多葛学派的哲学家。他在行军打仗的间隙里给自己写笔记：你痛苦的不是事情本身，而是你对事情的看法。他把这句话反复写给自己，因为当皇帝的人每天要面对的信息和情绪比常人多百倍。那件事已经发生了——领导说了那句话。它只发生了一次，但你在脑子里把它重播了一百遍，它对你造成了一百次伤害，而后面九十九次都是你自己给的。今天，试着在脑子里只让那件事发生一遍。它过去了，就不许再回放。你每一次想回放的时候，就对自己说：事实已经结束，剩下的只是我的解释。你可以选择一种不那么伤害自己的解释——他只是那天心情不好，他在那一瞬间说了那句话，和我整个人没有关系。这一遍解释，就是你放过自己。',
    '你在工作中总想出成绩，想让所有人看到自己的能力。可你的提案被否了，你的汇报没被记住，你觉得自己做的事都没有被人看见。赫塔·米勒在罗马尼亚的专制政权下写作，她的文字长期不被允许发表。她在暗处写了多年，没有人知道她，没有人给她掌声。后来她得了诺贝尔文学奖。她说，沉默的岁月里，她学会了让文字在地下扎根。谷穗越饱满，头垂得越低——你现在的沉默不是被忽视，是你在把自己的根往下扎。你做的那些没有被看见的工作，不是白费的，是在地下建构一个以后能支撑你全部高度的根系。不要急着冒头。头低一点，根深一点。等到你的根系足够发达，你不用去争，别人会看到你。现在，继续在暗处扎根。你每一次认真写下的文档、每一次用心准备的汇报、每一次没人注意到的细节优化，都是一根新的根。它们现在在地下，但它们会托起你以后所有的果实。',
    '你在职场里总觉得自己格格不入。别人在饭局上谈笑风生，你觉得别扭；别人在开会时抢着发言，你总是想好了才说；别人在团建时玩得尽兴，你觉得很累。你觉得自己是不是不适合这个社会。葛兰汀是自闭症患者，也是全世界最著名的动物科学家之一。她说，大自然从来不会创造两个一模一样的东西。如果世界只有一种大脑，那才是最危险的事。你的不一样不是缺陷，是你提供了一种和别人完全不同的视角。你在饭局上不说话，但你观察到了每个人的状态；你在会上不抢话，但你的发言经过深思熟虑，一针见血；你团建时觉得累，因为你比别人更敏感，更能体会到微妙的氛围。职场不需要所有人都一个模子。你不需要削足适履，你需要找到那个需要你这种视角的位置。那个位置存在，只是你还没有遇到。在没有遇到之前，先不要急着变成别人。你的不一样，是你未来最稀缺的竞争力。',
    '你觉得自己被困住了。经济下行，行业萎缩，公司裁员，你每天上班都像走在薄冰上。你不知道明天会不会被裁，不知道自己的未来在哪里。阿甘本在研究危机时说，危机的另一面是契机。旧的东西倒塌了，新的东西才有空间长出来。危机不仅意味着危险，也意味着机会——这句话被无数人用烂了，但它是真的。你现在感到的危机，正在逼着你重新审视自己：除了现在这份工作，我还能做什么；除了现在的行业，我还能去哪里。你不是被动等待被裁的人，你是那个在危机里主动学习新东西、主动接触新方向、主动给自己准备备选方案的人。旧的结构在瓦解，但你已经在为新的结构画图纸。抓住危机里的每一天，去学那个你一直想学但没时间学的技能，去认识那些在你想去的领域里已经深耕的人。危机不会等你准备好，但你可以跑在危机前面。等你跑出一段回头看，你会发现，那个曾经让你彻夜难眠的危机，是你人生转折的第一个推力。',
    '你在做一份自己不喜欢的实习，每天贴发票、订会议室、帮同事取快递。你觉得这种日子毫无价值，你读了那么多年书就是为了干这个。奥登是二十世纪最伟大的英语诗人之一，他年轻时在市政厅当过小职员，在战时做过新闻审查员。他写诗，也写过关于工作的散文，他说：没有一份工作是不值得认真对待的。不是因为工作本身高贵，是因为你是那个认真对待它的人。你今天贴的发票、订的会议室、跑的每一趟腿，都在训练你一种能力——把小事做到极致的能力。这种能力会跟你一辈子，不管你以后做什么。你读的那些书、你心里的那些抱负，它们不会被这些琐碎的工作消磨掉。相反，它们会在这些琐碎里被磨得更锋利。当你从最不起眼的工作里都能找到尊严，你就已经比大多数只会抱怨的人强出一大截。把今天的发票贴整齐，把会议室订到最合适的时间，把同事托你的事交到对方手里时多一句确认。你做的不是小事，是你自己的职业底色。',
    '你在职场上经常被要求做一些你不太认同的事：美化数据，夸大宣传，对客户说一些模糊其词的承诺。你心里不舒服，但你不做就会被说不合群，做了又觉得背叛了自己。哈维尔在捷克专制时期是一个剧作家，后来成了总统。他提出一个概念：生活在真实中。不是说你要公开反抗，是说在每一个可以选择的小事上，选择真实。生活在真实中——你不必用辞职来表达你的态度，但你可以在你经手的每一份报告里守住数据的真实，可以在你面对客户时说一句“这个我不太确定，我确认后再答复你”，可以在一堆套话里坚持写下一句真实的、有信息量的话。这些选择都很小，小到没有人会注意。但每次你做了这样的选择，你就在自己的心里种下了一棵真实的树。当这些树连成一片，你就不会被任何权力或潮流卷走。你不是不合群，你是在一群戴面具的人里，坚持做那个有脸的人。真实不需要宣告，它就在你每天做的每一个选择里。今天，做一次微小的选择，为真实。',
    '你在工作中犯了错，被扣了绩效，被领导约谈。你觉得这是你职业生涯的污点，一辈子都洗不掉。海明威在第一次世界大战中身中数百块弹片，做过记者，去过西班牙内战，写过无数失败者。他让一个老人在海上和鲨鱼搏斗，最后只拖回一副鱼骨头，然后他说：人可以被毁灭，但不可以被打败。你不是那个被扣掉的绩效数字，你是那个犯过错之后还能继续坐在工位上的人。你还能打开电脑，还能继续干活，还能在摔倒之后爬起来，这已经是对失败最大的反击。你的错误不是污点，是你职业生涯的一道疤。军人不以伤疤为耻，他们把它叫做勋章。这道疤证明你试过，你扛过，你没有在第一次受伤之后就退出战场。把这道疤留给时间，有一天你会对新人说起它：我曾经在这件事上犯过错，后来我用了很长时间学会不再犯同样的错。那时候，它就不再是污点，是你的勋章。',
    '你发现公司里有一些不成文的规则，没有人教你，但你违反了就会被边缘化。你觉得这不公平，你想改变这个规则。奥威尔一生都在对抗极权，他写《一九八四》，让所有人看到系统如何扭曲语言、控制思想。他说：谁控制过去，谁就控制未来。你不必成为奥威尔笔下的反抗者，但你可以在适应规则的同时，保持对规则的清醒认识。适应不是投降，是你在积蓄改变它的能力。一个连规则都没搞懂的人，没有能力改变任何东西。先摸清规则，先让自己成为系统中不可或缺的人，然后你才有资格说“我不赞同”。在那之前，不要空谈对抗。奥威尔对抗的是极权，不是职场；但他教会我们一件事：清醒地看清系统如何运作，然后找到你可以在其中发挥作用的空间。你不是被规则困住的棋子，你是正在学习规则、未来可能改变规则的棋手。清醒地适应，然后在你有力量时，做那个制定规则的人。',
    '你在团队里总是做最不起眼的工作——整理数据、校对文档、默默把别人遗留的坑填上。功劳从来不在你身上，犯错时你却要承担。你觉得自己是透明的，没有人看见你。埃里森写《看不见的人》，那个无名无姓的主人公在整本书里都在被忽略、被利用、被抹去身份。但他最后发现，看不见不是他本身的属性，是别人的视线没有落在他身上。我是看不见的人——但看不见不等于不存在。你做的工作——那些被填上的坑、被校对的文档、被整理的数据——是整个项目的地基。没有人站在地基上拍照，但所有站在顶楼的人，都踩在你做的工作上。你今天要做的不是大声宣告你的存在，是在每一次提交工作的时候，留一个属于你的标记。在邮件落款里写上你的名字，在文档属性里留下你的修订记录，在会议记录里记下你提出的建议。让别人不得不看见你。看不见不是你，是时候让他们看见了。',
    '你在周一早上就开始焦虑周五的汇报。你想象自己站在众人面前结结巴巴，想象领导皱起眉头，想象同事在底下交换意味深长的眼神。这些想象如此逼真，以至于你觉得它们已经发生了。蒙田在十六世纪就发现了人类的这个问题，他说：我的一生充满了不幸，但其中大部分从未发生。他是法国人，做过法官，写过一本随笔记，在书中他不断地分析和拆解自己的恐惧。你的恐惧也是你的敌人，但它不是真的。周五还没有来，汇报还没有发生，你想象中的那些糟糕场景只存在你的脑子里。它们是你脑子编出来的剧本，你可以编悲剧，你也可以改编剧。今天，把你在恐惧的那件事写下来，然后在旁边写上：这件事发生的概率有多大，最坏的结果是什么，那个最坏的结果真的那么可怕吗。蒙田就是这样做的，他把恐惧放在纸上，然后发现，那些恐惧在纸上看起来比在脑子里小得多。你试试看，把它们从脑子里搬到纸上，它们会缩小。',
    '你在公司里觉得自己孤立无援。你的困难没有人知道，你的压力没有人分担。你觉得整个公司都在高速运转，只有你一个人卡在齿轮里喘不过气。梅尔维尔写了白鲸，亚哈船长带着整船人去追那条白色巨鲸。船上每个人都有不同的想法，但他们在同一条船上，面对同一片海。你并不像你以为的那样孤立。你身边那些看起来游刃有余的同事，他们也有自己的白鲸在追，也在深夜失眠。今天午饭的时候，试着问一个你平时不太聊的同事一句：最近忙吗。你不用多说什么，只需要让他知道，你也在船上，你也在面对同一片海。你们不一定要成为朋友，但你们可以在同一条船上互相递一个眼神。不是所有的支持都要轰轰烈烈，有时候一句话、一个理解的眼神就够了。你不是一个人在追白鲸，整条船的人都在追各自的白鲸。你们在同一片海上，这就足够了。',
    '你觉得自己的职场生活太平凡了，不会成为任何故事的主角。你朝九晚五，吃同样的外卖，走同样的路。你觉得这样的人生不值得被书写。乔伊斯用了整本《尤利西斯》来写一个都柏林的犹太人在1904年6月16日这一天的全部经历。他没有去什么奇幻世界，没有遇到什么惊天大事，他只是在城里走了走，去参加了一场葬礼，去吃了一顿饭，回了家。平凡的一天，可以装下一个人的整部史诗。你不需要成为乔伊斯笔下的布卢姆，但你今天经历的每一个瞬间——你在电梯里遇到的陌生人，你在午休时望着窗外的那几分钟，你在下班路上听到的那首歌——都可以是你自己的史诗。你不需要等到变成英雄才开始书写你的故事。你的故事就在今天，就在你此刻坐着的这个位置。下班后，写下一句话，记录今天发生的一件小事。不需要惊天动地，只要你认真写下的那一句。你已经是你自己生活的作家。',
    '你在工作中积攒了一肚子火。被抢了功劳，被穿了小鞋，被明明不懂的人指手画脚。你想发火，想在办公室里拍桌子。但你知道这样做的后果，于是你把火气压下去，压得胸口发闷。古希腊悲剧诗人埃斯库罗斯写阿伽门农，写一个被愤怒诅咒的家族如何在代代相传的仇恨中毁灭。他的悲剧不是让人沉溺于愤怒，是让人看见愤怒如果得不到理解，会怎样吞噬一切。愤怒一旦被理解，就会变成智慧——不是要你压抑愤怒，是让你把它从胸口拿到桌子上，看清楚：你到底在气什么，是这件事本身，还是这件事触发了你过去的某种伤害。把它写下来，不用修饰，不用得体，把最真实的想法都倾倒在纸上。写完，把它折起来放抽屉里。不是为了存档，是为了把你的愤怒从身体里请出来，放在一个你可以不用随身携带的地方。它还在，但你已经不需要被它压着走了。你的愤怒是你的，不是你是它的。把它放出去，你自己往前走。',
    '你在这份工作里受了委屈，被误解，被忽略，被低估。你觉得自己被不公平地对待了。你想讨个说法，但你知道讨来的可能只是一句敷衍的“下次注意”。你不知道该怎么办。加缪在《鼠疫》里写，里厄医生在疫情里看到了太多痛苦和不公，他没有停下来去声讨命运的不公，他只是继续治疗下一个病人。他说：重要的不是治愈，而是带着病痛活下去。你受的委屈是真实的，不公平也是真实的，但它们不定义你。你不是你受的委屈，你是那个受了委屈之后还能在第二天起床、还能继续做事、还能在经历过这一切之后依然选择善良的人。你不是要忘记发生了什么，你是要带着这份经历往前走。有一天，当你有能力改变规则时，你不会忘记今天受过的委屈。那时候，它们会变成你制定新规则的依据。现在，先往前走。把你受的委屈收好，它不是你的伤口，是你未来行动的理由。继续走，带着这份痛，但别让它拖住你。',
    '你看着办公室里那些混日子的人，他们每天刷刷手机、聊聊八卦、准点下班。你觉得他们活得很轻松，而你每天都在为方案焦虑、为数据熬夜、为一句领导的评价辗转反侧。你有时候想，要不要也变成那样算了。赫胥黎写《美丽新世界》，里面的人每天吃一颗快乐药丸，没有烦恼，没有痛苦，也没有思想。但他们不是人，是驯化过的产品。约翰——那个来自野蛮保留区的“野人”——站在文明世界里对掌控者大喊：我宁愿做痛苦的苏格拉底，也不愿做快乐的猪。这句话是穆勒说的，但赫胥黎让它变成了一个现代寓言。你的焦虑、你的不安、你对工作的在意，都是你还没有变成“快乐猪”的证明。你不是比那些混日子的人更不幸，你是比他们更清醒。你的痛苦不是你的敌人，是你还是一个“人”的证明。苏格拉底喝毒酒而死，但他死之前一直在追问。你也在追问——追问工作的意义，追问自己的价值。这份追问不会让你轻松，但它会让你在十年后回头看时，知道自己真正活过。今晚加班累了，对着镜子看一眼自己——眼袋重了，但眼睛还有光。那是属于苏格拉底的光。',
    '你在职场里被无数人拉扯。领导要你这样做，客户要你那样改，同事要你配合他的节奏。你的时间被切成碎片，你的意志被分散到无数件事上。你觉得自己不再属于自己，而是一个被所有人共享的资源。狄金森一辈子隐居在父亲的老宅里，几乎不出门，写了将近两千首诗。她在一首诗里写：灵魂选择自己的伴侣，然后关上门。她不侍奉任何人，她只侍奉自己的灵魂。你不需要像她那样隐居，但你需要在每天被无数人拉扯的间隙里，为自己保留一扇可以随时关上的门。那扇门里有一件事——是你自己选择做的事，不是任何人布置的任务。可能是午休时读十页书，可能是晚饭后学半小时你想学的技能，可能是睡前在日记本上写几行字。这件事很小，但它完全属于你。每天关上那扇门，待一会儿。那是你的城堡，不需要大，只需要坚不可摧。第二天你再次开门面对那些拉扯时，你会比前一天更笃定。因为你有一个他们不知道的地方，在那里，你是完全属于自己的。',
    '你做了一个错误的职业决定。可能是选错了行业，可能是进错了公司，可能是在一个关键节点上做了一个后来证明是致命错误的决定。你在深夜里反复咀嚼这个错误，想象如果当初选了另一条路，现在的自己会是什么样。英国诗人勃朗宁擅长写戏剧独白，他最出名的诗叫《我已故的公爵夫人》——一个公爵对着墙上画像里的亡妻自言自语，你在独白里听出他所有的残忍、嫉妒和控制欲。但勃朗宁还有一首诗叫《安德烈·德尔·萨托》，一个文艺复兴时期的画家，因为一次错误的选择，终生困在平庸里。他看着黄昏的天空说：啊，但愿我能重做一遍。但他没有重做，他只是继续画。你无法修改过去，但你可以修改你对过去的讲述方式。试着用第三人称写一段你那个错误决策的独白，把它当成勃朗宁诗里的人物来写。写完你会发现，你不再是被困在错误里的人，你是那个讲述错误的人。讲述者永远比被困者更有力量。你还在继续画，这就够了。',
    '你在职业方向里迷路了。不知道自己擅长什么，不知道自己喜欢什么，不知道自己在这个庞大的职场迷宫里该往哪个方向走。你觉得每条路都可能是死胡同，每次转弯都在原地打转。博尔赫斯一生都在写迷宫，但他最著名的一句诗不是关于迷宫的困惑，而是天堂应该是图书馆的模样。图书馆不是没有出口的迷宫，是一座由无数本书组成的、每本书都是一个方向的世界。你不是在迷宫里找不到路，你是还没有去读那些能给你方向的书。你的迷宫不是用来困住你的，是用来让你在里面慢慢找到自己的。今天去读一本你专业之外的书，去接触一个你从来不了解的领域，去和那个做着你完全陌生的工作的人聊一聊。迷宫之所以是迷宫，不是因为它没有出口，是因为你在同一条路上反复走。换一条路走一次，哪怕只是一小段。你的天堂不在迷宫的尽头，在你探索迷宫的过程里。每一次新的尝试，都是在迷宫的墙上开一扇新的窗。',
    '你在职场上感到孤立无援。你觉得同事们都在各自为政，没有人真正关心你，你们只是被工作硬凑在一起的人。圣-埃克苏佩里写《小王子》，也当过飞行员，写过《战斗的飞行员》。他在飞行中体会到，战友之间的联结不来自交谈，而来自一起面对同一片天空、同一次任务。爱不是互相凝视，而是一起朝同一个方向看——你们不必成为朋友，不必在下班后一起喝酒，但你们可以在共事的时间里，一起朝同一个项目、同一个目标看。这份同事之谊不是来自私交，是来自共同承担的一项任务、一次危机、一个需要所有人合力才能完成的目标。当你觉得孤立时，试着在工作中找到那个可以和某个人“一起朝同一个方向看”的瞬间。可能是一起加一次班赶一份方案，一起在会议室里对客户据理力争，一起在项目验收那天相视一笑。你们不必凝视彼此，只需要在那个瞬间，看向同一个方向。这就是职场里最真实的情谊。它不黏稠，但它在那一刻，让你知道你不孤独。',
    '你入职两年，同期的人都在晋升，你还在原来的位置。你怀疑自己是不是能力有问题，是不是被领导忽视了，是不是该跳槽了。斯坦贝克在《伊甸之东》里写，他母亲告诉他，所有伟大事物都在沉默中孕育。他把这句话用在整个小说的写作过程里——那本书他写了很久，反复推翻，反复重写，但他知道它在生长。你现在的沉默期，也是你职业生涯的孕育期。你看不见，但你的能力在每一次重复的工作里被夯实，你的判断力在每一次失败的教训里被校准，你的耐心在每一次不被认可的时刻里被拉长。这些变化现在看不见，但它们会有一天破土而出。不要急。晋升是外界给的节奏，生长是你自己的节奏。两者不需要同步。你只需要确认一件事——今天的你，比一年前的你，有没有在一个看不见的地方变强了一点。如果有，你就没有落后。沉默不是停滞，是你在泥土里还在往下扎根。等根够深了，枝自然会往上长。',
    '你每天早上在早高峰的地铁里被人群挤成肉饼，中午在工位上吃掉一份没有温度的盒饭，晚上加班到末班地铁空荡荡的车厢。你觉得这样的日子没有头。维克多·弗兰克尔从集中营里活着出来，他写了一本书叫《活出生命的意义》。他说：当一个人知道了“为什么”，他就能忍受任何“如何”。你不是在集中营，但你也有属于你的“为什么”——也许是为了让父母不用再那么辛苦，也许是攒钱给自己一个渴望已久的自由，也许是能在这个城市站稳脚跟后把某个人接过来一起生活。把那个“为什么”写下来，放在你每天都能看到的地方。它不会让你通勤变短，不会让你加班变少，但它会在你被挤成肉饼时给你一个理由，在你打开那盒冷掉的盒饭时给你一个力量。所有“如何”的细节都是暂时的，只有你的“为什么”是持久的。今天再累，你的“为什么”还在。为了它，你可以忍受今天。继续走，为了那个只有你知道的理由。',
    '你被无休止的工作压得连喘气的时间都没有。你忘了上一次抬头看天是什么时候，忘了上一次在午后的阳光里发呆是什么时候。你觉得自己的生命被工作压成了一页没有留白的纸。伍尔夫在《达洛维夫人》的开头写了这样一句话：达洛维夫人说，她会自己去买花。那句话简单得不像一本小说的开头。她不是在做什么了不起的事，她只是出门，给自己买花。你在今天也给自己做一件这样的事。不用大，不用等周末，就在今天，在你工作的间隙里——去楼下便利店给自己买一瓶冰的饮料，站在写字楼门口抬头看三分钟的天空，在午休时戴上耳机听一首完整的歌。你不只是为工作而活的工具，你还是那个会自己去买花的人。在所有的忙碌和压力里，给自己留一朵花的空隙。这朵花不会让你的工作变少，但它会让你重新意识到，你在工作之外还有一个自己。那个自己值得被温柔对待。达洛维夫人自己买花，你也可以。今天，给自己买一朵花。',
    '你觉得自己什么都不精通。每样都懂一点，但没有一样能拿得出手。你是那种简历上写满了技能，但每一项都不敢说擅长的人。你觉得自己是碎片拼起来的，随时会散架。艾略特在写《荒原》时，把整个西方文明的碎片——希腊神话、圣经典故、梵文箴言、流行小调——全部拼在一首诗里。评论家骂他杂乱无章，但那首诗成了现代文学最重要的作品之一。他在结尾写：我以这些碎片支撑我的废墟。你不是碎片拼凑的次品，你是那种少有的、能在多个领域找到联系的通才。你的每一块碎片都不是废料，它们在等一个能把它们串起来的时刻。今天，把你会的那些看似不相关的技能写在一张纸上，试着在它们之间连上线。你会发现，那些别人觉得没用的知识，正是你看问题比别人多一个维度的原因。继续收集碎片，不要为它们的零碎感到羞愧。等你找到了你的主题，这些碎片会自动排列成星座。在那一刻之前，继续捡，继续拼。你的荒原是你未来花园的土壤。',
    '有人笑你太拼。他们说，拿多少钱做多少事，别太当真。你在茶水间听到这些话，端着杯子回到工位，心里有点动摇。我是不是太傻了。塞万提斯让堂吉诃德冲向风车时，所有人都笑他疯了。那个骑着瘦马、戴着破盆的老人，对着整个嘲笑他的世界说：我知道我是谁。你不是疯了，你是还没有被他们说服。你还在认真做方案、仔细核对每一个数据、在别人都敷衍的时候多检查一遍。这些不是傻，是你对自己有要求。别人笑你太拼，是因为他们在你用功里看到了自己放弃掉的那一部分。你的认真不是你的弱点，是你能走到他们走不到的远方的唯一原因。继续冲向你的风车。别人笑你疯癫，你就让他们笑。你知道你是谁——一个还没有放弃的人。堂吉诃德最后没有改变世界，但他改变了自己看待世界的方式。你也在改变——不是改变工作，是改变你在工作中的姿态。你选择站着，而不是趴下。这就是你知道自己是谁的方式。',
    '你在一个行业动荡的时期里惶惶不可终日。新闻天天说这个行业在走下坡路，身边的人陆续跳槽转行。你不知道自己是该坚持还是赶紧跑。狄更斯在《双城记》的开头写：这是最好的时代，也是最坏的时代。他写的是法国大革命时期的伦敦和巴黎，但他其实在写每一个时代的人都会感受到的那种撕裂。任何时代都有两面——旧的东西在崩塌，新的东西在裂缝里长出来。你所在的行业在洗牌，那些扛不住的人走了，留下来的空间就是你的。你不需要现在就判断这是好是坏，你只需要在这个动荡里保持清醒——学一门现在还用得上的新技能，关注行业里那些还在创新的公司，和那些也还在坚持的同行保持联系。时代好不好不是你选的，但在好时代里混日子的人，在坏时代里是第一批被淘汰的。在坏时代里还在默默长本事的人，在好时代来的时候是第一批起飞的。继续长。不管时代给你什么脸色，你只管长你的本事。',
    '你在职场上被排挤了。午餐没有人叫你，开会时你的意见没人接话，团建时你总是落在最后面。你感觉自己像一条被鱼群抛弃的鱼，独自游在又冷又深的水里。康拉德写《黑暗的心》，马洛沿着刚果河深入黑暗，他发现最可怕的不是丛林，是人心里那种无法被另一个人真正理解的绝对孤独。但马洛没有回头。我们是孤独的，绝对孤独的——接受这份孤独，不是投降，是你在黑暗里不再害怕黑暗本身。你不需要讨好排挤你的人，你只需要做好你的工作，然后在下班后找到那个不需要假装的地方。可能在健身房里，在书桌前，在一只等你回家的猫身边。在那里，你不被排挤，你是完整的。职场的冷暴力是真实的，但它不是整个世界。你在那片黑暗里学会的独自前行的能力，以后会让所有曾经轻视你的人重新认识你。不回头，继续往河流深处走。黑暗让你恐惧，但也让你长出属于自己的光。',
    '你觉得自己的运气很差。好的项目被抢了，好的机会被占了，好的位置被那些不如你但比你会表现的人坐上了。你看着这些不公平，心里堵得慌。奥康纳笔下的人物永远活在一种怪诞的困境里——被生活戏弄，被命运扇耳光，但每一次被击打都伴随着一个扭曲的恩典时刻。一个老妇人在被歹徒杀死之前，忽然理解了什么是真正的慈悲。好的都被抢走了——那些被抢走的不一定属于你，但剩下的那些没有人争的东西里，藏着只有你能发现的恩典。你没有被看见的机会，正是你可以悄悄试错、慢慢打磨而不被人指手画脚的机会。你去把那个没人愿意接的烂项目接过来，用你全部的能力把它做好。烂项目做好了就是你的代表作。别人在争抢中消耗精力，你在寂静中积累作品。运气不是等来的，是在别人都放弃了的地方，你捡起来，然后证明它其实不烂。你手里剩下的，不是次品，是恩典。',
    '你今天被领导骂了，方案被打回，邮件没人回，你在下班回家的路上觉得自己一无是处。你靠在公交车窗上，看着外面的灯一盏一盏亮起来，觉得这座城市里没有人知道你今天的挫败。米尔恩写了小熊维尼，那个笨拙的、总是把事情搞砸的小熊，和他的朋友们住在百亩森林里。他总觉得自己很笨，但他的朋友们从来不这么觉得。克里斯多夫·罗宾对维尼说：你比你认为的更勇敢，比你看起来更坚强，比你想象的更聪明。这句话不是哄小孩的，是成年人也会需要的一个提醒。你今天的挫败是真的，但你对自己的低估也是真的。你不是那个被打回方案的人，你是那个方案被打回了还会再改的人。你不是那个没人回邮件的人，你是那个仍然在认真对待沟通的人。这些都是比你想象中更了不起的事。今晚回到家，对着镜子，把罗宾那句话对自己说一遍。你没有搞砸，你只是还在进行中。',
    '你在做一份你不喜欢的工作，但你想攒够钱之后去做自己真正想做的事。你想画画，想写作，想开一家自己的小店。但你周围的人都说：别折腾了，安稳一点不好吗。毛姆写斯特里克兰德，一个四十岁的证券经纪人忽然抛妻弃子去巴黎画画。他说：我必须画画，就像溺水的人必须挣扎。追逐梦想就是追逐自己的厄运，因为梦想从来不给任何人安全感。但它给你一种你无法从任何安稳里获得的满足。你不用像斯德里克兰德那样抛下一切，你可以在白天的工作里攒钱，在晚上的时间里画画。攒够一笔是一笔，画完一幅是一幅。安稳不是你的目标，它是你为实现目标的燃料。你的梦想不需要所有人都理解，它只需要你每天给它一点时间。今晚，在所有人睡觉的时候，把那张画完成。你是斯德里克兰德的理性版——你没有逃跑，但你也没有放弃。这才是真正的坚持。',
    '你在职场上被情绪左右。被否定之后沮丧得不想说话，被误解之后愤怒得不能思考。你觉得情绪是你职场的软肋，你想把感情从工作中完全剔除，做一个绝对理性的人。纪伯伦在《先知》里说：你的理性与情感，是你航行中舵与帆。只有舵没有帆，你会原地不动；只有帆没有舵，你会迷失方向。你的情绪不是你的敌人，是你的帆——它在告诉你什么对你重要。愤怒告诉你你的边界被侵犯了，沮丧告诉你你需要调整方式，焦虑告诉你你在乎结果。帆给你动力，舵给你方向。不要砍掉你的帆，学会调节你的舵。今天被情绪淹没的时候，先停下来，给它一个名字：我现在感到的是愤怒，还是委屈。命名本身就是理性介入的开始。然后问自己：这个情绪在告诉我什么。你不需要做一个没有情绪的人，你需要做一个能用理性驾驭情绪的人。舵在你手里，帆在你心里。它们在一起，才是完整的航行。',
    '你从早忙到晚，回到家只剩一身疲惫。你倒在沙发上刷手机，脑子里还残留着工作的碎片。你觉得自己活得像一台机器——每天充上电，运转八小时，耗完电，再充电，再运转。德国诗人荷尔德林说：人充满劳绩，但还诗意地栖居在这片大地上。他穷过，漂泊过，精神失常过，但他写下了德语文学里最美的诗。诗意不是奢侈品，是你在劳绩之中为自己保留的那一点点人性的光。你不需要辞职去大理才能栖居。你可以在下班路上买一束五块钱的花，可以睡前读两页和工工毫无关系的闲书，可以在周末早晨为自己煮一碗不是速溶的面。这些事不能写进年终总结，但它们是你不是机器的唯一证明。今晚，做一个充满劳绩但也诗意栖居的人。加班回来，别急着瘫在沙发上。给自己倒一杯温水，站在窗前，看一眼今晚的月亮。月亮不会让你的加班变少，但它会让你记得，你是一个活人，不是一个工号。',
    '你刚入职，什么都还不会。你看着那些老员工游刃有余，觉得自己就像一个闯进大人世界的小孩。你着急，想马上变厉害，想马上被认可。里尔克在《给青年诗人的信》里对那个向他请教的年轻人说：要有耐心，对你心里所有尚未解决的问题。要学着去爱问题本身。他当时也在漂泊，也在靠别人的资助过活，但他知道一个人的成长需要时间，不是几个月，是几年。你现在的问题——不熟悉流程，不清楚规则，不明白那些潜台词——它们不需要现在就全部被解决。它们是你接下来几年里需要慢慢去爱的东西。你不需要在入职三个月就成为专家，你需要的是在今天学会一件事，明天再学会一件事。每一件你都学会了，每一个问题你都慢慢爱过了，几年后你回头看，你会发现那些曾经让你束手无策的问题，已经变成了你最熟悉的日常。耐心不是等待，是你每天都在向问题靠近。今天，又靠近了一点。这就够了。',
    '你什么都想学，什么都想做好。报了三个网课，买了五本书，周末安排得满满当当。结果是每样都只学了一点点皮毛，什么都没真正掌握。歌德是德国最伟大的诗人，但他一辈子也做过不少别的事——研究光学，当过部长，写过科学论文。他晚年说：谁要成事，谁就必须学会限制自己。不是学得越多越好，是学得越精越好。你现在最需要的不是再多报一门课，是把已经报了的课里，挑一门最有用或者最喜欢的，把另外两门先暂停。把五本书里挑一本，读到最后一页。你是被无限的可能性困住了，不是没有在努力。限制是让你从一万个方向里选一个，然后一直走到底。今天，做一个限制自己的决定——只做一件事，把它做到你暂时能做的极限。你不是在放弃，你是在聚焦。所有伟大的成就，都从一次果断的限制开始。',
    '你太想到达了。想快一点升职，快一点成功，快一点拥有那些你现在还没有的东西。你每天都在算自己还有多久才能到。卡瓦菲斯写《伊萨卡》，奥德修斯花了十年才从特洛伊回到家。诗人说：你要去的是伊萨卡，愿你的路途漫长。愿你在途中停靠腓尼基人的港口，买到精美的商品。愿你把这条路走得越丰富越好。你的职业生涯就是你的伊萨卡。不要只盯着那个还没有到达的终点，把路上的每一个港口都当成你旅程的一部分。你现在的这个岗位、现在跟的这个项目、现在被折磨的这些琐事，都是你将来站在终点时会怀念的细节。伊萨卡给了你这条漫长的旅途，没有它，你就不会出发。终点会到的，但你带回来的宝藏不是伊萨卡本身，是你这十年在路上的所有收获。今天，享受一次“在路上”的感觉。你还没有到，但你已经不是出发时的你了。这一路本身就值得庆祝。路途漫长，愿你享受每一海里。',
    '你在会议上被抢了话头。你刚说到一半，同事接过你的话往下说，所有人都跟着他的思路走了。你张着嘴坐在那里，像一个被按下静音键的人。阿特伍德写《使女的故事》，写那些被剥夺了发言权、被禁止阅读、被擦去名字的女人。但她本人从来没有沉默过。她说：一句话一旦说出，就再也不能收回，但它可以被另一句话改变。你今天被抢走的话还在，你没有说完的部分还在。在会议记录里把你的补充意见写上去，在会后给领导单独发一条消息说清楚你的想法。你不需要在当时当刻抢回来，你可以在事后用更完整的方式说出来。被抢话不是你的失败，是对方没有学会倾听。但你可以教会他们——下一次，当他们发现你总能用邮件把被掐断的句子补全，他们就会知道，你没有被按下静音键。你只是在等一个更好的时机把话说完整。今天的补充意见，就是改变第一句话的第二句话。发出去，你就收回了自己的声音。',
    '你在工作中总是不满意自己。方案交上去，你还在想第三页那句话能不能写得更好。汇报做完了，你还在想最后那个问题是不是答得不够漂亮。你对自己的要求高到你自己都达不到。莫里森是第一位获得诺贝尔文学奖的黑人女性，她写《宠儿》，写《最蓝的眼睛》，写那些被社会标准压垮的人如何重新站起来。她在一次访谈中说：你是你最好的作品。这不是让你停下脚步不再改进，是让你在改进的同时，不要忘了你已经是一件完整的作品。你不需要完美，你需要完整。完整意味着接受这一版方案已经有它的价值，同时下一版会更好。今天，把你已经交出去的那份东西再看一遍——不是找毛病，是找三处你觉得自己做得好的地方。找到它们，承认它们。你不是还在打磨中的半成品，你是一个不断在完善但已经完整的作品。今天这个版本，已经值得被你自己认可。明天再改。你不是半成品，你是正在生长的孤品。',
    '你在工作中有一个想法，但不敢提。你怕它太幼稚，怕被否决，怕在众人面前暴露自己还不够专业。这个想法在脑子里转了很久，每次都到了嘴边又被咽回去。斯坦贝克写《人鼠之间》，写两个底层工人梦想拥有一小块属于自己的土地。那个梦想最后破灭了，但它在整本书里给了他们活下去的理由。斯坦贝克自己经历过无数退稿，他的第一本书几乎无人问津，但他继续写。不尝试的人永远不会失败，但也不会成功。你的想法可能不成熟，可能被否决，可能真的还不够好。但你不提，它永远只是一个在你脑子里转圈的可能。今天把那个想法写下来，哪怕只发给自己看。把它从脑子里请到纸上，让它变成一个可以被修改、被完善的具体存在。你不需要第一次就完美，你只需要第一次就开口。失败不是你的敌人，沉默才是。今天开口的人，已经比昨天沉默的人往前走了一步。你的想法值得被说出来，哪怕它现在还不完美。每一个后来成熟的方案，都是从一次不成熟的开口开始的。',
    '你站在职业的岔路口，不知道该选哪条路。每条路都有不确定性，每条路都让你在深夜里反复权衡。你怕选错，怕多年后回头看，发现当初应该选另一边。博尔赫斯写《小径分岔的花园》，他把时间想象成一座不断分岔的迷宫，每一条岔路都不通向虚无，都通向一个完整的世界。时间是分岔的——你选左边，右边的那条路在另一个时空里也有人在走。你不需要把全部分岔都走完，你只需要在你选的这条路上认真走到头。岔路口不会只有这一个。你以后还会有很多次重新选择的机会。把眼前这条路走好，走到下一个岔口再重新审视。今天，为你正在走的这条路做一件具体的事——在这条路上认识一个新的人，学一项有用的技能，做一个让你自己满意的交付。你不需要在起点就看完全部路程，你只需要在每一个岔口都为自己的选择认真负责。没有一个选择会彻底决定你的整个人生。你的路是活的，你也是活的。',
    '你觉得这个时代对年轻人不公平。房价高、加班多、上升通道越来越窄。你看着父辈那一代人轻轻松松就有了房和稳定，而你再怎么努力也只能勉强糊口。狄更斯写《双城记》的时候，法国大革命刚过，欧洲到处是动荡和绝望。他劈头盖脸写了那句话，然后写了整个时代的故事——不仅有坏，也有好。你的时代对所有人都不容易，但那些在不容易里找到了自己方向的人，后来都会感谢这个时代没有让他们太舒服。你不需要改变时代，你只需要在时代的缝隙里找到你自己的活法。它可能是你父辈不理解的职业选择，可能是不走寻常路的斜杠人生。不管是什么，只要是你自己在摸索中选出来的，它就是你在最好也最坏时代里的坐标。今天，停止和时代较劲，把力气用在你能改变的那一小块领域里。时代好不好是你决定不了的，但你在时代里的样子是你决定的。你在这个时代里找到自己的节奏，你就是这个时代值得被写下的那一部分。',
    '你被分配去处理最琐碎、最没有人愿意干的活——整理过期文件，核对几百条数据，归档没人碰的旧档案。你觉得自己被边缘化了，做着毫无尊严的工作。雨果写《悲惨世界》，用了整整一章写下水道。他把下水道叫做“城市的良心”，因为所有被城市遗弃的东西都流经那里，所有无人看见的肮脏都在那里被默默处理。他现在在做什么——你做的那些琐碎工作不是没有尊严的。它们是一个组织看不见的“下水道”，没有人愿意做，但如果没有它们，整个项目就会在看不见的地方塌掉。你是那个在最不起眼的角落里保持一切运转的人。今天，不要因为没人看见就敷衍。把你经手的每一个文件整理好，每一个数据核对完，每一个归档做好标注。你不需要所有人看见，你自己知道这件事做得到位就够了。下水道是城市的良心，你的认真是你在职场里不会烂掉的那一部分。守住它，不管有没有人看见。',
    '你在周日傍晚就感到一种无形的焦虑。周一还没到，你的肩膀已经提前绷紧了。你坐在沙发上刷手机，脑子里却一直在盘算下周的进度、下周的汇报、下周可能会出问题的环节。你觉得很累，但就是停不下来。瑞典作家巴克曼写《一个叫欧维的男人决定去死》里那个固执的老头，也写了《焦虑的人》里那些在城市里各自挣扎的普通人。他说，焦虑是一把摇椅，它让你感觉你在动，但你哪里也去不了。你现在就在那把摇椅上。停不下来，但也动不了。现在试着离开那把椅子——站起来，去做一件不需要动脑的、只用身体的事。去拖地，去整理衣柜，去削一个苹果慢慢吃完。用身体的行动打断脑子里那台空转的机器。周日晚上不是用来解决明天的问题的，是用来让你准备好身体和心情去面对明天的。今天你能做的最有用的事，不是提前焦虑，是把自己照顾好，然后把明早的闹钟设好。摇椅还在，但你不需要一直坐在上面。下来，休息。',
    '你在职场上不敢信任任何人。你怕被抢功，怕被甩锅，怕自己掏心掏肺之后被当成垫脚石。你把自己裹得很紧，开会时不发表意见，合作时留一手底牌。努涅斯写《朋友》，写一个女人在失去挚友之后，被迫收留朋友留下的一条大丹犬。她不相信自己能照顾好它，但那条狗教会了她一件事：不信任是更深的孤独。你为了保护自己而筑起的墙，既挡住了别人的算计，也挡住了别人的善意。你不需要一下子就信任所有人，但你可以试着对一个人放下一点点戒备——在那个你直觉觉得不会害你的人面前，说一句你平时不会说的真实想法。这有风险，但一直全副武装，你会累。信任是一种冒险，但不信任是把自己锁在保险柜里，那里没有危险，也没有空气。今天，试着信任一个你心里已经观察了很久的人。不用多，就一点点。墙还在，但你开了一扇小小的窗。风会进来，光也会进来。',
    '你在团队里承担了大部分的工作，而有些人却在浑水摸鱼。你加班到深夜，别人准时下班；你周末还在改方案，别人在朋友圈晒美食。你觉得不公平，但又不想当打小报告的人。海勒写《第二十二条军规》，约塞连在空军基地里被一套荒谬的规则困住。他发现真正让他痛苦的，不是敌人的炮火，是一起执行任务的人里有人在做别的事。你不是那个不划船的人，你也不需要替他们划。你只需要在合适的时候，让该看到的人看到——在每周汇报里如实列出你的工作量，在会议上清晰说明你的进度。你不需要告状，你只需要用事实画出那条船的形状。那些不划船的人，会在某一天被看到。如果你实在划不动了，就放下桨，找船长谈一谈。你不是来给谁当桨的，你是来航行的。今天，用一份清晰的工作记录，画出你划船的路线。事实比任何告状都有力量。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();

};
