(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你在镜前像苛刻的建筑检查员，反复验收这具身体——肩线是否够平，腰线是否够细，腿型是否够直。你觉得它像一栋未完工的房屋，到处都需要修补。巴什拉在《空间的诗学》里写道：房屋是灵魂的庇护所，它比任何物理建筑都更早存在于我们心中。你的身体不是待验收的建筑，是你灵魂居住的庇护所。它不需要符合任何建筑规范。你在这庇护所里哭过、笑过、生病时独自蜷缩过。每一处不完美的角落，都是你在此真实活过的证据。今天，像回到童年的老家那样回到你的身体。不是验收，是安居。巴什拉说，庇护所不需要完美，它只需要能保护你。你的身体已经保护了你这么久，它值得被你当成家，而不是被当成工地。你的灵魂需要一个庇护所，它现在已经有了。安居吧，你的身体是你永远不需要退租的家。',

    '你只想被放在光里——亮的地方，白的地方，可以被清晰看见的地方。你害怕阴影，怕阴影里的自己不够被喜欢。谷崎润一郎在《阴翳礼赞》里写：美不存在于物体本身，而存在于物体与物体之间的阴影里。他用一整本书礼赞被现代照明驱逐的幽暗。你的身体也需要阴影。不是你全部暴露在光下的部分才值得被看见。你的锁骨在阴影里微微凹陷，你的脊柱在暗处有一道只有你才摸得到的弧度。今天，用谷崎的方式看自己——不在无影灯般的白光里，在窗边傍晚斜进来的暖光中。你会发现一个比你在白光下更丰富、更有层次的自己。你不是被阴影掩藏的次品，你是被阴影完成的孤品。你的深度在光找不到的地方。谷崎说，美在阴影里。你的身体里，有你还没有被光照到的全部深度。',
    '你被一套关于美的语言困住了——“胖就是丑”“不白就是土”“没有直角肩就是残次品”。这些句子像铁栏杆，把你围在一个不断缩小的标准里。法国文论家巴特在《神话修辞术》里拆解大众文化如何把偏见包装成“自然”。他说：语言既是一座牢笼，也是一把钥匙。那些定义你身体的词语是牢笼，但你可以学会拆解它们的语言。把“我太胖”换成“我的身体有它自己的韵律”，把“我不够好看”换成“我不符合一套为了缩小消费者而发明的审美神话”。今天，找出你最常用来否定自己身体的三句话，在每一句旁边写下另一个更接近真相的句子。巴特说，语言可以解放。你不是必须通过整容来重新定义自己，你只需要换一套更诚实、更属于自己的词汇。你的身体不在别人的辞典里，你正在为自己编纂一部新的词典。',
    '你每次在人群中都觉得自己的步伐太笨拙，姿态不够优美。你总是羡慕那些走路带风、举手投足都像被精心设计过的人。帕蒂·史密斯年轻时在纽约穷得睡在公园，她用捡来的纸写诗，用粗粝的手指弹吉他。她从来不学谁的姿态，她在自己的音乐里找到了属于自己的节奏。她说：我们只是孩子，但我们有力量。你不需要模仿任何人的仪态。你的身体有自己的节奏——你走路时膝盖微微内扣是因为小时候没人纠正过，你紧张时咬嘴唇是你从小学会的自我安抚。这些不是你需要改掉的坏习惯，是你身体自带的节奏。今天，走一段路，不听任何音乐。听你自己的脚步——不是美不美，是稳不稳。帕蒂说，力量在孩子里。你身体的节奏不需要被任何人编排，它本身就是一段只有你才有的旋律。你不需要学别人走路，你自己的脚步已经是你最诚实的节奏。',
    '你把自己的价值全部押在镜中这具身体上。瘦了就值得被爱，胖了就一无是处。你把整个人的精神世界压缩成一个体重秤上的数字。史蒂文斯是美国最伟大的诗人之一，他白天在保险公司上班，晚上写诗。他一生都在和同一个身体相处——不健美，不年轻，但他写：诗人是那个在冬天里仍然记得夏天的人。你不是你的体重。你是你记得的那些夏天——你第一次在海边跑进浪花时的触感，你在大雨中不打伞骑车回家的畅快，你在深夜和朋友笑到肚子疼时忘记了自己还有外貌焦虑。今天，把你记得的夏天写下来。史蒂文斯说，记得夏天的人不会在冬天里死掉。你的冬天可能是你对身体的全部不满，但你的夏天还在你记忆里。你不是你的外表，你是你全部夏天、全部身体记忆、全部精神生活的总和。记得你的夏天，它比任何体重秤上的数字都更真实。',
    '你因为一次失败的自拍、一条不合身的裙子、一句别人对你身体的评价，就觉得自己不配被喜欢。你用几秒钟的片段定义了自己的全部。马尔克斯在《百年孤独》里让每一个人都被命运的锁链缠绕，但他们从不因为自己的出生标记就放弃全部活法。他说：每个人都是他自己故事的总和。你的外貌只是你故事的第一页，不是全部章节。你今天为朋友做的一顿饭，你今晚比昨天早睡的决定，你在镜子前试着对自己笑的那一瞬间——它们也在继续写这本书。今天，翻开你故事新的一页。在这一页里，你的身体不是主角，是你继续写故事的工具。马尔克斯说，故事的总和才是人。你的总和不是几张不好看的照片，是你还在继续写的全部生活和全部行动。你的书远没有写完，不要因为第一页不够漂亮就把整本书撕了。',
    '你无法接受自己身体的限制——不够高，不够纤细，不是大众审美里被羡慕的类型。你觉得这些限制是你一生无法翻越的高墙。田立克在二战期间写《存在的勇气》。他亲眼见证人类精神如何在极端困境里坍塌又重建。他说：存在的勇气，是敢于接受自己的有限。你的身高、骨架、五官走向，是你的有限。勇气不是假装这些有限不存在，是接受它们之后，仍然觉得自己的存在有价值。今天，把你最介意的身体限制写在纸上，旁边写上它不影响你做什么——不影响你思考，不影响你感受，不影响你成为一个值得被爱的人。田立克说，勇气始于接受有限。你接受了自己的有限，就释放了那些浪费在自我苛责上的能量。你已经有了勇气，你只是还没有用它来面对自己。',
    '你把身体当成物体——需要被修缮、被比较、被放进橱窗里供人检验的物体。你忘了，你不是通过别人的目光拥有身体，你是通过身体拥有整个世界。法国现象学家梅洛-庞蒂在《知觉现象学》里写：身体不是物体，而是我们拥有世界的方式。你今天用它走了路，用它端起了热茶杯，用它感受到了阳光落在皮肤上的温度。你不是被困在身体里的囚犯，你是通过身体才触及这一切的主体。今天，不要用看物体的方式看自己。闭上眼，用身体感受——你脚下的地面，你呼吸时腹部的起伏，你手指触碰手机屏幕的触感。梅洛-庞蒂说，身体是你拥有世界的方式。你不只是被观看的客体，你是观看和感受的主体。你的身体不是需要被评分的作品，是你在这个世界上活着、感受、行动的全部条件。从这个角度出发，它已经足够完美。',
    '你担心脸上那些不完美——不够对称，不够标准，不够好看。你忘了脸不只是五官的集合，也是你灵魂的外露。王尔德在《道林·格雷的画像》里写一个永远年轻俊美的男人，他的画像替他老去、替他承担所有罪恶。最后他刺向画像，自己死成了面目可憎的老人。王尔德说：一个人的脸，是他自己塑造的。你的精神生活会在你脸上留下痕迹——你长期思考后变得安静深沉的眼眸，你选择善良后变得舒展柔和的眉间，你经历挫折后不再轻易被激怒的唇线。这些不是五官，但它们比五官更决定你是谁。今天，不要只看五官的排列。看你的精神面貌——那些被你的选择、你的坚持、你内心的善意慢慢重塑过的部分。王尔德说，脸是你自己塑造的。你的精神每天都在为这张脸雕刻，一笔一划，从不停歇。这是只有你才能完成的自塑像。',
    '你把全部注意力给了那些你身体上不符合标准的地方，然后用这些地方定义自己的全部价值。美国心理学之父威廉·詹姆斯在十九世纪末写下：我们变成我们持续关注的事物。他不是在写神秘主义，他是在描述注意力如何塑形人格——你关注什么，你的生命就变成什么。你持续关注自己的缺陷，你的人生就缩成一个小到只能照出缺陷的镜子。你开始关注你能为这个世界创造的东西，你的生命就开始往那个方向流动。今天，把注意力从“我哪里不够好”转移到“我今天能做一点什么”。詹姆斯说，注意力是选择的开始。你今天选择关注什么，就是在选择你将成为什么样的人。你可以选择继续关注身体的缺陷，也可以选择关注你还能用这具身体去做的事。你的注意力流向哪里，你就在哪里塑造自己。今天，把它流向你真正在乎的方向。',
    '你害怕一个人。害怕安静下来之后，你对自己身体那些苛刻的评论会像潮水一样涌上来。你把每一分钟都填满——刷手机，看视频，找人聊天——不敢给自己留一点空白。梅·萨顿一个人住在新罕布什尔的海边，写日记，种花，对着冬天的雪发呆。她说，独处不是孤独，是和自己的漫长约会。独处是一种丰收。你在怕的不是独处，是独处时那些会浮上来的自我审判。但那些念头不是你该逃避的敌人，是你很久没有坐下来听它们说话的老朋友。它们在你的心里等了一整天，等你把手机放下，等你把灯调暗，等你终于不再逃避。今天，给自己十分钟的空白。不做任何事，不碰手机，不听音乐。就在那里坐着，让那些等你等了一天的念头一个一个走进来。不用回应，不用分析，只是让它们进来。萨顿说，独处是丰收。丰收不在你继续逃避的时候，在你终于腾出双手，接住那些被你逃避太久的自己时。',
    '你今天照镜子时觉得自己失败了——胖了半斤，皮肤暗淡，肌肉线条不够清晰。你用一天的表现宣判了自己全部价值的死刑。布罗代尔把历史分成三种时间：短时段是事件，中时段是周期，长时段是结构。你今天在镜子里看到的失望，只是一个事件。你这一年来身体的起伏，只是一个周期。你这个人——你的健康状况、你的体力、你对自己身体的持续照料——是长时段。长时段不被某一天的事件定义。今天，用布罗代尔的长时段眼光看你的身体。它不是你今天镜中的那张快照，是你过去几十年活过的全部日子的总和。你为它做的每一顿饭，你让它睡的每一夜安稳觉，你在焦虑时依然选择继续照顾它——这些都还在你的长时段里继续沉积。布罗代尔说，长时段决定一切。你的身体美不美，不由今天早上的镜子决定，由你长时段的自我照料决定。',
    '你总觉得自己在镜头里不够好看——角度不对，光线不对，笑容不对。你把所有被拍下的自己都当成需要被删掉的废片。法国新浪潮导演瓦尔达一生站在镜头后面，也站在镜头前面。她不修图，不找角度，在晚年顶着一头白发拍自己脸上的皱纹。她说：我不是在拍纪录片，我是在拍生活本身。你的身体不是待拍的广告，是你生活本身的记录。今天，在你觉得不好看的一张照片面前，不要点删除。瓦尔达说，生活本身不需要修饰。你的生活记录也不需要用修图软件重新编辑。那张照片里你不完美的样子，是你那天活过的证据。你不需要把自己拍成别人，你只需要记录自己正在活。活过的日子不需要修图。',
    '你一直在逼自己变成别人的样子——她的身形，她的姿态，她的气质。你把自己逼成了一棵非要长成松树的橡树，别扭地站在那里。美国诗人玛丽·奥利弗一辈子在森林里散步，她写：你不必变成松树，你是你已经是的那棵橡树。橡树有橡树的生长节律——它长得慢，枝干不直，树冠不是尖的，但它是森林里活得最久、站得最稳的那一棵。你的身体也不需要变成别人的模板。今天，不要再用别人的形象要求自己。你已经是你的橡树——它粗壮的树干撑得起风暴，深扎的根经得起干旱。奥利弗说，森林里有各种各样的树，没有哪一种比另一种更配称为树。你也是那片森林里独一无二的一棵。做你的橡树，不需要做别人的松树。你的形态是你经历的全部风雨共同决定的，它不需要被修剪成别人喜欢的样子。',
    '你用速度衡量自己的身体——跑得够不够快，瘦得够不够快，变好看的速度够不够快。你把自己的身体当成一台需要被不断提速的机器。法国哲学家格罗在《走路，也是一种哲学》里写：行走是一种对速度的抵抗。他写尼采在阿尔卑斯山区的独自步行，写康德在哥尼斯堡每天准时散步。不是跑，是走。你今天不需要用别人的速度要求自己。你只需要在你自己的时间表里，继续走。格罗说，行走的人是自由的，因为他不再被速度奴役。你的身体不需要比别人更快地变瘦、变好看、变年轻。它在它自己的速度里，一步一步，走到它该去的地方。今天，用走的速度对待你的身体——不和任何人赛跑，只是继续走。你的身体节奏是你自己的，不需要被任何人加速。',
    '你被镜子困住了——每天检查，每天审判，每天和镜中那个不完美的自己对峙。你觉得镜子里的形象就是你全部的真相。费兰特在那不勒斯四部曲里写“界限消失”——在某个极端的时刻，人和人之间的界限忽然消失了，你发现你嫉妒的那些人，她们的生活也是一片破碎。你的镜子也是一道界限，它在你和真实世界之间隔了一层玻璃。界限消失之后，你才能看见真正的自己——不是那个被镜子框起来、被标准定义的你，是那个在做事情、在感受、在和生活搏斗的你。今天，从镜子前走开。你的脸不在镜子里，在你和别人说话时的表情里；你的身体不在镜框里，在你今天用它走过的全部道路上。费兰特说，界限消失后才能看见真正的自己。打破镜子的不是石头，是你开始不再把它当成唯一真实的时候。镜子里的只是你的正面，你的全部还有侧面、背面和被阴影藏起来的深度。那些镜子照不到的地方，才是你真正在活的地方。',
    '你站在镜子前，看见眼角第一道细纹。它很浅，但你看得很清楚。你觉得那是时间对你下达的第一份判决书——从今天起，你将渐渐失去被称作“年轻”的权利。川端康成在《雪国》里写，美是生命停驻的瞬间，也是时间流逝的证据。他写艺伎驹子的脸在雪夜的灯光下，既有青春的余韵，也有操劳的痕迹。他不觉得那种痕迹是缺陷——那是活过的证据。你的细纹也是你活过的日记。它不是从外部强加给你的惩罚，是你用这张脸笑过、哭过、思考过之后，时间自动在你脸上留下的浮雕。今天，用川端康成的目光看一次镜中的自己：不寻找需要被修正的瑕疵，只看那些证明你曾真实活过的痕迹。美不是停在某一年的标本，是你继续向前流淌时，在河面上泛起的每一道涟漪。你还在流动，这就是你全部的生命力。',
    '你觉得自己的外貌走了一条人少的、更难的路——不是大众审美里最吃香的那种，不是镜头里最上镜的那种。你觉得自己在所有人都往前走的地方，被留在了少有人选的岔路口。弗罗斯特写《未选择的路》，诗的叙述者选了一条人少的路，多年后他说那个选择改变了一切。他没有说那选择更好或更坏，他只是说它改变了一切。你被分配的身体不是你自己选的，但你怎么走这条路是你自己选的。今天，把你外貌里你最不喜欢的一个特征拿出来，写下它带给你的至少一个正面影响。也许你的大骨架让你在运动里更有力，也许你的单眼皮让你在人群中更独特。弗罗斯特说，选择改变一切。你改变的不是外貌，是你和外貌相处的方式。这条路走到今天，你已经积累了许多只有它才能给你的风景。你不是被发配到这条路上的，你是在这条路上走到今天的全部自己。',
    '你把自己的外貌当成全部故事的开头——因为不够好看，所以不被喜欢；因为不够好看，所以不被选择。你用这第一页定义了全部后续。马尔克斯在《百年孤独》里让每一个人都被宿命的锁链拴住，但他们从来不因为自己出生时的标记就放弃全部活法。每个人都是他自己故事的总和。你的外貌只是你故事的第一页，后面还有无数页你没有翻开。你今天为自己做的一顿饭，你今晚放下手机早睡的决定，你在镜子前对自己笑的那一下——它们都在继续写这本书。今天，翻开你故事的新一页。在这一页里，你不是被外貌定义的主角，你是用自己的行动继续写故事的人。马尔克斯说，故事的总和才是人。你的第一页不是你全部的书。继续写，最精彩的章节还在后面。',
    '你被贴过很多标签——婴儿肥、雀斑脸、小眼睛。你觉得这些标签是你无法挣脱的烙印，它们比你的名字更先被人记住。萨特说，存在先于本质。人不是天生被定义的，是由自己的行动塑造的。你的外貌标签是别人贴在你身上、为了方便他们识别而打印的标签。它们不是你真正的轮廓。今天，给自己下一个新的定义——不用任何关于外貌的词，只用你今天做过的事、你在乎的东西、你正在成为的人。萨特说，人是自己的行动。你的行动是你撕下那些标签唯一需要的工具。你不是别人随口定义的产物，你是在日复一日的行动里，一锤一锤把自己从毛坯敲成雕塑的那个人。标签会褪色，你的行动会留下来。',
    '你曾经在某个瞬间觉得自己很美——不是外貌改变了，是你那天做了什么让你感到笃定的事，或者是你在某个地方感到安全和自在。那天的光线里你不一样。华顿在《欢乐之家》里写莉莉·巴特，她用一生的时间想用外貌换一个位置，最后发现，真正让她发光的是她终于不再讨好任何人的那一刻。美不是一种长相，是一种状态。你不需要改变外貌才能感受到美，你需要找到那个能让你感到笃定、安全、不想讨好任何人的状态。今天，找出那天你觉得自己“状态好”时的记录——你当时在做什么，和谁在一起，心里在想什么。把其中的一个条件在今天复现一次。华顿说，状态才是美。你的美不是等比例缩放的脸，是你在某个瞬间终于不再需要审视自己时的全部舒展。状态是可以被找到的，因为你已经拥有过它。',
    '你觉得自己被卡在某个身体的坐标上——太胖、太瘦、太高、太矮。你觉得这个坐标决定了你在别人眼中全部的位置。博尔赫斯是图书馆员，他一生在书籍里重建坐标。他中年失明，无法再用眼睛阅读，但他继续在脑子里建造图书馆。你的身体坐标不是你的全部位置。你今天读的书、听的音乐、记住的诗句，它们也在重建你内在的地图。今天，把你用外在坐标定义自己的方式暂时停用一天。不用任何和外貌有关的词描述自己，只用你喜欢的、你在乎的、你正在学的东西来定位自己。博尔赫斯说，天堂是图书馆。你的天堂不在镜子里，在你不断往内填充的精神世界里。你在那里建的每一座书架、收藏的每一本书，都不会被时间从你的坐标上抹掉。',
    '你总想把自己拼成一张毫无裂痕的完整图片——修图，遮掩，不让任何人看到那些你称之为“缺陷”的地方。尼尔森在《阿尔戈英雄》里写自己的身体、爱人的身体、他们共同经历的变化与手术。她写：你不需要是完整的，你只需要是真实的。你的真实不包含“完美”这个选项。被遮掩的伤疤、被修掉的皱纹、被藏起来的生长纹——它们都是真实的，都是你身体历程里不能被删除的部分。今天，选一处你一直遮掩的地方，只在今天，在自己的房间里，让它暴露在空气里。不看它，不评价它，只是让它存在。尼尔森说，真实不需要完整。你的裂缝是你最真实的部分，它们是你这副拼图里唯一不需要被修剪的不规则边缘。',
    '你担心外貌会影响你的全部——工作面试、人际交往、被人爱和爱的资格。你觉得自己必须先过外貌这一关，才有资格谈别的。莫里森写《所罗门之歌》，奶娃在寻找家族历史的过程里，终于不再用任何外部的标准衡量自己。他找到的不是外貌的自信，是灵魂的根。你应得到最好的，你不是任何人的附庸。你最好的那部分，不在任何镜子能反射的地方。是你理解一个复杂问题的速度，是你在别人需要时递上的一杯水，是你对某件事持续多年的热爱。今天，把你最好的部分写下来——全部和外貌无关。这才是你真正的轮廓。莫里森说，你应得到最好的。你值得被爱，不是因为你有一天变得足够好看，是因为你身上早就有了和外貌无关的、值得被珍视的全部特质。',
    '你觉得自己是容貌的例外——不符合任何流行的模板，不属于任何被公认的好看范畴。辛波斯卡写诗偏爱一切被忽略的东西——丢失的纽扣，路边的野草，没有名字的云。她写道：我偏爱例外，因为例外是自由的。标准是大多数人的规则，例外是一个人的主权。你的脸不是流水线上的产品，是你自己独一无二的手写体。今天，用辛波斯卡的眼光重新审视你脸上那个最不符合标准的部分。它不是你的败笔，是你的例外。例外不需要被修正，例外有它自己的逻辑。你的容貌自由，从你不再把自己塞进别人的标准里开始。辛波斯卡说，例外是自由的。你今天就在行使这份自由——不需要和任何人解释，你只需要自己承认这份偏爱。',
    '你总被人说骨架大、肩宽、体型不纤细。你把自己藏在宽松的衣服里，试图藏起这些被人指指点点的特征。莱辛在非洲长大，没有受过正规教育，做过保姆、接线员，三十岁带着孩子独自离开婚姻，写作，得诺贝尔奖。她在自传里写道：无论你做什么，只要是你自己决定的，就是对的。你的骨架不是被别人决定的错误，是你自己必须接纳的起点。你今天决定穿那件一直不敢穿的紧身衣，不是你突然变好看了，是你终于决定不再让别人替你定义什么叫好看。你的宽肩撑起了你每一次搬重物时的力，你的骨架是你的地基。莱辛说，自己决定的，就是对的。你今天为自己的身体做的每一个决定，都是你在收回定义权。这具身体是你自己决定的形状，不需要别人的批准。',
    '你无法接受自己外形的限制——矮就是不如高，单眼皮就是不如双眼皮。你觉得这些限制是你无法翻越的高墙。二十世纪最重要的神学家田立克在二战期间写《存在的勇气》。他亲眼见证了人类精神如何在极端困境里坍塌又重建。他写：存在的勇气，是敢于接受自己的有限。你的身高、骨骼、五官走向，是你的有限，但不是你的全部定义。勇气不是假装这些有限不存在，是接受它们之后，仍然觉得自己的存在有价值。今天，把你最介意的外形限制写在纸上，旁边写上它不影响你做哪些事——不影响你阅读，不影响你思考，不影响你成为一个值得被爱、也值得被自己爱的人。田立克说，勇气始于接受有限。你接受了你的有限，你就把你的能量从无休止的自我苛责里解放出来了。你已经有了勇气，你只是还没有意识到。',
    '你害怕变老。害怕皮肤松弛，害怕白发，害怕自己不再年轻。尤瑟纳尔在《哈德良回忆录》里让罗马皇帝在生命的尽头回顾自己全部的一生，包括他逐渐老去的身体。哈德良说：我开始看见我自己死亡的轮廓。他没有用恐惧来写，他用审视来写。你的衰老不是你的失败，是你活过的全部证据。那些没有机会变老的人，不会拥有白发和皱纹。你今天发现的每一处岁月痕迹，都是时间给你的同盟标记——你不是在被淘汰，你是在被时间逐步纳入它的阵列。今天，把一处衰老的痕迹当成时间的签名。它不是判决书，是你和岁月共同签署的一份协议：你还在，你还在继续，你还拥有可以被雕刻的身体。尤瑟纳尔说，审视是理解的开始。你的审视不需要带着恐惧，它可以带着理解。你还在继续活，这就是时间对你最大的信任。',
    '你总在担心脸上的不完美，却忘了脸不只是五官的集合。王尔德在《道林·格雷的画像》里写一个永远年轻俊美的男人，他的画像替他老去，替他承担所有罪恶。最后他刺向画像，自己死成了一个面目可憎的老人。王尔德写：一个人的脸，是他自己塑造的。你的精神生活会在你的脸上留下痕迹——你读过书的安静眼神，你经历挫折后不再轻易被激怒的嘴角，你选择善良时舒展的眉间。这些不是五官，但它们比五官更决定你是谁。今天，不要只看五官，看你的精神外貌——那些被你的选择、你的坚持、你的善意慢慢塑形的部分。王尔德说，脸是自己塑造的。你的精神正在雕刻你的脸。你今天做的每一个选择，都是在继续这件只有你才能完成的雕塑。',
    '你在意外表，比你在意任何东西都更多。你把大部分时间花在镜子和购物车里，把很少时间花在书和笔记本上。斯坦纳说，书是人类沉默的情人。他一生在文学、音乐、语言里寻找人类精神的重量。他写：我们拥有的最好的那部分，从来都不是看得见的。你今天为外表花的时间，和你为精神花的时间，比例是你自己决定的。今天，从外表的时间里抽出二十分钟，给一本你一直想读的书。不是为了增加谈资，是为了让你内在的轮廓变得更深。斯坦纳说，沉默的情人比任何喧哗的赞美都更持久。你的精神外貌会随着你读过的每一行字、思考过的每一个问题慢慢变成你的第二张脸，而且是唯一一张不会被时间夺走的脸。',
    '你觉得自己在和外貌的战争里失去了太多——失去了自在，失去了享受食物的快乐，失去了在镜子里看自己时不带审判的目光。毕肖普一生与抑郁、酗酒、失去搏斗。她在《一种艺术》里写：失去的艺术不难掌握。她用了整首诗来练习失去，最后发现，当她能把失去写出来时，失去就不再是失败，而是她诗歌的一部分。你今天失去的那些自在和快乐，也可以被你写回来。今天，写一段你在和外貌焦虑斗争里失去的东西——不是为了哀悼，是为了练习。毕肖普说，写出来，它就不再是无法承受的。当你把你失去的写出来，你就从被剥夺者，变成了叙述者。叙述者永远比被剥夺者更有力量。你的内在风景，正在被你今天的书写重新描绘。',
    '你把自己的价值押在外表上，因为你害怕一旦不被人关注外表，你就没有什么可以被人看见的东西。阿伦特一生在男性主导的哲学界工作，她不以外貌取胜，她以思想站立。她说：思考是孤独的事业，但它能穿透所有的墙。你今天焦虑的外表，是你以为自己唯一能被看见的方式。但你的思考、你的判断、你对一件事独特的理解，才是你能穿透所有偏见、抵达另一颗心的唯一路径。今天，在你最容易被外表焦虑困住的时候，用思考转移注意力——想一个你最近正在思考的问题，一个你还没有结论但很想弄明白的事。阿伦特说，思考能穿透墙。你的墙今天还在，但你的思考已经开始在墙上凿洞。那些通过这个洞看见你的人，看见的才是你真正的模样。',
    '你觉得今天的自己不好看，这个月的体重让你崩溃，这一年的变化让你沮丧。布罗代尔把历史分成短时段事件、中时段周期和长时段结构。事件是今天照镜子的失望，周期是这一年的体重浮动，长时段是你这个人——你的习惯、你的生命力、你在时间里慢慢塑形的全部精神与身体的轮廓。长时段的美不是某一天的脸，是你在漫长岁月里持续照料自己、持续丰富自己之后，从内部透出的光。今天，不要用今天的事件定义你自己的全部美感。布罗代尔说，长时段决定一切。你的美也是。你今天读的书、你为自己做的饭、你在焦虑后主动调整的呼吸，都在你的长时段里继续沉积。长时段的美不会在一天之内被任何镜子和体重秤宣判。',
    '你觉得自己的一切都不如人——不如同学好看，不如同事精神。你觉得自己是废墟，别人是花园。贾曼是英国电影导演，他在确诊艾滋病之后，在海边买下一座废弃的渔民小屋，在一片碎石和荒草里，用捡来的浮木和鹅卵石建了一座花园。他说，如果一座花园不种在废墟上，它就不是真正属于你的花园。你的身体和精神也是可以被你亲手建造的花园。你今天为自己做的一切——喝够水，睡好觉，在焦虑时对自己说一句安慰的话——都是在废墟上种下种子。花园不是天生在沃土上的，是在废墟里开垦出来的。贾曼的花园现在还在海边开着，他的废墟变成了全世界人朝圣的地方。你的也是。继续种，你的花园会在废墟上长出来。它不是任何人的复制品，它只属于你。',
    '你在精心修饰之后才敢出门，你觉得素颜的自己、穿着旧T恤的自己、没有准备好的自己——不是真实的自己。梅尔维尔写《白鲸》，亚哈船长的全部面目不在港口被人记住的样子，是在海上追捕白鲸时，被海风刻出的轮廓。一条船最真实的样子，不在港口，在海上。你的身体最真实的模样，也不在你修饰之后，在你日常生活的风浪里——你加班时被屏幕光照着的脸，你运动完红润的皮肤，你早晨醒来还没有被任何外在标准审视过的原貌。今天，留一个时刻给你的“海上”的样子——不修图，不装扮，只是你日常航行里最真实的一刻。梅尔维尔说，海上的船才是真正的船。你日常的样子才是你全部真实的模样，它不需要被任何港口的眼光评判。',
    '你把所有注意力都给了容貌——怎么变得更白、更瘦、更符合标准。薇依是法国最神秘也最激进的哲学家之一，她一生拒绝一切多余的东西——她吃不饱，穿得破，把全部注意力给了劳工、受压迫者和真理。她说：注意力是最纯粹的慷慨。你把自己的注意力全部给外表，是你在对自己吝啬。你的慷慨应该留一些给你真正在乎的事——你要读的书，你要学的技艺，你要关心的人。今天，把你注视镜子的时间减半，把省下来的十分钟给你的精神。薇依说，注意力是你送给世界的礼物。你今天可以用这份礼物，送给你自己内在的生命。你给予什么，你就成为什么。把注意力分给你内在的精神，它会回报你一张不会被时间磨损的脸。',
    '你每次路过镜子都要把自己从头到脚检视一遍，好像在验收一座还没完工的房屋。你觉得这房屋的墙面不够平滑，结构不够匀称，配不上你理想中家的模样。法国哲学家巴什拉在《空间的诗学》里写：房屋是灵魂的庇护所，它比任何建筑都更早存在于我们心中。你的身体不是你租来的临时住所，是你灵魂的永久庇护所。你在这座房屋里笑过、哭过、生病时独自蜷缩过，它每一处被时间磨损的角落都是你精神生活的遗迹。今天，像回到童年的老宅那样回到你的身体——不是验收，是安居。巴什拉说，庇护所不需要完美，它只需要能保护你。你的身体已经保护了你这么多年，它不需要被修成别人的样板间。它是你的家，你是它唯一的主人。安居吧，你已经在家了。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
