<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <title>心序 · 整理心绪的华容道</title>
    <link rel="preload" as="image" href="youxi3.webp" fetchpriority="high">
    <style>
        :root {
            --bg: #08080f;
            --ease: cubic-bezier(0.22,0.61,0.36,1);
            --spring: cubic-bezier(0.32,0.72,0,1);
            --bounce: cubic-bezier(0.34,1.56,0.64,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; font-family:-apple-system,'PingFang SC','SF Pro Display','Microsoft YaHei',sans-serif; -webkit-font-smoothing:antialiased; }
        body { background:var(--bg); color:#fff; }

        .bg-img { position:fixed; inset:0; z-index:-1; background:var(--bg) center/cover no-repeat; opacity:0; transition:opacity 0.6s ease-out; }
        .bg-img.loaded { opacity:0.35; }
        .bg-vignette { position:fixed; inset:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse at center, transparent 30%, rgba(8,8,15,0.7) 100%); }

        .ambient { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .ambient .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; }
        .ambient .o1 { width:500px; height:500px; top:-15%; left:50%; transform:translateX(-50%); background:radial-gradient(circle,rgba(61,176,8,0.6),transparent); animation:orbBreathe 8s ease-in-out infinite; }
        .ambient .o2 { width:350px; height:350px; bottom:20%; right:-10%; background:radial-gradient(circle,rgba(0,153,255,0.5),transparent); animation:orbBreathe 10s ease-in-out -3s infinite; }
        .ambient .o3 { width:280px; height:280px; top:50%; left:-8%; background:radial-gradient(circle,rgba(0,245,212,0.4),transparent); animation:orbBreathe 9s ease-in-out -6s infinite; }
        @keyframes orbBreathe { 0%,100%{opacity:0.08;transform:translateX(-50%) scale(1)} 50%{opacity:0.16;transform:translateX(-50%) scale(1.15)} }

        .stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .star { position:absolute; width:1.5px; height:1.5px; border-radius:50%; background:#fff; animation:twinkle 3s ease-in-out infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.15} 50%{opacity:0.6} }

        .scroll { position:fixed; z-index:1; inset:0; overflow-y:auto; overflow-x:hidden; overscroll-behavior:none; scrollbar-width:none; }
        .scroll::-webkit-scrollbar { display:none; }
        .wrap { max-width:460px; margin:0 auto; padding:0 24px 80px; display:flex; flex-direction:column; align-items:center; min-height:100vh; }

        .back-btn { position:fixed; top:22px; left:22px; z-index:100; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.35s var(--ease); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
        .back-btn:hover { background:rgba(255,255,255,0.14); color:#fff; transform:scale(1.08); border-color:rgba(255,255,255,0.2); }

        .hero { text-align:center; padding:90px 0 10px; position:relative; z-index:2; }
        .hero-badge { display:inline-block; padding:6px 16px; border-radius:20px; background:rgba(168,230,0,0.08); border:1px solid rgba(168,230,0,0.18); font-size:0.62rem; color:#A8E600; letter-spacing:3px; font-weight:600; margin-bottom:18px; }
        .hero-title { font-size:3rem; font-weight:100; letter-spacing:16px; background:linear-gradient(135deg,#3DB008,#E9F8BC,#E0FE44,#00f5d4,#0099ff); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:4px; line-height:1.1; }
        .hero-en { font-size:0.62rem; color:rgba(255,255,255,0.35); letter-spacing:6px; font-weight:400; margin-bottom:22px; }
        .hero-divider { display:flex; align-items:center; gap:12px; margin:0 auto 20px; width:100px; }
        .hero-divider .hl { flex:1; height:1px; background:rgba(255,255,255,0.1); }
        .hero-divider .hd { width:5px; height:5px; border-radius:50%; background:rgba(168,230,0,0.5); box-shadow:0 0 12px rgba(168,230,0,0.3); }
        .hero-greeting { font-size:0.8rem; color:rgba(255,255,255,0.5); letter-spacing:1px; font-weight:300; margin-bottom:16px; }
        .hero-greeting b { color:#fff; font-weight:500; }
        .hero-poem { font-size:0.82rem; color:rgba(255,255,255,0.5); line-height:2.3; text-align:center; letter-spacing:1.5px; font-weight:300; max-width:300px; margin:0 auto; }

        .mode-tabs { display:flex; gap:6px; justify-content:center; margin:28px 0 6px; position:relative; z-index:2; background:rgba(255,255,255,0.03); border-radius:20px; padding:4px; border:1px solid rgba(255,255,255,0.06); }
        .mode-tab { padding:10px 24px; border-radius:18px; border:none; background:transparent; color:rgba(255,255,255,0.4); font-size:0.76rem; font-weight:500; cursor:pointer; transition:all 0.35s var(--ease); font-family:inherit; letter-spacing:1px; }
        .mode-tab.active { background:rgba(255,255,255,0.08); color:#fff; box-shadow:0 2px 12px rgba(0,0,0,0.2); }
        .mode-tab .mode-sub { display:block; font-size:0.55rem; opacity:0.4; font-weight:400; letter-spacing:1px; margin-top:1px; }
        .mode-tab.active .mode-sub { opacity:0.6; }

        .progress-ring-wrap { display:flex; align-items:center; gap:14px; margin:10px 0 6px; position:relative; z-index:2; }
        .progress-ring { width:44px; height:44px; flex-shrink:0; }
        .progress-ring .bg { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:3; }
        .progress-ring .fg { fill:none; stroke:url(#prGrad); stroke-width:3; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset 0.6s var(--spring); }
        .progress-info { text-align:left; }
        .progress-num { font-size:1.1rem; font-weight:600; color:#fff; letter-spacing:1px; }
        .progress-label { font-size:0.6rem; color:rgba(255,255,255,0.4); letter-spacing:2px; }
        .date-range { text-align:center; font-size:0.6rem; color:rgba(255,255,255,0.25); letter-spacing:1px; margin-top:2px; min-height:16px; position:relative; z-index:2; transition:opacity 0.4s; }

        .board-area { position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center; margin:10px 0; }
        .board-glow { position:absolute; inset:-10px; border-radius:24px; background:radial-gradient(ellipse at center, rgba(168,230,0,0.06) 0%, transparent 70%); pointer-events:none; opacity:0; transition:opacity 0.6s; }
        .board-glow.on { opacity:1; }
        .board { display:grid; gap:6px; margin:0 auto; padding:14px; border-radius:22px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); position:relative; }
        .board.s3 { grid-template-columns:repeat(3,1fr); }
        .board.s4 { grid-template-columns:repeat(4,1fr); }

        .tile { aspect-ratio:1; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; transition:transform 0.15s var(--bounce), box-shadow 0.15s ease; color:#fff; font-size:1.25rem; text-shadow:0 1px 4px rgba(0,0,0,0.3); position:relative; user-select:none; -webkit-user-select:none; box-shadow:0 3px 12px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.08) inset; }
        .tile::after { content:''; position:absolute; inset:0; border-radius:15px; background:linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 40%); pointer-events:none; }
        .tile:active { transform:scale(0.88); }
        .tile:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.12) inset; }
        .tile.snap { transition:transform 0.12s ease-out; z-index:10; }

        .tile.empty { background:rgba(255,255,255,0.025) !important; cursor:default; box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.05) !important; }
        .tile.empty::after { display:none; }
        .tile.empty:hover,.tile.empty:active { transform:none; }
        .tile.pending { background:rgba(255,255,255,0.015) !important; cursor:default; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03) !important; color:rgba(255,255,255,0.08); font-size:0.9rem; }
        .tile.pending::after { display:none; }
        .tile.pending:hover { transform:none; }

        .board.s3 .tile { width:78px; font-size:1.35rem; }
        .board.s4 .tile { width:56px; font-size:0.95rem; }
        .tile.light { color:#1a3a00; text-shadow:none; }
        .tile.light::after { background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 40%); }

        .hint { font-size:0.68rem; color:rgba(255,255,255,0.35); text-align:center; margin:10px 0 4px; letter-spacing:0.5px; min-height:18px; position:relative; z-index:2; transition:all 0.3s; }

        .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; position:relative; z-index:2; margin-top:4px; }
        .btn { padding:13px 32px; border-radius:24px; border:none; font-weight:600; font-size:0.82rem; cursor:pointer; transition:all 0.35s var(--ease); font-family:inherit; letter-spacing:1.5px; }
        .btn.primary { background:linear-gradient(135deg,#3DB008,#B8E620); color:#1a3a00; box-shadow:0 4px 22px rgba(61,176,8,0.3); position:relative; overflow:hidden; }
        .btn.primary::after { content:''; position:absolute; inset:0; border-radius:24px; background:linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 50%); pointer-events:none; }
        .btn.primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(61,176,8,0.5); }
        .btn.primary:disabled { opacity:0.25; pointer-events:none; transform:none; box-shadow:none; }
        .btn.ghost { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.1); }
        .btn.ghost:hover { background:rgba(255,255,255,0.1); color:#fff; border-color:rgba(255,255,255,0.2); }
        .btn:active { transform:scale(0.94) !important; }

        .win-card { padding:36px 24px 28px; border-radius:22px; background:linear-gradient(160deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%); border:1px solid rgba(255,255,255,0.08); text-align:center; width:100%; max-width:340px; position:relative; overflow:hidden; }
        .win-card::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:60px; height:3px; border-radius:0 0 3px 3px; background:linear-gradient(90deg,transparent,rgba(168,230,0,0.5),transparent); }
        .win-stamp { display:inline-block; padding:8px 20px; border-radius:18px; background:rgba(168,230,0,0.08); border:1px solid rgba(168,230,0,0.2); font-size:0.6rem; color:rgba(168,230,0,0.7); letter-spacing:4px; font-weight:600; margin-bottom:18px; }
        .win-msg { font-size:0.9rem; color:rgba(255,255,255,0.8); font-weight:300; line-height:2.1; letter-spacing:0.8px; }
        .win-moods { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin:20px 0 4px; }
        .win-dot { width:16px; height:16px; border-radius:5px; box-shadow:0 2px 6px rgba(0,0,0,0.2); }

        .tile-tip { position:fixed; z-index:200; pointer-events:none; padding:10px 16px; border-radius:12px; background:rgba(16,16,28,0.96); color:#fff; font-size:0.76rem; font-weight:500; letter-spacing:0.5px; opacity:0; transform:translateY(8px); transition:opacity 0.3s var(--ease), transform 0.3s var(--ease); box-shadow:0 12px 32px rgba(0,0,0,0.5); text-align:center; white-space:nowrap; border:1px solid rgba(255,255,255,0.1); }
        .tile-tip.show { opacity:1; transform:translateY(0); }
        .tile-tip .tip-date { font-size:0.6rem; color:rgba(255,255,255,0.45); margin-bottom:2px; }
        .tile-tip .tip-mood { font-size:0.82rem; }

        .history-section { width:100%; margin-top:56px; padding-top:36px; border-top:1px solid rgba(255,255,255,0.06); position:relative; z-index:2; }
        .history-title { text-align:center; font-size:0.6rem; color:rgba(255,255,255,0.22); letter-spacing:6px; margin-bottom:24px; font-weight:600; }
        .history-list { display:flex; flex-direction:column; gap:16px; position:relative; }
        .history-list::before { content:''; position:absolute; left:24px; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.06); }
        .history-card { position:relative; margin-left:42px; padding:16px 18px; border-radius:16px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.05); }
        .history-card::before { content:''; position:absolute; left:-31px; top:18px; width:8px; height:8px; border-radius:50%; background:rgba(168,230,0,0.35); box-shadow:0 0 10px rgba(168,230,0,0.2); }
        .history-card .hc-seq { position:absolute; top:-10px; left:14px; font-size:0.55rem; color:rgba(168,230,0,0.35); letter-spacing:2px; font-weight:600; background:var(--bg); padding:0 8px; }
        .history-card .hc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .history-card .hc-date { font-size:0.72rem; color:rgba(255,255,255,0.55); font-weight:500; letter-spacing:0.5px; }
        .history-card .hc-mode { font-size:0.58rem; color:rgba(255,255,255,0.25); letter-spacing:1.5px; font-weight:600; }
        .history-card .hc-dots { display:flex; gap:4px; flex-wrap:wrap; }
        .history-card .hc-dot { width:14px; height:14px; border-radius:4px; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
        .history-empty { text-align:center; color:rgba(255,255,255,0.2); font-size:0.78rem; padding:40px 0; letter-spacing:0.5px; line-height:2.2; }
        .history-empty .he-icon { font-size:1.8rem; margin-bottom:10px; display:block; }

        .footer { text-align:center; padding:48px 0 12px; position:relative; z-index:2; }
        .footer-name { font-size:0.95rem; font-weight:500; background:linear-gradient(90deg,#00f5d4,#0099ff,#00f5d4); background-size:300% 100%; animation:brandFlow 6s linear infinite; -webkit-background-clip:text; background-clip:text; color:transparent; display:inline-block; letter-spacing:2px; }
        @keyframes brandFlow { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }

        body { animation:pageIn 0.4s var(--ease); }
        @keyframes pageIn { from{opacity:0;transform:translateY(10px)} }

        .confetti { position:fixed; z-index:300; pointer-events:none; width:8px; height:8px; border-radius:2px; animation:confettiFall 1.8s ease-out forwards; }
        @keyframes confettiFall { 0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translate(var(--dx),100vh) rotate(var(--rot)) scale(0)} }
    </style>
</head>
<body>

<div class="bg-img" id="bgImg"></div>
<div class="bg-vignette"></div>

<div class="ambient"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="stars" id="stars"></div>

<div class="scroll">
<div class="wrap">

    <button class="back-btn" onclick="location.href='hall2.html'" aria-label="返回">←</button>

    <div class="hero">
        <div class="hero-badge">YOUR HEART · YOUR ORDER</div>
        <div class="hero-title">心 序</div>
        <div class="hero-en">H E A R T  ·  O R D E R</div>
        <div class="hero-divider"><span class="hl"></span><span class="hd"></span><span class="hl"></span></div>
        <div class="hero-greeting" id="heroGreeting"></div>
        <div class="hero-poem">每一天的心情，化为一枚色块。<br>亲手把它们一一归位。<br>杂乱归于有序，纷扰归于平静。</div>
    </div>

    <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode(3)" id="tab3">心序·周<span class="mode-sub">3×3 · 8天</span></button>
        <button class="mode-tab" onclick="setMode(4)" id="tab4">心序·半月<span class="mode-sub">4×4 · 15天</span></button>
    </div>

    <div class="progress-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 44 44">
            <defs><linearGradient id="prGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3DB008"/><stop offset="50%" stop-color="#E0FE44"/><stop offset="100%" stop-color="#00f5d4"/></linearGradient></defs>
            <circle class="bg" cx="22" cy="22" r="19"/>
            <circle class="fg" id="progressFg" cx="22" cy="22" r="19" stroke-dasharray="119.38" stroke-dashoffset="119.38"/>
        </svg>
        <div class="progress-info"><div class="progress-num" id="progressNum">0</div><div class="progress-label" id="progressLabel">/8 天</div></div>
    </div>
    <div class="date-range" id="dateRange"></div>

    <div class="board-area">
        <div class="board-glow" id="boardGlow"></div>
        <div class="board" id="board"></div>
    </div>
    <div class="hint" id="hint"></div>
    <div class="tile-tip" id="tileTip"><div class="tip-date"></div><div class="tip-mood"></div></div>

    <div class="btn-row">
        <button class="btn ghost" onclick="location.href='hall2.html'">返回</button>
        <button class="btn primary" id="startBtn" onclick="startGame()" disabled>开始归序</button>
    </div>

    <div class="history-section">
        <div class="history-title">心 序 录</div>
        <div class="history-list" id="historyList"></div>
    </div>
    <div class="footer"><span class="footer-name">You 捻光</span></div>

</div>
</div>

<script>
(function(){
  var html='';
  for(var i=0;i<50;i++){html+='<div class="star" style="left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(Math.random()*2+1)+'px;height:'+(Math.random()*2+1)+'px;animation-delay:'+(Math.random()*3)+'s"></div>'}
  document.getElementById('stars').innerHTML=html;
})();
(function(){
  var bg=document.getElementById('bgImg'), src='youxi3.webp', img=new Image();
  img.onload=function(){bg.style.backgroundImage='url('+src+')';bg.classList.add('loaded')};
  img.onerror=function(){bg.style.backgroundImage='url(youxi3.png)';bg.classList.add('loaded')};
  img.src=src; if(img.complete){bg.style.backgroundImage='url('+src+')';bg.classList.add('loaded')}
})();

var DIARY_KEY='njgDiaryEntries', HRD_HISTORY_KEY='xinxu_history';
(function(){var e=[];try{e=JSON.parse(localStorage.getItem(DIARY_KEY))||[]}catch(e){}var c=false;e=e.filter(function(x){if(x.text&&x.text.indexOf('[DEV]')===0){c=true;return false}return true});if(c)localStorage.setItem(DIARY_KEY,JSON.stringify(e));})();

var GRAD={7:'linear-gradient(135deg,#3DB008,#E9F8BC,#E0FE44)',6:'linear-gradient(135deg,#E9F8BC,#E0FE44,#00f5d4)',5:'linear-gradient(135deg,#E0FE44,#00f5d4,#076CAB)',4:'linear-gradient(135deg,#ade5fe,#7ad6fb,#44bcf9)',3:'linear-gradient(135deg,#7ad6fb,#44bcf9,#2499f8)',2:'linear-gradient(135deg,#2499f8,#157cf5,#1062ec)',1:'linear-gradient(135deg,#157cf5,#1062ec,#104fb9)'};
var SIGN_MSGS=['别执着过往得失，别焦虑未知以后，好好握住当下的时光就足够。','不必困在回忆里内耗，也不用为未来惴惴不安，眼前此刻便是礼物。','所有的情绪都会过去，就像色块终将归位。你需要的，只是一点耐心。','焦虑是心在说话，低落是心在休息。每一种心情，都值得被安放。','心乱的时候，就把色块一个一个归位。整理棋盘，也是整理自己。'];
var playerName=localStorage.getItem('playerName')||'朋友';
var mode=3, tiles=[], emptyIdx, playing=false, won=false;

function getMoods(n){
  var entries=[]; try{entries=JSON.parse(localStorage.getItem(DIARY_KEY))||[]}catch(e){}
  entries.sort(function(a,b){return a.dateKey<b.dateKey?-1:1});
  var moods=[];
  for(var i=0;i<entries.length&&moods.length<n;i++){
    if(entries[i].mood)moods.push({score:entries[i].mood.score,color:GRAD[entries[i].mood.score]||'#86868b',label:entries[i].mood.label||'',dateKey:entries[i].dateKey});
  }
  if(moods.length>n)moods=moods.slice(moods.length-n);
  for(var j=0;j<moods.length;j++)moods[j].day=j+1;
  return moods;
}

function setMode(m){if(playing)return; mode=m; won=false; document.getElementById('tab3').classList.toggle('active',m===3); document.getElementById('tab4').classList.toggle('active',m===4); refresh();}

function refresh(){
  var need=mode===3?8:15, moods=getMoods(need), collected=moods.length;
  var circ=119.38; document.getElementById('progressFg').style.strokeDashoffset=circ-(collected/need)*circ;
  document.getElementById('progressNum').textContent=collected; document.getElementById('progressLabel').textContent='/'+need+' 天';
  var dr=document.getElementById('dateRange');
  if(collected>=need && moods.length>0){dr.textContent=fmtDK(moods[0].dateKey)+' — '+fmtDK(moods[moods.length-1].dateKey); dr.style.opacity='1';}
  else{dr.textContent=''; dr.style.opacity='0';}
  document.getElementById('boardGlow').classList.toggle('on', collected>=need && !won);
  var board=document.getElementById('board'), hint=document.getElementById('hint'), startBtn=document.getElementById('startBtn');
  var greetingEl=document.getElementById('heroGreeting');
  if(collected>=need && !won)greetingEl.innerHTML='<b>'+playerName+'</b>，你的心序盘已就绪';
  else if(won)greetingEl.innerHTML='<b>'+playerName+'</b>，心已归序';
  else{var remain=need-collected; greetingEl.innerHTML='<b>'+playerName+'</b>，还差 <b>'+remain+'</b> 天解锁这盘心序';}
  if(won){
    board.innerHTML='<div class="win-card"><div class="win-stamp">◆ 心 序 签 ◆</div><div class="win-msg">'+SIGN_MSGS[Math.floor(Math.random()*SIGN_MSGS.length)]+'</div><div class="win-moods">'+moods.map(function(m){return '<div class="win-dot" style="background:'+m.color+'"></div>'}).join('')+'</div></div>';
    board.className=''; hint.textContent='心序已归位，内心也安顿好了'; startBtn.textContent='再归一次'; startBtn.disabled=false; return;
  }
  if(collected<need){
    tiles=[]; emptyIdx=-1; var allTiles=[];
    for(var k=0;k<need;k++){
      if(k<collected)allTiles.push({day:k+1,color:moods[k].color,score:moods[k].score,label:moods[k].label,dateKey:moods[k].dateKey,pos:k});
      else allTiles.push({day:null,color:'',score:0,empty:true,pending:true});
    }
    allTiles.push({day:null,color:'',score:0,empty:true}); tiles=allTiles;
    renderBoard(); hint.textContent='每天写静心日记，色块就会一枚枚填进棋盘'; startBtn.textContent='开始归序'; startBtn.disabled=true;
  }else{
    if(!playing){tiles=moods.map(function(m,i){return {day:m.day,color:m.color,score:m.score,label:m.label,dateKey:m.dateKey,pos:i}}); tiles.push({day:null,color:'',score:0,empty:true}); emptyIdx=tiles.length-1;}
    renderBoard(); hint.textContent=playing?'点击与空格相邻的色块来移动':'色块已集齐，点击「开始归序」开始整理'; startBtn.textContent='开始归序'; startBtn.disabled=false;
  }
}

function renderBoard(){
  var board=document.getElementById('board'); board.className='board s'+mode;
  var html='';
  for(var i=0;i<tiles.length;i++){
    var t=tiles[i];
    if(t.pending)html+='<div class="tile pending" data-idx="'+i+'">?</div>';
    else if(t.empty)html+='<div class="tile empty" data-idx="'+i+'"></div>';
    else{var cls='tile'; if(t.score===7||t.score===6)cls+=' light'; html+='<div class="'+cls+'" style="background:'+t.color+';" data-idx="'+i+'" data-row="'+Math.floor(i/mode)+'" data-col="'+(i%mode)+'" onclick="move('+i+')" ondblclick="showTip(event,'+i+')">'+t.day+'</div>';}
  }
  board.innerHTML=html;
}

var touchStart=null;
(function(){
  var board=document.getElementById('board');
  board.addEventListener('touchstart',function(e){if(!playing)return; var t=e.target.closest('.tile'); if(!t||t.classList.contains('empty')||t.classList.contains('pending'))return; var tc=e.touches[0]; touchStart={idx:parseInt(t.dataset.idx),x:tc.clientX,y:tc.clientY,el:t};},{passive:true});
  board.addEventListener('touchend',function(e){
    if(!touchStart||!playing)return; var endX=e.changedTouches[0].clientX, endY=e.changedTouches[0].clientY, dx=endX-touchStart.x, dy=endY-touchStart.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<20){touchStart=null;return}
    var idx=touchStart.idx, er=Math.floor(emptyIdx/mode), ec=emptyIdx%mode, tr=Math.floor(idx/mode), tc=idx%mode, match=false;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&tc+1===ec&&tr===er)match=true; if(dx<0&&tc-1===ec&&tr===er)match=true;}
    else{if(dy>0&&tr+1===er&&tc===ec)match=true; if(dy<0&&tr-1===er&&tc===ec)match=true;}
    if(match){var ts=mode===3?84:62, sx=0, sy=0; if(dx>0)sx=ts; else if(dx<0)sx=-ts; if(dy>0)sy=ts; else if(dy<0)sy=-ts; touchStart.el.classList.add('snap'); touchStart.el.style.transform='translate('+sx+'px,'+sy+'px)'; touchStart.el.style.opacity='0.6'; setTimeout(function(){move(idx)},100);}
    touchStart=null;
  });
})();

function startGame(){
  if(won){won=false; playing=false; refresh(); return;}
  var need=mode===3?8:15, moods=getMoods(need); if(moods.length<need)return;
  tiles=moods.map(function(m,i){return {day:m.day,color:m.color,score:m.score,label:m.label,dateKey:m.dateKey,pos:i}}); tiles.push({day:null,color:'',score:0,empty:true}); emptyIdx=tiles.length-1; playing=true;
  for(var s=0;s<(mode===3?120:280);s++){var nb=neighbors(emptyIdx), pick=nb[Math.floor(Math.random()*nb.length)]; swap(pick,emptyIdx); emptyIdx=pick;}
  renderBoard(); document.getElementById('hint').textContent='移动色块，按 1-'+need+' 顺序归位'; document.getElementById('boardGlow').classList.add('on');
}

function neighbors(idx){var size=mode, nb=[], r=Math.floor(idx/size), c=idx%size; if(r>0)nb.push(idx-size); if(r<size-1)nb.push(idx+size); if(c>0)nb.push(idx-1); if(c<size-1)nb.push(idx+1); return nb;}
function swap(a,b){var tmp=tiles[a]; tiles[a]=tiles[b]; tiles[b]=tmp; tiles[a].pos=a; tiles[b].pos=b;}

function fmtDK(dk){var p=dk.split('-');return p[0]+'.'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
var tipTimer=null;
function showTip(e,idx){var t=tiles[idx]; if(!t||t.empty)return; var tip=document.getElementById('tileTip'); tip.querySelector('.tip-date').textContent=fmtDK(t.dateKey); tip.querySelector('.tip-mood').textContent=t.label; tip.style.left=Math.min(e.clientX,window.innerWidth-140)+'px'; tip.style.top=(e.clientY-55)+'px'; tip.classList.add('show'); clearTimeout(tipTimer); tipTimer=setTimeout(function(){tip.classList.remove('show')},1800);}

function move(idx){
  if(!playing)return; if(neighbors(emptyIdx).indexOf(idx)===-1)return;
  swap(idx,emptyIdx); emptyIdx=idx; renderBoard();
  if(checkWin()){playing=false; won=true; document.getElementById('hint').textContent='✨ 心序归位，你做到了'; document.getElementById('boardGlow').classList.remove('on'); celebrate(); saveRecord(); refresh();}
}
function checkWin(){for(var i=0;i<tiles.length-1;i++){if(tiles[i].day!==i+1)return false} return tiles[tiles.length-1].empty;}

function celebrate(){
  var colors=['#3DB008','#E0FE44','#00f5d4','#0099ff','#ade5fe','#7ad6fb','#E9F8BC'];
  for(var i=0;i<30;i++){var el=document.createElement('div'); el.className='confetti'; el.style.left=Math.random()*100+'%'; el.style.top=-(Math.random()*20+10)+'px'; el.style.setProperty('--dx',(Math.random()-0.5)*200+'px'); el.style.setProperty('--rot',(Math.random()-0.5)*720+'deg'); el.style.background=colors[Math.floor(Math.random()*colors.length)]; el.style.animationDelay=Math.random()*0.5+'s'; document.body.appendChild(el); setTimeout(function(){el.remove()},2500);}
}

function saveRecord(){
  var records=[]; try{records=JSON.parse(localStorage.getItem(HRD_HISTORY_KEY))||[]}catch(e){}
  var moods=getMoods(mode===3?8:15);
  records.unshift({date:new Date().toISOString(),mode:mode,modeLabel:mode===3?'心序·周':'心序·半月',moods:moods.map(function(m){return m.color})});
  if(records.length>30)records.length=30; localStorage.setItem(HRD_HISTORY_KEY,JSON.stringify(records)); renderHistory();
}
function renderHistory(){
  var records=[]; try{records=JSON.parse(localStorage.getItem(HRD_HISTORY_KEY))||[]}catch(e){}
  var list=document.getElementById('historyList');
  if(records.length===0){list.innerHTML='<div class="history-empty"><span class="he-icon">◈</span>还没有通关记录<br>归序一次，这里便长出一枚心序签</div>';return}
  var html='';
  records.forEach(function(r,i){
    var d=new Date(r.date),ds=d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
    var dots=r.moods.map(function(c){return '<div class="hc-dot" style="background:'+c+'"></div>'}).join('');
    html+='<div class="history-card" style="animation:fadeUp 0.5s ease '+(i*0.08)+'s both"><div class="hc-seq">第'+(records.length-i)+'次</div><div class="hc-header"><span class="hc-date">'+ds+'</span><span class="hc-mode">'+r.modeLabel+'</span></div><div class="hc-dots">'+dots+'</div></div>';
  });
  list.innerHTML=html;
}
(function(){refresh(); renderHistory();})();
</script>
</body>
</html>
