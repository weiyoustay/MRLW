<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心序 · 整理心绪的华容道</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'PingFang SC','Microsoft YaHei',sans-serif; -webkit-font-smoothing:antialiased; }
body { background:#0a0a14; }

.bg { position:fixed; inset:0; z-index:0; }
.bg img { width:100%; height:100%; object-fit:cover; opacity:0.5; }
.bg::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 35%, rgba(10,10,20,0.7) 100%); }

.scene { position:fixed; inset:0; z-index:1; display:flex; align-items:center; justify-content:center; }

/* ── 介绍页 ── */
.back-btn { padding:7px 16px; border-radius:18px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); font-size:0.72rem; cursor:pointer; font-family:inherit; letter-spacing:1px; }
.intro { text-align:center; padding:40px 28px; color:#fff; max-width:400px; animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} }
.intro .tag { display:inline-block; padding:5px 14px; border-radius:14px; background:rgba(168,230,0,0.08); border:1px solid rgba(168,230,0,0.15); font-size:0.58rem; color:#A8E600; letter-spacing:3px; margin-bottom:18px; }
.intro h1 { font-size:3rem; font-weight:100; letter-spacing:14px; background:linear-gradient(135deg,#3DB008,#E9F8BC,#E0FE44,#00f5d4,#0099ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.intro .en { font-size:0.6rem; letter-spacing:6px; color:rgba(255,255,255,0.3); margin-bottom:20px; }
.intro .divider { display:flex; align-items:center; gap:10px; width:80px; margin:0 auto 22px; }
.intro .divider i { flex:1; height:1px; background:rgba(255,255,255,0.1); }
.intro .divider b { width:4px; height:4px; border-radius:50%; background:rgba(168,230,0,0.4); }
.intro .poem { font-size:0.85rem; color:rgba(255,255,255,0.5); line-height:2.3; letter-spacing:1px; margin-bottom:20px; }

/* 进度状态 */
.intro .status { padding:14px 20px; border-radius:16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); margin-bottom:24px; }
.intro .status .row { display:flex; align-items:center; justify-content:center; gap:10px; }
.intro .status .big { font-size:1.6rem; font-weight:600; color:#fff; letter-spacing:1px; }
.intro .status .sep { color:#fff; font-size:0.9rem; }
.intro .status .small { font-size:0.7rem; color:rgba(255,255,255,0.35); letter-spacing:1px; }
.intro .status .bar-wrap { height:4px; background:rgba(255,255,255,0.06); border-radius:4px; margin-top:10px; overflow:hidden; }
.intro .status .bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#3DB008,#E0FE44,#00f5d4); transition:width 0.6s ease; }
.intro .status .msg { font-size:0.68rem; color:rgba(255,255,255,0.4); margin-top:8px; letter-spacing:0.5px; }
.intro .status .msg b { color:#fff; font-weight:600; }
.intro .status .dots { display:flex; gap:3px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
.intro .status .dot { width:16px; height:16px; border-radius:5px; background-size:cover; background-position:center; }

.intro .mode-row { display:flex; gap:8px; justify-content:center; margin-bottom:28px; }
.intro .mode-btn { padding:10px 22px; border-radius:18px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.4); font-size:0.78rem; cursor:pointer; font-family:inherit; letter-spacing:1px; transition:all 0.3s; }
.intro .mode-btn.on { background:rgba(255,255,255,0.1); color:#fff; border-color:rgba(255,255,255,0.25); }
.intro .mode-btn .sm { font-size:0.55rem; opacity:0.5; display:block; }
.intro .start-btn { padding:15px 52px; border-radius:26px; border:none; font-size:0.95rem; font-weight:600; letter-spacing:3px; cursor:pointer; font-family:inherit; background:linear-gradient(135deg,#3DB008,#B8E620); color:#1a3a00; box-shadow:0 4px 22px rgba(61,176,8,0.3); transition:all 0.3s; }
.intro .start-btn:active { transform:scale(0.95); }
.intro .start-btn:disabled { opacity:0.2; }

/* ── 游戏页 ── */
.game { display:none; flex-direction:column; align-items:center; width:100%; height:100%; color:#fff; animation:fadeIn 0.5s ease; }
.game.on { display:flex; }

/* 进度卡片 */
.prog-card { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:18px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); margin:60px 0 8px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
.prog-card svg { width:42px; height:42px; flex-shrink:0; }
.prog-card .pbg { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:3; }
.prog-card .pfg { fill:none; stroke:url(#pg); stroke-width:3; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
.prog-card .info { display:flex; flex-direction:column; }
.prog-card .num { font-size:1.3rem; font-weight:600; color:#fff; letter-spacing:1px; }
.prog-card .lbl { font-size:0.58rem; color:rgba(255,255,255,0.3); letter-spacing:2px; }
.prog-card .range { font-size:0.55rem; color:rgba(255,255,255,0.18); letter-spacing:0.5px; margin-top:1px; }

/* 模式选择 */
.game .mode-row { margin-bottom:6px; }
.game .mode-btn { padding:8px 20px; border-radius:16px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.35); font-size:0.72rem; cursor:pointer; font-family:inherit; letter-spacing:1px; transition:all 0.3s; }
.game .mode-btn.on { background:rgba(255,255,255,0.1); color:#fff; border-color:#fff; }
.game .mode-btn .sm { font-size:0.5rem; opacity:0.4; display:block; }

/* 棋盘 */
.board-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:0 16px; width:100%; }
.board { display:grid; gap:6px; padding:16px; border-radius:22px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); box-shadow:0 12px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.03); position:relative; }
.board::before { content:''; position:absolute; inset:-1px; border-radius:22px; padding:1px; background:linear-gradient(160deg,rgba(255,255,255,0.04),transparent 50%,rgba(255,255,255,0.02)); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
.board.s3 { grid-template-columns:repeat(3,1fr); }
.board.s4 { grid-template-columns:repeat(4,1fr); }
.board.s5 { grid-template-columns:repeat(5,1fr); }

.tile { aspect-ratio:1; border-radius:16px; display:flex; align-items:flex-end; justify-content:flex-end; background-size:cover; background-position:center; position:relative; user-select:none; box-shadow:0 4px 16px rgba(0,0,0,0.3); transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease; cursor:pointer; overflow:hidden; }
.tile::after { content:''; position:absolute; inset:0; border-radius:16px; background:linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 40%); pointer-events:none; }
.tile .num { position:absolute; bottom:2px; right:4px; z-index:1; font-weight:700; font-size:0.7rem; color:#000; text-shadow:0 1px 0 rgba(255,255,255,0.3); line-height:1; }
.tile:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.tile:active { transform:scale(0.86); box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.tile.gone { background:rgba(255,255,255,0.025) !important; cursor:default; box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.04); }
.tile.gone::after,.tile.gone .num { display:none; }
.tile.gone:hover { transform:none; }
.tile.wait { background:rgba(255,255,255,0.012) !important; cursor:default; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.025); color:rgba(255,255,255,0.06); font-size:0.9rem; align-items:center; justify-content:center; }
.tile.wait::after { display:none; }
.tile.wait:hover { transform:none; }
.board.s3 .tile { width:80px; }
.board.s4 .tile { width:56px; }
.board.s5 .tile { width:48px; }

/* 控制区 */
.ctrl { display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:8px; }
.hint { font-size:0.62rem; color:rgba(255,255,255,0.25); text-align:center; letter-spacing:0.5px; min-height:14px; }
.action { padding:15px 48px; border-radius:28px; border:none; font-weight:600; font-size:0.88rem; letter-spacing:2px; cursor:pointer; font-family:inherit; background:linear-gradient(135deg,#3DB008,#B8E620); color:#1a3a00; box-shadow:0 4px 24px rgba(61,176,8,0.35); transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); position:relative; overflow:hidden; }
.action::after { content:''; position:absolute; inset:0; border-radius:28px; background:linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 50%); pointer-events:none; }
.action:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 32px rgba(61,176,8,0.55); }
.action:disabled { opacity:0.12; transform:none; box-shadow:none; }
.action:active:not(:disabled) { transform:scale(0.93); }

.tip { position:fixed; z-index:100; padding:8px 14px; border-radius:10px; background:rgba(18,18,32,0.96); color:#fff; font-size:0.7rem; text-align:center; white-space:nowrap; border:1px solid rgba(255,255,255,0.08); box-shadow:0 8px 24px rgba(0,0,0,0.3); opacity:0; pointer-events:none; transition:opacity 0.2s; }
.tip.on { opacity:1; }

.confetti { position:fixed; z-index:200; pointer-events:none; width:10px; height:10px; border-radius:3px; animation:fall 1.8s ease-out forwards; }
@keyframes fall { 0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translate(var(--x),110vh) rotate(var(--r)) scale(0.3)} }
</style>
</head>
<body>

<div class="bg"><img src="youxi3.webp" onerror="this.src='youxi3.png'" alt=""></div>

<div class="scene">

    <!-- ── 介绍页 ── -->
    <div class="intro" id="intro">
        <button class="back-btn" style="position:fixed;top:18px;left:18px;z-index:10;" onclick="location.href='hall2.html'">← 返回</button>
        <div class="tag">HEART · ORDER</div>
        <h1>心 序</h1>
        <div class="en">H E A R T  ·  O R D E R</div>
        <div class="divider"><i></i><b></b><i></i></div>
        <div class="poem">每一天的心情，化为一枚色块。<br>亲手把它们一一归位。<br>杂乱归于有序，纷扰归于平静。</div>

        <!-- 收集进度 -->
        <div class="status" id="introStatus">
            <div class="row">
                <span class="big" id="introGot">0</span><span class="sep">/</span><span class="small" id="introNeed">8 天</span>
            </div>
            <div class="bar-wrap"><div class="bar-fill" id="introBar" style="width:0%"></div></div>
            <div class="msg" id="introMsg"></div>
            <div class="dots" id="introDots"></div>
        </div>

        <div class="mode-row">
            <button class="mode-btn on" onclick="pickMode(3,this)">心序·周<span class="sm">3×3 · 8天</span></button>
            <button class="mode-btn" onclick="pickMode(4,this)">心序·半月<span class="sm">4×4 · 15天</span></button>
            <button class="mode-btn" onclick="pickMode(5,this)">心序·月<span class="sm">5×5 · 24天</span></button>
        </div>
        <button class="start-btn" id="introStart" onclick="enter()">开始游戏</button>
    </div>

    <!-- ── 游戏页 ── -->
    <div class="game" id="game">
        <button class="back-btn" style="position:fixed;top:18px;left:18px;z-index:10;" onclick="back()">← 返回</button>

        <div class="prog-card">
            <svg viewBox="0 0 42 42">
                <defs><linearGradient id="pg"><stop offset="0%" stop-color="#3DB008"/><stop offset="50%" stop-color="#E0FE44"/><stop offset="100%" stop-color="#00f5d4"/></linearGradient></defs>
                <circle class="pbg" cx="21" cy="21" r="18"/>
                <circle class="pfg" id="pFg" cx="21" cy="21" r="18" stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
            </svg>
            <div class="info">
                <span class="num" id="pNum">0</span>
                <span class="lbl" id="pLbl">/ 8 天</span>
                <span class="range" id="pRange"></span>
            </div>
        </div>

        <div class="mode-row">
            <button class="mode-btn on" id="gt3" onclick="setMode(3)">心序·周<span class="sm">3×3 · 8天</span></button>
            <button class="mode-btn" id="gt4" onclick="setMode(4)">心序·半月<span class="sm">4×4 · 15天</span></button>
            <button class="mode-btn" id="gt5" onclick="setMode(5)">心序·月<span class="sm">5×5 · 24天</span></button>
        </div>

        <div class="board-wrap">
            <div class="board" id="board"></div>
        </div>

        <div class="ctrl">
            <div class="hint" id="hint"></div>
            <button class="action" id="goBtn" onclick="start()" disabled>开始归序</button>
        </div>
    </div>

</div>

<div class="tip" id="tip"></div>

<script>
var DK='njgDiaryEntries';
(function(){var e;try{e=JSON.parse(localStorage.getItem(DK))||[]}catch(e){e=[]}var c=false;e=e.filter(function(x){if(x.text&&x.text.slice(0,5)==='[DEV]'){c=true;return false}return true});if(c)localStorage.setItem(DK,JSON.stringify(e));})();

var IMG={7:'url(平静.webp)',6:'url(快乐.webp)',5:'url(低落.webp)',4:'url(烦躁.webp)',3:'url(焦虑.webp)',2:'url(迷茫.webp)',1:'url(疲惫.webp)'};
var M=['','疲惫','迷茫','焦虑','烦躁','低落','快乐','平静'];
var Q=['别执着过往得失，别焦虑未知以后，好好握住当下的时光就足够。','不必困在回忆里内耗，也不用为未来惴惴不安，眼前此刻便是礼物。','所有的情绪都会过去，就像色块终将归位。','焦虑是心在说话，低落是心在休息。','心乱的时候，把色块一个个归位，也是在整理自己。'];
var pn=localStorage.getItem('playerName')||'朋友';

// 清理测试数据
(function(){
  var e;try{e=JSON.parse(localStorage.getItem(DK))||[]}catch(e2){e=[]}
  var c=false; e=e.filter(function(x){if(x.text==='DEV'||x.text==='测试心情'||(x.text&&x.text.indexOf('[DEV]')===0)){c=true;return false}return true});
  if(c)localStorage.setItem(DK,JSON.stringify(e));
})();
localStorage.removeItem('xinxu_seeded');

var mode=3, tiles=[], empty, playing=false, done=false, steps=0;
function needN(){return mode===3?8:mode===4?15:24}

function fm(dk){var p=dk.split('-');return p[0]+'.'+parseInt(p[1])+'月'+parseInt(p[2])+'日'}

function moods(n){
  var e;try{e=JSON.parse(localStorage.getItem(DK))||[]}catch(e){e=[]}
  e.sort(function(a,b){return a.dateKey<b.dateKey?1:-1});
  var r=[];
  for(var i=0;i<e.length&&r.length<n;i++){if(e[i].mood)r.push({s:e[i].mood.score,c:IMG[e[i].mood.score]||'',l:M[e[i].mood.score]||'',dk:e[i].dateKey})}
  r.reverse(); for(var j=0;j<r.length;j++)r[j].d=j+1; return r;
}

// ── 介绍页进度刷新 ──
function refreshIntro(){
  var n=needN(), ms=moods(n), got=ms.length;
  document.getElementById('introGot').textContent=got;
  document.getElementById('introNeed').textContent='/ '+n+' 天';
  document.getElementById('introBar').style.width=(got/n*100)+'%';
  var remain=n-got;
  var msgEl=document.getElementById('introMsg');
  if(got>=n){msgEl.innerHTML='<b>'+pn+'</b>，色块已集齐，可以开始归序了'}else{msgEl.innerHTML='<b>'+pn+'</b>，还差 <b>'+remain+'</b> 天的心情色块';}
  var dots=ms.map(function(m){return '<span class="dot" style="background-image:'+m.c+';background-size:cover;"></span>'}).join('');
  if(got===0)dots='<span style="font-size:0.65rem;color:#fff;">还没有心情记录，去首页写静心日记吧</span>';
  document.getElementById('introDots').innerHTML=dots;
}

function pickMode(m,el){
  mode=m; document.querySelectorAll('#intro .mode-btn').forEach(function(b){b.classList.remove('on')}); el.classList.add('on');
  refreshIntro();
}

function enter(){
  document.getElementById('intro').style.display='none';
  var g=document.getElementById('game'); g.style.display='flex'; g.classList.add('on');
  document.querySelectorAll('#game .mode-btn').forEach(function(b){b.classList.remove('on')});
  document.getElementById('gt'+mode).classList.add('on');
  draw();
}

function back(){document.getElementById('game').style.display='none';document.getElementById('game').classList.remove('on');document.getElementById('intro').style.display='';playing=false;done=false;refreshIntro()}

function setMode(m){if(playing)return;mode=m;done=false;document.querySelectorAll('#game .mode-btn').forEach(function(b){b.classList.remove('on')});document.getElementById('gt'+m).classList.add('on');draw()}

function draw(){
  var n=needN(), ms=moods(n), got=ms.length;
  // 进度环
  var circ=113.1; document.getElementById('pFg').style.strokeDashoffset=circ-(got/n)*circ;
  document.getElementById('pNum').textContent=got; document.getElementById('pLbl').textContent='/ '+n+' 天';
  var pr=document.getElementById('pRange');
  if(got>=n&&ms.length>0){pr.textContent=fm(ms[0].dk)+' — '+fm(ms[ms.length-1].dk)}else{pr.textContent='';}

  var b=document.getElementById('board'), h=document.getElementById('hint'), a=document.getElementById('goBtn');
  if(done){
    b.innerHTML='<div style="text-align:center;padding:32px 20px;color:#fff;max-width:320px;"><div style="display:inline-block;padding:6px 16px;border-radius:14px;background:rgba(168,230,0,0.06);border:1px solid rgba(168,230,0,0.15);font-size:0.55rem;color:rgba(168,230,0,0.6);letter-spacing:3px;margin-bottom:14px;">◆ 心 序 签 ◆</div><div style="font-size:0.85rem;color:rgba(255,255,255,0.7);line-height:2;letter-spacing:0.5px;margin-bottom:8px;">'+Q[Math.floor(Math.random()*Q.length)]+'</div><div style="font-size:0.6rem;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-bottom:16px;">共 '+steps+' 步完成归序</div><div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">'+ms.map(function(m){return '<div style="width:13px;height:13px;border-radius:4px;background-image:'+m.c+';background-size:cover;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>'}).join('')+'</div></div>';
    b.className=''; h.textContent='心序归位，内心也安顿好了'; a.textContent='再归一次'; a.disabled=false; return;
  }
  if(got<n){
    tiles=[]; empty=-1;
    for(var k=0;k<n;k++){if(k<got)tiles.push({d:k+1,c:ms[k].c,s:ms[k].s,l:ms[k].l,dk:ms[k].dk});else tiles.push({gone:true,wait:true})}
    tiles.push({gone:true}); a.textContent='开始归序'; a.disabled=true; h.textContent='还需 '+ (n-got) +' 天，色块就会一枚枚填进棋盘';
  }else{
    if(!playing){tiles=ms.map(function(m,i){return {d:m.d,c:m.c,s:m.s,l:m.l,dk:m.dk}}); tiles.push({gone:true}); empty=tiles.length-1}
    a.textContent='开始归序'; a.disabled=false; h.textContent=playing?'点击空格旁的色块来移动它':'色块已集齐，点击按钮开始整理';
  }
  render();
}

function render(){
  var b=document.getElementById('board'); b.className='board s'+mode; var h='';
  for(var i=0;i<tiles.length;i++){
    var t=tiles[i];
    if(t.wait)h+='<div class="tile wait" data-i="'+i+'">?</div>';
    else if(t.gone)h+='<div class="tile gone" data-i="'+i+'"></div>';
    else{h+='<div class="tile" style="background-image:'+t.c+';" data-i="'+i+'" data-r="'+Math.floor(i/mode)+'" data-c="'+(i%mode)+'" onclick="mv('+i+')" ondblclick="ti(event,'+i+')"><span class="num">'+t.d+'</span></div>'}
  }
  b.innerHTML=h;
}

function start(){
  if(done){done=false;playing=false;steps=0;draw();return}
  var n=needN(), ms=moods(n); if(ms.length<n)return;
  tiles=ms.map(function(m,i){return {d:m.d,c:m.c,s:m.s,l:m.l,dk:m.dk}}); tiles.push({gone:true}); empty=tiles.length-1; playing=true; steps=0;
  for(var s=0;s<(mode===3?120:mode===4?280:500);s++){var nb=nbr(empty);var p=nb[Math.floor(Math.random()*nb.length)];swp(p,empty);empty=p}
  render(); document.getElementById('hint').textContent='移动色块，按 1-'+n+' 顺序归位 · 0 步';
}

function nbr(i){var s=mode,n=[];var r=Math.floor(i/s),c=i%s;if(r>0)n.push(i-s);if(r<s-1)n.push(i+s);if(c>0)n.push(i-1);if(c<s-1)n.push(i+1);return n}
function swp(a,b){var t=tiles[a];tiles[a]=tiles[b];tiles[b]=t}

function mv(i){
  if(!playing)return; if(nbr(empty).indexOf(i)===-1)return;
  swp(i,empty); empty=i; steps++; render();
  var n=needN(); document.getElementById('hint').textContent='移动色块，按 1-'+n+' 顺序归位 · '+steps+' 步';
  if(win()){playing=false;done=true;document.getElementById('hint').textContent='✨ 心序归位！共 '+steps+' 步';pop();draw()}
}
function win(){for(var i=0;i<tiles.length-1;i++){if(tiles[i].d!==i+1)return false}return tiles[tiles.length-1].gone}

function pop(){var cs=['#3DB008','#E0FE44','#00f5d4','#0099ff','#ade5fe','#7ad6fb','#E9F8BC'];for(var i=0;i<30;i++){var el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'%';el.style.top='-10px';el.style.setProperty('--x',(Math.random()-0.5)*200+'px');el.style.setProperty('--r',(Math.random()-0.5)*720+'deg');el.style.background=cs[Math.floor(Math.random()*cs.length)];el.style.animationDelay=Math.random()*0.4+'s';document.body.appendChild(el);setTimeout(function(){el.remove()},2000)}}

var tt=null;
function ti(e,i){var t=tiles[i];if(!t||t.gone)return;var p=document.getElementById('tip');p.textContent=fm(t.dk)+' · '+t.l;p.style.left=Math.min(e.clientX,window.innerWidth-120)+'px';p.style.top=(e.clientY-42)+'px';p.classList.add('on');clearTimeout(tt);tt=setTimeout(function(){p.classList.remove('on')},1500)}

// 触屏滑动
var ts=null;
document.getElementById('board').addEventListener('touchstart',function(e){if(!playing)return;var el=e.target.closest('.tile');if(!el||el.classList.contains('gone')||el.classList.contains('wait'))return;ts={i:parseInt(el.dataset.i),x:e.touches[0].clientX,y:e.touches[0].clientY,el:el}},{passive:true});
document.getElementById('board').addEventListener('touchend',function(e){
  if(!ts||!playing)return; var x=e.changedTouches[0].clientX,y=e.changedTouches[0].clientY,dx=x-ts.x,dy=y-ts.y; if(Math.sqrt(dx*dx+dy*dy)<20){ts=null;return}
  var er=Math.floor(empty/mode),ec=empty%mode,tr=Math.floor(ts.i/mode),tc=ts.i%mode,match=false;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&tc+1===ec&&tr===er)match=true;if(dx<0&&tc-1===ec&&tr===er)match=true}
  else{if(dy>0&&tr+1===er&&tc===ec)match=true;if(dy<0&&tr-1===er&&tc===ec)match=true}
  if(match){var s=mode===3?86:mode===4?62:54; ts.el.style.transition='transform 0.1s ease-out'; ts.el.style.transform='translate('+(dx>0?s:dx<0?-s:0)+'px,'+(dy>0?s:dy<0?-s:0)+'px)'; ts.el.style.opacity='0.5'; setTimeout(function(){mv(ts.i)},80)}
  ts=null;
});

// 初始化
refreshIntro();
</script>
