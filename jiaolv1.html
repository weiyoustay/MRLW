(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');

  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');

  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

const quotes = [
    // 1 · 冰山原则（海明威·《老人与海》）
    "凌晨一点，你把简历检查完最后一处标点，点了发送。屏幕暗下去，黑色镜面映出你的脸——疲惫，但轮廓还在。海上那个老人拖着一副鱼骨头靠岸，岸上的人说他失败了，可他自己知道那三天三夜里发生过什么。真正的重量全在水面以下，省略掉的远比写出来的沉。“幸福都是奋斗出来的”，这句话你从小听到大，今晚才听懂另一半意思：幸福在奋斗的过程中就已经开始生长了，不是排队等你的奖品。你学着把焦虑压进心底，只让八分之一浮在表面。简历上那几行工整的文字，就是别人能看见的全部；而水面之下，是你无数次咽下的叹息、擦干眼泪重新振作的模样、还有不肯放弃的手指。一座冰山浮在水上，不是因为它轻，是因为它底下够深。你沉得够深，就浮得够稳。现在，再往下沉一寸，再往前划一步。",
    // 2 · 魔幻现实主义（马尔克斯·《百年孤独》）
    "你在出租屋的阳台上晾完第三件衬衫，指尖被冷水浸得泛红。平凡往复的日子里，你时常陷入一种漫长的精神失眠：昼夜清醒、心绪难安，最怕的不是熬夜的疲惫，而是记忆悄然褪色，慢慢忘了自己为何踏上前路。就像身处一座被遗忘裹挟的方寸天地，所有人都在无意识丢失初心、模糊过往，只能靠着给周遭一切标记痕迹，勉强留住活着的凭据。你的迷茫亦是如此，余额的窘迫、人际的冷清、前路的未知，反复缠绕心神，让你在日复一日的重复里濒临失忆。但你从未放任自己沉沦，搓洗洁净的衣衫、捕捉阳光下的细碎光影、认真对待每一个平凡晨昏，都是你为生活烙印的痕迹。你在风里、在烟火里、在无数个不眠的凌晨标记初心，对抗遗忘与荒芜。阴雨不会永续，荒芜终会新生，你亲手扬起的生活之帆，终会载着坚守，走出这场漫长的精神困顿。",
    // 3 · 荒诞与变形（卡夫卡·《变形记》）
    "早高峰的地铁粗暴地将人流裹挟挤压，玻璃镜面映出一张陌生的脸，眉眼疲惫、棱角坚硬，早已不是年少懵懂的模样。你忽然读懂一种荒诞的蜕变：人会在某个寻常清晨，悄然完成精神的异化，如同褪去熟悉的人形，化作笨拙匍匐的虫躯。哪怕身躯已然变形、生活早已失重，心底牵挂的依旧是世俗的琐碎责任：未完成的任务、待应对的工作、无法搁置的生活重担。你被生活揉搓重塑，被迫适配仓促的节奏，笨拙地扛着压力前行，看似狼狈荒诞，实则是普通人最真实的生存模样。世人皆惧变形的狼狈，却不知绝境里的蜕变本就是活着的证明。那些被迫的成长、咬牙的坚持、不曾懈怠的奔赴，都是对抗虚无的力量。车门开合，步履向前，你从未沦为被动蜷缩的躯壳，你始终在破碎与变形中，守住了向前行走的勇气与尊严。",

    "走出图书馆，整片橘粉色的晚霞铺满天际，你停下脚步静静仰望，身边的路人也纷纷驻足，所有人都默契地保持安静，沉醉在这一瞬的景致里。转瞬即逝的光影，却能定格成心底长久的美好，就像器物上镌刻的画面，任凭岁月流转，吹笛的身影、追逐的脚步永远鲜活，刹那的动人，本就是另一种形式的永恒。生活总在催促我们奔赴目标、追赶进度，却常常忽略沿途免费赠予所有人的温柔光景。美从不是少数人独享的奢侈品，它藏在傍晚的天际、路边的草木、抬头可见的光影里，能抚平奔波的疲惫，补足内心的能量。奔波赶路时积攒的疲惫，会在凝望晚霞的片刻悄然消散。把这份眼底的温柔收进心底，如同储存一份温热的能量。带着这份美好继续前行，你会发现，那些短暂的美好从未真正远去，它们化作底气，支撑你走过一个又一个忙碌且艰难的日子。",

    "对着镜子，你忍不住自问：当下做的选择，是顺从内心的期许，还是迎合旁人眼中“该走的路”？这个问题在心底盘旋许久，让你陷入深深的思索。世间总有一种耐人寻味的悖论：有人试图用外在的光鲜掩盖内在的沧桑，用表面的顺遂欺骗所有人，却唯独骗不了最真实的自己。外在的模样可以刻意修饰，旁人的评价可以刻意迎合，但藏在深处的本心，永远如实记录着你的每一次选择、每一份挣扎。活成别人期待的样子固然容易，坚守独一的自我却需要勇气。成长从不是一成不变的复刻，而是认清自我之后，朝着心中向往的模样慢慢蜕变。你不必立刻给出答案，把这份思索记录下来，每一个认真提出的问题，都是指引方向的路标。在辨析自我与外界的过程中慢慢摸索，终会分清盲从与热爱，在悖论之中寻得属于自己的人生智慧。",
    // 52 · 黑暗之心（康拉德·《黑暗的心》）
    "深夜关掉所有灯火，唯有电脑屏幕透出一方微光，映亮你的脸庞。屏幕里是尚未提交的申请材料，在无边的黑暗中，如同暗河之上漂浮的一叶小舟。有人曾向着幽深的黑暗深处前行，在看不清前路的河道里，渐渐明白：哪怕周遭一片混沌，手中书写、诉说的力量，就是穿越黑暗的船桨，眼前微弱的光亮，就是前行的坐标。身处幽暗之中，最忌讳的便是因视线受阻而停滞不前。你既是掌舵人，也是划桨者，整段航程都要靠自己掌控。黑暗会放大不安，却也能让人静下心来聆听内心的声音。你一字一句完善内容，小舟便在暗河里缓缓向前。最幽深的航道，最能练就划船的本领，当下的迷茫与漆黑，终会变成日后穿越风雨的底气。不必畏惧眼前的昏暗，只要笔下不停、脚步不止，这盏微光，就会一直伴你驶向明朗的远方。",

    "清晨醒来，偶尔会陷入一阵短暂的空白，辨不清身处何方，也恍惚忘了前行的初衷。这种精神上的恍惚，如同被无形的力量抽走了记忆，让人在日复一日的忙碌中迷失方向。当遗忘开始蔓延，人们总会用最朴素的方式对抗混沌：给身边的一切留下标记，守住过往的记忆与出发的理由。你把重要的日子、心底的目标写在便利贴上，一一贴在床头，用清晰的文字锚定心神。渐渐的，便利贴上多了一句提醒：记得为何出发。这些小小的字迹，如同沉入心底的压舱石，稳住飘摇的思绪。记忆从不会真正消失，只要主动留下印记，初心就不会被时光偷走。墙上的标签越来越多，模糊的方向感也一点点回归。在容易迷茫的日子里，学会为生活做标记，守住来路，方能笃定去路，在漫长的时光里，始终清醒前行。",

    "你将一张大白纸贴在墙面，用线条划分出十二个区域，对应一年的十二个月份，又在第一个区域里写下三个小小的目标。一张粗糙的蓝图，就此铺展开来。复杂的人生轨迹，如同一座错落的城池，从来不是杂乱无章的拼凑，而是先搭建整体框架，再填充细碎的日常。那些看似零散的经历、交错的选择，只要依托清晰的结构，最终便能拼接成完整的人生图景。大道至简，所有远大的理想，都要落地于脚踏实地的行动。这张草图或许不够精致，却为漂泊的思绪找到了落脚之处。蓝图无法直接建成高楼，但能让每一块砖石都摆放在正确的位置。你写下“读完它”三个字，这便是砌下的第一块砖瓦。不必嫌弃蓝图简陋，也不必畏惧进度缓慢。顺着规划的方向，一砖一瓦慢慢搭建，日复一日坚持耕耘，原本模糊的未来，终会在亲手构筑的框架里，慢慢变得清晰、立体。",

    "深夜刷到同龄人的留言，无数人诉说着相同的迷茫：临近毕业，看不清前路，找不到方向。评论区里一句句“我也是”，汇聚成一片共有的心绪。一座城池会拥有独属于全体居民的情绪，淡淡的怅惘萦绕在每个人心头，这份忧愁从不是孤立的悲伤，而是一群人共有的心境。成长路上的迷茫，从来不是你一人的困境，千万同行者都走在这片名为“彷徨”的土地上。不必因为一时的困顿觉得自己孤身一人，这份共同的心绪，恰恰是彼此相连的证明。面对解不开的心结，不必强迫自己立刻走出迷茫，学会带着心绪继续前行，也是一种成长。你不必妄图一次性化解所有烦恼，试着挑选其中最小的难题，动手去拆解、去处理。哪怕只是摸清问题的脉络，也是一种收获。带着迷茫稳步向前，在同行的脚步声里汲取力量，终会慢慢走出这片共同的怅惘。",

    "翻出上学期留在图书馆的便签，三行简短的文字历经时光，字迹依旧清晰：以后会有好日子的，别停下来，讲下去。你轻轻将皱软的纸条夹回笔记本，这几句叮嘱，一直默默陪伴着你走过低谷。当言语被限制、故事被禁止流传时，坚韧的人们会用眼神、用手势、用细碎的文字，把经历与信念一代代传递下去。只要故事还在被讲述，精神就永远不会消亡。你没有把新的期许写在纸上，却用日复一日的行动，续写着属于自己的故事。风吹雨打会改变外在的模样，却无法磨灭扎根在骨血里的韧性。一路走来的挣扎、坚持、自愈，都是独属于你的人生篇章。继续往前走，继续把这段追梦的旅程“讲述”下去。岁月会磨损纸张，却夺不走刻在心底的信念。坚守初心，步履不停，你的故事，会在一次次前行中，愈发厚重、愈发有力量。",

    // 66 · 推开世界的门（原创·码头与木板）

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

let currentIndex = 0;

function showQuote(){
  const r = Math.floor(Math.random() * quotes.length);
  currentIndex = r;
  document.getElementById('quoteText').innerText = quotes[r];
  document.getElementById('dateText').innerText = signatures[r];
}

// 英文日期+星期显示
function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
