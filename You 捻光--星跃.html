<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>方块快跑 | You 捻光</title>
<meta name="view-transition" content="same-origin">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; position:fixed; top:0; left:0; }
body {
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}

body.theme-green { background:#B7F700; }
body.theme-green .tbtn { background:rgba(0,0,0,0.15); border:1px solid rgba(0,0,0,0.3); color:#1a1a1a; }
body.theme-green .tbtn:active { background:rgba(0,0,0,0.3); transform:scale(0.95); }
body.theme-green .overlay { background:rgba(183,247,0,0.92); }
body.theme-green .txt { color:#1a1a1a; }
body.theme-green .txt2 { color:rgba(0,0,0,0.55); }
body.theme-green .txt3 { color:rgba(0,0,0,0.4); }
body.theme-green .ctrl-btn { background:rgba(26,26,26,0.12); border:2px solid rgba(26,26,26,0.18); color:#1a1a1a; }
body.theme-green .ctrl-btn:active { background:rgba(26,26,26,0.24); }

body.theme-blue { background:#428DFF; }
body.theme-blue .tbtn { background:rgba(255,255,255,0.25); border:1px solid rgba(255,255,255,0.5); color:#fff; }
body.theme-blue .tbtn:active { background:rgba(255,255,255,0.4); transform:scale(0.95); }
body.theme-blue .overlay { background:rgba(66,141,255,0.94); }
body.theme-blue .txt { color:#fff; }
body.theme-blue .txt2 { color:rgba(255,255,255,0.7); }
body.theme-blue .txt3 { color:rgba(255,255,255,0.5); }
body.theme-blue .ctrl-btn { background:rgba(255,255,255,0.14); border:2px solid rgba(255,255,255,0.25); color:#fff; }
body.theme-blue .ctrl-btn:active { background:rgba(255,255,255,0.28); }

/* 全屏画布 */
#gameCanvas { display:block; position:absolute; top:0; left:0; width:100%; height:100%; z-index:3; }

/* 顶部 HUD 浮层 */
.top-hud {
  position:absolute; top:0; left:0; right:0; z-index:10;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:max(12px, env(safe-area-inset-top)) 14px 0;
  pointer-events:none;
}
.top-hud > * { pointer-events:auto; }
.hud-left, .hud-right { display:flex; align-items:center; gap:8px; }
/* 顶部中央计分 */
.hud-center {
  position: absolute;
  left: 50%;
  top: max(12px, env(safe-area-inset-top));
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: none;
}
.hud-score { font-size:22px; font-weight:800; letter-spacing:1px; text-shadow:0 1px 2px rgba(0,0,0,0.1); }
.hud-dist { font-size:11px; letter-spacing:1px; opacity:0.7; }
.hud-combo { font-size:13px; font-weight:700; letter-spacing:1px; }
.hud-lives { font-size:15px; letter-spacing:2px; }

.back-btn {
  position: fixed;
  top: 24px; left:20px;
  width:44px; height:44px;
  border-radius:50%;
  background: rgba(20,20,35,0.7);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  display:grid; place-items:center;
  cursor:pointer;
  z-index:9999;
  transition: all 0.3s;
}
.back-btn:hover {
  background: rgba(183,247,0,0.15);
  border-color: #B7F700;
  color: #B7F700;
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(183,247,0,0.25);
}
.back-btn:active { transform: scale(0.95); }
.back-btn:focus-visible { outline: 2px solid #B7F700; outline-offset: 2px; }

.tbtn {
  padding:6px 14px; border-radius:18px; font-size:11px; letter-spacing:1px;
  cursor:pointer; transition:all 0.15s ease; border-style:solid;
  white-space:nowrap;
  font-weight:600;
}
.theme-dots { display:flex; gap:5px; }
.tdot {
  width:20px; height:20px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all 0.2s ease;
}
.tdot.green { background:#B7F700; }
.tdot.blue  { background:#428DFF; }
.tdot.on { border-color:currentColor; transform:scale(1.12); }

/* 覆盖层（介绍/结束） */
.overlay {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
}

/* 底部控制栏 */
.ctrl-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:8;
  display:none; justify-content:center; align-items:flex-end;
  padding:0 12px max(20px, env(safe-area-inset-bottom));
  pointer-events:none;
}
.ctrl-bar.on { display:flex; }
.ctrl-bar > * { pointer-events:auto; }
/* 菱形方向键 */
.dpad {
  display:grid; grid-template-columns:repeat(3, auto); grid-template-rows:repeat(3, auto);
  gap:12px; justify-items:center; align-items:center;
}
.dpad-center { width:16px; height:16px; border-radius:50%; background:rgba(128,128,128,0.12); }
.ctrl-btn {
  width:54px; height:54px; border-radius:50%; font-size:18px; font-weight:600;
  letter-spacing:1px; cursor:pointer; transition:all 0.08s ease;
  touch-action:manipulation; border-style:solid;
  -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
}
.ctrl-btn:active { transform:scale(0.82); }
#upBtn { grid-column:2; grid-row:1; }
#leftBtn { grid-column:1; grid-row:2; }
#rightBtn { grid-column:3; grid-row:2; }
#downBtn { grid-column:2; grid-row:3; }

@media (min-width:420px) {
  .ctrl-btn { width:60px; height:60px; font-size:20px; }
  .dpad { gap:14px; }
  .ctrl-bar { padding:0 18px max(24px, env(safe-area-inset-bottom)); }
}

@media (min-width:600px) {
  .ctrl-btn { width:68px; height:68px; font-size:22px; }
  .dpad { gap:16px; }
}

/* 小屏手机优化 */
@media (max-width:360px) {
  .ctrl-btn { width:48px; height:48px; font-size:16px; }
  .dpad { gap:10px; }
  .ctrl-bar { padding:0 8px max(14px, env(safe-area-inset-bottom)); }
  .hud-score { font-size:18px; }
  .tbtn { padding:5px 10px; font-size:10px; }
  .tdot { width:17px; height:17px; }
}
body { animation: pageIn 0.1s ease; will-change: transform, opacity; }
body.no-page-anim { animation: none !important; }
@keyframes pageIn { from { opacity: 0.7; transform: translate3d(15px,0,0); } }

/* 云朵装饰 */
.cloud-deco { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
.cld { position:absolute; border-radius:50%; background:rgba(255,255,255,0.35); }
.cld::before, .cld::after { content:''; position:absolute; border-radius:50%; background:rgba(255,255,255,0.35); }
.c1 { width:160px; height:80px; border-radius:80px; top:5%; left:3%; animation: cloudDrift 14s ease-in-out infinite; }
.c1::before { width:80px; height:80px; top:-35px; left:25px; }
.c1::after  { width:100px; height:100px; top:-45px; left:55px; }
.c2 { width:120px; height:60px; border-radius:60px; top:18%; right:8%; animation: cloudDrift 16s ease-in-out infinite; animation-delay:-5s; }
.c2::before { width:55px; height:55px; top:-25px; left:18px; }
.c2::after  { width:70px; height:70px; top:-30px; left:40px; }
.c3 { width:100px; height:50px; border-radius:50px; top:35%; left:55%; animation: cloudDrift 18s ease-in-out infinite; animation-delay:-9s; }
.c3::before { width:50px; height:50px; top:-22px; left:15px; }
.c3::after  { width:60px; height:60px; top:-28px; left:35px; }
.c4 { width:140px; height:70px; border-radius:70px; top:65%; left:10%; animation: cloudDrift 15s ease-in-out infinite; animation-delay:-3s; }
.c4::before { width:65px; height:65px; top:-30px; left:20px; }
.c4::after  { width:85px; height:85px; top:-38px; left:50px; }
.c5 { width:110px; height:55px; border-radius:55px; top:78%; right:5%; animation: cloudDrift 17s ease-in-out infinite; animation-delay:-7s; }
.c5::before { width:50px; height:50px; top:-22px; left:15px; }
.c5::after  { width:65px; height:65px; top:-28px; left:38px; }
@keyframes cloudDrift {
  0%,100% { transform: translate(0,0); }
  25% { transform: translate(20px,-8px); }
  50% { transform: translate(-10px,12px); }
  75% { transform: translate(15px,4px); }
}

/* 星星装饰 */
.star-deco { position:fixed; inset:0; z-index:2; pointer-events:none; }
.st { position:absolute; color:rgba(0,0,0,0.2); animation: starTwinkle 3s ease-in-out infinite; }
.s1  { top:8%; left:15%; font-size:0.6rem; animation-delay:0s; }
.s2  { top:12%; right:20%; font-size:0.9rem; animation-delay:-0.7s; }
.s3  { top:22%; left:40%; font-size:0.5rem; animation-delay:-1.4s; }
.s4  { top:30%; right:12%; font-size:0.7rem; animation-delay:-2.1s; }
.s5  { top:42%; left:8%; font-size:0.8rem; animation-delay:-0.3s; }
.s6  { top:48%; right:25%; font-size:0.55rem; animation-delay:-1.8s; }
.s7  { top:55%; left:70%; font-size:0.65rem; animation-delay:-1.1s; }
.s8  { top:62%; left:22%; font-size:0.9rem; animation-delay:-2.5s; }
.s9  { top:72%; right:18%; font-size:0.5rem; animation-delay:-0.9s; }
.s10 { top:80%; left:50%; font-size:0.75rem; animation-delay:-1.6s; }
.s11 { top:88%; right:30%; font-size:0.6rem; animation-delay:-2.3s; }
.s12 { top:94%; left:35%; font-size:0.7rem; animation-delay:-0.4s; }
@keyframes starTwinkle {
  0%,100% { opacity:0.15; transform:scale(1) rotate(0deg); }
  50% { opacity:0.4; transform:scale(1.3) rotate(15deg); }
}
</style>
</head>

<body class="theme-green">
<!-- 云朵和星星装饰 -->
<div class="cloud-deco" aria-hidden="true">
  <div class="cld c1"></div><div class="cld c2"></div><div class="cld c3"></div>
  <div class="cld c4"></div><div class="cld c5"></div>
</div>
<div class="star-deco" aria-hidden="true">
  <span class="st s1">✦</span><span class="st s2">✦</span><span class="st s3">✦</span>
  <span class="st s4">✦</span><span class="st s5">✦</span><span class="st s6">✦</span>
  <span class="st s7">✦</span><span class="st s8">✦</span><span class="st s9">✦</span>
  <span class="st s10">✦</span><span class="st s11">✦</span><span class="st s12">✦</span>
</div>

<!-- 固定在左上角、永远可见的返回按钮，完全不影响其他内容 -->
<button class="back-btn" onclick="location.href='hall2.html'" aria-label="返回成长大厅">←</button>

<div class="top-hud" id="topHud">
  <div class="hud-left">
  </div>
  <!-- 顶部中央计分 -->
  <div class="hud-center">
    <span class="txt hud-score" id="scoreDisplay">0</span>
    <span class="txt hud-dist" id="distDisplay">0m</span>

<canvas id="gameCanvas"></canvas>

<div class="overlay txt" id="gameIntro">
  <div style="font-size:32px;letter-spacing:5px;font-weight:700;margin-bottom:4px;">方块快跑</div>
  <div class="txt2" style="font-size:12px;letter-spacing:3px;margin-bottom:20px;">跳 跃 · 冒 险 · 收 集</div>
  <div class="txt2" style="font-size:12px;line-height:2;margin-bottom:20px;max-width:280px;">

<script>
// ==================== 主题切换 ====================
function switchTheme(t) {
  document.body.className = t === 'green' ? 'theme-green' : 'theme-blue';
  document.querySelectorAll('.tdot').forEach(function(d) {
    d.classList.toggle('on', d.dataset.theme === t);
  });
}
function getBG() { return document.body.classList.contains('theme-green') ? '#B7F700' : '#428DFF'; }
function getAccent() { return document.body.classList.contains('theme-green') ? '#1a1a1a' : '#ffffff'; }

// ==================== 常量 ====================
var GRAVITY = 0.45;
var JUMP_VEL = -11.5;
var DOUBLE_JUMP_VEL = -9.8;
var TRIPLE_JUMP_VEL = -8.2;
var MAX_JUMPS = 3;
var PLAYER_SPEED = 3.2;
var PLAYER_W = 28;
var PLAYER_H = 34;
var COYOTE_FRAMES = 7;
var JUMP_BUFFER_FRAMES = 6;
var MAX_LIVES = 5;
var INVINCIBLE_FRAMES = 90;

// ==================== 状态 ====================
var canvas, ctx, W, H, gameScale;
var gameRunning = false;
var player, platforms, monsters, stars, particles, popups;
var camX, maxPlayerX, distance, score, combo, maxCombo, lives;
var totalKills, totalStars, bestDistance;
var inputLeft = false, inputRight = false, inputDown = false, inputJump = false;
var jumpBuffered = false, downUsed = false;
var shakeAmt = 0, flashAmt = 0, frameCount = 0;
var shX = 0, shY = 0, rafId = null;

// ==================== 初始化 ====================
function initGame() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  bestDistance = parseInt(localStorage.getItem('blockrun_best') || '0');
  resetGameState();
}

function resizeCanvas() {
  var dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  gameScale = W < 380 ? 0.72 : W < 500 ? 0.82 : 1.0;
}

function resetGameState() {
  var pw = PLAYER_W * gameScale;
  var ph = PLAYER_H * gameScale;
  player = {
    x: W * 0.25, y: H * 0.5, vx: 0, vy: 0,
    w: pw, h: ph,
    onGround: false, wasOnGround: true, jumpsUsed: 0, facingRight: true,
    squash: 1, stretch: 1, coyoteTimer: 0, jumpBufferTimer: 0,
    dropThrough: 0, invincible: 0, trail: [],
    blinkT: 70 + Math.random() * 130, blinkF: 0
  };
  platforms = [];
  monsters = [];
  stars = [];
  particles = [];
  popups = [];
  camX = 0;
  maxPlayerX = 0;
  distance = 0;
  score = 0;
  combo = 0;
  maxCombo = 0;
  lives = MAX_LIVES;
  totalKills = 0;
  totalStars = 0;
  inputLeft = false;
  inputRight = false;
  inputDown = false;
  inputJump = false;
  jumpBuffered = false;
  downUsed = false;
  shakeAmt = 0;
  flashAmt = 0;
  shX = 0;
  shY = 0;

  var startPlat = makePlat(20, H * 0.58, 160 * gameScale, 'normal');
  platforms.push(startPlat);
  player.x = startPlat.x + 60 * gameScale;
  player.y = startPlat.y - player.h;
  player.onGround = true;

  for (var i = 0; i < 50; i++) {
    spawnNextPlatform();
  }
  for (var j = 0; j < 12; j++) {
    var rp = platforms[2 + Math.floor(Math.random() * (platforms.length - 3))];
    spawnStar(rp);
  }
  camX = player.x - W * 0.3;
  updateUI();
}

function makePlat(px, py, pw, type) {
  return {
    x: px, y: py, w: pw,
    type: type,
    moveDir: 1, moveBase: px, moveX: px,
    moveSpeed: 0.4 + Math.random() * 1.1,
    moveRange: 35 + Math.random() * 55,
    opacity: 1, bobT: Math.random() * Math.PI * 2,
    shakeT: 0
  };
}

function findRightmost() {
  if (platforms.length === 0) {
    var ep = makePlat(camX + 60 * gameScale, H * 0.5, 130 * gameScale, 'normal');
    platforms.push(ep);
    return ep;
  }
  var best = platforms[0];
  for (var i = 1; i < platforms.length; i++) {
    if (platforms[i].x + platforms[i].w > best.x + best.w) best = platforms[i];
  }
  return best;
}

var HEIGHT_TIERS = [0.12, 0.28, 0.44, 0.58, 0.72, 0.84];
var MAX_JUMP_H = 150;
var MAX_JUMP_DIST = 180;

function canReach(fromPlat, toPlat) {
  var dx = Math.abs((toPlat.x + toPlat.w/2) - (fromPlat.x + fromPlat.w/2));
  var dy = fromPlat.y - toPlat.y;
  if (dx > MAX_JUMP_DIST * 2.5) return false;
  if (dy <= 0) return dx < MAX_JUMP_DIST * 2;
  if (dy > MAX_JUMP_H * 2.5) return false;
  if (dy > MAX_JUMP_H && dx > MAX_JUMP_DIST * 1.5) return false;
  return true;
}

function overlapsExisting(nx, ny, nw, margin) {
  margin = margin || 0;
  var start = Math.max(0, platforms.length - 60);
  for (var oi = platforms.length - 1; oi >= start; oi--) {
    var op = platforms[oi];
    if (op.opacity < 0.3) continue;
    if (nx - margin < op.x + op.w + margin && nx + nw + margin > op.x - margin &&
        Math.abs(ny - op.y) < 12) return true;
  }
  return false;
}

function spawnNextPlatform() {
  var diff = Math.min(1, distance / 5000);
  var rightmost = findRightmost();
  var gs = gameScale;
  var colSpacing = (50 + diff * 10) * gs;

  var colX = rightmost.x + rightmost.w + colSpacing;
  var baseW = (135 + Math.random() * 55) * gs;

  var count = 1;
  var r0 = Math.random();
  if (r0 < 0.3) count = 1;
  else if (r0 < 0.7) count = 2;
  else count = 3;

  var nearbyPlats = [];
  for (var ni = platforms.length - 1; ni >= 0; ni--) {
    var np = platforms[ni];
    if (np.opacity < 0.3) continue;
    if (np.x + np.w > colX - MAX_JUMP_DIST * 3 && np.x < colX + 100) {
      nearbyPlats.push(np);
    }
  }

  var chosenTiers = [];
  var pool = HEIGHT_TIERS.slice();

  var foundReachable = false;
  var shuffled = pool.slice().sort(function(){return Math.random()-0.5;});
  for (var si = 0; si < shuffled.length; si++) {
    var testY = H * (shuffled[si] + (Math.random() - 0.5) * 0.03);
    testY = Math.max(H * 0.06, Math.min(H * 0.86, testY));
    var testPlat = { x: colX, y: testY, w: baseW };
    var ok = nearbyPlats.length === 0;
    for (var ri = 0; ri < nearbyPlats.length && !ok; ri++) {
      if (canReach(nearbyPlats[ri], testPlat)) ok = true;
    }
    if (ok) {
      chosenTiers.push(shuffled[si]);
      pool.splice(pool.indexOf(shuffled[si]), 1);
      foundReachable = true;
      break;
    }
  }
  if (!foundReachable && nearbyPlats.length > 0) {
    var closest = pool[0];
    var minDiff = Infinity;
    for (var pi = 0; pi < pool.length; pi++) {
      for (var ri2 = 0; ri2 < nearbyPlats.length; ri2++) {
        var dy2 = Math.abs(H * pool[pi] - nearbyPlats[ri2].y);
        if (dy2 < minDiff) { minDiff = dy2; closest = pool[pi]; }
      }
    }
    chosenTiers.push(closest);
    pool.splice(pool.indexOf(closest), 1);
  } else if (!foundReachable) {
    chosenTiers.push(pool[Math.floor(Math.random() * pool.length)]);
    pool.splice(pool.indexOf(chosenTiers[0]), 1);
  }

  for (var ci = 1; ci < count; ci++) {
    if (pool.length === 0) break;
    var idx = Math.floor(Math.random() * pool.length);
    chosenTiers.push(pool[idx]);
    pool.splice(idx, 1);
  }
  chosenTiers.sort(function(a,b){return a-b;});

  var monsterTierIdx = -1;
  if (Math.random() < 0.2 + diff * 0.12 && count >= 1) {
    monsterTierIdx = Math.floor(Math.random() * chosenTiers.length);
  }

  var lastPlat = null;
  for (var ti = 0; ti < chosenTiers.length; ti++) {
    var t = chosenTiers[ti];
    var ny = H * (t + (Math.random() - 0.5) * 0.03);
    ny = Math.max(H * 0.06, Math.min(H * 0.86, ny));
    var pw = baseW + (Math.random() - 0.5) * 20 * gs;

    var type = 'normal';
    var r = Math.random();
    if (r < 0.04 + diff * 0.02) type = 'spring';
    else if (r < 0.09 + diff * 0.03) type = 'fragile';
    else if (r < 0.15 + diff * 0.04) type = 'moving';

    var hasMonster = (ti === monsterTierIdx && type === 'normal');
    if (hasMonster) pw = baseW * (2.2 + Math.random() * 0.8);

    var platX = colX;
    if (overlapsExisting(platX, ny, pw, 5)) {
      platX += 20 * gs;
      if (overlapsExisting(platX, ny, pw, 5)) continue;
    }

    if (type === 'fragile' && !(ti + 1 < chosenTiers.length)) {
      var safeY = ny + 65 * gs + Math.random() * 30 * gs;
      safeY = Math.min(H * 0.88, safeY);
      if (!overlapsExisting(platX, safeY, pw * 0.9, 3)) {
        var safePlat = makePlat(platX, safeY, pw * 0.9, 'normal');
        platforms.push(safePlat);
        if (Math.random() < 0.35) spawnStar(safePlat);
      }
    }

    var plat = makePlat(platX, ny, pw, type);
    platforms.push(plat);

    if (hasMonster) spawnMonster(plat, diff);
    if (!hasMonster && type === 'normal' && pw > 150 * gs && Math.random() < 0.12 + diff * 0.06) {
      spawnMonster(plat, diff);
    }
    if (Math.random() < 0.5) spawnStar(plat);
    lastPlat = plat;
  }

  if (chosenTiers.length >= 2 && Math.random() < 0.25) {
    var lowT = chosenTiers[0];
    var highT = chosenTiers[chosenTiers.length - 1];
    var stepCount = Math.round((highT - lowT) * H / (50 * gs));
    stepCount = Math.max(2, Math.min(stepCount, 4));
    for (var sti = 1; sti < stepCount; sti++) {
      var sy = H * (lowT + (highT - lowT) * sti / stepCount);
      var sx = colX + 25 * gs + sti * 28 * gs;
      if (!overlapsExisting(sx, sy, 55 * gs, 3)) {
        var stepPlat = makePlat(sx, sy, 55 * gs, 'normal');
        platforms.push(stepPlat);
        if (Math.random() < 0.25) spawnStar(stepPlat);
      }
    }
  }

  return lastPlat || makePlat(colX, H * 0.5, baseW, 'normal');
}

function spawnMonster(plat, diff) {
  var types = ['spike','slime','ghost','crab','piku'];
  var type = types[Math.floor(Math.random() * types.length)];
  var gs = gameScale;
  var base = { x: plat.x + plat.w * 0.3 + Math.random() * plat.w * 0.4, y: plat.y, plat: plat, dir: Math.random() > 0.5 ? 1 : -1, dead: false, squish: 0, bobT: Math.random() * Math.PI * 2, diff: diff || 0, type: type };
  switch (type) {
    case 'spike':
      base.y -= 16 * gs; base.w = 22 * gs; base.h = 18 * gs; base.speed = 0.15 + Math.random() * 0.4; break;
    case 'slime':
      base.y -= 14 * gs; base.w = 28 * gs; base.h = 22 * gs; base.speed = 0.08 + Math.random() * 0.2; base.bobAmp = 3; break;
    case 'ghost':
      base.y -= 24 * gs; base.w = 24 * gs; base.h = 30 * gs; base.speed = 0.2 + Math.random() * 0.5; base.floatOff = Math.random() * Math.PI * 2; break;
    case 'crab':
      base.y -= 10 * gs; base.w = 32 * gs; base.h = 15 * gs; base.speed = 0.2 + Math.random() * 0.35; break;
    case 'piku':
      base.y -= 12 * gs; base.w = 18 * gs; base.h = 18 * gs; base.speed = 0.18 + Math.random() * 0.45; base.roll = 0; break;
  }
  monsters.push(base);
}

function spawnStar(nearPlat) {
  var sx = nearPlat.x + nearPlat.w / 2 + (Math.random() - 0.5) * nearPlat.w * 1.2;
  var sy = nearPlat.y - 25 * gameScale - Math.random() * 55 * gameScale;
  for (var i = 0; i < stars.length; i++) {
    if (Math.abs(sx - stars[i].x) < 120 && Math.hypot(sx - stars[i].x, sy - stars[i].y) < 20) return;
  }
  stars.push({
    x: sx, y: sy, r: 8 * gameScale,
    collected: false,
    rot: Math.random() * Math.PI * 2,
    bob: Math.random() * Math.PI * 2
  });
}

function burst(x, y, n, clr, spd) {
  if (particles.length > 200) return;
  var add = Math.min(n, 200 - particles.length);
  for (var i = 0; i < add; i++) {
    var a = (i / add) * Math.PI * 2 + Math.random() * 0.3;
    var s = spd * (0.3 + Math.random() * 0.7);
    particles.push({
      x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2,
      life: 14 + Math.random() * 22, maxLife: 36, size: 1.5 + Math.random() * 3.5,
      color: clr, grav: 0.06
    });
  }
}

function popup(x, y, txt, scl, clr) {
  if (popups.length > 15) return;
  popups.push({
    x: x, y: y, text: txt, scale: scl || 1,
    life: 28, maxLife: 28, vy: -2.2, color: clr || '#000'
  });
}

function shake(v) { shakeAmt = Math.max(shakeAmt, v); }
function flash(v) { flashAmt = Math.max(flashAmt, v); }

function updateUI() {
  document.getElementById('scoreDisplay').innerText = score;
  document.getElementById('distDisplay').innerText = Math.floor(distance / 10) + 'm';
  document.getElementById('comboDisplay').innerText = combo > 1 ? '连击 x' + combo : '';
  var h = '';
  for (var i = 0; i < MAX_LIVES; i++) h += i < lives ? '❤️' : '🖤';
  document.getElementById('livesDisplay').innerText = h;
}

function startGame() {
  document.getElementById('gameIntro').style.display = 'none';
  document.getElementById('gameControls').classList.add('on');
  resizeCanvas();
  resetGameState();
  gameRunning = true;
  gameLoop();
}

function restartGame() {
  document.getElementById('gameWin').style.display = 'none';
  resizeCanvas();
  resetGameState();
  gameRunning = true;
  gameLoop();
}

function endGame() {
  gameRunning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  var dm = Math.floor(distance / 10);
  var rank = dm >= 500 ? 'S' : dm >= 250 ? 'A' : dm >= 100 ? 'B' : 'C';
  if (dm > bestDistance) {
    bestDistance = dm;
    localStorage.setItem('blockrun_best', bestDistance);
  }
  document.getElementById('winRank').innerText = rank;
  document.getElementById('winDist').innerText = dm + 'm';
  document.getElementById('winScore').innerText = score;
  document.getElementById('winKills').innerText = totalKills;
  document.getElementById('winStars').innerText = totalStars;
  setTimeout(function () { document.getElementById('gameWin').style.display = ''; }, 450);
}

function loseLife() {
  if (player.invincible > 0) return;
  lives--;
  combo = 0;
  player.invincible = INVINCIBLE_FRAMES;
  shake(16);
  flash(0.4);
  burst(player.x, player.y, 28, '#ff4444', 7);
  popup(player.x, player.y - 16, lives > 0 ? '💔 -1' : '💀', 1.6, '#ff3333');

  if (lives <= 0) {
    endGame();
    return true;
  }

  var nearestPlat = null;
  var nearestDist = Infinity;
  var dx = player.x;
  var dy = player.y;
  for (var fi = 0; fi < platforms.length; fi++) {
    var fp = platforms[fi];
    if (fp.opacity < 0.3 || fp.type === 'fragile') continue;
    if (fp.x + fp.w < dx - 200 || fp.x > dx + 200) continue;
    var weight = Math.abs(fp.x + fp.w/2 - dx) + Math.abs(fp.y - dy) * 1.5;
    if (fp.y < dy - 80) weight += 200;
    if (weight < nearestDist) { nearestDist = weight; nearestPlat = fp; }
  }
  if (nearestPlat) {
    player.x = Math.max(nearestPlat.x + player.w/2, Math.min(nearestPlat.x + nearestPlat.w - player.w/2, dx));
    player.y = nearestPlat.y - player.h / 2;
    player.onGround = true;
    player.wasOnGround = true;
    camX = player.x - W * 0.3;
  } else {
    player.y = Math.min(player.y, H * 0.42);
    player.onGround = false;
    player.wasOnGround = false;
    camX = player.x - W * 0.3;
  }
  player.vy = 0;
  player.vx = 0;
  player.jumpsUsed = 0;
  player.coyoteTimer = COYOTE_FRAMES;
  player.jumpBufferTimer = 0;
  player.dropThrough = 0;
  player.trail = [];
  updateUI();
  return false;
}

function gameLoop() {
  if (!gameRunning) { rafId = null; return; }
  frameCount++;
  update();
  draw();
  rafId = requestAnimationFrame(gameLoop);
}

function update() {
  if (inputJump && !jumpBuffered && !player.onGround) {
    player.jumpBufferTimer = JUMP_BUFFER_FRAMES;
    jumpBuffered = true;
  }
  if (!inputJump) jumpBuffered = false;

  if (!player.onGround && player.coyoteTimer > 0) player.coyoteTimer--;

  var canJump = (player.onGround || player.coyoteTimer > 0 || player.jumpsUsed < MAX_JUMPS);
  if (inputJump && canJump && player.jumpBufferTimer >= 0) {
    if (player.onGround || player.coyoteTimer > 0) {
      player.vy = JUMP_VEL;
      player.jumpsUsed = 1;
      player.onGround = false;
      player.coyoteTimer = 0;
      player.stretch = 1.4;
      burst(player.x, player.y + player.h / 2, 8, getAccent(), 2.5);
    } else if (player.jumpsUsed === 1) {
      player.vy = DOUBLE_JUMP_VEL;
      player.jumpsUsed = 2;
      player.stretch = 1.25;
      burst(player.x, player.y + player.h / 2, 14, '#fff', 4);
    } else if (player.jumpsUsed === 2) {
      player.vy = TRIPLE_JUMP_VEL;
      player.jumpsUsed = 3;
      player.stretch = 1.15;
      burst(player.x, player.y + player.h / 2, 18, '#ffdd57', 5);
    }
    player.jumpBufferTimer = 0;
    inputJump = false;
  }

  if (inputLeft) { player.vx = -PLAYER_SPEED; player.facingRight = false; }
  else if (inputRight) { player.vx = PLAYER_SPEED; player.facingRight = true; }
  else if (player.onGround) { player.vx *= 0.82; }

  if (player.dropThrough > 0) player.dropThrough--;
  if (inputDown && !downUsed) {
    downUsed = true;
    var bestPlat = null;
    var bestY = Infinity;
    var px = player.x;
    var footY = player.y + player.h / 2;
    for (var di = 0; di < platforms.length; di++) {
      var dp = platforms[di];
      if (dp.opacity < 0.3 || dp.type === 'fragile') continue;
      if (px > dp.x - player.w * 0.3 && px < dp.x + dp.w + player.w * 0.3) {
        if (dp.y >= footY - 4 && dp.y < bestY) {
          bestY = dp.y;
          bestPlat = dp;
        }
      }
    }
    if (bestPlat) {
      player.y = bestPlat.y - player.h / 2;
      player.vy = 0;
      player.onGround = true;
      player.jumpsUsed = 0;
      player.coyoteTimer = COYOTE_FRAMES;
      player.squash = 0.6;
      player.dropThrough = 6;
      burst(player.x, player.y + player.h / 2, 8, getAccent(), 2.5);
      shake(2);
    }
  }
  if (!inputDown) downUsed = false;

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  if (player.x < 0) { player.x = 0; player.vx = 0; }

  player.squash += (1 - player.squash) * 0.16;
  player.stretch += (1 - player.stretch) * 0.12;
  if (player.blinkT > 0) { player.blinkT--; if (player.blinkT <= 0) { player.blinkF = 4; player.blinkT = 60 + Math.random() * 150; } }
  if (player.blinkF > 0) player.blinkF--;
  if (player.invincible > 0) player.invincible--;

  player.trail = [];

  var wasOnGround = player.onGround;
  player.onGround = false;
  if (player.vy >= 0 && player.dropThrough <= 0) {
    for (var pi = 0; pi < platforms.length; pi++) {
      var p = platforms[pi];
      if (p.opacity < 0.3) continue;
      var footX = player.x;
      var footY = player.y + player.h / 2;
      var colW = player.w * 0.55;
      if (footX - colW < p.x + p.w && footX + colW > p.x &&
          footY >= p.y - 6 && footY - player.vy <= p.y + 6) {
        player.y = p.y - player.h / 2;
        player.vy = 0;
        player.onGround = true;
        player.jumpsUsed = 0;
        player.coyoteTimer = COYOTE_FRAMES;
        player.squash = 0.55;
        player.trail = [];
        jumpBuffered = false;

        if (player.jumpBufferTimer > 0) {
          player.vy = JUMP_VEL;
          player.jumpsUsed = 1;
          player.onGround = false;
          player.coyoteTimer = 0;
          player.stretch = 1.4;
          burst(player.x, player.y + player.h / 2, 8, getAccent(), 2.5);
          player.jumpBufferTimer = 0;
          inputJump = false;
        }

        if (player.onGround) {
          if (p.type === 'spring') {
            player.vy = -16;
            player.onGround = false;
            player.coyoteTimer = 0;
            player.jumpsUsed = 1;
            player.stretch = 1.6;
            p.shakeT = 8;
            burst(player.x, player.y + player.h / 2, 20, '#ff9800', 5);
            popup(player.x, player.y - 16, 'BOOST!', 1.4, '#e67e22');
            shake(6);
            score += 5;
          } else if (p.type === 'fragile') {
            p.opacity = 0;
            player.onGround = false;
            player.vy = 2;
            burst(p.x + p.w / 2, p.y, 14, getAccent(), 3);
            popup(p.x + p.w / 2, p.y, '碎了!', 0.9, getAccent());
            shake(4);
          } else if (!wasOnGround) {
            burst(player.x, player.y + player.h / 2, 6, getAccent(), 2);
            shake(1);
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            score += 1;
            if (combo === 15) popup(player.x, player.y - 22, '15连击!', 1.3, getAccent());
            if (combo === 35) popup(player.x, player.y - 22, '35连击!!', 1.6, '#ff9800');
            if (combo === 60) popup(player.x, player.y - 22, '60连击!!!', 1.9, '#ff4444');
          }
        }
        break;
      }
    }
  }

  if (wasOnGround && !player.onGround && player.vy > 0) {
    player.coyoteTimer = COYOTE_FRAMES;
  }

  for (var mi = 0; mi < platforms.length; mi++) {
    var mp = platforms[mi];
    if (mp.type === 'moving' && mp.opacity > 0.3) {
      var oldX = mp.x;
      mp.moveX += mp.moveDir * mp.moveSpeed;
      if (mp.moveX > mp.moveBase + mp.moveRange || mp.moveX < mp.moveBase - mp.moveRange) {
        mp.moveDir *= -1;
      }
      mp.x = mp.moveX;
      if (player.onGround && player.y + player.h / 2 >= mp.y - 3 && player.y + player.h / 2 <= mp.y + 8 &&
          player.x - player.w * 0.5 < mp.x + mp.w && player.x + player.w * 0.5 > mp.x) {
        player.x += mp.x - oldX;
      }
    }
    mp.bobT += 0.01;
    if (mp.shakeT > 0) mp.shakeT *= 0.85;
  }

  for (var ei = 0; ei < monsters.length; ei++) {
    var mon = monsters[ei];
    if (mon.dead) continue;
    mon.bobT += 0.04;
    mon.x += mon.dir * mon.speed;
    if (mon.type === 'piku') mon.roll += mon.dir * mon.speed * 0.3;
    if (mon.type === 'ghost') mon.floatOff += 0.02;
    if (mon.x - mon.w / 2 < mon.plat.x || mon.x + mon.w / 2 > mon.plat.x + mon.plat.w) {
      mon.dir *= -1;
    }
    mon.squish *= 0.85;
  }

  for (var ci = 0; ci < monsters.length; ci++) {
    var mo = monsters[ci];
    if (mo.dead) continue;
    var mTop = mo.y - mo.h / 2;
    var mBot = mo.y + mo.h / 2;
    var mLeft = mo.x - mo.w / 2;
    var mRight = mo.x + mo.w / 2;
    var pTop = player.y - player.h / 2;
    var pBot = player.y + player.h / 2;
    var pLeft = player.x - player.w / 2;
    var pRight = player.x + player.w / 2;

    if (pRight > mLeft && pLeft < mRight && pBot > mTop && pTop < mBot) {
      var prevFootY = pBot - player.vy;
      if (player.vy > 0 && prevFootY <= mTop + mo.h * 0.55) {
        mo.dead = true;
        mo.squish = 1;
        player.vy = -9;
        totalKills++;
        score += 50;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        burst(mo.x, mo.y, 18, '#ff9800', 5);
        popup(mo.x, mo.y - 10, '+50!', 1.3, '#ff9800');
        shake(7);
      } else {
        if (loseLife()) return;
      }
    }
  }

  for (var si = 0; si < stars.length; si++) {
    var st = stars[si];
    if (st.collected) continue;
    st.rot += 0.04;
    st.bob += 0.03;
    if (Math.hypot(player.x - st.x, player.y - st.y) < st.r + player.w / 2) {
      st.collected = true;
      totalStars++;
      score += 15;
      burst(st.x, st.y, 10, '#ffd700', 4);
      popup(st.x, st.y, '+15', 1, '#f39c12');
      shake(1.5);
    }
  }

  var camOffset = W < 380 ? 0.22 : W < 500 ? 0.28 : 0.35;
  var targetCamX = player.x - W * camOffset;
  camX += (targetCamX - camX) * 0.1;

  if (player.x > maxPlayerX) maxPlayerX = player.x;
  distance = maxPlayerX;

  if (player.y - player.h / 2 > H + 40) { if (loseLife()) return; }
  if (player.x + player.w / 2 < camX - 100 && player.invincible <= 0) { if (loseLife()) return; }

  for (var ri = platforms.length - 1; ri >= 0; ri--) {
    if (platforms[ri].x + platforms[ri].w < camX - 900 || platforms[ri].opacity < 0.05) {
      platforms.splice(ri, 1);
    }
  }
  for (var rmi = monsters.length - 1; rmi >= 0; rmi--) {
    var rm = monsters[rmi];
    if (rm.dead || rm.x + rm.w < camX - 800) { monsters.splice(rmi, 1); }
  }
  for (var rsi = stars.length - 1; rsi >= 0; rsi--) {
    if (stars[rsi].collected || stars[rsi].x < camX - 700) stars.splice(rsi, 1);
  }

  var rightmost = findRightmost();
  var safety = 0;
  while (rightmost.x + rightmost.w < camX + W + 800 && safety < 50) {
    rightmost = spawnNextPlatform();
    safety++;
  }
  if (stars.length < 6 && Math.random() < 0.4) {
    var vps = [];
    for (var vpi = 0; vpi < platforms.length; vpi++) {
      var vp = platforms[vpi];
      if (vp.x > camX && vp.x < camX + W && vp.y > 0 && vp.y < H && vp.opacity > 0.3) {
        vps.push(vp);
      }
    }
    if (vps.length > 0) spawnStar(vps[Math.floor(Math.random() * vps.length)]);
  }

  for (var pti = particles.length - 1; pti >= 0; pti--) {
    var pt = particles[pti];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += pt.grav; pt.life--;
    if (pt.life <= 0) particles.splice(pti, 1);
  }
  for (var spi = popups.length - 1; spi >= 0; spi--) {
    popups[spi].y += popups[spi].vy; popups[spi].life--;
    if (popups[spi].life <= 0) popups.splice(spi, 1);
  }

  shakeAmt *= 0.84;
  flashAmt *= 0.86;
  if (!player.onGround && player.coyoteTimer <= 0 && player.vy > 5 && combo > 0) {
    combo = 0;
  }

  updateUI();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (flashAmt > 0.005) {
    ctx.fillStyle = 'rgba(255,255,255,' + flashAmt + ')';
    ctx.fillRect(0, 0, W, H);
  }

  var parallax1 = ((-camX * 0.08) % (W * 2) + W * 2) % (W * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (var mx = parallax1; mx < W + 200; mx += 220 + Math.sin(mx * 0.01) * 60) {
    var mh = 50 + Math.sin(mx * 0.008) * 25;
    ctx.beginPath();
    ctx.arc(mx, H - 10, mh, Math.PI, 0);
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 1;
  var gox = ((-camX * 0.25) % 70 + 70) % 70;
  for (var gx = gox; gx < W; gx += 70) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (var gy = 0; gy < H; gy += 70) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  shX += ((Math.random() - 0.5) * shakeAmt - shX) * 0.5;
  shY += ((Math.random() - 0.5) * shakeAmt - shY) * 0.5;
  ctx.save();
  ctx.translate(shX, shY);

  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    var px = p.x - camX;
    var py = p.y;
    if (px < -250 || px > W + 250 || py < -60 || py > H + 60) continue;
    if (p.opacity < 0.2) continue;

    ctx.globalAlpha = Math.min(1, p.opacity);

    if (p.type === 'spring' && p.shakeT > 0.5) {
      px += (Math.random() - 0.5) * p.shakeT * 0.5;
    }

    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(px + p.w / 2, py + 10, p.w / 2 + 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    var baseClr = '#1a1a1a';
    if (p.type === 'spring') baseClr = '#2a1a0a';
    if (p.type === 'fragile') baseClr = '#c0392b';
    ctx.fillStyle = baseClr;
    var cr = 8;
    ctx.beginPath();
    ctx.moveTo(px + cr, py);
    ctx.lineTo(px + p.w - cr, py);
    ctx.quadraticCurveTo(px + p.w, py, px + p.w, py + cr);
    ctx.lineTo(px + p.w, py + 12);
    ctx.lineTo(px, py + 12);
    ctx.lineTo(px, py + cr);
    ctx.quadraticCurveTo(px, py, px + cr, py);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fillRect(px + 4, py + 1, p.w - 8, 1.8);

    if (p.type === 'spring') {
      ctx.fillStyle = '#ff9800';
      ctx.fillRect(px + p.w / 2 - 5, py - 3, 10, 6);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(px + p.w / 2 - 2, py - 3, 4, 6);
    }
    if (p.type === 'fragile') {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + p.w * 0.25, py + 1);
      ctx.lineTo(px + p.w * 0.42, py + 4);
      ctx.lineTo(px + p.w * 0.35, py + 8);
      ctx.moveTo(px + p.w * 0.6, py + 2);
      ctx.lineTo(px + p.w * 0.68, py + 5);
      ctx.lineTo(px + p.w * 0.56, py + 9);
      ctx.stroke();
    }
    if (p.type === 'moving') {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(px + 6, py + 4, p.w - 12, 2);
      var arrX = px + p.w / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.moveTo(arrX - 6, py + 1);
      ctx.lineTo(arrX + 6, py + 1);
      ctx.lineTo(arrX, py - 3);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(arrX - 6, py + 8);
      ctx.lineTo(arrX + 6, py + 8);
      ctx.lineTo(arrX, py + 12);
      ctx.closePath();
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }

  for (var si = 0; si < stars.length; si++) {
    var st = stars[si];
    if (st.collected) continue;
    var sx = st.x - camX;
    var sy = st.y + Math.sin(st.bob) * 5;
    if (sx < -60 || sx > W + 60 || sy < -60 || sy > H + 60) continue;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(st.rot);

    ctx.fillStyle = 'rgba(255,200,0,0.18)';
    ctx.beginPath();
    ctx.arc(0, 0, st.r * 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffc107';
    ctx.beginPath();
    for (var sp = 0; sp < 5; sp++) {
      var sa = sp * Math.PI * 2 / 5 - Math.PI / 2;
      var ia = sa + Math.PI / 5;
      ctx.lineTo(Math.cos(sa) * st.r, Math.sin(sa) * st.r);
      ctx.lineTo(Math.cos(ia) * st.r * 0.4, Math.sin(ia) * st.r * 0.4);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, st.r * 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  for (var ei = 0; ei < monsters.length; ei++) {
    var mo = monsters[ei];
    if (mo.dead) continue;
    var mx = mo.x - camX;
    var my = mo.y + Math.sin(mo.bobT) * (mo.bobAmp || 2);
    // ghost floats higher
    if (mo.type === 'ghost') my += Math.sin(mo.floatOff || 0) * 8;
    if (mx < -60 || mx > W + 60 || my < -60 || my > H + 60) continue;

    ctx.save();
    ctx.translate(mx, my);
    var sq = mo.squish || 1;
    ctx.scale(1, Math.max(0.15, sq));

    var hw = mo.w / 2, hh = mo.h / 2;

    if (mo.type === 'spike') {
      var d = mo.diff || 0;
      var hue = (d * 420 + (mo.x * 0.3)) % 360;
      ctx.fillStyle = 'hsl(' + hue + ', 65%, 48%)';
      ctx.beginPath();
      ctx.moveTo(0, -hh);
      ctx.lineTo(hw, hh);
      ctx.lineTo(-hw, hh);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.moveTo(0, -hh); ctx.lineTo(hw/3, -hh/3); ctx.lineTo(-hw/3, -hh/3); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-4, hh*0.1, hw*0.28, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, hh*0.1, hw*0.28, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-3, hh*0.1, hw*0.14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, hh*0.1, hw*0.14, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-7, -hh*0.2); ctx.lineTo(-1, -hh*0.05); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7, -hh*0.2); ctx.lineTo(1, -hh*0.05); ctx.stroke();
    }

    if (mo.type === 'slime') {
      var slimeColor = mo.dir > 0 ? '#4ECDC4' : '#FF6B6B';
      ctx.fillStyle = slimeColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, hw, hh*0.9, 0, Math.PI, 0);
      ctx.ellipse(0, hh*0.1, hw, hh*0.55, 0, 0, Math.PI);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(-hw*0.25, -hh*0.35, hw*0.35, hh*0.3, 0, 0, Math.PI*2); ctx.fill();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-hw*0.3, -hh*0.15, hw*0.25, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.3, -hh*0.15, hw*0.25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-hw*0.25, -hh*0.12, hw*0.13, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.35, -hh*0.12, hw*0.13, 0, Math.PI*2); ctx.fill();
    }

    if (mo.type === 'ghost') {
      ctx.fillStyle = 'rgba(220,210,255,0.85)';
      ctx.beginPath();
      ctx.arc(0, -hh*0.2, hw, Math.PI, 0);
      ctx.lineTo(hw, hh*0.4);
      // wavy bottom
      for (var wi = 0; wi < 4; wi++) {
        var wx = hw - (wi * hw * 0.5);
        ctx.quadraticCurveTo(wx - hw*0.25, hh*1.2, wx - hw*0.5, hh*0.4);
      }
      ctx.closePath();
      ctx.fill();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-hw*0.3, -hh*0.3, hw*0.28, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.3, -hh*0.3, hw*0.28, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(-hw*0.25, -hh*0.28, hw*0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.35, -hh*0.28, hw*0.15, 0, Math.PI*2); ctx.fill();
      // mouth
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(0, -hh*0.05, hw*0.2, 0, Math.PI); ctx.fill();
    }

    if (mo.type === 'crab') {
      ctx.fillStyle = '#FF6B4A';
      // body
      ctx.beginPath(); ctx.ellipse(0, 0, hw*0.7, hh, 0, 0, Math.PI*2); ctx.fill();
      // legs
      ctx.strokeStyle = '#FF6B4A'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      for (var li = -1; li <= 1; li += 2) {
        for (var lj = 0; lj < 2; lj++) {
          ctx.beginPath();
          ctx.moveTo(li * hw*0.5, lj * hh*0.6);
          ctx.lineTo(li * hw*1.1, (lj-0.3) * hh*0.8);
          ctx.stroke();
        }
      }
      // claws
      ctx.fillStyle = '#E8553A';
      ctx.beginPath(); ctx.arc(-hw*0.85, -hh*0.5, hw*0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.85, -hh*0.5, hw*0.3, 0, Math.PI*2); ctx.fill();
      // eyes on stalks
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-hw*0.35, -hh*0.7, hw*0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.35, -hh*0.7, hw*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-hw*0.32, -hh*0.68, hw*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hw*0.38, -hh*0.68, hw*0.1, 0, Math.PI*2); ctx.fill();
    }

    if (mo.type === 'piku') {
      ctx.save();
      ctx.rotate(mo.roll || 0);
      ctx.fillStyle = '#FFD93D';
      ctx.beginPath();
      // spiky circle
      var spikes = 8;
      for (var si = 0; si < spikes; si++) {
        var a1 = (si / spikes) * Math.PI * 2;
        var a2 = ((si + 0.5) / spikes) * Math.PI * 2;
        var r1 = si % 2 === 0 ? hw : hw * 0.65;
        var r2 = si % 2 === 0 ? hw * 0.65 : hw;
        ctx.lineTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, -2, hw*0.32, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(1, -1, hw*0.16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FF6B4A';
      ctx.beginPath(); ctx.arc(-hw*0.3, -hh*0.2, hw*0.18, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  for (var pti = 0; pti < particles.length; pti++) {
    var pt = particles[pti];
    ctx.globalAlpha = pt.life / pt.maxLife;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x - camX, pt.y, pt.size * (pt.life / pt.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (var spi = 0; spi < popups.length; spi++) {
    var pp = popups[spi];
    ctx.globalAlpha = pp.life / pp.maxLife;
    ctx.fillStyle = pp.color;
    ctx.font = 'bold ' + (13 * pp.scale) + 'px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(pp.text, pp.x - camX, pp.y);
  }
  ctx.globalAlpha = 1;

  drawPlayer(player.x - camX, player.y);

  ctx.restore();
}

function drawPlayer(cx, cy) {
  ctx.save();
  ctx.translate(cx, cy);

  var scX = player.squash;
  var scY = player.stretch;
  if (scX > 1.3) scX = 1.3;
  if (scY > 1.5) scY = 1.5;
  if (!player.onGround) {
    scX = player.stretch < 1 ? player.stretch : 1 + (1 - player.squash) * 0.2;
    scY = player.squash < 1 ? player.squash : 1 + (player.stretch - 1) * 0.2;
    scX = Math.max(0.65, Math.min(1.35, scX));
    scY = Math.max(0.6, Math.min(1.5, scY));
  } else {
    scX = Math.max(0.55, scX);
  }

  ctx.scale(scX, scY);

  var hw = player.w / 2;
  var hh = player.h / 2;
  var blink = player.blinkF > 2;

  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  var bodyR = 6;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(-hw + bodyR, -hh);
  ctx.lineTo(hw - bodyR, -hh);
  ctx.quadraticCurveTo(hw, -hh, hw, -hh + bodyR);
  ctx.lineTo(hw, hh - bodyR);
  ctx.quadraticCurveTo(hw, hh, hw - bodyR, hh);
  ctx.lineTo(-hw + bodyR, hh);
  ctx.quadraticCurveTo(-hw, hh, -hw, hh - bodyR);
  ctx.lineTo(-hw, -hh + bodyR);
  ctx.quadraticCurveTo(-hw, -hh, -hw + bodyR, -hh);
  ctx.closePath();
  ctx.fill();

  var eyeY = -hh * 0.16;
  if (blink) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-hw * 0.42, eyeY);
    ctx.quadraticCurveTo(-hw * 0.17, hh * 0.08, -hw * 0.02, eyeY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hw * 0.02, eyeY);
    ctx.quadraticCurveTo(hw * 0.33, hh * 0.08, hw * 0.48, eyeY);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-hw * 0.25, eyeY, hw * 0.3, hh * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hw * 0.25, eyeY, hw * 0.3, hh * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-hw * 0.18, eyeY + 1, hw * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(hw * 0.32, eyeY + 1, hw * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-hw * 0.1, eyeY - 4, hw * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(hw * 0.4, eyeY - 4, hw * 0.09, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function setupInput() {
  function bindDir(id, downFn, upFn) {
    var b = document.getElementById(id);
    b.addEventListener('touchstart', function (e) { e.preventDefault(); downFn(); }, { passive: false });
    b.addEventListener('touchend', function (e) { e.preventDefault(); upFn(); }, { passive: false });
    b.addEventListener('touchcancel', function (e) { upFn(); });
    b.addEventListener('mousedown', function (e) { e.preventDefault(); downFn(); });
    b.addEventListener('mouseup', function (e) { e.preventDefault(); upFn(); });
    b.addEventListener('mouseleave', function (e) { upFn(); });
  }

  bindDir('leftBtn',
    function () { inputLeft = true; inputRight = false; },
    function () { inputLeft = false; }
  );
  bindDir('rightBtn',
    function () { inputRight = true; inputLeft = false; },
    function () { inputRight = false; }
  );
  bindDir('upBtn',
    function () { inputJump = true; },
    function () {}
  );
  bindDir('downBtn',
    function () { inputDown = true; },
    function () { inputDown = false; }
  );

  document.addEventListener('keydown', function (e) {
    if (!gameRunning) return;
    if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); inputLeft = true; inputRight = false; }
    if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); inputRight = true; inputLeft = false; }
    if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); inputDown = true; }
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); inputJump = true; }
  });
  document.addEventListener('keyup', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'a') inputLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd') inputRight = false;
    if (e.key === 'ArrowDown' || e.key === 's') inputDown = false;
  });
}

window.addEventListener('load', function () {
  initGame();
  setupInput();
});
</script>
