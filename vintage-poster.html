<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓮說 · 复古手工书海报</title>
<style>
:root{--bg:#1a1a14}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Georgia','PingFang SC',serif;color:#ccc;gap:20px;padding:20px}
h1{font-size:1.2rem;font-weight:400;letter-spacing:4px;color:rgba(255,255,255,0.5)}
canvas{max-width:90vw;max-height:80vh;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
button{padding:12px 28px;border-radius:24px;border:none;background:linear-gradient(90deg,#5a6b3a,#8a9b6a);color:#fff;font-size:0.85rem;letter-spacing:1px;cursor:pointer;transition:all 0.3s}
button:hover{opacity:0.85;transform:translateY(-1px)}
button:active{transform:scale(0.97)}
.desc{font-size:0.7rem;color:rgba(255,255,255,0.25);text-align:center;max-width:400px;line-height:1.8}
</style>
</head>
<body>
<h1>蓮 說 · LOTUS WHISPER</h1>
<canvas id="c"></canvas>
<div class="btns">
    <button onclick="saveImg()">保存海报</button>
</div>
<p class="desc">Bloom · Vivid is the Life<br>花看半開，酒飲微醺</p>
<script>
const W=1200,H=1600; // 3:4
const c=document.getElementById('c');
c.width=W;c.height=H;
const ctx=c.getContext('2d');

function genLinenTex(){
    const off=document.createElement('canvas');off.width=W;off.height=H;
    const o=off.getContext('2d');
    o.fillStyle='#e8dcc8';o.fillRect(0,0,W,H);
    // 经纬线
    o.strokeStyle='rgba(0,0,0,0.04)';o.lineWidth=1;
    for(let y=0;y<H;y+=4){o.beginPath();o.moveTo(0,y);o.lineTo(W,y);o.stroke()}
    for(let x=0;x<W;x+=4){o.beginPath();o.moveTo(x,0);o.lineTo(x,H);o.stroke()}
    // 粗麻线
    o.strokeStyle='rgba(0,0,0,0.02)';o.lineWidth=2;
    for(let y=12;y<H;y+=48){o.beginPath();o.moveTo(0,y);o.lineTo(W,y+2);o.stroke()}
    // 噪点
    const img=o.getImageData(0,0,W,H),d=img.data;
    for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*18;d[i]+=n;d[i+1]+=n;d[i+2]+=n}
    o.putImageData(img,0,0);
    return off;
}

function genWallTex(){
    const off=document.createElement('canvas');off.width=W;off.height=H;
    const o=off.getContext('2d');
    o.fillStyle='#d5c8b0';o.fillRect(0,0,W,H);
    // 不规则水渍
    for(let i=0;i<60;i++){
        const x=Math.random()*W,y=Math.random()*H,r=20+Math.random()*120;
        const g=o.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0,'rgba(180,160,130,0.25)');g.addColorStop(0.5,'rgba(200,185,155,0.08)');g.addColorStop(1,'rgba(0,0,0,0)');
        o.fillStyle=g;o.beginPath();o.arc(x,y,r,0,Math.PI*2);o.fill()
    }
    // 裂纹
    o.strokeStyle='rgba(0,0,0,0.06)';o.lineWidth=0.5;
    for(let i=0;i<30;i++){
        o.beginPath();let x=Math.random()*W,y=Math.random()*H;
        o.moveTo(x,y);
        for(let j=0;j<8;j++){x+=(Math.random()-0.4)*60;y+=(Math.random()-0.4)*60;o.lineTo(x,y)}
        o.stroke()
    }
    // 霉斑
    for(let i=0;i<200;i++){
        const x=Math.random()*W,y=Math.random()*H,r=2+Math.random()*8;
        o.fillStyle='rgba(60,50,30,'+(0.03+Math.random()*0.06)+')';
        o.beginPath();o.arc(x,y,r,0,Math.PI*2);o.fill()
    }
    return off;
}

function drawTextOverlay(){
    // 大字 "蓮說"
    ctx.fillStyle='rgba(45,38,20,0.82)';
    ctx.font='bold 120px "STKaiti","KaiTi","楷体","PingFang SC",serif';
    ctx.textAlign='center';
    ctx.fillText('蓮  說',W/2,420);
    // 小字
    ctx.fillStyle='rgba(55,48,30,0.55)';
    ctx.font='36px "STKaiti","KaiTi","楷体","PingFang SC",serif';
    ctx.fillText('花  看  半  開',W/2,500);
    // 英文
    ctx.fillStyle='rgba(70,60,40,0.4)';
    ctx.font='italic 28px "Georgia",serif';
    ctx.fillText('Bloom · Vivid is the Life',W/2,560);
    // 底部诗句
    ctx.fillStyle='rgba(55,48,30,0.45)';
    ctx.font='24px "STKaiti","KaiTi","楷体","PingFang SC",serif';
    ctx.fillText('出淤泥而不染  濯清漣而不妖',W/2,H-180);
    ctx.fillText('—— 周敦頤《愛蓮說》',W/2,H-135);
    // 印章
    ctx.fillStyle='rgba(160,50,30,0.5)';
    ctx.fillRect(W/2+160,H-230,50,50);
    ctx.fillStyle='rgba(220,200,170,0.7)';
    ctx.font='bold 20px "STKaiti","KaiTi",serif';ctx.textAlign='center';
    ctx.fillText('蓮',W/2+185,H-195);
}

const img=new Image();
img.onload=function(){
    // Step 0: base image
    const iw=img.naturalWidth,ih=img.naturalHeight;
    const ir=iw/ih,tr=W/H;let sx=0,sy=0,sw=iw,sh=ih;
    if(ir>tr){sw=ih*tr;sx=(iw-sw)/2}else{sh=iw/tr;sy=(ih-sh)/2}
    ctx.drawImage(img,sx,sy,sw,sh,0,0,W,H);

    // Step 1: Difference blend with moss green overlay
    const diffLayer=document.createElement('canvas');diffLayer.width=W;diffLayer.height=H;
    const dl=diffLayer.getContext('2d');
    dl.fillStyle='#3b4a2f';dl.fillRect(0,0,W,H);
    ctx.save();ctx.globalCompositeOperation='difference';ctx.drawImage(diffLayer,0,0);ctx.restore();

    // Step 2: Multiply blend with linen texture
    const linen=genLinenTex();
    ctx.save();ctx.globalCompositeOperation='multiply';ctx.drawImage(linen,0,0);ctx.restore();

    // Step 3: Color Dodge with low fill (simulate 75% fill via globalAlpha)
    const wall=genWallTex();
    ctx.save();ctx.globalCompositeOperation='color-dodge';ctx.globalAlpha=0.75;ctx.drawImage(wall,0,0);ctx.restore();

    // Vignette
    const vig=ctx.createRadialGradient(W/2,H/2,W*0.55,W/2,H/2,W*0.75);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(0.7,'rgba(20,15,10,0.15)');vig.addColorStop(1,'rgba(20,15,10,0.5)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

    // Edge darkening
    ctx.strokeStyle='rgba(15,10,5,0.3)';ctx.lineWidth=40;
    ctx.strokeRect(0,0,W,H);

    // Text overlay
    drawTextOverlay();

    // Dust specks
    for(let i=0;i<400;i++){
        const x=Math.random()*W,y=Math.random()*H,r=0.3+Math.random()*1.2;
        ctx.fillStyle='rgba(200,180,150,'+(0.05+Math.random()*0.15)+')';
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()
    }
    // Hairline scratches
    ctx.strokeStyle='rgba(200,180,150,0.04)';ctx.lineWidth=0.3;
    for(let i=0;i<15;i++){
        ctx.beginPath();let x=Math.random()*W,y=Math.random()*H;
        ctx.moveTo(x,y);
        for(let j=0;j<4;j++){x+=Math.random()*80;y+=Math.random()*3;ctx.lineTo(x,y)}
        ctx.stroke()
    }
};
img.src='poster2.webp';

function saveImg(){
    const a=document.createElement('a');
    a.download='蓮說_LotusWhisper.png';
    a.href=c.toDataURL('image/png');
    a.click()
}
</script>
</body>
</html>
