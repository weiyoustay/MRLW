(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你在被误解的时候常常选择沉默。不是不想解释，是解释了太多次之后发现，有些人只愿意相信自己想相信的版本。你被贴上了一些你根本不认可的标签，但你懒得撕了。远藤周作一生都在写信仰与沉默，他笔下的沉默不是软弱，是在不被理解的环境里保护自己内心最后一点完整的方式。桃李不言，下自成蹊——你不必向每一个人解释你是谁。花开在那里，香气自己会引路。那些愿意了解你的人，不需要你解释；那些不愿意了解你的人，解释再多也没用。沉默不是认输，是把力气省下来，留给那些真的愿意走到你树下来的人。在你还没有力气开口的时候，不说话是完全可以的。你的沉默不是空白的，它里面装着你所有的委屈和坚持。有一天你会遇到一个人，你不用解释他就懂了。在此之前，保持沉默。你的安静不是缺陷，是你的护城河。',
    '你害怕一个人。一个人吃饭的时候要假装在看手机，一个人走路的时候总觉得别人在看你，一个人过节的时候会被巨大的孤独感淹没。你觉得一个人就等于落单，落单就等于被人遗忘。梅·萨顿一个人住在新罕布什尔的乡下，她写日记，种花，在海边散步，对着冬天的雪发呆。她说，独处不是孤独，是和自己的一场漫长的约会。独在异乡为异客——你是异客，但你也可以是自己的主人。你不需要每时每刻都有人陪才能证明你没有被遗忘。一个人吃饭可以细细品味，一个人走路可以随心所欲地拐进一家小店，一个人过节可以给自己煮一碗面加一个荷包蛋。你和你自己的关系，是所有关系里最长的一段。把它经营好。今天试着一个人做一件你一直想找人陪却没人有空陪的事——看一部电影，逛一家书店，吃一顿想吃了很久的饭。和自己约会，你不会爽约。',
    '你特别在意在人群中自己的位置。每次合照你都要看自己站在哪里，每次群聊你都要看自己说的话有没有人回应。你太怕被忽视了，因为被忽视就等于不被认可，不被认可就等于没有价值。卢克莱修在两千年前写《物性论》，从原子的运动写到宇宙的边界。他站在宇宙的尺度上看人类——所有君王的伟业、凡人的焦虑，在永恒的时空里都只是转瞬即逝的微尘。寄蜉蝣于天地——你不是被忽视的沙粒，你是整个宇宙的一部分。你在合照里的位置、在群聊里的回应、在人群里被看见的程度，从宇宙的尺度看，它们轻如鸿毛。这听起来残忍，但也是解脱。既然从宇宙看来这些都不重要，那你就可以自己决定什么才重要。把注意力从“我被看见了吗”挪到“我看见什么了”。你看见窗外那棵树了吗。它没有在合照里，但它很美。你也是。你没有站在最显眼的位置，但你同样在生长。',
    '你在社交里受过伤。曾经全心全意对待的朋友在背后说了你的坏话，曾经信任的人在关键时刻没有站在你这边。这些经历让你现在对交朋友这件事充满了戒心，你不确定下一个靠近你的人是不是也会在某个时刻让你失望。阿列克谢耶维奇用口述记录的方式写下战争中普通人的声音，那些被历史遗忘的、被伤痛碾过的人，在她的书里重新开口说话。同是天涯沦落人——你不是唯一在友谊里栽过跟头的人。很多人都曾在某个深夜里被自己最信任的人伤到，然后学会了不那么快交心。你的戒心不是冷漠，是你用伤口换来的自我保护。相逢何必曾相识——你不用立刻卸下铠甲，但你可以在新认识的人身上找一找那些和你相似的伤疤。他们也在小心翼翼地靠近你。给他们一点时间，也给自己一点时间。用伤疤认人，比用笑脸认人更准。',
    '你在社交场合常常被人忽略。你的名字被叫错，你的话被抢了话头，你的存在被当成背景板。你有时候想：是不是我天生就没有存在感。托妮·莫里森用一辈子为那些没有名字的黑人女性写作。她在《宠儿》里写被剥夺一切的人如何重新确认自己的存在——不是靠别人的确认，是靠自己对过去的正视、对自己的命名。天生我材必有用——你的价值不需要在每一次社交互动里被重新确认。你的名字是你的，不管有没有人叫对。你的话是你的，不管有没有人听完。你不是靠别人的确认才存在的影子，你是一个完整的、独立的人。下一次被抢话的时候，试着把你的话说完。你不需要大声，不需要生气，你只需要继续说完。他说他的，你说你的。你的声音不需要被邀请才能发声。你天生就有这个权利。确认你自己，从下一句没被打断的话开始。',
    '你在一群人里总是感到自己格格不入。他们的笑点你不懂，他们的话题你不感兴趣，他们的相处方式让你觉得不自在。你怀疑自己是一个无法适应社会的异类。奥维德写《变形记》，里面所有的人和神都在不断地变形——变成树，变成鸟，变成石头，变成河流。变形不是惩罚，是生命在应对环境时展现出来的最惊人的适应力。海纳百川，有容乃大——你不需要把自己削成别人的形状才能融入。你是水，你可以保持自己的质地，同时容纳不同的存在方式。他们喜欢热闹，你可以喜欢安静；他们聊八卦，你可以聊书；他们用碰杯表达亲密，你可以用倾听表达在乎。你不是格格不入，你是另一种波长。容纳的意思是：你不必变成他们，你只需要允许他们和你不一样，也允许自己和他们不一样。容纳别人的同时，把你自己的形状也保留在里面。海之所以大，不是因为它只有一种鱼。',
    '你在不同的社交场合戴着不同的面具。在父母面前是懂事的，在朋友面前是幽默的，在领导面前是稳重的，在恋人面前是体贴的。有一天你照镜子，忽然不知道哪一张脸才是自己真正的脸。皮兰德娄一辈子都在写同一个主题：每个人的身份都是碎片化的，你既是你在自己眼里的人，也是别人眼里的人，这些面目互相矛盾又同时真实。不识庐山真面目——你不是丢了真实的自己，你是站在太近的地方看不见整座山。你的每一个面具都不是假的，它们都是你在不同角度下真实的反应。你对父母的关心是真的，你对朋友的幽默是真的，你对工作的认真也是真的。不需要从这些面目里挑一张当成“真的”。它们加在一起才是你。你不是活在面具底下的演员，你是一张脸可以转出不同角度的山。从这个面看是陡壁，从那面看是缓坡，每一面都是真山。',
    '你怕自己的缺点被别人发现。你在社交时小心翼翼地把自己的毛病藏起来——说话太直，反应太慢，容易脸红，不善言辞。你觉得这些缺点是社交的致命伤，一旦暴露就会被嫌弃。查尔斯·兰姆一辈子口吃，但他写了一整本随笔集，把自己的缺点、怪癖、糗事全部摊在纸上。那些文字没有让他被人嫌弃，反而让他被无数读者爱戴，因为他让那些同样不完美的人觉得：原来我也可以被理解。人非圣贤，孰能无过——你的缺点不是你的社交障碍，是你和别人产生真正联结的入口。完美让人仰望，不完美让人靠近。下一次社交时，试着暴露一个无伤大雅的小缺点。不是自黑，是坦然地说：这个我不太在行。你会惊讶地发现，对方也在等你说这句话。没有人能在一个处处完美的人面前感到放松。你的缺点不是你的短板，是你递出去的第一块砖。',
    '你不懂怎么拒绝别人。同事把多余的活推给你，你接了。朋友半夜找你倒情绪垃圾，你听着。不太熟的人找你借了钱，你不好意思催。你怕拒绝会伤害关系，于是你成了所有人的情绪海绵，吸满了别人的水，自己越来越重。赛珍珠在中国长大，她写中国农民，写那些在土地上老实本分却总被人欺负的人。她在小说里画出了一条很清晰的界线——老实不等于可以被随意踩踏。己所不欲，勿施于人——反过来也一样：己所欲，也勿强施于己。你不喜欢被人占便宜，你也不该让自己被占便宜。你不需要用一个“好人”的标签来证明自己的价值。你的善良必须有牙齿。下次试着说一句：这个我帮不了你。不需要解释，不需要道歉。你拒绝的不是那个人，是那件超出了你能力范围的事。划清界线不是推开别人，是保护你自己。你有权拒绝，而这不会让你变成一个坏人。',
    '你在社交中总是模仿别人。模仿那个最受欢迎的人说话的方式，模仿那个最时尚的人穿衣的风格，模仿那个最成功的人做事的节奏。你以为学得足够像，就会被接纳，就会变得有价值。基拉尔说，人的欲望大多不是自己产生的，是模仿别人产生的。别人想要什么，你就想要什么；别人觉得什么好，你就觉得什么好。东施效颦——你模仿的不是真正适合你的生活方式，是别人生活的表面。邯郸学步——学到后来连自己原本怎么走路都忘了。停下来，问自己一句：撇开所有人的眼光，我喜欢什么。你喜欢的音乐，你喜欢的衣服，你喜欢度过周末的方式。把那些从别人身上复制来的欲望一件一件脱掉，看看底下还剩下什么。剩下的那个，才是你自己的轮廓。你不需要模仿任何人。你本身就是一件孤品，不是一件仿品。用自己的方式生活，用自己的方式社交，这才是你最吸引人的地方。',
    '你在社交里受了委屈，心里有一股火想要发泄。你想对那个让你难堪的人说几句狠话，想在朋友圈阴阳怪气一下，想在某个时刻让对方也尝尝你此刻的滋味。戈尔丁写《蝇王》，一群孩子在没有规则约束的小岛上迅速退化成野蛮人。他们不是因为本性邪恶，而是在那个环境里，文明的约束一旦消失，人性里最原始的攻击欲就会浮上来。己所不欲，勿施于人——这是人与人之间最基本的文明底线。你难受，你想报复，这些冲动是真实的。但你没有去做，因为你不是岛上那群失去约束的孩子。你在受伤的时刻依然守住了自己的底线，这本身就是对你人格的一种确认。愤怒不需要被压抑，它需要被转化。去跑步，去打球，去对着枕头捶几拳，把你那些无法消化的情绪用身体排出去。你不需要用刺还击刺。你的沉默不是软弱，是你为自己保留的尊严。这份尊严，是任何反击都换不回来的。',
    '你在一段关系破裂之后，忽然失去了表达的欲望。朋友问你“怎么了”，你说不出。日记本打开又合上。你在对话框里打了删、删了打。你觉得语言是徒劳的，说什么都没有用。贝克特一生都在写“说不了”——他笔下的人物不是不能说话，是不相信语言能传达他们真正的感受。《等待戈多》里的两个人在荒原上没话找话，因为他们害怕沉默，但沉默才是他们离真实最近的距离。此处无声胜有声——你在失语的状态里不是退步，是在重建一种更真实的表达方式。那些说不出来的话，不是不存在，是还没有找到属于它们的形状。它们会在你走路的时候、洗澡的时候、临睡前的某个瞬间，忽然变成一句你觉得“就是这个意思”的话。在那之前，不急着说。真正的沟通，不是用语言填满每一段空白，是在合适的时候说出那一句。你现在不说，是因为那一句还没长好。等它长好，它会自己出来。',
    '你在社交里一直穿着铠甲。你不敢让别人看到真实的你——你的脆弱、你的迷茫、你的不如意。你怕一旦露出缝隙，就会被看不起、被利用、被当成弱者。莱里斯写了一部自传叫《成年时代》，他把自己所有的阴暗面、所有不体面的冲动、所有藏在内心深处的秘密全部写了出来。他说：诚实是自我救赎的唯一途径。诚者，天之道也——你不是要变成社交场合里最完美的人，你是要变成最真实的人。今天试着对一个人说一句真话，不说场面话。不是要你把所有秘密都倒出来，只是在被问“最近怎么样”的时候，不说那个惯性的“还行”，而是说一句：最近有点累，但还在扛。这句话很短，但它是一道缝。缝里漏出来的不是你的脆弱，是你的光。真诚不是社交的短板，它是你在这套复杂社交规则里最锋利的武器。因为它不需要维护，不需要记忆，不需要圆谎。你就是你，这句话本身就足够了。',
    '你觉得社交需要强悍。需要口才好，需要气场强，需要能在任何场合都游刃有余。你觉得自己不够强，所以总在社交里吃亏。扬·马特尔写《少年Pi的奇幻漂流》，一个少年和一只猛虎在救生艇上漂流了两百多天。他没有驯服那头虎，他只是用日复一日的陪伴和照顾，在它心里种下了一种无法解释的信任。柔能克刚——社交里最强的不是最会说的人，是最会听的人；不是气场最足的人，是让人最放松的人。你的温和不是你的短板，是你独有的能力。在别人都在抢话的时候，你是那个安静听完的人；在别人都在表现的时候，你是那个注意到角落里有人不舒服的人。这些不显眼的能力，恰恰是社交里最难得的能力。它们不需要强悍的外壳来保护。你的柔不是弱，是你还没有意识到它的力量。下一次社交，不必逼自己变成一个外向者。用你本来的方式，温和地、不疾不徐地和人相处。那头老虎不会忘记谁在船上陪过它。',
    '你觉得自己的社交生活太平凡了。没有那种惊天动地的友谊，没有那种一拍即合的相遇，没有那种能写成小说的人际关系。你的朋友圈是柴米油盐，周末是和同样几个人的小聚，聊天内容不过是最近看的剧、吃的饭、工作上的小事。你觉得这些不值一提。埃丝特·凯恩写的全是普通人的日常——一个在厨房里削土豆的女人，一个在院子里晾床单的少女。她把她们写得像史诗一样庄严。一花一世界——你拥有的那些平凡的社交时刻，在另一个人的眼里可能是最温暖的记忆。你们一起吃过的那碗面，你们在超市里为选哪个牌子拌过的嘴，你们在下雨天共撑过的那把伞——这些不是微不足道，是构成你人际关系的全部基石。史诗不一定是战争和英雄，平凡人的平凡日子也值得被记下。今晚，写一句关于今天你和某个人之间发生的最普通的事。写下它，你就给了它应得的重量。你的社交生活不是苍白的，它只是安静得不喧嚣。安静的东西，往往更持久。',
    '你在社交迷宫里转了很久，不知道该往哪个方向走才不会被指指点点。每次你做了一个和别人不一样的选择，就有人开始在你耳边吹风：这样不行，那样不好，你这个人怎么这么不合群。但丁写《神曲》，在人生中途迷失在一片黑暗森林里，他一个人走不出来，直到出现了他的向导维吉尔。维吉尔没有背他过去，他只是在前面走，时不时回头说：跟着我，别怕。走自己的路，让别人说去吧——这句话不是赌气，是你在被所有声音淹没之后，终于听见了自己内心那个最清晰的声音。你的向导不在外面，在你心里。那个从黑暗森林里走出来的自己，就是你未来回头看时最感谢的人。别人的嘴长在他们身上，路长在你脚下。他们不会替你走一步，也不会替你承担任何一个后悔的后果。但丁走过地狱、炼狱，最后才到天堂。你现在可能还在地狱的入口，但你已经有了向导。跟着他，往前走。那些声音会越来越远，直到你再也听不见。',
    '你经历过一次社交上的“患难”——可能是当众出丑，可能是一段时间的低谷。那时候你以为身边有很多朋友，可真正留下来陪你的，可能只有一个、两个。其他人都找借口散了，礼貌地、体面地、不留痕迹地退出了你的生活。薄伽丘写《十日谈》，十个年轻人在瘟疫蔓延的城市里逃到郊外讲故事。瘟疫就是一面筛子，筛走了所有虚假的、表面的、脆弱的东西，留下来的才是真的。患难见真情——不是让你感谢苦难，是让你看清谁是真情。你不需要记恨那些离开的人，他们只是被筛子筛掉了。你的生命容量有限，留不下那么多人。那些在瘟疫过后还在你身边的人，你把他们记住。他们不需要很多，两三个就够。从今天起，把精力从那些已经疏远的人身上收回来，留给那几个还在你身边讲故事的人。你们一起躲过了瘟疫，你们的友谊是被检验过的。这才是社交里最珍贵的那一小撮。',
    '你在社交场合总是绷得太紧。别人讲笑话你不敢大声笑，别人拉你一起玩游戏你怕出丑，别人放松的时候你还在想自己的发型是不是乱了、说话声调是不是高了。你把自己活成了一根随时会断的弦。拉伯雷写《巨人传》，里面全是荒诞的、放纵的、不合规矩的狂欢。他让那些平时被规矩绑得喘不过气的人，在文字里彻底释放一次。人生得意须尽欢——你不是工作机器，也不是社交礼仪展示器，你是一个活生生的、需要释放的人。下一次聚会，允许自己做一件出格的事：不为了什么，就是笑到肚子疼，就是跟着音乐乱跳，就是对着蛋糕许一个不着边际的愿望。你的紧绷不是因为你有修养，是因为你太怕被评价。但狂欢的意义，就在于暂时忘掉那些评价。你不必永远保持得体。今天，就在今天，做一次那个内心深处的、想笑就笑的孩子。酒不用喝多，释放就好。',
    '你在社交里总是小心翼翼地扮演着一个角色——好相处的同事、好说话的朋友、好脾气的恋人。时间久了你开始恍惚：他们喜欢的到底是我，还是我扮演的那个角色。塞万提斯让堂吉诃德在一个人人笑他疯癫的世界里，高举长矛冲向风车。所有人都告诉他那是风车，但他看见的是巨人。他说：我知道我是谁。这不是疯话，是一个人在被所有人定义时，对自己最清晰的确认。你知道你是谁吗。如果你脱下那些角色，卸掉那些伪装，剩下的那个内核还是不是你自己。今晚，试着在纸上写下你绝对不会为了社交而妥协的几样东西。它们是你身份的风车，也是你的巨人。守住它们，不管别人怎么说。你不需要向任何人解释你为什么冲向风车。懂你的人不需要解释，不懂的人解释了也白费。做你自己的骑士，骑着那匹瘦马，走你自己的路。世界笑你疯癫，你笑世界看不穿。',
    '你把所有的挫败感都归咎于你所在的社交圈子：是他们太冷漠，是环境太功利，是身边没有懂你的人。你觉得自己被环境困住了，只要换个城市、换份工作、换一群人，就能重新开始。弥尔顿在双目失明之后写《失乐园》，他说心灵是它自己的居所，可以在地狱里建天堂，也可以在天堂里造地狱。你现在的圈子可能是地狱，但这地狱是你自己心灵的投射，还是真的没有光。试试在离开之前，先在你现在的环境里找一个可以让你感到片刻安宁的人或角落。可能是那个总是一个人吃午饭的同事，可能是图书馆靠窗的那张桌子，可能是楼下便利店那个总是对你笑一下的店员。你不需要彻底逃离，你只需要在地狱里先给自己搭一个小棚子。心灵可以把地狱变成天堂，从这个小棚子开始。等你心里有了天堂，不管去哪里，你都能带上它。',
    '你在社交里总想讨好所有人，生怕漏掉一个，得罪一个。你把自己的时间切成碎末，洒给每一个开口要你帮忙的人。到最后你觉得很累，却没有人记得你的付出。歌德笔下的浮士德一生追求知识、追求美、追求权力，但他最后满足的时刻，是他为人类填海造地的瞬间。你若要喜爱自己的价值，你就得给世界创造价值——这个价值不是讨好，是你真正用自己的能力为这个世界做的一点实实在在的事。你的社交价值不体现在你有多么随叫随到，体现在你用心做的那件事、那件作品、那个项目。把讨好别人的时间收回来，用在你能创造价值的地方。当你有了属于自己的创造，那些真正值得交往的人会循着价值找到你。你不是因为讨人喜欢才有价值，是因为你有价值，所以才会被人喜欢。去做那件你一直想做但怕没时间做的事，这才是你社交的底气。',
    '你在一段已经让你不舒服的关系里待得太久，每天数着日子，算着自己付出了多少，得到了多少。你觉得不公平，但又不舍得割断——已经认识这么多年了，已经一起经历过那么多事了。司汤达分析于连的心理，用了临床手术刀一般的精确。他看穿一切激情的背后都有虚荣、自尊和利益的博弈。你不是不舍得那个人，是不舍得这些年投入的时间。爱情不像钟表——友谊也是。你不能用投资回报的逻辑去计算人际关系。过去的投入是沉没成本，它不应该影响你未来的决定。如果这段关系现在让你长期疲惫、长期自我怀疑，那它就是一段需要被重新审视的关系。你不需要和过去投入的时间绑在一起。那些年不是浪费，是让你成长到今天能看清这个问题必经的路。看清了，就做决定。留下值得的，放手消耗的。你的时间还在走，别让它困在一只已经停了的钟里。',
    '你总在偷偷比较。朋友换了好工作，你焦虑；熟人买了房子，你嫉妒；陌生人在社交媒体上晒了你没有的生活，你也觉得自己被比下去了。你把别人的铁砧搬到自己的铺子里，对着它乱敲一通，自己的活反而没干。福楼拜写《包法利夫人》，把爱玛的虚荣、她的比较、她因为和别人攀比而一步步走向毁灭的过程，写得像解剖一样精确。他说，我们敲打自己的铁砧，而不是别人的。别人的砧上打出了什么，和你没有关系。你不需要去敲别人的铁砧，因为你自己的铁砧上那块铁还等着你锤打。把注意力拉回你正在做的事情上。你今天有没有比昨天进步哪怕一点点？你今天有没有做一件对自己诚实的事？你不需要活在别人的时间表里。关上朋友圈，打开自己的文档或工具，敲你自己的那块铁。它现在还烫，还需要反复锤打，但它是你的。敲好了，它比任何一把别人家的剑都更趁手。',
    '你怕一个人待着。下班之后不敢直接回家，怕面对空荡荡的房间。周末不敢不约人，怕一整天不说话会变成隐形人。你觉得独处就等于被世界抛弃。易卜生笔下的娜拉摔门而去，她离开的不是丈夫，是那个把她当玩偶的家。她走向了一个人的孤独，但她在那一刻才真正开始拥有自己。世上最强有力的人是最孤独的人——不是因为孤独让他们变强，是因为变强的路上有一段必经的、无人陪伴的路。你必须学会一个人在房间里和自己待一整天。不靠手机，不靠社交软件，就靠你自己——你的思绪、你的呼吸、你给自己做的一顿饭。这不是被抛弃，是你主动选择的独处。当你不再害怕一个人，你就拥有了社交里最坚固的铠甲：你不需要任何人来填补你的空洞，你本身已经完整。那时候你再出去社交，不是为了索取，是为了分享。分享一个完整的人，比索取一个空洞的人，吸引来的关系要健康得多。',
    '你在一次社交中感受到了彻底的隔膜。你说了很多，对方一句没听进去；对方说了很多，你也觉得像隔着一层玻璃。你意识到人与人之间原来隔着这么宽的一条河。康拉德写《黑暗的心》，马洛沿着刚果河深入黑暗，他发现最可怕的黑暗不是丛林，是人心里那种无法被另一个人真正理解的绝对孤独。但马洛没有回头，他继续往前，因为他在黑暗里看见了库尔茨——那个在孤独尽头崩溃的人——然后他选择了不变成他。我们是孤独的，绝对孤独的，但你可以在这片孤独里，在自己心里点亮一盏灯。你不能消除这条河，但你可以摆渡。下一次你觉得没人理解你的时候，不要放弃表达。你说了，也许对方还是没听懂，但你在那片黑暗里点了灯。有人会被你的灯光吸引，涉水而来。他们也许还是不能完全抵达，但他们已经在朝你靠近。这就够了。孤独是绝对的条件，联结是勇敢的选择。你选择继续伸出手，这就是你的光。',
    '你在社交里常常为了合群而放弃自己的意见。大家说去吃火锅，你明明胃不舒服也跟着去了。大家聊某个你根本不感兴趣的话题，你也装作听得津津有味。你觉得这是社交的必要代价，但你越来越不认识自己。伍尔夫在《达洛维夫人》里写，克拉丽莎在筹备派对的过程中，不断闪过自己年轻时的样子——那时候她还不是一个“完美的女主人”，而是一个有棱角、有渴望的人。一个人能使自己成为自己，比什么都重要。你在社交里失去的那一小块自己，你以为不重要，可是积累多了，你就变成了一个自己都不认识的人。下次试着不合群一次，用温和的方式。大家聊你不感兴趣的话题，你不用假装投入，可以安静地听着，或者在合适的时候说一句“这个我不太懂”。你不必哗众取宠，你只需要如实表达自己。当你开始做自己，那些因为你的真实而被你吸引的人，才是真正适合你的人。你不用变回年轻时的自己，你只需要从现在开始，不再背叛此刻的自己。',
    '你在一段关系里跌倒了，对方触碰到了你最痛的地方。你觉得自己以后再也不能相信任何人了。你把所有试图靠近你的人都推开，你觉得一个人待着比较安全。劳伦斯写人与人之间的吸引力，他说那是一种原始的、血性的、无法被理性完全解释的东西。我们靠近对方，不是因为对方完美，是因为我们在彼此身上嗅到了一种能够理解自己伤口的气息。我们都在彼此身上寻找治疗伤口的药。你的伤口不是你的耻辱，它是你筛选真正能靠近你的人的一个标准。你不需要把它藏起来，也不需要把它展示给所有人。把它留给你信任的人。那个能好好对待你伤口的人，就是那个配得上你的人。在那之前，别把自己锁死。给自己留一扇门，别上锁。你不知道那个人什么时候会走到你的门前，但你要让他有机会敲。你的伤口不是丑陋的疤痕，是你身体上唯一能让真正的药渗进去的地方。',
    '你在经历了社交冷漠之后，开始对整个人际关系感到绝望。你觉得人和人之间就是互相利用，什么温情，什么友谊，都是暂时的、靠不住的。你把自己裹得紧紧的，拒绝再对任何人付出。加缪一辈子都在对抗虚无，他写《局外人》，写《西西弗神话》，但他也写过一句话：在冬天的正中心，我终于发现在我心里有一个不可战胜的夏天。你心里也有一个夏天。它不是别人给的，是你自己长出来的——你曾经毫无保留地信任过一个人，你曾经不求回报地帮过一个陌生人，你曾经在深夜接到朋友的电话，二话不说就出门。那些不是幻觉，是你心里夏天的证据。不要把冬天误认为是全部四季。你现在经历的，只是冬天。夏天还在，在你的核心里，没有人可以夺走。继续往前走，你会遇到下一个春天。当你遇到的时候，不要害怕伸出手。你心里的夏天，足够融化任何冬天里冻住的关系。',
    '你被人际关系折磨得筋疲力尽。你的每一个举动都要考虑别人的眼光，你的每一个选择都要照顾别人的情绪。你觉得自己活在地狱里，而这个地狱的狱卒，全是别人。萨特在《禁闭》里让三个人互相折磨，他们发现，地狱不是烈火和酷刑，就是另外几个人。他人即地狱——这句话不是用来让你绝望的，是让你清醒的。你活在别人的目光里，把定义自己的权利交了出去，这才是地狱。把定义权收回来。别人怎么看你，是他们的事。你是谁，你心里清楚。今天，试着在一件事上不看任何人的脸色：发一条你真正想发的朋友圈，穿一件你喜欢但别人可能觉得奇怪的衬衫，拒绝一个你不想去的局。你不需要向他们解释，你只需要做你自己的狱卒。地狱的门没锁，钥匙在你手里。你一直以为锁着的是你，其实你只是忘了转一下把手。推开它，走出来。别人还在里面互相折磨，那是他们的事。你，自由了。',
    '你是一个女生，你在社交里被要求温柔、顺从、善解人意。你稍微强势一点就被说“太要强”，你稍微独立一点就被说“不够可爱”。你被塞进一个“女生该有的样子”的模子里，勒得你透不过气。波伏娃说，女人不是天生的，是后天形成的。那些所谓的“女生该有的样子”是社会硬塞给你的剧本，不是你天生的本性。你可以撕掉这个剧本，自己来写。你可以做你想做的人——可以是温柔的，也可以是强悍的；可以是合群的，也可以是独行的；可以是照顾别人的，也可以是需要被照顾的。不要让任何人用性别来限制你。下一次有人说“你是女生，所以你应该怎样”时，问问他：谁规定的。你自己来规定。你不是天生的模板，你是自己后天塑造的艺术品。每一刀都刻在你自己的选择里，不是刻在别人的嘴里。',
    '你在一成不变的社交圈里困倦了，每天都在重复同样的话题，面对同样的人，聊着同样的八卦。你觉得自己的社交生命在慢慢枯萎。凯鲁亚克用一卷打字纸一气呵成写下《在路上》，他说在路上的人永远是年轻的，因为他们永远向着未知敞开。永远年轻，永远热泪盈眶——不是让你辞掉工作去流浪，是让你的社交圈里至少保留一个让你感到新鲜的、可以探索的方向。去认识一个和你的生活完全不一样的人，去参加一个你从未涉足过的兴趣小组，去敲开一扇你一直以为不会对自己打开的门。你的社交生命会因为你不断注入新的经历而保持活力。不要困在那些已知的、安全的、毫无波澜的关系里。走出去，去看看不一样的人，去听听不一样的故事。当你在路上时，你就永远年轻。不是年龄，是你的心，还在好奇，还在期待，还在热泪盈眶。',
    '你怕承担社交里的任何负担。怕帮朋友的忙会拖累自己，怕在关系里投入太多会受伤害，怕被需要，也怕需要别人。你把自己的生活过得很轻，轻到没有任何一个人能影响你，但你也感觉不到任何重量。昆德拉说，负担越重，我们的生命越贴近大地，它就越真切实在。最沉重的负担同时也是最强盛的生命力的影像。你是不是太轻了，轻到一阵风就能把你吹走。试着在某一小段关系里，主动承担一点负担：帮那个搬家的朋友抬一下箱子，陪那个失恋的人聊一个无聊的晚上，接下那件别人都不愿意做的琐事。这些负担会让你累，但也会让你真实地感受到自己活在一个真实的人际网络里。你不是一个漂浮的岛，你是大地上一棵被其他人拽着、同时也拽着其他人的树。负担会给你重量，重量会让你不被风吹走。不要怕那一点点累。那是你和这个世界发生真实联系的唯一证明。',
    '你和一个曾经很亲密的朋友疏远了很多年，你已经不太想起那段友谊了。但某天你在街上听到一首当年的老歌，整个人忽然被拽回到过去。你发现那些记忆没有消失，它们只是被你封存了。石黑一雄笔下的人物永远在与记忆纠缠，他们的讲述经常不可靠，但那份情感是真的。回忆，不管多么痛苦，都是我们唯一拥有的东西。你不用强迫自己忘掉那段已经结束的友谊。它是你的，哪怕它现在已经变成了一个再也回不去的地方。它在你的记忆里活着，它的价值不会因为关系结束而消失。如果你还想他，可以试着联系他。不用说什么煽情的话，就说一句：今天听到那首歌，忽然想起你。他可能回，也可能不回，但这不重要。重要的是你承认了那段友谊曾经是真的。那段友谊是你人格的一部分，你没有白白经历。它在你的记忆里，继续陪伴你走接下来的路。',
    '你在社交里一直找不到自己的位置。你试过融入不同的圈子，但每个圈子都让你觉得差了一点——你在那里，却又不完全属于那里。你觉得自己像一个没有身份证的人在世界上流浪。莫迪亚诺的小说永远在写一个主题：一个人如何在城市的废墟和记忆的碎片里寻找自己的身份。他笔下的人物永远在问：我是谁，我从哪里来，我属于谁。我们在这个世界上都是孤独的，但这不意味着你不能找到一个暂时的栖息地。你不要强求自己完全属于任何一个圈子。你可以是跨界的，可以是边缘的，可以是自由流动的。你的身份不是被某一个固定团体定义的，是被你自己的选择、你的经历、你走过的所有城市和街道定义的。不需要一个最终的身份确认。你在寻找的过程里，就已经是你自己了。继续走，继续试，继续在每一个让你觉得舒服的地方多待一会儿，不舒服了就离开。你不需要在一个地方安家，你可以在多个地方都留有自己的痕迹。',
    '你被误解后不断解释，说了很多话，对方还是在原地打转。你把嘴皮磨破了，只想换来一句“我理解你了”，可是对方根本没有意愿理解你。你感觉自己被掏空。库切笔下的人物常常在面对无法沟通的困境时，选择沉默。沉默不是投降，它是你从无意义的辩论中退出，把自己的能量收回来的姿态。有些人不配听你说话。不是你不值得被听，是他们没有准备好要听。你不用再解释一遍了。你的价值不依赖他们的理解。从今天起，对那些反复误解你的人，只说一遍。他们再问，你就微笑，不说话。你的沉默不是承认错误，是换一种方式说：我已经说过了。他们会不适应你的沉默，但你会慢慢适应这种省力的方式。把解释的力气拿去读两页书，或者给你真正在乎的人发一句问候。沉默是金，不是因为你没话可说，是因为你把话留给了值得的人。',
    '你在社交里一直找不到归属感。你和很多人说过话，加过微信，聚过会，但你觉得那些联结都是表面的、临时的、随时会断的。你不敢往深处走，因为深处意味着暴露，暴露意味着风险。福斯特在《霍华德庄园》里反复说一句话：只有连接起来。他不是在说人和人之间要建立多少关系，是在说你要把内心的理智与情感、过去与现在、自己和他人真正连接起来。只有连接起来，生命才有意义——你现在的疲惫不是因为连接太多，是因为那些连接没有触及到你真正的那部分。试着在接下来的一次社交里，不要再聊天气、工作、热点新闻。试着说一句你真正的感受，问一个你真正好奇的问题。把一次闲聊变成一次真诚的连接。这需要勇气，因为你可能会被拒绝。但也有可能，对方也在等你说这句话。你们之间那根断掉的线，只需要一个人先伸出手。你先伸手。连接起来的生命，才真正开始有意义。',
    '你在一段友谊或爱情结束之后，用了很长时间还是走不出来。你看着对方已经有了新的圈子、新的生活，而你还在原地打转。你觉得自己很没用，连遗忘都做不到。聂鲁达写：爱情如此短暂，遗忘如此漫长。他写的不是要你快点忘掉，他是在告诉你，漫长是正常的。遗忘本来就比爱更难，不要为自己的漫长而羞愧。你不需要强迫自己立刻走出来。你可以把那些还没消化完的记忆放在一个盒子里，给它一个名字，给它一个位置。它不是你的伤口，是你曾经认真对待过一段感情的证明。当你不再逼自己遗忘，你就已经开始遗忘了。这个过程会很慢，慢到你自己都察觉不到。直到有一天你忽然发现，想起那个人时心里不再是刺痛，而是一种淡淡的、可以承受的怅惘。到那一天，你就完成了遗忘。在那之前，不用赶时间。你有一整个余生可以用来遗忘。',
    '你在社交里总是把自己放在最后。别人需要你时你随叫随到，你自己需要人陪时却不敢开口。你把别人的需求放在第一位，把自己的需求藏起来，藏久了连你自己都找不到了。惠特曼在《草叶集》的开篇就喊出：我赞美我自己，歌唱我自己。在那个时代，这句话是惊世骇俗的——一个人怎么可以如此堂而皇之地肯定自己。但你仔细想想，赞美自己不是骄傲，是承认自己也有被照顾的权利。我赞美我自己——不是因为我已经完美，是因为我还在努力。你不需要等到变成更好的人才有资格照顾自己。今天的你，这个疲惫的、还在坚持的你，值得被赞美。在照顾别人之前，先问自己一句：我今天需要什么。然后满足它。哪怕只是给自己煮一碗热汤，只是比平时早半小时睡觉。你不需要所有人来赞美你，你自己先来。那首从你嘴里唱出的歌，是你给自己最好的礼物。',
    '你被一次当众出丑的经历困住了。那次演讲时的卡壳，那次聚会上说错的话，那次在众人面前摔倒的尴尬——你反复在脑子里播放那一幕，越想越觉得所有人都还在笑你。荷尔德林写过一句被无数人引用的话：哪里有危险，哪里也生长着拯救的力量。他不是在写社交尴尬，但这句话可以送给你。你最难堪的那个瞬间，同时也就是你长出铠甲的地方。拯救的力量不在别处，就在你重新站起来的那个动作里。下一次，你不需要回避那个让你出丑的场合。你只需要再做一次——再做一次演讲，再去一次那个聚会，再走一次那条路。这一次，你可能会紧张，但你已经不是上一次的你。你带着上一次的伤疤站在这里，这本身就是一种拯救。危险还在，但你已经在它旁边种下了新的东西。那东西现在还很小，但它会长大。有一天你会站在这里，对那个还在害怕的自己说：你看，我做到了。',
    '你特别害怕被评判，这种恐惧让你在社交中不敢做真实的自己。你每一句话都要在心里先过一遍，每一个动作都怕引起不必要的注意。你把自己活成了一个小心翼翼的观察者，从来不敢下场。特罗洛普善于写旁观者——那些在社交场合里坐在角落观察所有人的角色。他让他们拥有一种特殊的敏锐：看穿所有人的虚张声势，同时永远保护着自己不被发现。我们最需要的是理解，而不是被评判——你怕被评判，但你有没有想过，你对自己也是一种评判，而且是所有人里最严厉的那一个。你不是需要别人停止评判你，是你先要停止评判自己。下一次你在心里对自己说“他们肯定觉得我怎样怎样”时，试着把这句话改成：我不知道他们怎么想，但我觉得自己此刻这样做是可以的。你不需要立刻变成一个社交达人，你只需要在自己心里给自己一个不被评判的位置。你对自己的理解，比全世界所有人的评判加起来都重要。',
    '你每天在固定的轨道上运转，社交圈也是固定的几个同事、几个朋友、几个家人。你觉得人际关系的可能性已经被耗尽了，你认识的人就这么多，不会再有什么新鲜的事发生。普鲁斯特哪里都没有去，他只是躺在一个密不透风的房间里，用全新的眼睛重新看了一遍自己的整个一生。真正的发现之旅不在于寻找新的风景，而在于拥有新的眼睛。你不需要认识新的人才能刷新你的社交生命。你可以用新的眼睛再看一遍你身边的人。你了解他吗，你听过他小时候最难忘的一个夏天吗，你知道他每天下班回家路上在想什么吗。试着用一种从未有过的好奇，去重新认识一个你已经认识了很久的人。你会发现，他是一座你从来没有真正踏进去过的城市。你以为你早就逛完了，其实你一直在城墙外面转。推门进去，里面有另一个世界。认识新的人不如重新认识旧的人。后者才是真正的发现之旅。',
    '你在社交里觉得自己没有天赋。别人天生就会聊天，天生就讨人喜欢，而你每迈出一步都很吃力。你把乐观当作一种天生的性格，觉得自己永远也不可能拥有。法国哲学家阿兰说，悲观主义是情绪，乐观主义是意志。情绪是你控制不了的，今天阴天你就心情不好，这不是你的错。但乐观是可以选择的行为，是你今天在感到低落时依然决定去做的那件小事。你在社交里不需要等到自己变得开朗才去行动。你可以带着所有的悲观、所有的紧张、所有的不擅长，依然在今天对一个陌生人说一声谢谢，依然在明天赴一个你已经答应了却想逃的约。乐观不是一种感觉，是一个动作。你今天做了这个动作，你就是乐观的人。不需要等情绪变好才行动，行动本身会带来情绪。今天，就做一个乐观的动作。你说出的那句谢谢，就是你意志的第一次胜利。悲观还在，但你已经不是它的俘虏。',
    '你在人群里常常觉得自己是一个局外人。他们的世界有一套你搞不懂的规则，他们的笑声里有你不懂的梗，他们的热闹里有你融不进去的温度。加缪笔下的默尔索在母亲的葬礼上没有哭，然后他被整个社会审判——不是因为他杀了人，是因为他不合群。局外人不一定是错的，只是他拒绝表演。我反抗，故我存在——你的不合群不是你人生的失败，是你选择了不按照别人的剧本活。你不需要让所有人都理解你。你可以是你自己，可以是一个安静的人，可以是一个不喜欢热闹的人，可以是一个在人群里独自清醒的人。那些试图审判你的人，他们只是怕你不是他们中的一员，你的存在本身就是一种让他们不安的自由。守住这份自由，不用激烈的方式，就用你安静的、笃定的、不解释的方式。你不必和他们一样，你已经是你。这比合群更需要勇气，也更值得骄傲。',
    '你在社交里太关注别人怎么看你，以至于忘了自己怎么看自己。你在意每一个表情、每一个语气、每一次回复的速度，你把别人的反馈当成自己价值的唯一指标。米沃什在被流放多年后写道：爱意味着学会注视你自己。他说的爱不只是爱情，是你对自己的那份最基本的关注。你太久没有注视过自己了。你一直注视别人，想从他们的眼睛里找自己。但那些眼睛是碎的，你拼不出一张完整的脸。从现在起，每天花五分钟注视你自己——不是在镜子里检查外表，是安静地坐下来，问自己今天真实的感受是什么，我今天最舒服的时刻是什么，我今天最不想做的事是什么。你在学习注视自己。当你能看见自己，你就不再需要从别人的眼里找碎片来拼自己。你已经是一整块完整的镜子，在这块镜子里，你可以看见自己的全部。不需要别人确认你的存在，你已经确认了。',
    '你怕周末一个人待在家里，怕晚上下班后一个人走在路上，怕节假日的朋友圈都是聚会而你一个人。你觉得独处就是被抛弃，就是没人要。君特·格拉斯在《铁皮鼓》里写了一个拒绝长大的孩子，他用自己的方式抵抗整个世界。他选择不参与，选择不融入，选择站在窗外看屋里的热闹。独处是一种选择，而不是一种惩罚。你的独处也可以是主动选择的。你不是被世界抛弃的那个人，你是那个主动退后一步，给自己留出空间的人。今晚不要强迫自己出去社交。你可以一个人去看一场电影，一个人去吃一顿好的，一个人坐在窗边什么也不做。把手机调成静音，不刷朋友圈。这个世界没有你想象中那么需要你，你也不必每时每刻都在里面扮演一个角色。今天你是自己的全部观众。你会发现独处不是空洞的，它里面装着你很久没有听到的自己。那个人有很多话想对你说，今晚，听听他怎么说。',
    '你觉得真实的自己不能被人看见。你有一些阴暗的想法、自私的念头、不那么体面的过去。你在社交里把它们全部藏起来，觉得一旦暴露，所有人都会离你而去。毛姆一生愤世嫉俗，他笔下的人物大多带着道德上的污点，没有一个是完美的。但他让他们在污点里显得无比真实，让读者在这些不完美的人身上看见了自己。任何心都可以被了解，只要你说出真话——你不需要一下子把所有秘密都摊开，但你可以在一个你信任的人面前，试着说出一点点真实的、不那么完美的想法。你会发现，对方没有跑，没有嫌弃你，而是松了一口气，因为他也有。你一直以为你的污点是你的弱点，其实它是你和别人之间最短的距离。完美让人仰望，真诚让人靠近。你不需要变成完美的样子才配拥有朋友。用你的真诚去靠近另一个人，然后用你们的真诚互相取暖。这才是友谊里最珍贵的底色。',
    '你很久没有和朋友有过一次认真的交谈了。你们的交流变成了微信里简短的回复、朋友圈点一个赞、过节群发一条祝福。你觉得自己有好多朋友，但又没有一个真正在联系的朋友。略萨用结构复杂的叙事编织出生活的全部面貌，但他最打动人的地方在于：他在小说里留住了一个又一个具体的人。生活不是我们活过的日子，而是我们记住的日子。你的社交不是你的通讯录人数，是你记得的那些时刻——某年某月某日你们一起吹过的夜风，某年某月某日你在电话里哭了很久，某年某月某日你们在路边摊上吃串，辣得眼泪直流。重新联系一个你心里记得但很久没有联系的人。不用多想，就发一句：刚才忽然想起你，最近还好吗。这句话很短，但它的温度是任何群发祝福都替代不了的。留住那些值得记住的日子，和那些日子相关的人。你的社交生命，由这些时刻构成，不由点赞数构成。',
    '你和一个人闹翻了之后，谁也不先开口。你等着他来道歉，他等着你去示好。你们在沉默中对峙，一天一天过去，关系越来越冷。拉什迪在流亡岁月里学到了沉默的力量。他说，沉默也是回答。沉默也是回答。你不需要先说话，你只需要想清楚：你要的到底是什么，是赢了他，还是修复这段关系。如果你要的是后者，那沉默就不是你们之间的墙，是你放不下的自尊。先开口的人不一定输了，他只是把关系看得比输赢更重。今天你可以不开口，继续沉默。但你可以写一条消息存在草稿箱里。不用发，只是把它写出来。写完之后，你再看一眼：这句话是你在为自己争一口气，还是你在为这段关系留一扇门。如果是一扇门，总有一天你会按下发送键。那时候你不是输了，是你用勇气迈出了对方不敢迈的一步。沉默可以是一种回答，但它不是唯一的回答。',
    '你在社交里卑微惯了，不敢和别人提要求。你怕被拒绝，怕给别人添麻烦，怕自己显得太把自己当回事。你把自己缩得很小很小，尽量不给任何人添麻烦。帕斯捷尔纳克在日瓦戈医生里写：活着，仅仅活着，就是最伟大的冒险。你不需要缩到最小才能活。你是一个完整的、有需求的人。你有权提出你的要求，有权被拒绝，有权在被拒绝之后继续好好活着。被拒绝不是你的失败，是对方做不到。下一次试着提一个小小的要求，不求所有人答应，只求自己开口。你可以说：今天我有件事想请你帮个忙。然后你会紧张，会有各种不好的预感，但你说出口之后就会发现，天没塌，你还在。拒绝你的人不是你的敌人，接受你的人是你的朋友，而你自己，是那个学会了说出自己需求的人。活着就是冒险，冒险就要承担被拒绝的风险。你承担了，你就是一个比昨天更勇敢的人。',
    '你把自己每一分钟都填满，不让自己一个人待着。你害怕独处，因为独处的时候所有你不愿意面对的问题都会浮上来，像沉在水底的石头在水退之后暴露出来。斯珀伯说，孤独是通往自我的唯一道路。你不能绕开它。你必须一个人走过这条窄路，才能走到你真正的核心里去。那些石头是你的，你必须一块一块把它们翻过来，看清楚它们上面刻着什么。你以为你怕的是孤独，其实你怕的是那些石头。这个周末，留一个下午，不约人，不看手机，不做事。让自己在房间里一个人待着，不管浮上来什么，都别急着按下去。看着它，让它浮上来。你会发现那些被你压了很久的情绪并不是怪物，它们只是一直等着被你看见。当你看见它们，它们就不再需要用破坏你的方式吸引你的注意。独处不是惩罚，是你在给自己清淤。把那些积压的东西清理出去，你会变轻，然后重新回到人群时，你是完整的，不是碎片拼凑的。66.无名的地图（原创，融合伊塔洛·卡尔维诺的城市诗学与佩索阿的异名哲学）——“我意识到，我一直在寻找的，不是被看见，而是被认出。”——费尔南多·佩索阿聚会散场，你站在门口和每个人笑着说再见，说你今晚很开心。可关上门之后你靠在门板上，觉得自己在刚才的每一分钟都在扮演一个人——健谈的、合群的、不会让任何人尴尬的。佩索阿一生创造了七十多个异名作者，每一个都有独立的生平和风格。他说：我意识到，我一直在寻找的，不是被看见，而是被认出。被看见是在人群中亮出你的轮廓，被认出是在轮廓里发现只有你才有的纹理。你在社交里疲惫，不是因为你不擅长，是因为你一直在用别人的地图找自己的路。你把自己活成了马可·波罗口中的城市——向大汗描述那座桥时，马可·波罗说：桥不是由石头建成的，是由每一块石头的形状建成的。你在社交里展示的，只是桥面——方便别人通过的平坦部分。你真正的形状在桥拱下，在没有人趴下来看就不会注意到的弧度里，在只有你自己知道的那块承重石上。你不需要所有人趴下来看你，你只需要不再假装自己是一座只有桥面的建筑。今天，在你下一次社交之后，留十分钟给自己。在备忘录里写一句只有你能认出来的话。它不需要被任何人理解，它只需要是你自己的暗号。你不是在扮演合群的陌生人，你是在人群中护送你还没有被认出的那部分自己。桥面上人来人往，桥拱下是你全部不被通过的完整。那座桥是你建的，你知道哪一块石头上刻着你的名字。'
];

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
