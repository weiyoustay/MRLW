<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7天重塑人生 · 专属纪念海报</title>
<link rel="preload" as="image" href="图片9.webp" fetchpriority="high">
<link rel="preload" as="image" href="poster1.webp" fetchpriority="high">
<link rel="preload" as="image" href="poster2.webp" fetchpriority="high">
<link rel="preload" as="image" href="poster3.webp" fetchpriority="high">
	<link rel="preload" as="image" href="nasa.webp" fetchpriority="high">
<meta name="view-transition" content="same-origin">
    <style>
        :root {
            --bg: #0a0a14;
            --text: #e8e8f0;
            --text-sub: #a0a0b0;
            --cyan: #00f5d4;
            --blue: #0099ff;
            --gradient: linear-gradient(90deg, #00f5d4, #0099ff, #00f5d4);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            background-image: url('nasa.webp');
            background-size: cover;
            background-position: center;
            /* background-attachment: fixed; removed for mobile performance */
        }
        .page-bg {
            position: fixed; inset:0; z-index:-2;
            background: rgba(0,0,0,0.6);
        }
        .scroll {
            position:fixed; inset:0;
            overflow-y:auto; overflow-x:hidden;
            padding: 30px 24px 100px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position:relative; z-index:1;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            background: var(--gradient);
            background-size: 300% 100%;
            animation: flow 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-align: center;
        }
        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .subtitle {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
        }
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-sub);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            background: var(--gradient);
            color: #000;
            font-weight: 500;
        }
        .canvas-wrapper {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 153, 255, 0.2);
            background: #fff;
        }
        #posterCanvas {
            display: block;
            width: 100%;
        }
        .save-btn {
            margin-top: 28px;
            padding: 12px 36px;
            border-radius: 100px;
            background: var(--gradient);
            background-size: 300% 100%;
            animation: flow 6s linear infinite;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .save-btn:active {
            transform: scale(0.96);
        }
        .footer {
            margin-top: 60px;
            text-align: center;
        }
        .brand {
            font-size: 20px;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        #date {
            color: var(--text-sub);
            font-size: 13px;
        }
        .scroll::-webkit-scrollbar { width: 4px; }
        .scroll::-webkit-scrollbar-track { background: transparent; }
        .scroll::-webkit-scrollbar-thumb { background: #0099ff55; border-radius: 10px; }
        .scroll::-webkit-scrollbar-thumb:hover { background: #0099ff88; }
        /* === Enhanced Interactions === */
        .scroll { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .tab { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); color: #fff; transform: translateY(-2px); }
        .tab:active { transform: scale(0.95); }
        .tab:focus-visible { outline: 2px solid #00f5d4; outline-offset: 2px; }
        .save-btn { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
        .save-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,153,255,0.4); filter: brightness(1.1); }
        .save-btn:focus-visible { outline: 2px solid #00f5d4; outline-offset: 2px; }
        .canvas-wrapper { transition: box-shadow 0.3s ease; }
        .canvas-wrapper:hover { box-shadow: 0 12px 40px rgba(0,153,255,0.3); }
        .title { will-change: transform; }
        .brand { will-change: transform; }
.back-btn {
    position: fixed;
    top: 24px; left:20px;
    width:44px; height:44px;
    border-radius:50%;
    background: rgba(20,20,35,0.7);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
    display:grid; place-items:center;
    cursor:pointer;
    z-index:999;
    transition: all 0.3s;
}
.back-btn:hover { border-color: #00f5d4; color: #00f5d4; }
.back-btn:active { transform: scale(0.95); }
body { animation: pageIn 0.1s ease; will-change: transform, opacity; }
body.no-page-anim { animation: none !important; }
@keyframes pageIn { from { opacity: 0.7; transform: translate3d(15px,0,0); } }
    </style>
</head>
<body style="background-color:#0a0a14;">
<button class="back-btn" onclick="location.href='hall.html'" aria-label="返回成长大厅">←</button>
    <div class="page-bg"></div>
    <div class="scroll">
        <div class="container">
            <div class="title">7天重塑人生 · 专属纪念海报</div>
            <div class="subtitle">
                七天蜕变，打破旧我<br>
               重塑新生，遇见更好的自己
            </div>
            <div class="tab-bar">
                <div class="tab active" data-id="1">Poster One</div>
                <div class="tab" data-id="2">Poster Two</div>
                <div class="tab" data-id="3">Poster Three</div>
                <div class="tab" data-id="4">Poster Four</div>
            </div>
            <div class="canvas-wrapper">
                <div id="tabLoading" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:14px;letter-spacing:2px;z-index:10;">加载中...</div>
                <canvas id="posterCanvas"></canvas>
            </div>
            <button class="save-btn" id="saveBtn" aria-label="保存海报图片">保存海报，传递美好</button>
            <div class="footer">
                <div class="brand">You 捻光</div>
                <div id="date"></div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('posterCanvas');
        const mainCtx = canvas.getContext('2d');
        let ctx = mainCtx;
        const tabs = document.querySelectorAll('.tab');
        const saveBtn = document.getElementById('saveBtn');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = 1440 * dpr;
        const height = 2160 * dpr;
        canvas.width = width;
        canvas.height = height;
        mainCtx.imageSmoothingEnabled = true;
        mainCtx.imageSmoothingQuality = 'high';

        const posterCache = {};
        let currentPoster = 1;

        function showCached(id) {
            if (posterCache[id]) {
                mainCtx.clearRect(0, 0, width, height);
                mainCtx.drawImage(posterCache[id], 0, 0);
                document.getElementById('tabLoading').style.display = 'none';
            }
        }

        function startOffscreen() {
            const off = document.createElement('canvas');
            off.width = width; off.height = height;
            const octx = off.getContext('2d');
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = 'high';
            octx.translate(0.5, 0.5);
            ctx = octx;
            return off;
        }

        function finishOffscreen(off, id) {
            posterCache[id] = off;
            ctx = mainCtx;
            if (id === currentPoster) showCached(id);
        }
        function getUserName() {
            try { return localStorage.getItem('playerName') || '重塑者'; } 
            catch (e) { return '重塑者'; }
        }
        function showDate() {
            const date = new Date();
            const opt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = date.toLocaleDateString('en-US', opt);
        }
        let userName = getUserName();

        // 预加载所有海报图片到内存
        const posterImages = {
            1: 'poster1.webp',
            2: 'poster2.webp',
            3: 'poster3.webp',
            4: 'poster4.webp'
        };
        const preloaded = {};
        let loadedCount = 0;
        Object.entries(posterImages).forEach(([id, src]) => {
            const img = new Image();
            img.onload = () => {
                loadedCount++;
                preloaded[id] = img;
                if (loadedCount === 1) drawPoster(1);
            };
            img.onerror = () => { loadedCount++; };
            img.src = src;
        });

        function drawPoster(id) {
            if (posterCache[id]) { showCached(id); return; }
            const off = startOffscreen();
            const img = preloaded[id] || new Image();
            
            if (id === 1) {
                // ===== 海报1：蜕变 =====
                img.src = 'poster1.webp';
                img.onload = function () {
                    const W = width, H = height;
                    const pad = 85 * dpr;

                    // 全幅背景图 cover
                    const imgRatio = img.naturalWidth / img.naturalHeight;
                    const canvasRatio = W / H;
                    let sw, sh, sx, sy;
                    if (imgRatio > canvasRatio) {
                        sh = img.naturalHeight; sw = sh * canvasRatio;
                        sx = (img.naturalWidth - sw) / 2; sy = 0;
                    } else {
                        sw = img.naturalWidth; sh = sw / canvasRatio;
                        sx = 0; sy = (img.naturalHeight - sh) / 2;
                    }
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);

                    // 暗色渐变叠层
                    var overlay = ctx.createLinearGradient(0, 0, 0, H);
                    overlay.addColorStop(0, 'rgba(0,0,0,0.12)');
                    overlay.addColorStop(0.25, 'rgba(0,0,0,0.22)');
                    overlay.addColorStop(0.55, 'rgba(0,0,0,0.42)');
                    overlay.addColorStop(0.8, 'rgba(0,0,0,0.56)');
                    overlay.addColorStop(1, 'rgba(0,0,0,0.68)');
                    ctx.fillStyle = overlay;
                    ctx.fillRect(0, 0, W, H);

                    // ===== 顶部品牌栏 =====
                    ctx.textAlign = 'left';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold ' + (24 * dpr) + 'px "Georgia", serif';
                    ctx.fillText('◆  YOU You 捻光', pad, 90 * dpr);
                    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
                    ctx.lineWidth = 0.7 * dpr;
                    ctx.beginPath(); ctx.moveTo(pad, 103 * dpr); ctx.lineTo(pad + 170 * dpr, 103 * dpr); ctx.stroke();

                    ctx.textAlign = 'right';
                    ctx.fillStyle = '#fff';
                    ctx.font = (17 * dpr) + 'px "Georgia", serif';
                    ctx.fillText('NO.01  /  7 DAYS REBIRTH', W - pad, 90 * dpr);

                    // ===== 主视觉 "蜕" — 高级质感 =====
                    ctx.textAlign = 'center';
                    var cx = W/2, cy = 480*dpr, fSize = 260*dpr;

                    // 第一层：深色投影（深度感）
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.30)';
                    ctx.shadowBlur = 25*dpr;
                    ctx.shadowOffsetX = 3*dpr;
                    ctx.shadowOffsetY = 5*dpr;
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.font = 'bold ' + fSize + 'px "PingFang SC", "Microsoft YaHei", "SimSun", serif';
                    ctx.fillText('蜕', cx, cy);
                    ctx.restore();

                    // 第二层：外发光
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,245,212,0.45)';
                    ctx.shadowBlur = 55*dpr;
                    ctx.fillStyle = 'rgba(0,0,0,0)';
                    ctx.font = 'bold ' + fSize + 'px "PingFang SC", "Microsoft YaHei", "SimSun", serif';
                    ctx.fillText('蜕', cx, cy);
                    ctx.restore();

                    // 第三层：青白渐变主体
                    ctx.save();
                    var cGrad = ctx.createLinearGradient(cx-200*dpr, cy-fSize, cx+200*dpr, cy);
                    cGrad.addColorStop(0, '#009980');
                    cGrad.addColorStop(0.2, '#00e0c0');
                    cGrad.addColorStop(0.4, '#a0fff0');
                    cGrad.addColorStop(0.5, '#ffffff');
                    cGrad.addColorStop(0.6, '#a0fff0');
                    cGrad.addColorStop(0.8, '#00e0c0');
                    cGrad.addColorStop(1, '#009980');
                    ctx.fillStyle = cGrad;
                    ctx.font = 'bold ' + fSize + 'px "PingFang SC", "Microsoft YaHei", "SimSun", serif';
                    ctx.fillText('蜕', cx, cy);
                    ctx.restore();

                    // 第四层：顶部高光线
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    var hlGrad = ctx.createLinearGradient(0, cy-fSize*0.7, 0, cy);
                    hlGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
                    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = hlGrad;
                    ctx.font = 'bold ' + fSize + 'px "PingFang SC", "Microsoft YaHei", "SimSun", serif';
                    ctx.fillText('蜕', cx, cy);
                    ctx.restore();

                    // 副标题
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold ' + (44 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('放下执念 · 与自己和解释怀', W / 2, 560 * dpr);

                    // 英文副标
                    ctx.fillStyle = 'rgba(255,255,255,0.48)';
                    ctx.font = 'italic ' + (27 * dpr) + 'px "Georgia", serif';
                    ctx.fillText('A journey of letting go and becoming', W / 2, 605 * dpr);

                    // 关键词
                    ctx.fillStyle = 'rgba(255,255,255,0.36)';
                    ctx.font = (24 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('觉察  |  接纳  |  行动  |  坚持  |  突破  |  成长  |  蜕变', W / 2, 650 * dpr);

                    // ===== 7天数据 =====
                    var dataY = 710 * dpr;
                    ctx.strokeStyle = 'rgba(0,245,212,0.25)';
                    ctx.lineWidth = 0.8 * dpr;
                    ctx.beginPath(); ctx.moveTo(W * 0.20, dataY); ctx.lineTo(W * 0.35, dataY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(W * 0.65, dataY); ctx.lineTo(W * 0.80, dataY); ctx.stroke();
                    ctx.fillStyle = '#ffd54f';
                    ctx.font = 'bold ' + (76 * dpr) + 'px "Georgia", "PingFang SC", serif';
                    ctx.fillText('7', W / 2 - 50 * dpr, dataY);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold ' + (38 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('天', W / 2 + 12 * dpr, dataY);
                    ctx.fillStyle = 'rgba(255,255,255,0.55)';
                    ctx.font = (28 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('心智蜕变之旅', W / 2 + 72 * dpr, dataY);
                    ctx.textAlign = 'right';
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = 'bold ' + (22 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('重塑人生', W - pad, dataY);

                    // ===== 图片小窗 =====
                    ctx.textAlign = 'center';
                    var iw = 520 * dpr, ih = 330 * dpr;
                    var ix = (W - iw) / 2, iy = 780 * dpr;
                    // 外底
                    ctx.fillStyle = 'rgba(0,210,180,0.05)';
                    ctx.fillRect(ix - 16 * dpr, iy - 16 * dpr, iw + 32 * dpr, ih + 32 * dpr);
                    // 外框
                    ctx.strokeStyle = 'rgba(0,245,212,0.28)';
                    ctx.lineWidth = 1.2 * dpr;
                    ctx.strokeRect(ix - 12 * dpr, iy - 12 * dpr, iw + 24 * dpr, ih + 24 * dpr);
                    // 图片
                    ctx.drawImage(img, ix, iy, iw, ih);
                    // 内框
                    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                    ctx.lineWidth = 0.8 * dpr;
                    ctx.strokeRect(ix, iy, iw, ih);
                    // 青绿装饰线
                    ctx.strokeStyle = 'rgba(0,245,212,0.5)';
                    ctx.lineWidth = 2.5 * dpr;
                    ctx.beginPath(); ctx.moveTo(ix, iy - 6 * dpr); ctx.lineTo(ix + 140 * dpr, iy - 6 * dpr); ctx.stroke();
                    // 四角L形
                    var Lsz = 20 * dpr;
                    ctx.strokeStyle = 'rgba(0,245,212,0.35)';
                    ctx.lineWidth = 1.6 * dpr;
                    [[ix,iy,1,1],[ix+iw,iy,-1,1],[ix,iy+ih,1,-1],[ix+iw,iy+ih,-1,-1]].forEach(function(a){
                        ctx.beginPath();
                        ctx.moveTo(a[0], a[1] - a[3]*Lsz); ctx.lineTo(a[0], a[1]); ctx.lineTo(a[0] + a[2]*Lsz, a[1]);
                        ctx.stroke();
                    });

                    // ===== 金句区 =====
                    var qY = iy + ih + 60 * dpr;
                    // 圆点
                    ctx.fillStyle = 'rgba(0,245,212,0.45)';
                    [W/2-20*dpr, W/2, W/2+20*dpr].forEach(function(dx){ctx.beginPath();ctx.arc(dx, qY-15*dpr, 2.5*dpr, 0, Math.PI*2);ctx.fill();});

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold italic ' + (44 * dpr) + 'px "Georgia", "PingFang SC", serif';
                    ctx.fillText('" 放下过去，才能拥抱更好的未来 "', W / 2, qY + 15 * dpr);

                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = (34 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('7天仅仅是开始，余生皆是蜕变', W / 2, qY + 75 * dpr);

                    // ===== 七日历程 =====
                    var stepY = qY + 150 * dpr;
                    var steps = ['觉察','接纳','行动','坚持','突破','成长','蜕变'];
                    var stepGap = 115 * dpr;
                    var stepTotalW = steps.length * stepGap;
                    var stepStartX = (W - stepTotalW) / 2 + stepGap / 2;
                    steps.forEach(function(s, i){
                        var sx = stepStartX + i * stepGap;
                        // 连线
                        if (i < steps.length - 1) {
                            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                            ctx.lineWidth = 1 * dpr;
                            ctx.beginPath();
                            ctx.moveTo(sx + 22*dpr, stepY);
                            ctx.lineTo(sx + stepGap - 22*dpr, stepY);
                            ctx.stroke();
                        }
                        // 圆
                        var isLast = (i === steps.length - 1);
                        ctx.fillStyle = isLast ? '#00f5d4' : 'rgba(255,255,255,0.14)';
                        ctx.beginPath(); ctx.arc(sx, stepY, 18*dpr, 0, Math.PI*2); ctx.fill();
                        if (isLast) {
                            ctx.strokeStyle = 'rgba(0,245,212,0.5)';
                            ctx.lineWidth = 2 * dpr;
                            ctx.beginPath(); ctx.arc(sx, stepY, 18*dpr, 0, Math.PI*2); ctx.stroke();
                        }
                        // 序号
                        ctx.fillStyle = isLast ? '#000' : 'rgba(255,255,255,0.6)';
                        ctx.font = 'bold ' + (16*dpr) + 'px "Georgia",sans-serif';
                        ctx.fillText(i+1, sx, stepY + 6*dpr);
                        // 标签
                        ctx.fillStyle = isLast ? '#00f5d4' : 'rgba(255,255,255,0.45)';
                        ctx.font = (21*dpr) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
                        ctx.fillText(s, sx, stepY + 48*dpr);
                    });

                    // ===== 用户名 =====
                    var nY = stepY + 140 * dpr;
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,200,60,0.45)';
                    ctx.shadowBlur = 26 * dpr;
                    var nGrad = ctx.createLinearGradient(W * 0.25, 0, W * 0.75, 0);
                    nGrad.addColorStop(0, '#FFD700');
                    nGrad.addColorStop(0.4, '#FFF5C0');
                    nGrad.addColorStop(0.6, '#FFA500');
                    nGrad.addColorStop(1, '#FFD700');
                    ctx.fillStyle = nGrad;
                    ctx.font = 'bold ' + (76 * dpr) + 'px "Georgia", "PingFang SC", "Microsoft YaHei", serif';
                    ctx.fillText(userName, W / 2, nY);
                    ctx.restore();

                    ctx.fillStyle = 'rgba(255,255,255,0.58)';
                    ctx.font = (29 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('已完成7天心智蜕变之旅', W / 2, nY + 55 * dpr);

                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = (23 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('7天重塑人生  ·  蜕变新生', W / 2, nY + 88 * dpr);

                    // ===== 底部英文 =====
                    var botY = nY + 180 * dpr;
                    ctx.fillStyle = 'rgba(255,255,255,0.40)';
                    ctx.font = 'italic ' + (30 * dpr) + 'px "Georgia", serif';
                    ctx.fillText('" The wound is where the light enters you. "', W / 2, botY);
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.font = (24 * dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('伤口是光进入你内心的地方', W / 2, botY + 42 * dpr);

                    // ===== 品牌 =====
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.lineWidth = 0.6 * dpr;
                    ctx.beginPath(); ctx.moveTo(pad, H - 60 * dpr); ctx.lineTo(W - pad, H - 60 * dpr); ctx.stroke();

                    ctx.fillStyle = 'rgba(255,255,255,0.40)';
