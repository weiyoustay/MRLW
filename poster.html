        const canvas = document.getElementById('posterCanvas');
        const mainCtx = canvas.getContext('2d');
        let ctx = mainCtx;
        const tabs = document.querySelectorAll('.tab');
        const saveBtn = document.getElementById('saveBtn');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = 1440 * dpr;
        const height = 2160 * dpr;
        canvas.width = width;
        canvas.height = height;
        mainCtx.imageSmoothingEnabled = true;
        mainCtx.imageSmoothingQuality = 'high';

        const posterCache = {};
        let currentPoster = 1;

        var UNLOCK_MINUTES = {2:666,3:777,4:888,5:999,6:1111,7:1222,8:1333};
        function getDaysDone(){ try{var s=localStorage.getItem('startDate');if(!s)return 0;var start=new Date(parseInt(s));var now=new Date();now.setHours(0,0,0,0);return Math.min(Math.floor((now-start)/86400000)+1,7)}catch(e){return 0} }
        function getTotalMin(){ try{return Math.floor(parseFloat(localStorage.getItem('totalActiveMinutes')||'0'))}catch(e){return 0} }
        function isUnlocked(id){ if(id===1)return getDaysDone()>=7; return getDaysDone()>=7 && getTotalMin()>=UNLOCK_MINUTES[id]; }
        function getHint(id){ if(id===1)return '完成7天成长解锁'; var m=UNLOCK_MINUTES[id],cur=getTotalMin(); if(getDaysDone()<7)return '需完成7天+累计'+m+'分钟'; if(cur<m)return '还需'+(m-cur)+'分钟(当前'+cur+'/'+m+')'; return ''; }
        function updateTabs(){ document.querySelectorAll('.tab').forEach(function(t){ var id=parseInt(t.dataset.id); if(isUnlocked(id)){ t.classList.remove('locked'); } else { t.classList.add('locked'); } }); }
        updateTabs(); updateUnlockStatus();
        function updateUnlockStatus(){ var el=document.getElementById('unlockStatus'); if(!el)return; var tds=getDaysDone(); var tm=getTotalMin(); var txt=''; if(tds<7){ txt='需完成7天成长（当前'+tds+'/7）解锁基础海报，累计活跃达666分钟解锁第二张，当前累计活跃'+tm+'分钟'; } else { txt='7天成长已完成 ✓ · 累计活跃时长 '+tm+' 分钟'; var next=0; for(var k in UNLOCK_MINUTES){ if(tm<UNLOCK_MINUTES[k]){ next=UNLOCK_MINUTES[k]; break; } } if(next)txt+=' · 解锁下一张海报需累计活跃 '+next+' 分钟（还差'+(next-tm)+'分钟）'; else txt+=' · 🎉 全部8张海报已解锁'; } el.textContent=txt; }
        updateUnlockStatus();


        function showCached(id) {
            if (posterCache[id]) {
                mainCtx.clearRect(0, 0, width, height);
                mainCtx.drawImage(posterCache[id], 0, 0);
                document.getElementById('tabLoading').style.display = 'none';
            }
        }

        function startOffscreen() {
            const off = document.createElement('canvas');
            off.width = width; off.height = height;
            const octx = off.getContext('2d');
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = 'high';
            octx.translate(0.5, 0.5);
            ctx = octx;
            return off;
        }

            posterCache[id] = off;
            ctx = mainCtx;
            if (id === currentPoster) showCached(id);

                        ctx.stroke();
                    }
                    ctx.restore();

                    // ===== 10. 副标题 =====
                    var subY3 = cy + 260*dpr;
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold ' + (42*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('恒久闪耀 · 自成宇宙', cx, subY3);

                    ctx.fillStyle = 'rgba(255,255,255,0.45)';
                    ctx.font = 'italic ' + (25*dpr) + 'px "Georgia", serif';
                    ctx.fillText('Eternal radiance, infinite becoming', cx, subY3 + 40*dpr);

                    // ===== 11. 7天数据 =====
                    var dataY3 = subY3 + 120*dpr;
                    ctx.strokeStyle = 'rgba(0,245,212,0.20)';
                    ctx.lineWidth = 0.7*dpr;
                    ctx.beginPath(); ctx.moveTo(W*0.22, dataY3); ctx.lineTo(W*0.38, dataY3); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(W*0.62, dataY3); ctx.lineTo(W*0.78, dataY3); ctx.stroke();
                    ctx.fillStyle = '#ffd54f';
                    ctx.font = 'bold ' + (68*dpr) + 'px "Georgia", "PingFang SC", serif';
                    ctx.fillText('7', cx - 42*dpr, dataY3);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold ' + (32*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('天', cx + 18*dpr, dataY3);
                    ctx.fillStyle = 'rgba(255,255,255,0.50)';
                    ctx.font = (23*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('心智蜕变之旅', cx, dataY3 + 42 * dpr);

                    // ===== 12. 关键词 =====
                    var kwY2 = dataY3 + 82*dpr;
                    ctx.fillStyle = 'rgba(255,255,255,0.32)';
                    ctx.font = (21*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('像恒星一样燃烧  ·  像宇宙一样辽阔  ·  像时间一样永恒', cx, kwY2);

                    // ===== 13. 金句 =====
                    var qY4 = kwY2 + 65*dpr;
                    ctx.fillStyle = 'rgba(0,245,212,0.32)';
                    [cx-16*dpr, cx, cx+16*dpr].forEach(function(dx){ctx.beginPath();ctx.arc(dx, qY4-8*dpr, 2*dpr, 0, Math.PI*2);ctx.fill();});

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold italic ' + (36*dpr) + 'px "Georgia", "PingFang SC", serif';
                    ctx.fillText('" 你的存在，就是永恒的意义 "', cx, qY4 + 22*dpr);

                    ctx.fillStyle = 'rgba(255,255,255,0.58)';
                    ctx.font = (27*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('7天仅仅是开始，蜕变的光辉将永恒闪耀', cx, qY4 + 65*dpr);

                    // ===== 14. 用户名 =====
                    var nY4 = qY4 + 130*dpr;
                    ctx.save();
                    ctx.shadowColor = 'rgba(180,200,255,0.40)';
                    ctx.shadowBlur = 22*dpr;
                    var nGrad4 = ctx.createLinearGradient(W*0.25, 0, W*0.75, 0);
                    nGrad4.addColorStop(0, '#c0d0ff');
                    nGrad4.addColorStop(0.3, '#ffffff');
                    nGrad4.addColorStop(0.5, '#e0e8ff');
                    nGrad4.addColorStop(0.7, '#ffffff');
                    nGrad4.addColorStop(1, '#c0d0ff');
                    ctx.fillStyle = nGrad4;
                    ctx.font = 'bold ' + (64*dpr) + 'px "Georgia", "PingFang SC", "Microsoft YaHei", serif';
                    ctx.fillText(userName, cx, nY4);
                    ctx.restore();

                    ctx.fillStyle = 'rgba(255,255,255,0.50)';
                    ctx.font = (25*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('已完成7天心智蜕变之旅', cx, nY4 + 46*dpr);
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.font = (20*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('7天重塑人生  ·  永恒新生', cx, nY4 + 78*dpr);

                    // ===== 15. 底部 =====
                    var botY4 = nY4 + 145*dpr;
                    ctx.fillStyle = 'rgba(255,255,255,0.36)';
                    ctx.font = 'italic ' + (27*dpr) + 'px "Georgia", serif';
                    ctx.fillText('" We are made of star-stuff, ', cx, botY4);
                    ctx.fillText('  and to the stars we return. "', cx, botY4 + 38*dpr);
                    ctx.fillStyle = 'rgba(255,255,255,0.20)';
                    ctx.font = (21*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.fillText('我们由星辰所铸，终将归于星辰', cx, botY4 + 70*dpr);

                    if (userMotto) {
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#00f5d4';
                        ctx.font = 'bold ' + (26*dpr) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
                        ctx.fillText('「' + userMotto + '」', W/2, H - 280*dpr);
                    }
                    // 省/市
                    if (userLoc) {
                        ctx.textAlign = 'right';
                        ctx.fillStyle = 'rgba(255,255,255,0.72)';
                        ctx.font = (34*dpr) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
                        ctx.fillText('◆ ' + userLoc, W - pad, H - 78*dpr);
                    }

                    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                    ctx.lineWidth = 0.6*dpr;
                    ctx.beginPath(); ctx.moveTo(pad, H - 60*dpr); ctx.lineTo(W - pad, H - 60*dpr); ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,0.75)';
                    ctx.font = (25*dpr) + 'px "Georgia", serif';
                    ctx.fillText('© You 捻光', cx, H - 28*dpr);
                    ctx.fillStyle = 'rgba(0,245,212,0.22)';
                    ctx.beginPath(); ctx.arc(cx, H - 12*dpr, 2*dpr, 0, Math.PI*2); ctx.fill();

                    finishOffscreen(off, 8);
                };
            }
            img.onerror = function(){
                ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);
                ctx.fillStyle='#000';ctx.font=`60px sans-serif`;
                ctx.textAlign='center';ctx.fillText('图片加载失败',width/2,height/2);
            };
            // 预加载已完成则立即绘制
            if (img.complete && img.naturalWidth > 0 && img.onload) img.onload();
        }
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                var tid=Number(tab.dataset.id);
                if(!isUnlocked(tid)){ updateTabs(); return; }
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPoster = tid;
                if (posterCache[currentPoster]) {
                    showCached(currentPoster);
                } else {
                    document.getElementById('tabLoading').style.display = 'block';
                    drawPoster(currentPoster);
                }
            });
        });
        saveBtn.onclick = () => {
            if (!posterCache[currentPoster]) return;
            const tmp = document.createElement('canvas');
            tmp.width = width; tmp.height = height;
            tmp.getContext('2d').drawImage(posterCache[currentPoster], 0, 0);
            const link = document.createElement('a');
            link.download = `7天重塑人生-${userName}.png`;
            link.href = tmp.toDataURL('image/png', 1.0);
            link.click();
        };
        showDate();
    </script>
<script>
(function(){
var n=performance.getEntriesByType('navigation')[0];
if(n&&n.type==='back_forward') document.body.classList.add('no-page-anim');
var bb=document.querySelector('.back-btn');if(bb){var m=bb.getAttribute('onclick');if(m){var u=m.match(/location\.href='([^']+)'/);if(u){bb.removeAttribute('onclick');bb.addEventListener('click',function(e){e.preventDefault();location.href=u[1]});}}}
})();
</script>
