/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你刷着手机，看着那些光鲜亮丽的生活，觉得自己和她们之间隔着一道透明但坚硬的墙。她们在墙的另一边闪闪发光，你在这一边灰头土脸。埃莱娜·费兰特在那不勒斯四部曲里写两个女孩长达一生的友谊与竞争。她们互相嫉妒，互相伤害，又互相成为对方最重要的参照系。她写一个概念叫“界限消失”——在某个极端的瞬间，人和人之间的界限消失了，你发现那个你嫉妒的人，她的生活也是一片破碎。界限消失之后，你才能看见真正的自己。那些在朋友圈里闪闪发光的人，她们的生活不是没有裂缝，是你和她们之间的界限还不够透明。你不需要打破那道墙，你只需要知道，那堵墙是你自己砌的。今天，试着在心里对那个你一直嫉妒的人说一句：我祝你好。这不是让你认输，是让那道墙开始松动。你的生活不需要比任何人好，它只需要是你自己的。',
    '你在聚会里插不上话。别人聊得热火朝天，你在旁边微笑点头，觉得自己像一个静音的音响。你羡慕那些一开口就能吸引所有人的人，你觉得自己的安静是社交的残障。科尔姆·托宾写人最擅长的，就是那些没有说出口的话。他的小说里充满了沉默、克制和藏在平静表面下的暗流。最深沉的爱，常常是最安静的。最有力的表达，常常是那个在嘈杂里选择沉默的人。你的安静不是缺陷。在别人都抢着说话的时候，你是那个听完的人；在别人都忙着表现的时候，你是那个记下所有细节的人。这些是你安静里积蓄的财富。不要逼自己变得外向。你只需要在关键的时候说出那一句你一直在心里打磨的话。那一句，比之前所有的喧哗都更有力量。今天，不必逼自己在群里说话。把你真正想说的话，留给那个会安静听的人。',
    '你觉得自己被一种死板的节奏控制住了。别人在朋友圈里晒出的生活都那么有序——升职、结婚、旅行，一切都按部就班。你的人生却像一个被摔乱的魔方，每一面都转不到一起。凯鲁亚克用一卷打字纸一口气写完《在路上》，他不要结构，不要章法，他只要那种原始的、不可遏制的冲动。永远年轻，永远热泪盈眶。他不是在歌颂无序，他是在告诉你，你可以用你自己的节奏活，不需要把谁的生活当成标准答案。你的人生不是被摔乱的魔方，你是一幅还在画布上的画。别人已经装裱好了挂在墙上，你还在涂底色，这很正常。画得慢的画，通常更耐看。今天，在你的混沌里找一个节奏——也许是在混乱的工作中抽半小时只做一件事，也许是在周末晚上给自己独处的一段时间。你不必活成朋友圈里那种整洁的模样，你可以是草稿，可以是涂鸦，只要是你的。',
    '你觉得自己在同辈里是最孤独的那一个。别人有说有笑，有打有闹，你在旁边看着，觉得自己是唯一一个被排除在外的。卡森·麦卡勒斯写《心是孤独的猎手》，一群孤独的人在同一座城市里互相寻找，却永远无法真正触碰到彼此。孤独是绝对的，但联结是可以尝试的。你并不比别人更孤独，你只是比别人更早地感觉到了这份孤独。那些在人群里笑着的人，他们也有他们的孤独，只是他们暂时用热闹盖住了它。今天，试着给一个你觉得也可能孤独的人发一条消息。不用说“你怎么了”，就聊聊最近看的剧，聊聊天气，聊聊猫。你们不是在治疗孤独，你们是在尝试联结。两个孤独的人，哪怕只是触碰到一点点，也比一个人独自面对要好。孤独不会消失，但它可以被分担。你伸出手的那一刻，你就不是孤岛。',
    '你特别讨厌自己身上那些不够好的部分——嫉妒，小心眼，玻璃心。你在和别人比较时，看到的全是自己阴影的那一面。卡尔·荣格说，人不能只接受自己光明的部分，也要接受阴影。他把阴影叫做“黄金的影子”——因为你最不能接受自己的地方，往往藏着你最大的能量。我们不是由光明组成的，我们是由光明和阴影共同组成的。你的嫉妒不是恶，是你渴望变得更好的信号。你的小心眼不是缺陷，是你还没有安全到可以大方的程度。你的玻璃心不是软弱，是你比别人更敏感的雷达。今天，试着接受你阴影里的一部分——不用多，就那一件你一直嫌弃自己的特质。把它写在纸上，然后在旁边写：这可能是我的阴影，但它也是我的一部分。当你接受它，它就不再控制你。你不是由完美组成的，你是由真实组成的。真实的人，才有真正的力量。',
    '你在和同龄人的比较里觉得自己是废墟——别人建起了高楼，你还是一片散乱的砖瓦。你觉得自己什么都差一点，什么都来不及。奥登在二战前夕写下“我们必须相爱，否则就会死去”。后来他自己把这句话划掉了，说诗不能阻止任何事发生。但他继续写诗，在战后的一片废墟上继续写。你不是散乱的砖瓦，你是一块还在窑里烧的砖。别人已经盖好的是高楼，你还在承受高温，还未出窑。但那窑里的温度，会让你比那些已经出窑的砖更坚硬。今天，在你觉得比不上任何人的时候，对自己说：我还在窑里，我还没有成型，但我在烧。废墟不是你的终点，是你还没有完工的建筑现场。那些散乱的砖瓦，每一块都还有用。相爱吧，不是和某个人，是和你自己正在经历的这个阶段。当你不再嫌弃这片工地，你会发现它其实一直在施工。',
    '你在和人比较时总是觉得自己嘴笨，不会表达，不会在恰当的时机说出漂亮的话。你羡慕那些在任何场合都能侃侃而谈的人。彼得·汉德克写《骂观众》，他的语言像一把手术刀，切开了所有虚伪的表达。当语言失效的时候，沉默就是你的母语。你不是不会表达，你是还在寻找属于你自己的语言。那些侃侃而谈的人，他们用的是现成的、被社会认可的表达模版。你不是不会用那些模版，你是对语言更有洁癖。在你没有找到合适的词之前，保持沉默不是失败，是你在保护表达的真实。今天，不必强迫自己去学那些社交话术。你在沉默里酝酿的那个更真实的声音，比任何漂亮话都更值得被听见。等待它的成熟。当它终于发出声，会比其他人的叽叽喳喳都更掷地有声。',
    '你害怕一个人出现在公共场合。一个人吃饭，一个人逛街，一个人周末待在房间里。你总觉得别人在用异样的眼光看那个“独自一人”的你。梅·萨顿一个人住在新罕布什尔的海边，写日记，种花，对自己说话。她说独处不是孤独，是和自己漫长的约会。独处是一种丰收，你在那些没有人打扰的时间里，收获了对自己的了解。你不是没人要才一个人，是你还没有找到值得你放弃独处的人。在那之前，一个人的餐桌是你给自己的犒赏，一个人的周末是你给自己放的假。今天，主动为自己安排一次独处——去吃那个你一直想吃的餐厅，一个人，不戴耳机，认真品尝。你不是被留下的那个人，你是主动选择陪伴自己的人。这样的人，会吸引来真正值得的关系。在那之前，享受丰收。你一个人的时间里，种着以后和别人分享的全部果实。',
    '你在职场里被边缘化，在同辈的比较里也觉得自己是站得最远的那个人。别人的生活是正文，你觉得自己是页脚的注解。若泽·萨拉马戈一生都是边缘人，他的书在葡萄牙被禁，他流亡海外，直到晚年才获得诺贝尔奖。他在《失明症漫记》里写：如果我们不能像人一样生活，至少我们可以像人一样死去。这句话反过来也可以说：至少我们可以像人一样，在最边缘的地方活着。你不是页脚的注解，你是正文旁边那行被写在空白处的、独一无二的批注。页脚没有那么多观众，但也因此更自由。今天，在你的边缘位置上，做一件只有边缘人才有自由做的事——不必迎合主流的节奏，不必讨好中心的人。你在边缘处，你可以比他们看得更清楚。边缘不是被抛弃，是你可以开始画自己地图的地方。',
    '你逛商场时看见一群同龄人，他们穿着你买不起的品牌，提着大包小包从你身边走过，笑声像铃铛一样清脆。你握紧了手里那杯最便宜的奶茶，觉得自己活在另一个世界。奥尔罕·帕慕克在《雪》里写一个人回到土耳其东部的小城，发现所有人都活在彼此的注视和比较里。他用一种诗意的笔调写：我是另一个你。那些穿着名牌的人，也是另一个你——你们只是站在同一条河的不同岸边。他们手里的购物袋不会让他们比你更完整，你手里的奶茶也不会让你比他们更匮乏。今天，当你再次在人群里感到匮乏时，在心里对那个陌生的同龄人说一句：我是另一个你。你不是在认输，你是在拆除那堵看不见的墙。你们都在同一条河里，只是站在不同的岸边。河是一样的河，人是一样的人。',
    '你看着别人都选择了安稳：考公、进国企、回老家。你也想过那样的生活，但心里总有另一个声音让你再试试。你觉得自己在漂，而别人都已经靠岸。米兰·昆德拉写，不能承受的不是重，是轻。那些选择了安稳的人，他们背负的是责任的重；你选择漂，承受的是自由的轻。两条路各有各的难。你不用羡慕他们的重，也不用轻视自己的轻。轻不是飘忽不定，是你还没有找到愿意让你落地生根的那片土壤。在那之前，你的漂不是失败，是你在试飞。今天，在日记本上写一句：我承受自由的重量。这是你选择的生活，它不必和别人一样稳，它是你自己的。昆德拉说，轻是另一种重。你能承受它，已经比那些从未离开过地面的人多了一副只有天空才看得见的翅膀。',
    '你看到同龄人在舞台中央，你觉得他们是被命运选中的主角，而你只是台下举着荧光棒的观众。你觉得自己还没有上场就被淘汰了。歌德年轻时也曾焦躁不安，他写《少年维特之烦恼》一炮而红，但他后来用六十年写《浮士德》——一部需要一生才能完成的作品。你若要喜爱你自己的价值，你就得给世界创造价值。你不要急着上台，舞台下的时间不是被淘汰，是你在积蓄。种子在地下的时间，比开花的时间长得多，但你不会说种子没有价值。它在地下创造根系，那是它给世界的第一份礼物。你现在的观众席不是你的归宿，是你的修炼场。认真鼓掌，认真观看，认真向台上的人学习。当你有一天上台时，你会比那些从未在台下坐过的人更懂得怎么在灯光下站得稳。种子的时间是沉默的，但它决定了花的高度。',
    '你觉得自己的人生是一片荒原。别人的人生是花园，你的只有沙和风。你找不到自己的井。圣-埃克苏佩里曾是飞行员，他在撒哈拉沙漠迫降，在干渴和死亡边缘被一个朋友救起。他写《小王子》，让小王子在沙漠里对飞行员说：沙漠之所以美丽，是因为它在某处藏了一口井。你现在站在荒原上，看不到井。但那口井就在你脚下的某个地方，只是被沙暂时盖住了。别人花园里的花是看得见的美丽，你的井是看不见的深度。今天，在你的荒原里走一步——不是你平时走的那条路，是另一条你从来没试过的路。也许是一本你从没想过会读的书，也许是一个你从没聊过的陌生人。你的井就在某处，你往前走一步，就离它近一步。沙漠不可怕，可怕的是你不再往前走。继续走，你的井在等你。',
    '你恨自己为什么不能像别人那样。你恨自己的怯懦、犹豫、笨拙。尤瑟纳尔写《哈德良回忆录》，她在书里让一个临终的罗马皇帝回顾自己的一生。哈德良说：开始恨一个东西之前，先要了解它。你恨自己的那些部分，你都了解吗？你的怯懦，可能是在保护你不在冲动中做决定；你的犹豫，可能是你的内心在给你更多时间；你的笨拙，可能是你还没有找到适合你的表达方式。它们不是你的缺陷，是你还没有被理解的天赋。今天，试着了解自己一个你一直讨厌的特质。不要判它死刑，把它请到桌前，问问它：你来，是想教会我什么。它在你的茧里待了那么久，只是想保护你，直到你有力气自己咬破茧飞出去。咬破茧是痛的，但恨茧不会让它变薄。了解它，你会知道什么时候该咬破它。',
    '你站在镜子前，看到自己身上满是裂痕。这个年纪的同龄人好像都完整光滑，只有你是一只有裂缝的旧茶杯。伦纳德·科恩是诗人、歌手，他在六十岁之后出家，又在出山后写出了一生最动人的歌。万物皆有裂痕，那是光照进来的地方。你的裂缝不是你的次品标志，是你和光的秘密通道。那些看起来光滑完整的人，他们也有裂缝，只是他们的裂缝还没有被光照到。你的裂缝让你的光可以进来，也让你的光可以出去——你比别人更理解痛苦，更知道如何安慰一个破碎的人。今天，在镜子里对那个有裂缝的自己说：我看到你了。你不只是我的一部分，你是我光进来的地方。把这句话写下来贴在镜子上。每天早晨看到它时，你就知道：裂痕不是我的耻辱，是我独有的窗。光从那里进来，也从那里出去。',
    '你看到同龄人一个个升职加薪、买房买车，而你还在原来的岗位上做着不起眼的工作。你觉得自己像一块被遗忘在河床上的粗石，别人都是大理石，只有你满身棱角、无人问津。托马斯·曼写《布登勃洛克一家》，用几十年跨度写一个家族的兴衰。他自己也是到中年才完成最重要的作品，在流亡中写下《魔山》。他说，时间是艺术家，它会把粗糙的石头打磨成大理石。你现在被河水冲刷的每一道痕迹，都是时间在你身上留下的工笔。那些早早变成大理石的人，他们也曾是粗石，只是他们被冲刷的时间比你更长，或者被放在了水流更急的地方。你的位置水流慢，所以你的纹理更细腻。不要羡慕别人的光滑，你的棱角里藏着时间还没有来得及展示的图案。今天，继续待在属于你的河段。水流慢不是怠慢，是给你更精细的打磨。时间这个艺术家，从来不交半成品。',
    '你觉得在同辈的星空里，你是最暗的那一颗。别人是北极星、天狼星，你觉得自己连名字都没有，只是角落里一粒不起眼的光点。圣-埃克苏佩里除了《小王子》，还写过《夜间飞行》。他写那些在深夜驾机飞越南美的飞行员，他们看不见地面，看不见航标，只能靠头顶的星辰导航。真正重要的东西，眼睛是看不见的。那些最亮的星，不是因为他们本身更亮，是因为他们离观察者的眼睛更近。你的光，在你看不见的波段里，正照着另一片夜空。只是你还站在自己的光里，所以看不见自己的亮。今天，试着用别人的眼睛看自己一次——那个被你帮过的同事，那个被你安慰过的朋友，那个在深夜读到你这几年坚持写下的文字的陌生人。你对他们来说不是暗星，是他们在黑暗里找到方向的坐标。继续发光，哪怕你自己看不见。你的光，正在照着另一个人的航线。',
    '你羡慕别人的人生像一部史诗，有远征、有冒险、有荣耀。你的人生像一部流水账——上班，下班，吃饭，睡觉，今天和昨天一模一样。荷马写《奥德赛》，奥德修斯用了十年才从特洛伊回到家。那十年里大部分时间不是在和怪物搏斗，是在海上漂着，日复一日，看不见陆地。没有比漫无目的地徘徊更令人无法忍受的了。但你今天的徘徊，不是漫无目的，是你还没有看见陆地。奥德修斯在海上漂的时候也不知道自己什么时候能到家，但他没有把桨扔进海里。你每天重复的日常不是流水账，是你在海上划的每一桨。今天，把这一天当成你史诗里的一个章节。没有怪物，没有风暴，但有一个人还在划桨。这个章节的标题叫“坚持”。史诗不只有战斗，还有漫长的航行。你在航行中，这已经是史诗的一部分。',
    '你站在同龄人的岔路口，看着他们选择了不同的路——有人继续深造，有人进入职场，有人创业，有人成家。你不知道哪条路是对的，你怕自己选错了，从此就被所有人甩在后面。博尔赫斯写《小径分岔的花园》，他把时间想象成一座迷宫，每一条岔路都不通向虚无，都通向一个完整的世界。我一直在想象天堂是一座图书馆——天堂不是只有一本书，是一座有无数本书的图书馆。你选择的这条路是一本书，别人选择的路是另一本书。没有一本书是错的，它们只是不同的书。今天，不要站在岔路口盯着别人的封面。翻开你自己的这本书，读到下一页。它可能没有别人的书那么热闹，但它的主角是你。天堂的图书馆里有你这本书的位置，它不需要模仿任何一本。翻开它，继续读。好的故事都在下一页。',
    '你收藏了无数篇干货文章，报了十几个网课，每天都在想自己应该做什么。但想法一直在变，行动却一直没有开始。你看着那些已经做出来成绩的同龄人，觉得他们一定比你更聪明、更有执行力。歌德写《浮士德》用了六十年。他说，知道是不够的，我们必须应用；意愿是不够的，我们必须行动。他笔下的浮士德和魔鬼签了约，但浮士德没有坐在那里等魔鬼送来快乐，他一直在做——填海造地，建造城市，直到生命的最后一刻。你不是没有能力，是你还没有把知道变成做到。今天，从你收藏夹里选一件事，就一件，不用是最重要的，不用是最完美的。把它做完，哪怕只做十分钟。你的意愿从今天开始不再是空想，是你落笔的第一个字。行动起来的人，已经超过了所有还在想的人。你不需要想好所有才出发，你只需要在今天出发一点点。',
    '你在和别人的比较中迷失了方向。他们的声音像四面八方的风，把你吹得摇摇晃晃。有人说这个行业好，有人说那个方向对，每个人都像在替你指路。约瑟夫·康拉德曾是一名海员，他在风浪里学会了一件事：在黑暗中没有岸上的灯塔时，只能靠船上的罗盘。在黑暗中，我们更需要内心的指南针。你需要一个自己的罗盘——不是别人的方向，是你自己内心最深处那个微弱但坚定的指向。它可能和所有人的方向都不一样，但没有关系。今天，把你的罗盘拿出来看一看：抛开所有别人的声音，你真正想要什么。不用大声说出来，写在纸上就好。那个方向还在，被风浪遮住了，但它没有消失。握紧它，它是你在所有风向中最稳的锚。风会停，你的罗盘还在。',
    '你在朋友圈里看到别人成群结队，而你总是一个人。你觉得自己是不是不值得被爱，不值得被人在意。圣-埃克苏佩里除了飞行员和作家，还是一个深谙孤独的人。他在沙漠里迫降时，最渴望的不是水，是一个能和他说说话的人。但他写，爱不是彼此凝视，而是一起望向同一个方向。你不用急着找到那个能凝视你的人，你只需要继续走你的路。在路上，你会遇到和你望向同一个方向的人。你们不必互相凝视，只需要在某个岔路口交换一个眼神，就知道对方也在往那边去。今天，不必为自己一个人感到难过。你只是在路上还没有遇到同行者。继续走，那个和你望向同一个方向的人，也在他的路上往你的方向来。你们会在那个共同的方向里相遇，那时的并肩，比任何凝视都长久。',
    '你看着别人的生活像一本已经装订好的书，封面精美，内容充实。你的生活像一堆散乱的草稿，每页都写着“待修改”。伊恩·麦克尤恩写《赎罪》，整本书都在做一件事：用写作来弥补现实里无法挽回的遗憾。每个人的生活都是一部未完成的小说。你看到的别人那本装订好的书，只是他们在某个章节暂时停下来，给封面拍了张照。你看不见他们扉页背后那些划掉的字、揉成团的草稿、写到一半放弃了的段落。你不是唯一还在打草稿的人，每个人都在打草稿，只是有人藏得更深。今天，接受你的草稿状态。你不是成品，你不需要是成品。散乱的草稿不是失败，是你还在写的证明。继续写，哪怕字迹潦草，哪怕逻辑不通。小说的意义不在装订，在被写下。你还在写，这就是你和所有人一样值得被尊重的地方。',
    '你觉得自己笨拙。说话笨拙，做事笨拙，连安慰别人都安慰不到点子上。别人似乎都能恰到好处地表达，只有你每次都差那么一点。库尔特·冯内古特经历过二战，被俘，在德累斯顿大轰炸中幸存。他用荒诞的笔调写最残酷的事，却永远保持一种笨拙的温柔。他说，我们在地球上只是过客，应该对彼此温柔一些。你的笨拙不是缺陷，是你还没有学会用虚假来包装自己。在所有人都学会精致表达的时代，笨拙就是最珍贵的真诚。今天，不必为自己的笨拙感到羞耻。那个被你笨拙地安慰过的人，他听到了你话里没有技巧但很真实的在乎。这个世界不缺精致的利己主义者，但缺笨拙的温柔。你是后者。对你自己也温柔一些，你只是一个过客，别对自己太苛刻。',
    '你觉得自己太软了。心软，脾气软，在该强硬的时候总是退让。你觉得那些比你强势的同龄人都比你更有竞争力，你会被这个弱肉强食的社会淘汰。老子在《道德经》里用最简洁的意象写水的力量：天下莫柔弱于水，而攻坚强者莫之能胜。你不需要变成石头才能不被冲走。你的软不是弱，是水。水从不和石头硬碰硬，它只是流。流久了，石头也会被磨成圆润的鹅卵石。今天，在你觉得自己太软的时候，想一想水。你可以绕过障碍，可以渗透进最细的缝隙，可以在严寒里结成比石头更硬的冰。你不是软，你只是还没有到需要结冰的时候。保持你的柔软，它会在你需要的时候变成你最强大的力量。水不争，但万物莫能与之争。你的柔和，是你最坚硬的铠甲。',
    '你精心规划的职业生涯被一次次打断——行业动荡、公司重组、领导更换。你看着那些顺风顺水的同龄人，觉得只有你的人生充满了计划外的转折。爱丽丝·门罗是短篇小说的大师，她擅长写普通人生活里那些微小的颠覆——一个决定、一次偶遇、一通电话，生活就拐向了一条完全不同的路。她写：生活就是不断被中断的。你以为自己的计划被打乱了，但你不知道，那些中断本身就是你真正的路径。那些看似顺风顺水的人，他们也被打断过，只是他们的中断不在你视线之内。今天，重新看待你人生中被中断的那些时刻。它们不是意外，是你没有预料到的情节转折。门罗的故事，最精彩的部分往往发生在计划被打断之后。你的也是。打开下一页，看看这个被中断的故事接下来会往哪里去。它会比你原先计划的更有意外之喜。',
    '你在比较里陷入了一种你无法摆脱的黑暗。你觉得自己什么都不行，什么都不是。你甚至不敢打开朋友圈，怕又看到让你崩溃的消息。圣十字若望是十六世纪的西班牙神秘主义诗人，他被自己所在的修道院囚禁，在黑暗的牢房里待了好几个月。他在那间牢房里写下了最明亮的诗句。他提出了一个概念：灵魂的暗夜——在信仰最黑暗的时刻，其实离光明最近。在灵魂的暗夜里，光最近。你现在感受到的黑暗，不是你的失败，是你离自己最近的时候。在白天的喧嚣里，你看不见自己；在深夜的暗处，你才听得到内心最真实的声音。不要逃避这份暗。今晚，就坐在暗里，不刷手机，不看别人。听听那个在白天被压住的声音想对你说什么。它可能只说了一句话，那一句话，就是你的光。暗夜不是惩罚，是光在化妆。',
    '你觉得日复一日的日常是在浪费生命。那些在同辈里拔尖的人，每天都在做大事、见大人物、去大场合。你的生活是两点一线，重复得像被按下了单曲循环。谷崎润一郎写《阴翳礼赞》，他从厕所的木质拉门、漆器的反光、碗里汤羹的形状，写出一种只有反复才能体会到的美。他写，美不在轰动，在细微的重复里。你每天重复的通勤、重复的工作、重复的餐桌，它们不是浪费，是仪式。那些做大事的人，他们的人生也由重复构成——每一次成功背后都是无数次重复的练习。你今天所做的不起眼的重复，正在构成只有你才能懂得的阴翳之美。不用急着跳出这个循环。认真地重复一次——认真吃一顿饭，认真走一段路，认真做完今天的工作。当你不再把重复当惩罚，它会变成你独一无二的修行。',
    '你在最需要帮助的时候没有人出现。你觉得自己没有可靠的朋友，没有可依赖的家人。你觉得自己在这个世界上孤身一人。田纳西·威廉斯写《欲望号街车》，女主角布兰奇在被整个世界抛弃之后，对送她出门的医生说了一句：我一直依赖陌生人的善良。我们都依赖陌生人的善良活着。你没有被抛弃，你只是还没有遇到那个在关键时刻对你伸出手的陌生人。每一个你还没有认识的人，都可能成为你未来的朋友。今天，在你觉得孤立无援的时候，试着把自己当成那个对自己伸出手的陌生人。对自己说：我会照顾你的。你不需要等到被谁拯救，你自己就是那个善良的陌生人。先去爱自己，然后你会发现，陌生人的善良，其实无处不在。你也曾经是别人眼里那个温暖的陌生人，只是你不知道。',
    '你觉得现在这份工作折损了你的骄傲。你曾经以为自己会成为了不起的人，但现在你在做着任何人都能替代的琐事。你觉得自己是成熟的反面——你既没有壮烈死去，也没有卑微活着，你在中间，不上不下。塞林格在《麦田里的守望者》里让霍尔顿在纽约街头晃荡了几天几夜。霍尔顿恨一切虚伪，但他最后发现，他不能只恨，还要守护——守护那些在麦田里还没有掉下悬崖的孩子。一个成熟的人，是为了同一项事业卑微地活着。你现在的琐碎不是卑微，是你为了守护某个你还说不清楚但心里非常在意的东西所付出的代价。你选择了留下来，而不是壮烈地走掉。这已经是一种成熟。今天，为你正在守护的东西做一件小事——守护你的生活、守护那个还在你心里的少年。他的麦田还在，他的守望者还没有离开。',
    '你一直在找那个可以让你在同辈中脱颖而出的核心优势，但你找了这么久还没有找到。你觉得自己是不是根本就没有中心。博尔赫斯的迷宫不是让人迷路的，是让人在其中不断探索的。他说，天堂应该是迷宫的模样，但迷宫的中心什么都没有。这句话不是绝望，是解放——你一直在找的那个“中心”，也许根本不存在。存在的，只是你在这个迷宫里不断选择的路径。你不需要找到那个唯一的优势，你只需要在你已经走了这么久的路上继续走下去。你的优势不是某一种天赋，是你愿意在这条路上继续找下去。今天，在你的迷宫里再往前走一段。不要问出口在哪里，不要问中心在哪里，就只是走。迷宫的意义不在出口，在你走的过程里。你走过的每一步，都在建造属于你的天堂。',
    '你总觉得被同龄人抛在后面，已经追不上了。你觉得这个时代属于年轻人，你已经过了那个可以闪闪发光的年纪。乔治·艾略特是维多利亚时代的伟大小说家，但她四十岁才出版第一本小说。在那之前，她是乡村牧师的女儿，是翻译，是被人议论的“老姑娘”。成为你自己，永远不会太晚。你不是在追赶谁的时间表，你是在用自己的节奏变成那个你还没有完全成为的人。这个时代不只有二十岁的天才，还有三四十岁才找到方向的探索者。你没有落后，你只是在准备。像艾略特那样，在安静的岁月里积蓄对世界的全部理解，然后在属于你的年纪，写出只有那个年纪才能写出的作品。今天，读一页她的书，感受那份跨世纪的鼓励。你的黄金时代不在过去，在每一个你还在努力成为自己的今天。',
    '你被同辈在背后议论过，被朋友背叛过，被你不设防的人伤害过。你现在每次和别人比较时，都会想起那些伤。你觉得别人都是完整的，只有你带着裂痕。黑塞在《德米安》里写，鸟要挣脱出来，蛋壳是整个世界。伤口就是蛋壳第一次裂开的地方。他用诗的语言重复伦纳德·科恩那句话：伤口是光照进来的地方。你的裂痕不是你的缺陷，是光第一次照进你灵魂的入口。那些伤害过你的人，他们不知道，他们只是砸开了那扇窗。今天的你，不是那个被伤害后只会哭的人，你是那个从伤口里长出勇气的人。你学会了设防，也学会了在设防的同时不对世界彻底关上窗。这是只有受过伤的人才懂的智慧。今天，对那道旧伤口说：谢谢你照进来的光。它还在，但它已经不是伤口，是你灵魂上一道透光的纹路。',
    '你觉得这一次真的被打败了。创业失败，被裁员，考试落榜。你在和同龄人的比较里，觉得自己是那个所有坏事都赶上了的人。大江健三郎是诺贝尔文学奖得主，他有一个智力障碍的儿子。他在照顾儿子几十年后说：他的存在，教会我什么是真正的人。他的一生都在和失败、和痛苦共生，但他从未停止书写。人可以被击倒，但不可以被打败——海明威这句话，大江用了一生来践行。你不是失败者，你是被击倒后还在呼吸的人。击倒你的不是你的同龄人，是你把自己和他们比较的方式。今天，重新定义“打败”。你没有输，你只是暂时躺下。那些躺在地上的时间，不是为了认输，是为了积蓄重新站起来的力量。大江健三郎照顾了儿子一生，那个让他最累的人，也是让他最深刻的人。你的失败也是。你会在以后感谢它让你活得比别人更深刻。',
    '你看着别人都安顿下来了，只有你还在漂。你也不知道自己还要漂多久，还能漂多久。托尔金写《魔戒》时是牛津大学的教授，他没有出去冒险，他让霍比特人替他去了。弗罗多离开夏尔时，对山姆说：不是所有流浪的人都会迷路。山姆是那个最平凡、最不起眼的园丁，但他跟着弗罗多走完了整个旅程。山姆回家后，继续做他的园丁。你不是在流浪，你是在护送属于你的那枚魔戒。它可能是你心里的某个执念、某个梦想、某个你不愿意就这么放弃的东西。别人的安顿是他们的夏尔，你的流浪是护送魔戒的必经之路。总有一天你会回到你的夏尔，那时候你会像山姆一样，坐在花园里，看着阳光，知道魔戒已经被销毁了，而你，走完了全程。继续走。不是所有流浪的人都会迷路，他们只是走在回家的长路上。你的家在路的尽头，也在每一个你认真走过的今日。',
    '你觉得自己在职业赛道上被卡住了。别人都进了大厂、拿了高薪、在朋友圈晒工牌，你在一个小公司里做着不起眼的工作，连说都不好意思说。你觉得自己的简历是一块没有缝隙的石头，困在里面出不去。纳丁·戈迪默是南非作家，诺贝尔文学奖得主。她在种族隔离最严酷的年代写作，她的书被禁，她的人被监视，但她从石头般的制度里找到了一道裂缝，把种子种了下去，然后开出了花。她说，石头里也能开出花，只要种子找到了裂缝。你的裂缝是你现在这份不起眼的工作里，某个只有你能发现的机会——一个没人愿意接的项目，一个被忽视的客户需求，一个你比别人多懂一点的小技能。把种子种进那道缝里，每天浇一点水。不用急着破石而出，先在裂缝里扎下根。石头还在，但种子已经在长。有一天，裂缝会变成你的出口。',
    '你看到同龄人已经深耕一个领域好几年，有了深厚积累。你因为转行、考研或者其他原因，刚刚站到新的起跑线上。你觉得晚了，觉得自己怎么追也追不上。乔治·奥威尔在缅甸当过警察，在巴黎的餐馆后厨洗过碗，在西班牙内战中被打穿喉咙。他三十多岁才开始写让他名留青史的那两本书。他在一篇随笔里写：任何时候开始都比不开始好。你不是从零开始，你是带着你过去所有失败和教训、所有被浪费的时间和被抓住的机会，一起站到这个起跑线上的。你的起点比别人更沉，但你迈出的每一步，也比别人更稳。不要抬头看那些已经跑远的人，低头看你的脚。它正在接触地面。今天，迈出第一步。不需要快，只需要实。奥威尔在洗碗的时候也不知道自己以后会写出《一九八四》。你不需要知道终点，你只需要在今天开始。',
    '你在深夜里反复想：如果当初选了另一条路会怎样。如果选了那个专业，去了那个城市，接了那份offer。你看着同龄人里那些选了对的路的人，觉得自己在岔路口上选错了。卡瓦菲斯写伊萨卡，奥德修斯花了十年才从特洛伊回家。诗人说，你要去的是伊萨卡，愿你的路途漫长。伊萨卡没有给你财富，没有给你荣耀，她给了你一样东西：你自己。伊萨卡给了你漫长的旅途，没有她，你就不会出发。你现在的这条路，是你自己选的伊萨卡。它让你绕了远路，让你吃尽苦头，但它也让你变成了现在这个——在深夜里纠结过、在岔路口徘徊过、在失败之后还能站起来的人。不要后悔你的选择。没有这条路，你就不会遇到那些只有在这条路上才能遇到的人、才能学会的事。你的伊萨卡不在目的地，在你走路的姿势里。继续走，愿你的路途漫长。',

    '你总羡慕别人拥有的那些天赋：口才好、逻辑强、人缘好、长得好看。你觉得自己什么都很普通，没有什么拿得出手的东西。多丽丝·莱辛在非洲长大，没有受过什么正规教育。她后来得了诺贝尔文学奖。她在自传里说，她的天赋不是学校教的，是她在非洲草原上观察蚂蚁搬家、听老人讲故事时，自己长出来的。你不必成为别人，你只需要成为你自己。你的天赋可能不在那些被所有人认可的地方。它可能是你比别人多一点的耐心，可能是你总能听出别人话里隐藏情绪的直觉，可能是你在压力下还能保持镇定的特质。这些东西不写在简历里，但它们是你在职场里最硬的底牌。今天，试着找一找你身上一个不被所有人认可但你自己知道很有用的特质。那就是你的天赋。它不需要和任何人比，它只需要被你自己发现。莱辛在草原上看蚂蚁时也不知道自己以后会得诺贝尔奖。你也是，你的天赋正在你不注意的地方慢慢长大。',
    '你把同辈比较变成了一场田径赛——别人在冲刺，你在慢跑；别人在领奖台上，你在观众席。你觉得自己输了。尤金·奥尼尔四次获普利策奖，得了诺贝尔文学奖，但他的一生充满了疾病、酗酒、家庭破裂。他在晚年写出《长夜漫漫路迢迢》，把自己所有的痛苦都摊在纸上。他不是赢了谁，他只是完成了自己的航行。人生不是一场比赛，是一场航行。比赛有固定的跑道和唯一的终点，航行没有。你的船可以去北极，也可以去赤道。你不需要和别人比谁先到岸，你只需要保证你的船还在水上，帆还挂着。今天，在你觉得“又输了”的瞬间，问自己：我正在航行的方向，是我自己选的吗？如果是，你就没有输。你只是还在海上。奥尼尔航行了一辈子，最后在痛苦的深海里写出了一部杰作。你的航行也有你自己的终点，不需要和别人比靠岸的时间。',
    '你用别人的标尺量了自己太久。别人的薪水是你的标准，别人的职位是你的标准，别人买房的年纪是你给自己设定的截止日期。你活在别人的度量衡里，忘了自己还有一把尺。伍尔夫一辈子都在为自己量体裁衣。在她那个年代，女人不应该写作，不应该有自己的房间，不应该独立于男人生活。她把这些“不应该”全都撕了，用一把自己的尺量出了自己的路。她说，一个人能使自己成为自己，比什么都重要。今天，试着用你自己的尺量一次。不要看别人在这个年纪做了什么，只看你自己：和去年的你比，和上个月的你比。你比那时候多做了一点什么。那个别人看不见的进步，在你自己的尺子上清清楚楚。把它记下来，这是你今天最真实的分。别人有别人的刻度，你有你的。这把尺是你为自己做的，它最懂你应该量哪里。继续用它，不要换成别人的。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
