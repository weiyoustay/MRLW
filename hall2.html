<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>给我一点光</title>
    <meta name="view-transition" content="same-origin">
    <style>
        :root {
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; font-family: -apple-system,'PingFang SC','SF Pro Display','Microsoft YaHei',sans-serif; -webkit-font-smoothing:antialiased; }

        /* ============ GREEN MODE ============ */
        body.theme-green {
            --bg: #8CC600;
            --bg-soft: #A8D820;
            --bg-warm: #C4E060;
            --card-bg: rgba(255,255,255,0.7);
            --card-border: rgba(255,255,255,0.55);
            --card-hover: rgba(255,255,255,0.88);
            --text: #141f00; --text2: rgba(20,31,0,0.55); --text3: rgba(20,31,0,0.3);
            --accent: #428DFF;
            --btn1-from: #2B9EFF; --btn1-to: #6DC5FF; --btn1-glow: rgba(43,158,255,0.35);
            --btn2-from: #8CE000; --btn2-to: #C9FF38; --btn2-glow: rgba(140,224,0,0.35); --btn2-text: #142000;
            --ring: rgba(255,255,255,0.18); --dot-op: 0.22;
        }
        /* ============ BLUE MODE ============ */
        body.theme-blue {
            --bg: #2968D8;
            --bg-soft: #4A80E0;
            --bg-warm: #7AA8E0;
            --card-bg: rgba(255,255,255,0.72);
            --card-border: rgba(255,255,255,0.58);
            --card-hover: rgba(255,255,255,0.9);
            --text: #001433; --text2: rgba(0,20,51,0.5); --text3: rgba(0,20,51,0.28);
            --accent: #B7F700;
            --btn1-from: #2B9EFF; --btn1-to: #6DC5FF; --btn1-glow: rgba(43,158,255,0.4);
            --btn2-from: #8CE000; --btn2-to: #C9FF38; --btn2-glow: rgba(140,224,0,0.35); --btn2-text: #142000;
            --ring: rgba(255,255,255,0.2); --dot-op: 0.25;
        }

        /* ============ BACKGROUND ============ */
        body {
            background:
                radial-gradient(ellipse 900px 700px at 25% 15%, var(--bg-soft) 0%, transparent 55%),
                radial-gradient(ellipse 700px 600px at 75% 85%, var(--bg-warm) 0%, transparent 50%),
                var(--bg);
            transition: background 0.7s var(--ease);
        }
        .bg-rings { position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .bg-rings .r {
            position: absolute; border-radius: 50%;
            border: 1.8px solid var(--ring); background: transparent;
            animation: ringDrift 20s ease-in-out infinite;
        }
        .bg-rings .r1 { width:500px; height:500px; top:-200px; left:-120px; }
        .bg-rings .r2 { width:350px; height:350px; top:55%; right:-140px; animation-delay:-7s; }
        @keyframes ringDrift {
            0%,100% { transform: translate(0,0); }
            33% { transform: translate(15px,-10px); }
            66% { transform: translate(-8px,12px); }
        }
        .bg-dots {
            position: fixed; inset:0; z-index:0; pointer-events:none;
            background-image: radial-gradient(rgba(255,255,255,var(--dot-op)) 1.4px, transparent 1.4px);
            background-size: 44px 44px;
            mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 20%, transparent 68%);
            -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 20%, transparent 68%);
        }

        /* ============ 卡通星星 ============ */
        .stars {
            position: fixed; inset:0; z-index:0; pointer-events:none;
        }
        .star {
            position: absolute; color: rgba(255,255,255,0.3);
            animation: twinkle 3s ease-in-out infinite;
        }
        .s1  { top:8%;  left:18%; font-size:0.6rem;  animation-delay:0s; }
        .s2  { top:14%; right:15%; font-size:0.9rem;  animation-delay:-0.6s; }
        .s3  { top:22%; left:42%; font-size:0.5rem;  animation-delay:-1.2s; }
        .s4  { top:30%; right:8%;  font-size:0.7rem;  animation-delay:-1.8s; }
        .s5  { top:38%; left:10%; font-size:0.8rem;  animation-delay:-0.3s; }
        .s6  { top:45%; right:28%; font-size:0.55rem; animation-delay:-2.1s; }
        .s7  { top:52%; left:65%; font-size:0.65rem; animation-delay:-1.5s; }
        .s8  { top:58%; left:22%; font-size:0.9rem;  animation-delay:-0.9s; }
        .s9  { top:66%; right:18%; font-size:0.5rem;  animation-delay:-2.4s; }
        .s10 { top:74%; left:48%; font-size:0.75rem; animation-delay:-0.7s; }
        .s11 { top:82%; right:30%; font-size:0.6rem;  animation-delay:-1.1s; }
        .s12 { top:90%; left:32%; font-size:0.7rem;  animation-delay:-1.9s; }
        /* 小圆点装饰 */
        .dot-d {
            position: absolute; border-radius:50%;
            background: rgba(255,255,255,0.2);
            animation: dotPulse 2.5s ease-in-out infinite;
        }
        .d1 { width:6px; height:6px; top:16%; left:32%; animation-delay:0s; }
        .d2 { width:4px; height:4px; top:42%; right:35%; animation-delay:-0.8s; }
        .d3 { width:5px; height:5px; top:68%; left:55%; animation-delay:-1.6s; }
        .d4 { width:7px; height:7px; top:86%; right:12%; animation-delay:-2.2s; }
        .d5 { width:3px; height:3px; top:28%; left:72%; animation-delay:-1.0s; }
        .d6 { width:5px; height:5px; top:54%; left:14%; animation-delay:-0.4s; }
        @keyframes dotPulse {
            0%,100% { opacity:0.2; transform:scale(1); }
            50% { opacity:0.55; transform:scale(1.6); }
        }
        @keyframes twinkle {
            0%,100% { opacity:0.2; transform:scale(1) rotate(0deg); }
            50% { opacity:0.5; transform:scale(1.4) rotate(20deg); }
        }

        /* ============ TOP BAR ============ */
        .top-bar {
            position: fixed; top:0; left:0; right:0; z-index:100;
            display:flex; justify-content:space-between; align-items:center;
            padding:14px 18px; pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }
        .back-btn {
            width:42px; height:42px; border-radius:50%;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.5);
            color: var(--text);
            display:grid; place-items:center;
            cursor:pointer; font-size:1rem; font-weight:600;
            transition: all 0.4s var(--spring);
        }
        .back-btn:hover { background: rgba(255,255,255,0.65); transform: scale(1.1); }
        .back-btn:active { transform: scale(0.9); }
        .theme-toggle {
            display:flex; gap:6px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(16px);
            border-radius: 26px; padding:4px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .tdot { width:30px; height:30px; border-radius:50%; cursor:pointer; transition: all 0.4s var(--spring); border:2px solid transparent; }
        .tdot.green { background: #B7F700; }
        .tdot.blue  { background: #428DFF; }
        .tdot.active { border-color: rgba(255,255,255,0.9); transform: scale(1.18); box-shadow: 0 2px 14px rgba(0,0,0,0.12); }

        /* ============ SCROLL ============ */
        .scroll {
            position: fixed; z-index:1; inset:0;
            overflow-y:auto; overflow-x:hidden;
            overscroll-behavior:none; scrollbar-width:none;
        }
        .scroll::-webkit-scrollbar { display:none; }
        .wrap {
            max-width:640px; margin:0 auto;
            padding:90px 24px 60px; min-height:100%;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:44px;
        }

        /* ============ HERO ============ */
        .hero { text-align:center; max-width:420px; animation: heroIn 0.85s var(--ease) forwards; }
        @keyframes heroIn { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
        .hero h1 {
            font-size: clamp(2rem,4.5vw,2.6rem); font-weight:800;
            color:var(--text); margin-bottom: 10px;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(255,255,255,0.25);
        }
        .hero h1 span {
            display: inline-block;
            animation: charBounce 2.5s ease-in-out infinite;
        }
        .hero h1 span.c { color: var(--accent); text-shadow: 0 0 18px var(--accent), 0 2px 8px rgba(255,255,255,0.3); }
        .hero h1 span:nth-child(1) { animation-delay: 0s; }
        .hero h1 span:nth-child(2) { animation-delay: 0.12s; }
        .hero h1 span:nth-child(3) { animation-delay: 0.24s; }
        .hero h1 span:nth-child(4) { animation-delay: 0.36s; }
        .hero h1 span:nth-child(5) { animation-delay: 0.48s; }
        @keyframes charBounce {
            0%,100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(0); }
            75% { transform: translateY(-4px); }
        }
        .hero-divider {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin: 8px 0;
        }
        .hero-divider .hd-line {
            width: 28px; height: 1px;
            background: var(--text3); border-radius: 1px;
        }
        .hero-divider .hd-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: dotGlow 2s ease-in-out infinite;
        }
        @keyframes dotGlow {
            0%,100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }
        .hero .sub {
            font-size: 0.9rem; color: var(--text2); font-weight: 500;
            letter-spacing: 2px; margin-bottom: 2px;
        }
        .hero .desc {
            font-size: 0.84rem; color: var(--text2); line-height: 1.85;
            max-width: 320px; margin: 0 auto; font-weight: 400;
            letter-spacing: 0.4px;
        }

        /* ============ 3x3 GRID ============ */
        .grid {
            display:grid; grid-template-columns:repeat(3,1fr);
            gap:6px 6px; row-gap:0px; width:100%; max-width:240px;
        }
        .card {
            position:relative; border-radius:14px;
            padding:0;
            background: transparent;
            border: none;
            cursor:pointer; text-align:center;
            text-decoration:none;
            transition: all 0.4s var(--spring);
            overflow:hidden;
            display:flex; flex-direction:column;
            align-items:center;
        }
        .card .img-area {
            width:100%; aspect-ratio:1/1;
            border-radius:14px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position:relative; z-index:1;
            transition: transform 0.4s var(--spring);
        }
        .card:hover .img-area { transform: scale(1.05); }
        .card .label {
            font-size:0.73rem; font-weight:600;
            color: var(--text); position:relative; z-index:1;
            letter-spacing:0.3px; padding-top:1px; line-height:1.2;
        }
        .card.selected .img-area {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
            box-shadow: 0 0 8px var(--accent);
            transform: scale(1.02);
        }
        .card.selected .label { color: var(--accent); font-weight: 800; }
        .card:hover { transform: translateY(-4px); }
        .card:active { transform:scale(0.95); transition:all 0.06s ease; }

        /* ============ 点亮按钮 ============ */
        .light-btn-wrap { text-align:center; width:100%; max-width:180px; margin-top:2px; }
        .light-btn {
            width:100%; padding:10px 16px; border-radius:14px;
            background: linear-gradient(135deg, var(--btn1-from), var(--btn1-to));
            border:none; color:#fff; font-size:0.85rem; font-weight:700;
            letter-spacing:1.5px; cursor:pointer;
            box-shadow: 0 4px 18px var(--btn1-glow);
            transition: all 0.35s var(--spring);
            opacity:0.45; pointer-events:none;
        }
        .light-btn.active { opacity:1; pointer-events:auto; }
        .light-btn.active:hover { transform:translateY(-3px); box-shadow:0 6px 26px var(--btn1-glow); }
        .light-btn.active:active { transform:scale(0.95); }
        .light-btn .hint { font-size:0.6rem; font-weight:400; letter-spacing:0.5px; opacity:0.7; display:block; margin-top:1px; }

        /* 每张卡片背景图 */
        .img-1 { background-image: url('未来.webp'); }
        .img-2 { background-image: url('前途未卜.webp'); }
        .img-3 { background-image: url('学业.webp'); }
        .img-4 { background-image: url('职场.webp'); }
        .img-5 { background-image: url('同辈.webp'); }
        .img-6 { background-image: url('社交.webp'); }
        .img-7 { background-image: url('自我价值.webp'); }
        .img-8 { background-image: url('容貌身材.webp'); }
        .img-9 { background-image: url('情绪内耗.webp'); }

        /* ============ BOTTOM BUTTONS ============ */
        .b-section { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; max-width:150px; }
        .b-label { font-size:0.65rem; font-weight:700; letter-spacing:3px; color:var(--text3); }
        .b-row { display:flex; gap:10px; width:100%; }
        .b-btn {
            flex:1; position:relative;
            border-radius:14px; overflow:hidden;
            cursor:pointer; text-align:center;
            text-decoration:none;
            transition: all 0.4s var(--spring);
            border:none; background:transparent;
            display:flex; flex-direction:column;
            align-items:center;
        }
        .b-btn .b-img {
            width:100%; aspect-ratio:16/10;
            border-radius:10px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.4s var(--spring);
        }
        .b-fuyao .b-img { background-image: url('You 捻光--扶摇上.webp'); }
        .b-xingyue .b-img { background-image: url('You 捻光--星跃.webp'); }
        .b-btn:hover .b-img { transform: scale(1.03); }
        .b-btn .b-text {
            font-size:0.72rem; font-weight:700;
            color:var(--text); padding-top:5px;
            letter-spacing:0.5px;
        }
        .b-btn.selected .b-img {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
            box-shadow: 0 0 8px var(--accent);
            transform: scale(1.02);
        }
        .b-btn.selected .b-text { color: var(--accent); font-weight: 800; }
        .b-btn:hover { transform:translateY(-3px); }
        .b-btn:active { transform:scale(0.95); transition:all 0.07s ease; }

        /* ============ FOOTER ============ */
        .brand-footer {
            margin-top:12px; text-align:center; padding:8px 0;
        }
        .brand-name {
            font-size:1.4rem; font-weight:bold;
            background: linear-gradient(90deg, #00f5d4, #0099ff, #00f5d4);
            background-size: 300% 100%;
            animation: brandFlow 6s linear infinite;
            -webkit-background-clip:text; background-clip:text; color:transparent;
            display:inline-block; margin-bottom:6px;
        }
        @keyframes brandFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .date-text { font-size:0.9rem; color:#a0a0b0; margin-top:6px; }

        /* ============ ANIM ============ */
        .rise { opacity:0; animation: riseIn 0.6s var(--ease) forwards; }
        @keyframes riseIn { from { opacity:0; transform:translateY(40px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
        body { animation: pageIn 0.2s ease; }
        body.no-page-anim { animation:none!important; }
        @keyframes pageIn { from { opacity:0.5; transform:translate3d(8px,0,0); } }

        @media (max-width:600px) {
            .grid { gap:8px 8px; row-gap:0px; }
            .card { padding:6px 3px 8px; border-radius:15px; }
            .card .label { font-size:0.76rem; }
            .b-row { flex-direction:column; gap:10px; }
            .wrap { padding:80px 14px 48px; gap:32px; }
            .hero h1 { font-size:1.65rem; }
        }
    </style>
</head>
<body class="theme-green">

<div class="bg-rings"><div class="r r1"></div><div class="r r2"></div></div>
<div class="bg-dots"></div>
<div class="stars">
    <span class="star s1">✦</span><span class="star s2">✦</span><span class="star s3">✦</span><span class="star s4">✦</span>
    <span class="star s5">✦</span><span class="star s6">✦</span><span class="star s7">✦</span><span class="star s8">✦</span>
    <span class="star s9">✦</span><span class="star s10">✦</span><span class="star s11">✦</span><span class="star s12">✦</span>
    <div class="dot-d d1"></div><div class="dot-d d2"></div><div class="dot-d d3"></div>
    <div class="dot-d d4"></div><div class="dot-d d5"></div><div class="dot-d d6"></div>
</div>

<div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'" aria-label="返回">←</button>
    <div class="theme-toggle">
        <div class="tdot green active" onclick="setTheme('green')" id="dotGreen"></div>
        <div class="tdot blue" onclick="setTheme('blue')" id="dotBlue"></div>
    </div>
</div>

<div class="scroll">
<div class="wrap">

    <div class="hero">
        <h1><span>给</span><span>我</span><span class="c">一</span><span class="c">点</span><span class="c">光</span></h1>
        <p class="sub" id="welcomeText">深呼吸，你并不孤单</p>
        <div class="hero-divider">
            <span class="hd-line"></span><span class="hd-dot"></span><span class="hd-line"></span>
        </div>
        <p class="desc">每种焦虑背后，都藏着一个等待被你看见的自己。<br>选一个困扰，一起解开它。</p>
    </div>

    <div class="grid" id="cardGrid">
        <div class="card rise" data-href="jiaolv1.html" data-label="未来" style="animation-delay:.02s">
            <div class="img-area img-1"></div><span class="label">未来</span>
        </div>
        <div class="card rise" data-href="jiaolv2.html" data-label="前途未卜" style="animation-delay:.05s">
            <div class="img-area img-2"></div><span class="label">前途未卜</span>
        </div>
        <div class="card rise" data-href="jiaolv3.html" data-label="学业" style="animation-delay:.08s">
            <div class="img-area img-3"></div><span class="label">学业</span>
        </div>
        <div class="card rise" data-href="jiaolv4.html" data-label="职场" style="animation-delay:.11s">
            <div class="img-area img-4"></div><span class="label">职场</span>
        </div>
        <div class="card rise" data-href="jiaolv5.html" data-label="同辈" style="animation-delay:.14s">
            <div class="img-area img-5"></div><span class="label">同辈</span>
        </div>
        <div class="card rise" data-href="jiaolv6.html" data-label="社交" style="animation-delay:.17s">
            <div class="img-area img-6"></div><span class="label">社交</span>
        </div>
        <div class="card rise" data-href="jiaolv7.html" data-label="自我价值" style="animation-delay:.20s">
            <div class="img-area img-7"></div><span class="label">自我价值</span>
        </div>
        <div class="card rise" data-href="jiaolv8.html" data-label="容貌身材" style="animation-delay:.23s">
            <div class="img-area img-8"></div><span class="label">容貌身材</span>
        </div>
        <div class="card rise" data-href="jiaolv9.html" data-label="情绪内耗" style="animation-delay:.26s">
            <div class="img-area img-9"></div><span class="label">情绪内耗</span>
        </div>
    </div>

    <div class="light-btn-wrap">
        <button class="light-btn" id="lightBtn" disabled>
            点亮它
            <span class="hint">先选一个困扰，再点这里</span>
        </button>
    </div>

    <div class="b-section">
        <div class="b-label">✦ 探索更多 ✦</div>
        <div class="b-row" id="gameRow">
            <div class="b-btn b-fuyao rise" data-href="You 捻光--扶摇上.html" data-label="You 捻光——扶摇上" style="animation-delay:.30s">
                <div class="b-img"></div><span class="b-text">You 捻光——扶摇上</span>
            </div>
            <div class="b-btn b-xingyue rise" data-href="You 捻光--星跃.html" data-label="You 捻光——星跃" style="animation-delay:.34s">
                <div class="b-img"></div><span class="b-text">You 捻光——星跃</span>
            </div>
        </div>
        <div class="light-btn-wrap">
            <button class="light-btn" id="gameBtn" disabled>
                开始体验
                <span class="hint">先选一个游戏，再点这里</span>
            </button>
        </div>
    </div>

    <div class="brand-footer">
        <div class="brand-name">You 捻光</div>
        <div class="date-text" id="dateDisplay"></div>
    </div>

</div>
</div>

<script>
// ===== 卡片选择 + 点亮按钮 =====
// ===== 9宫格卡片 + 点亮它按钮 =====
var selectedGrid = null;
var gridCards = document.querySelectorAll('#cardGrid .card');
var lightBtn = document.getElementById('lightBtn');

gridCards.forEach(function(card) {
    card.addEventListener('click', function() {
        gridCards.forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selectedGrid = card;
        lightBtn.classList.add('active');
        lightBtn.disabled = false;
        lightBtn.querySelector('.hint').innerText = '面对「' + card.dataset.label + '」，光就会进来';
    });
});

lightBtn.addEventListener('click', function() {
    if (selectedGrid) location.href = selectedGrid.dataset.href;
});

// ===== 游戏卡片 + 开始体验按钮 =====
var selectedGame = null;
var gameCards = document.querySelectorAll('#gameRow .b-btn');
var gameBtn = document.getElementById('gameBtn');

gameCards.forEach(function(card) {
    card.addEventListener('click', function() {
        gameCards.forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selectedGame = card;
        gameBtn.classList.add('active');
        gameBtn.disabled = false;
        gameBtn.querySelector('.hint').innerText = '进入「' + card.dataset.label + '」';
    });
});

gameBtn.addEventListener('click', function() {
    if (selectedGame) location.href = selectedGame.dataset.href;
});

function setTheme(t) {
    document.body.className = 'theme-' + t;
    document.getElementById('dotGreen').classList.toggle('active', t==='green');
    document.getElementById('dotBlue').classList.toggle('active', t==='blue');
    try { localStorage.setItem('hall2Theme', t); } catch(e) {}
}
try { var s = localStorage.getItem('hall2Theme'); if (s==='blue') setTheme('blue'); } catch(e) {}

document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

var pn=localStorage.getItem('playerName');
if(pn){
    var s2=localStorage.getItem('startDate'),jd=1;
    if(s2){var st=new Date(parseInt(s2));st.setHours(0,0,0,0);var n3=new Date();n3.setHours(0,0,0,0);jd=Math.min(Math.floor((n3-st)/86400000)+1,7);}
    document.getElementById('welcomeText').innerText=pn+'，你已坚持了 '+jd+' 天';
}

(function(){
    var n=performance.getEntriesByType('navigation')[0];
    if(n&&n.type==='back_forward') document.body.classList.add('no-page-anim');
    var bb=document.querySelector('.back-btn');
    if(bb){var m=bb.getAttribute('onclick');if(m){var u=m.match(/location\.href='([^']+)'/);if(u){bb.removeAttribute('onclick');bb.addEventListener('click',function(e){e.preventDefault();location.href=u[1]});}}}
})();
</script>
</body>
</html>
