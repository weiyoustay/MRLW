/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你时常在两个极端之间摇摆：今天觉得自己还不错，有点小才华，明天又觉得自己一无是处；这一刻觉得自己配得上所有好东西，下一刻又觉得自己连这点念头都不该有。你怀疑自己是不是太不稳定了，是不是只有你一个人这样。托尔斯泰擅长写出人的心灵辩证法——同一个人在同一天里可以既崇高又卑琐，既慷慨又自私，既自信又自卑。这不是人格分裂，这是完整。月有阴晴圆缺——月亮从来没有因为它有阴晴圆缺就不再是月亮，你也不会因为你有起伏波动就不再是你。当你觉得自己一无是处的时候，请记住那只是今天的月亮到了它该缺的时刻。缺不会永远持续，圆也不会。你不是不稳定的残次品，你是一个完整的人，在经历他该有的全部阴晴圆缺。今天的低价值感，只是今天。它不是你全部的人生。',

    '晚上你一个人坐在阳台，把积攒了一整天的话都倒出来。说给空气听，说给远处的路灯听，说给楼下的流浪猫听。你说你也不知道自己到底在坚持什么，不知道自己到底值不值得被人爱、被人认可、被人记住。这些话你从来没对任何人说过，你怕他们觉得你矫情，怕他们用一句“想开点”就把你打发了。哈姆雷特的独白之所以震撼人心，不是因为他在思考一个哲学命题，而是因为他在无人可以倾诉的时候，把所有最脆弱的东西都摊在了舞台上。你也有自己的舞台——阳台、浴室、深夜的被窝。那些你对自己说的话不是废话，是你在和自己进行一场最重要的对话。把那些话都说出来，哪怕只是对着空气。说出来之后，它们就不再是堵在你心里的毒，而是被你看见、被你承认的一部分。你在问自己值不值得的时候，你已经值得了。因为你在乎，你还在问，你还没有放弃寻找答案。',
    '你有时候觉得一切都没有意义。无论你多努力，总有人比你更强；无论你取得什么成绩，很快就有人追上来。你像西西弗一样每天都在推同一块石头上山，石头到了山顶又滚下去，第二天再推，周而复始。你问自己：如果最后还是滚下去，我为什么要推。加缪回答：正因为你知道石头会滚下去而你仍然推，你才比石头更高贵。意义从来不来自山顶的风景，意义来自你推石头时绷紧的肌肉、你流的汗、你在滚落的间隙里抬头看见的天空。宝剑锋从磨砺出——磨砺本身就是价值。你不是在白白受苦，你是在一遍一遍的重复里把自己磨成了一把更锋利的刀。那些比你强的人，他们也在推他们自己的石头。每个人都有自己的荒诞要面对，而你在面对属于你的这一份时，没有选择躺平。继续推。你的尊严不在山顶，在你每一次重新出发的双手里。',
    '有人笑你不切实际。他们说现在这个环境，能找个工作就不错了，别谈什么理想，别想什么热爱。你被他们说得开始怀疑自己：是不是我真的太矫情了，是不是我该安分一点。塞万提斯让堂吉诃德在一个人人都在嘲笑理想的时代里，骑着一匹瘦马、顶着一只破盆冲向风车。所有人都说他是疯子，但他看见的是巨人。你不需要证明给他们看，你只需要在心里保留那个巨人。知我者谓我心忧，不知我者谓我何求——不懂你的人永远觉得你要求太多，懂你的人知道你在乎的是什么。你的价值不需要所有人都认可。那些笑你“不切实际”的人，只是放弃了抬头看的人。你没有放弃。不是因为你有多了不起，是因为你的心还没有习惯低头。把风车当成风车的人永远安全，但把风车当成巨人的人，才真正在活。别让任何人把你的巨人变回风车。',
    '你在自我价值的迷宫里迷路了很久。你走了很多条路：用成绩证明自己，用薪水证明自己，用别人羡慕的眼光证明自己。每一条路你都走了一段，然后发现尽头还是一堵墙。你开始怀疑：是不是我的价值根本就不存在，所以我怎么找都找不到。博尔赫斯一生都在写迷宫，但他最迷人的地方在于，他从来不写迷宫的出口。他认为迷宫本身就是答案。你寻找自我价值的过程，就是自我价值本身。你在迷宫里转过的每一个弯、撞过的每一堵墙、停下来喘过的每一口气，都在证明一件事：你在乎。众里寻他千百度——你找的那个东西，在你找的过程里已经悄悄长进了你的身体。蓦然回首——你不是找到了它，你是变成了它。你不是没有价值，你是一直在用寻找的方式体现你的价值。停下来，看看自己：那个在迷宫里跌跌撞撞还在找的人，不正是你最了不起的证据吗。',
    '你觉得自己被很多沉重的东西压住了：别人对你的评价、社会对你的期望、你自己对自己的苛求。你活得小心翼翼，生怕走错一步就证明自己真的不行。你把人生变成了一道不能出错的证明题。卡尔维诺说，轻盈不是逃避重量，是从重量里解放出飞翔的可能性。你不需要背着所有期待走完这一生。那些评价是别人的，那些标准是别人定的，那些“你应该怎样”的声音你可以选择不听。轻舟已过万重山——不是山不存在了，是船找到了自己过山的方式。今天试着给自己卸掉一个担子：允许自己在某件事上不完美，允许自己让一个人失望，允许自己在今天对自己说一句“这样就够了”。你不需要做别人眼里的满分答卷。你是自己的出题人，也是自己的阅卷人。把那张过于沉重的考卷折成一只纸飞机。让它飞。你也可以飞。',
    '你常常想：如果当年选的那个专业没被调剂，如果那次面试说的是另一个答案，如果当初勇敢一点去了另一座城市，现在的自己会不会活得更有价值一点。你在脑子里构建了无数个平行世界，那个世界的你总是比现在这个更成功、更幸福、更接近理想。村上春树在两个世界之间穿行了一整个写作生涯，但他笔下的主人公最终总会回到“现在”这个唯一的现实里来。另一个世界的你只是一个参照，不是答案。你用幻想的完美来审判现实的不完美，这对现在的你并不公平。人生如梦——梦里的你当然可以完美，但醒着的你才是真实的、在呼吸的、还有机会改变的。把平行世界的门轻轻关上。你不需要变成另一个版本的自己才配得到肯定。这个版本，这个坐在真实世界里有点迷茫但还在前进的你，已经值得被认真对待。幻想是休息站，不是目的地。你的目的地，就在你此刻坐着的这个位置。',
    '你在日记本上写下一句话：我觉得自己毫无价值。写完之后你看着这七个字，忽然觉得哪里不对——它不是真的，它是一团模糊的雾，把很多具体的东西裹在了一起。福楼拜教给写作者最重要的一课是：精确。不要写“一棵树”，要写它的品种、它的高度、它叶子上虫咬的洞。你把那句话划掉，重新写：我这次面试失败了，我写的申请被拒了，我还没有找到自己的方向，但我的价值不是由这些事决定的。精确地描述困境，困境就从一团压在你胸口的雾变成了一张你可以逐条解决的清单。差之毫厘，谬以千里——模糊的自我否定和精确的自我审视之间，差了十万八千里。前者让你沉溺，后者让你行动。你不是毫无价值，你是暂时还没有找到准确的词来形容你自己的价值。今晚，把那张清单上的每一条都变成可以执行的一小步。精确是治愈内耗的第一把刀。',
    '你常常觉得自己是一块不合群的拼图，被放错了盒子。别人的追求你不感兴趣，你的想法别人不理解。你说服自己适应这个世界，但越适应越觉得自己在背叛自己。萨特说，存在先于本质——你不是生来就被定义好的，你是先存在了，然后自己定义自己。世界给你的标签不是你，别人给你的评价不是你，甚至你自己过去做过的选择也不完全是你。你永远有重新定义自己的自由。仰天大笑出门去——李白走出那扇门的时候，不在乎别人怎么看他。我辈岂是蓬蒿人——你不是路边无名的野草，你是正在选择自己要成为什么样的人的那个人。你的价值不由任何预设的模板决定。所谓成长，就是一次次撕掉别人贴在你身上的标签，重新写下自己认同的定义。你不适配这个世界没关系，你可以为自己创造一个新的世界。自由很重，但它是唯一配得上你的重量。',
    '你总觉得自己不够格——那个岗位、那次机会、那个被你暗恋的人，你都觉得自己配不上。你觉得优秀的人是天生的，而你不是。你看到那些自信满满的同龄人，心里又羡慕又自卑。波伏娃说，一个人不是天生的，是后天形成的。你看到的那些光彩照人的人，他们也不是一生下来就那样。他们在你还没看到的地方摔过无数次跤，有过无数次自我怀疑，流过无数次眼泪。自信不是天赋，是练习。配得感不是天生的，是一点一点从生活手里赢过来的。巾帼不让须眉——不让，不是天生不让，是在一次一次的对峙里慢慢长出不让的底气。你今天觉得不配的，不代表明天还不配。把那个让你心虚的目标写下来，拆成一个个可以攻克的步骤。每完成一步，你的配得感就会长一寸。优秀不是等来的馈赠，是你亲手从时间里抢回来的战利品。你可以成为那种你曾经羡慕的人——不是天生的，是用每一天、每一件小事、每一个选择慢慢把自己塑造成那样的。',
    '你的室友拿到了大厂offer，你的同学考上了名校研究生，你的朋友圈里全是喜报。你礼貌地给每一条点了赞，然后把手机扣过去，觉得自己像个站在跑道边上看别人冲刺的旁观者。毛姆写斯特里克兰德，四十岁抛下一切去画画，被所有人骂疯了。但他说：我必须画画，就像溺水的人必须挣扎。你不需要成为那种极端的人，但你心里有一件事——可能很小，可能在别人看来不值一提——但那件事对你来说就是画画。亦余心之所善兮——你心里觉得好的东西，不需要所有人理解。别人在冲刺他们的跑道，你有你自己的路。你的价值不体现在追上谁，体现在你没有背叛自己心里那个最深的向往。继续画你的画，写你的诗，追你的梦。别人的跑道属于别人，你的森林只有你自己可以走。在你走的那条路上，没有第二名，只有你自己。这就是你独一份的价值。',
    '你觉得自己生错了时代。房价太高，竞争太激烈，机遇好像都被上一代人抢走了。你刷着手机看那些年少成名的故事，心里又焦虑又无力——同样的年纪，别人已经站在山顶，你还在山脚下找路。狄更斯在《双城记》里写：这是最好的时代，也是最坏的时代。每个时代的人都觉得自己生不逢时，但每个时代都有从废墟里长出来的希望。你不需要为整个时代负责，你只需要在今天做好一件你能做的事。路漫漫其修远兮——屈原说这条路很长，但他没说你必须跑得比别人快。你只需要走。时代的大风大浪不是你能控制的，但你的脚步是你能控制的。别人在山顶有山顶的风光，你在山谷有山谷的积累。最坏的时代里也有最好的人——那些在失望中依然坚持、在比较中依然专注、在迷茫中依然求索的人。你就是这样的人。继续求索，时代不会辜负一直在走的人。',
    '你看着镜子里的自己，觉得又浪费了一年。去年的计划没有完成，前年的目标没有实现，时间像沙子从指缝漏下去，你抓不住任何东西。你开始焦虑：再这样下去，我是不是就废了。川端康成写樱花，最美的时刻不是它盛开的时候，是它开始飘落的时候。物哀不是悲伤，是深知美好易逝之后生出的珍惜。花有重开日，人无再少年——不是让你为逝去的时光痛哭，是让你在意识到时间有限的那一刻，真正开始活。你过去浪费的时间不是完全白费的，它们至少让你在今天懂得了珍惜。你现在坐在这里后悔昨天，明天你又会后悔今天。打破这个循环只需要一件事：关掉手机，拿出纸笔，写下今天可以完成的一件小事。然后完成它。不要为打翻的牛奶哭泣，把杯子洗干净，倒满新的。你还年少，或者说，你现在的每一天都是你余生里最年少的一天。从今天开始，不算晚。',
    '你的生活每一天都长一个样：起床、通勤、上课或上班、回家、刷手机、睡觉。你觉得这样的重复毫无意义，它正在慢慢磨掉你对生活的所有期待。你害怕自己就这样在重复里变成一个平庸的、没有价值的人。杜拉斯写《情人》，整本书的语调像潮水一样反复涨落——她说她十八岁就老了，但她在反复的回忆里把那个十八岁重新活了一遍。重复不是平庸的根源，重复里藏着一种只有时间才能磨出的光泽。不积跬步，无以至千里——你每天走的那一小步看起来和昨天一模一样，但当你走了很久之后回头看，你已经不在原来的位置了。那些你觉得毫无意义的日常，正在不知不觉中改变着你。把今天的一小步走好，不需要惊天动地。重复不可怕，可怕的是在重复里闭上了眼睛。你只要还睁着眼，还在感受，还在往前走，重复就是积累，而不是沉沦。',
    '你觉得自己毫无特长。没有拿得出手的成绩，没有让人记住的才华，你觉得自己就是一个面目模糊的普通人。纳博科夫教读者一个本事：在蝴蝶翅膀的鳞粉上看出一整个世界。他从不写笼统的概括，他写每一个细节——光线怎样照在栏杆上，一个词怎样在舌尖停留，一个动作怎样暴露一个人的全部心理。于细微处见精神——你的价值不藏在什么惊天动地的大事里，它就藏在你每天做的小事里。你做的饭比别人好吃一点，你记别人的生日比别人准一点，你在朋友难过时说的话比别人暖一点。这些细碎的、不起眼的、你自己都忽略的优点，才是构成你这个人最坚实的地基。今晚，在纸上写下今天你做过的三件小事——不用大，小到把垃圾带下楼、给陌生人扶了一下门、把一本书读到某一行。这些小事不是无用的，它们是你价值的细节。每一个细节都在告诉你：你没有你想的那么普通，你只是还不习惯从细处看见自己。',
    '你看着身边的人都在往前走，好像只有你停在原地。你在深夜里对着天花板发呆，觉得自己是被遗忘在角落里的配角，灯光永远打在别人身上。菲茨杰拉德写尽了这种站在华丽派对边缘的孤独——盖茨比每晚看着对岸那盏绿灯，他也没有抵达，但他一直在看。独上高楼，望尽天涯路——你现在的孤独不是被抛弃，是你在爬上高楼的过程中必然经历的冷清。不是所有人都能站在高处，也不是所有人都愿意忍受登高时的寂寞。你还在看，还在望，还在找那条属于你的天涯路，这本身就已经把你和那些已经停下来的人区分开了。不要在孤独里否定自己。孤独是你和自己对话的唯一机会。把这份孤独当成一间只有你能进入的房间，在房间里把你所有的怀疑写下来，然后一个一个回答它们。当你从高楼下来，你会比那些从未登高的人更清楚远方的样子。',
    '你常常被人说“太敏感了”。别人随口一句话你琢磨三天，别人一个眼神你记在心里反复回放。你觉得自己这种性格很累，也很没用——别人都能大大咧咧地活着，就你一个人在玻璃心里受罪。曹雪芹写《红楼梦》，从一草一木、一饭一茶里写出整个人生的悲欢。那些最细微的日常里，藏着最深的洞察。敏感不是缺陷，是你独有的雷达。世事洞明皆学问——你能感知到别人忽略的细节，你能听懂别人没说的话，你能在风还没起的时候察觉到凉意。这不是没用，这是天赋。只是你还没有学会和它相处。把这份敏感从自我攻击的方向，转到理解世界的方向。当你用它来体谅别人的不易，而不是审判自己的不足；当你用它来捕捉生活的美，而不是放大自己的痛。你就从“玻璃心”变成了“水晶心”。同样的材质，换个角度，就是价值。你的敏感，是你最珍贵的原料。',
    '你觉得这个世界对你不公平。你努力了，但机会给了比你差的人；你真诚了，但回报给了比你假的人。你开始怀疑：做一个认真的人是不是错了。鲁迅笔下的孔乙己，一个落魄到极点的读书人，被人嘲笑，被人遗忘，但他始终穿着那件破长衫——那是他最后的体面，也是他最后的坚守。横眉冷对千夫指——不是和所有人作对，是在所有人都觉得你该放弃的时候，你还在做你认为对的事。俯首甘为孺子牛——不是低头认输，是为了自己真正在乎的东西甘愿吃眼下这份苦。你的价值不体现在世界给你的回报上，体现在你没有因为不公平就变成你讨厌的那种人。做一个认真的人没有错。错的是这个暂时还不公平的世界，不是你。守住你的认真，它是你身上最稀缺的价值。世界会变，但你的底色不会。在别人都敷衍的时候，你还在认真，这本身就是你的勋章。',
    '你在大城市里漂泊，没有归属感。这座城市很大，但没有一个角落让你觉得踏实。你每天在人群中穿行，却觉得自己像一个透明人。沈从文写边城，写一条河、一座渡口、一个摆渡的老人和一个小姑娘。外面战火纷飞，那里却有一方安静的天地。他不是在写逃避，是在写一个人如何在乱世里为自己建一座内心的边城。此心安处是吾乡——你的价值不需要依附任何一座城市、任何一份工作、任何一段关系。你可以自己给自己一个安放灵魂的地方。它可能很小——出租屋里一张收拾干净的书桌，一扇能看见夕阳的窗户，一条你每天走过的安静小巷。找到它，把它变成你的边城。在那里，你不需要成为任何人，你只需要成为你自己。当外面的一切都在质疑你的价值时，你还有一个地方可以回去。那里有你全部的价值，安安静静地待着，等你回来。',
    '你总觉得自己不够好看，不够聪明，不够有趣。你拿自己的短板和别人的长板比，把自己比得一无是处。张爱玲说，生命是一袭华美的袍，爬满了蚤子。没有谁是完美的，每个人都有藏在袍底的虱子。你看到的那些光鲜亮丽的人，他们的袍子里也有你不知道的痒和痛。曾经沧海难为水——你不是比不上别人，是你把自己放在了一个不该放的地方。你不是水，不必和海水比浩瀚；你是云，有自己飘荡的天空。你的价值不在你比不上别人的地方，在你独一无二的地方。你身上那个让你自卑的缺点，在另一个场合可能是别人欣赏的特点。你不必变成别人袍子上的花纹，你可以做你自己的整件衣裳。接纳袍底的蚤子，也珍惜袍面的华美。你是完整的，而完整本身就是价值。',
    '你被人否定之后特别难受，反复回想那个人说的话，越想越觉得自己真的不行。你把自己关在宿舍里生闷气，觉得全世界都在看你笑话。老舍写茶馆，三教九流各色人物在那个小空间里来来往往，有人得意有人落魄，但最后大家都不过是历史里的一粒尘。他把人生的荒诞和苦涩包在幽默里，让你在笑出声的同时忽然想哭。别人笑我太疯癫——你太把别人的话当回事了。那个否定你的人，可能早就忘了自己说过什么，只有你还在替他伤害自己。我笑他人看不穿——他不是看不穿你，他是看不穿自己。他的否定更多来自他自己的局限，而不是你的真实价值。学会用一点幽默的眼光看这件事：一个看不清自己的人，对你做了一个不准确的判断，然后你把它当成了圣旨。这不好笑吗。笑一笑，把那张圣旨撕了。你不需要任何人的盖章认证，你自己就是公章。',
    '你觉得自己没有激情了。小时候你有很多梦想，现在你只想安稳一点，不被生活踢出局。你觉得自己的棱角被磨平了，变成了一个无聊的大人。巴金在《家》里让觉慧冲出那个封建大家庭，他没有什么周密的计划，他只有一腔不肯冷却的热血。少年负壮气，奋烈自有时——壮气不是永远在燃烧的烈火，是在你最灰心的时候还能感受到的余温。它没有被磨平，它只是被你藏起来了。藏在一个未完成的计划里，藏在书架上一本还没拆封的书里，藏在某个深夜你忽然想起的“我本来可以”里。把它拿出来。今天就做一件那个无聊的大人不会做的事——大声读一首诗，给很久没联系的朋友发一句“我想你了”，在洗澡时放声唱歌。你不是没有棱角了，你是太久没有使用它们。让你的棱角重新长出来，你的少年还在，他只是睡了一觉。现在，把他叫醒。',
    '你觉得自己的存在像一粒沙子，落在人群中就再也找不到。你做的每一件事好像都没有人看见，你说的每一句话好像都没有人听见。洛夫写诗，用意象砌成一座座孤独的城池——一块石头、一片落叶、一盏深夜不灭的灯。他说孤独不是空的，孤独里挤满了自己的回声。你现在感受到的那种无人见证的虚无，不是你不重要，是你正在成为金子的路上。淘金的第一步，就是从无数粒沙子中被洗出来。你正在被生活反复淘洗，那些不被看见的日子，就是你最珍贵的洗炼过程。把此刻的孤独写下来，给它一个意象：它像什么。是你桌上那杯凉了的茶，还是窗外那棵被雨淋了整夜的树。当你给它一个名字，它就不再是虚无，而是你的创作。一粒沙子也可以是一座山，只要你开始认真地看它。你就是你生命里那座还没被命名的山。',
    '你总觉得自己不够好——不够成功，不够坚强，不够符合所有人的期待。你在镜子前看着自己，眼睛里全是对自己的不满意。泰戈尔说，世界以痛吻我，要我报之以歌。他不是说你要用微笑欺骗自己，是说你要在接受痛苦的同时，依然选择发声。你要唱的不是一首完美的歌，而是一首真实的歌。你不需要成为别人期待的样子才配得到肯定。现在的你，这个有缺陷、会犯错、还在努力的你，已经值得被唱出来。你的价值不在你变成了什么人之后才开始存在，它现在就在。就在你呼吸的这口气里，就在你读这些字的眼睛里，就在你还没有放弃的那个念头上。今晚试着对自己唱一首歌——不是喉咙唱，是用手唱：写下你今天做过的一件你觉得自己做得还不错的事，不管多小。这就是你今天的歌。世界给的痛还在，但你报了歌。这就够了。',
    '你总在追逐一个更好的自己。考更好的成绩，找更好的工作，变成更好看、更优秀、更受欢迎的人。你嫌现在的自己不够好，觉得只有更好才配被爱。聂鲁达写情诗，但他这首诗不只对爱人说，也可以对自己说：我爱你，不光因为你的样子，还因为和你在一起时我的样子。你有没有试过停下来，和现在的自己待一会儿——不是那个未来更好的自己，就是这个现在坐在这里、有点疲惫、有点迷茫的人。他在和你在一起的时候，是什么样子？他是不是比你以为的要坚韧一点，温柔一点，不那么完美但足够努力。你的价值不在你变成了什么人之后才开始被爱。现在的你，值得被你自己爱。不是因为你好，是因为你就是你。试着今晚在纸上写一句：我爱和你在一起时我的样子。然后把那个样子描述出来。那才是你真正的价值，不是别人定义的，是你自己感受到的。',
    '你在意自己在别人眼里的形象，到了小心翼翼的地步。发一条消息要斟酌十分钟，发完又反复查看有没有人回复。没人回应你就开始检讨自己是不是说错了什么、是不是不够有趣、是不是别人根本不在乎你。马克·吐温说：在你年轻时，你担心所有人都在看你。等你老了，你才发现根本没人注意你。这话听起来扎心，但它是个解脱——你纠结了半天的那个尴尬瞬间，除了你自己，没有人记得。人生如逆旅，你是一个行人，别人也是行人。每个人都在走自己的路，没有谁有那么多时间停下来审判你。你把自己放在舞台中央，以为聚光灯永远打在你身上，其实观众席上根本没什么人。把那份战战兢兢收回来。你不是演员，你是你自己人生的编剧。今天试着做一件你一直想做但怕被笑话的事，然后你会发现：没有笑你，大家都在忙自己的事。这是你重获自由的第一步。',
    '你觉得自己没本事、没背景、没资源，这辈子可能就这样了。你看着那些赢在起跑线上的人，心里生出一股无力的愤怒。杰克·伦敦笔下那个被同伴抛弃在雪原上的淘金者，独自一人，受伤，没有食物，被一头病狼一路跟踪。他没有武器，没有帮手，但他对自己说：我绝不放弃。他靠着这口气和那头狼对峙，直到它退却。天行健——天道运行刚健有力，从来不停。你不是狼的食物，你是那个在绝境里还能和狼对峙的人。你不需要背景和资源才能开始。你只需要像那个淘金者一样，拖着受伤的身体往前爬，不让自己停下来。继续爬，你的价值不在你站在什么起跑线上，在你还没有躺下这个事实里。今天你觉得自己一无所有，但你还有一口气。用这口气，做一件事——一件很小的事。做了，你就赢了今天的对手。那头叫做自我怀疑的狼。',
    '你的手机里塞满了各种课程、干货、提升自我的方法论。你觉得自己要学的东西太多了，越学越焦虑。你总觉得别人都在悄悄进步，只有你原地踏步。梭罗一个人跑到瓦尔登湖边住了两年，他自己种地、盖房子、观察蚂蚁搬家。他说他不想走到终点时发现，自己从未真正出发过。采菊东篱下，悠然见南山——你不需要那么多东西才能证明自己的价值。你不需要把所有课程都学完、把所有证书都考到手、把所有技能都掌握。你需要的是，在今天下午，放下手机，走到窗边，看看外面的云。简朴不是让你放弃进步，是让你分清楚：哪些是你真正需要的，哪些是别人告诉你需要的。你的价值不是用证书摞出来的，是用每一天真正活过的时间计算的。今天试着删掉一个你从来没用过的APP，取消一个你从来不听的课程。把节省下来的时间拿去发五分钟呆，或者去楼下走一圈。你活着这件事本身，不需要任何附加条件来证明。',
    '你太依赖别人对你的肯定了。领导夸你一句你高兴三天，朋友没回你消息你就怀疑自己是不是做错了什么。你把情绪的遥控器放在了别人手里，别人随便按一个键你就跟着变频道。爱默生说：相信你自己。这是他从头到尾反复说的一句话。他不是在喊口号，是在说：你要把自己当成自己人生的权威。君子求诸己——不是让你拒绝帮助，是让你不要把自我价值寄托在任何外部反馈上。领导不夸你，不代表你做得不好；朋友没回消息，不代表你没人喜欢。你的价值是一个常数，不是别人脸色决定的自变量。今天试着做一件事：在你期待别人夸奖的时候，自己先对自己说一句“今天这件事我做得不错”。不要等别人的反馈。你是你自己的第一听众，也是你自己的第一评委。把遥控器收回来，你自己来调台。',
    '你觉得自己太平凡了，没有什么值得被写下来的事。你不是天才，不是英雄，你的生活只是日复一日的庸常。惠特曼的整本《草叶集》都在歌颂一样东西：平凡的自我。他歌颂草叶，歌颂肌肉，歌颂汗水，歌颂一个普通人在路上走路的姿态。他不是在歌颂伟大，他是在歌颂存在本身。万物皆备于我——你的身体、你的呼吸、你走过的路、你流过的汗，这一切已经足够成为一首诗。你不需要等到功成名就才配被歌颂。现在的你，坐在这个房间里的你，已经是一个完整的、值得被写下来的你。试着歌颂自己一件小事：你坚持早起了一周，你为朋友做了一顿饭，你在最难过的那天还是洗了澡换了衣服。这些不是平庸，是你存在过的证据。你不是诗里没名字的标点，你是这首诗的作者。今天，在这首诗里，用你的名字署名。',
    '你总在刷朋友圈和社交平台，看到别人精彩的生活，然后反手给自己扣上一个“废柴”的帽子。那些精心剪辑的动态被你当成了他们全部的人生，然后拿来和自己的日常作比较。简·奥斯汀用一整部《傲慢与偏见》拆解了人们在社交中戴上的各种面具——每个人都在展示自己想被看到的那一面，真正的偏见和傲慢都藏在看不见的地方。不畏浮云遮望眼——你看到的那些光鲜不是假象，但它不是全部。浮云只是浮云，它遮不住你的价值，除非你站得不够高。把刷手机的时间用来做一件你不需要向任何人展示的事：读完两页书，整理一个抽屉，把一首诗抄在本子上。当你站在你自己垒起来的高度上回头再看那些曾经让你焦虑的动态，你会发现它们只是浮云。不是别人的精彩褪色了，是你自己的地基变高了。',
    '你看着别人在台上侃侃而谈，在朋友圈分享捷报，在群里成为焦点。而你坐在角落，不说话，不张扬，觉得自己的安静是一种缺点。艾米莉·勃朗特生前几乎没有离开过她的家乡，没有结婚，没有轰动的事迹，她只是安静地写出了一部把整个文学界震得发颤的《呼啸山庄》。谁终将声震人间，必长久深自缄默——沉默不是你没有东西可说，是你在积蓄力量。你现在的安静期，是种子在地下生根的阶段。它不需要被看见，被看见的芽只是最后的一小部分。不要羡慕那些已经冒出地面的嫩芽。你的根，在看不见的地方扎得比他们更深。缄默是你在酝酿一场只属于你的风暴，不需要向任何人解释它的预兆。继续缄默，继续蓄力。当那场风暴终于来临，所有人都会知道，安静了那么久的人，爆发起来是什么样子。',
    '你觉得自己太普通了，普通到像路边一棵没人会多看一眼的草。你没有显赫的家世，没有耀眼的才华，没有让人记住的特点。你在人群里总是最安静的那个，聚会时坐在角落，开会时很少发言。安徒生写丑小鸭，那只小鸭子在整个故事里都在问自己是谁——它被鸭子嘲笑，被母鸡嫌弃，连它自己都相信自己是一只丑陋的废物。直到它在水面上看见自己的倒影。苔花如米小，也学牡丹开——你不需要变成牡丹才有资格绽放。你现在的普通不是你价值的判决，是你还在长羽毛的阶段。那些你以为毫无特点的日常——你认真完成的每一件小事，你对人不起眼的善意，你一个人默默坚持的爱好——都是你正在生长的羽毛。丑小鸭不是因为变成了天鹅才美丽，它本来就是天鹅，只是需要时间看见自己。你也需要时间。水面上那个倒影，已经在慢慢清晰了。',
    '你在底层做着最不起眼的工作，没有人关注你，没有人在乎你的去留。你觉得自己的存在轻如鸿毛，换了谁都一样。果戈理写《外套》，一个抄写文件的小公务员，穷得连一件像样的外套都买不起。他被人嘲笑，被人忽视，直到最后也没有人记得他的名字。但果戈理用整整一部中篇写了他——用文学给了他一个比生前所有人都更隆重的注目。时穷节乃见，不是在富裕的时候，是在最窘迫的时候，一个人的价值才真正显露。你在最底层坚持的那些东西——不偷工减料、不敷衍了事、不对别人使绊子——是你最珍贵的价值。没有人看见不代表不存在。果戈理看见了那个小公务员，他让无数读者也看见了他。我在这里写你，就是因为你和那个小公务员一样，值得被看见。你不需要飞黄腾达才有价值，你在泥泞里保持干净的鞋底，本身就是一种了不起。',
    '你觉得自己的声音太弱了。你发在网上的文字没人看，你在讨论时提的意见没人回应，你觉得自己说的话就像石头扔进深井，等不到回音。哈代笔下的人物大多活在沉默里——苔丝到最后也没能为自己辩护，裘德终其一生都没被世界理解。但哈代替他们说了。他用一整部小说替那些没有话语权的人说话。桃李不言，下自成蹊——你不需要大声喧哗才能证明自己存在。你在认真生活、认真思考、认真做一件小事的时候，你已经在走出一条自己的路。那条路现在可能还窄，还没有人经过，但它会越来越宽。不要因为暂时没有回音就放弃发出声音。你的声音不是没有价值，是还没有传到它该传到的人耳朵里。继续写，继续说，继续做。石头扔进井里，水面会有涟漪，只是你自己看不见。终有一天，有人会循着你走过的路走回来，告诉你：你当年的那句话，我听到了。',
    '你觉得自己是一个失败者。考试没过，面试被刷，表白被拒。你在深夜里把所有的失败摊在床上，一件一件地数，觉得这就是你人生的全部成绩单。伯尔写二战后的德国，写那些在废墟上捡破烂的人，写那些失去了一切却还在努力重建的人。他们身上没有荣耀，没有成就，但他们有一种你也能拥有的东西——失败者的尊严。粉身碎骨浑不怕，要留清白在人间——清白不是没有失败，是在失败之后没有放弃自己。你的那些失败不是你的污点，是你还没有被打倒的证明。每一件你经历过的事——被拒、落榜、失意——都在你的生命里留下了一道印记。这些印记不是你的耻辱，是你和命运搏斗过的勋章。把它们捡起来，别扔。你没有失败，你只是还在打仗。战场上有伤疤的人，比从未上过战场的人更有资格谈论勇气。',
    '你觉得自己被排挤在边缘。不属于任何圈子，不被任何群体接纳，你在哪里都像一个外人。你开始怀疑：是不是我真的不值得被接纳。布尔加科夫一生被苏联文坛排斥，他的作品在生前几乎无法发表。他在给斯大林的信里写道：我不是敌人，我只是一个作家。但他没有停止写作。他在最边缘的角落里写出了《大师与玛格丽特》——几十年后，全世界都在读他。咬定青山不放松，立根原在破岩中——你不是被边缘化，你是在破岩中扎根。那些被轻易接纳的人，他们的根在松软的土里；你的根，在岩石的缝隙里一点一点往下钻。现在你感觉不到自己的价值，因为你还在岩石里。但等你破土的那一天，你比任何人都更抗风。边缘不是流放地，是另一种中心。守住你在边缘的这片角落，它只属于你。在你最孤独的地方，长出你最坚硬的骨头。',
    '你常常觉得自己的话没有分量。你说了很多，但别人记不住；你写了很多，但没有人认真看。你觉得自己的表达是廉价的。兰波十六岁就写完了自己一生最重要的诗，然后二十岁封笔，跑去非洲做生意。他把语言当炼金术——每一个词都要在坩埚里烧过才能用。他相信语言可以改变现实。天生我材必有用——你的表达不是太多了，是还没被提炼。你的每一次书写、每一次开口，都是在锻炼你语言的金子。别人听不听得进去是他们的事，你有没有认真地、真实地说出你的想法，是你的事。不要让别人的冷漠削减你表达的热情。你在用语言一点一点锻造自己——每一次对着镜子说出的那句话，每一次在深夜写下的那行字，每一次在讨论中鼓起勇气说出自己的观点。你正在把自己的语言炼成金。继续练，有一天有人会听到，而且会被打动。',
    '你觉得自己离理想的生活太远了。你想要的是一种充满意义的存在，但你的日常是一堆琐碎的庸碌。你觉得这样的自己毫无价值可言。佩索阿一辈子在里斯本当一个小职员，给外贸公司翻译信件。他住在一个小房间里，没有去过远方，没有惊天动地的经历。但他写了几十卷诗和散文，把那个小房间变成了整个宇宙。道不远人——你想要的意义不在远方，不在某个理想的未来，就在你此刻的琐碎里。你每天做的工作、你下班路上买的那袋水果、你煮糊了的那锅粥——这些不是意义的对立面，它们就是意义的原料。佩索阿在翻译商业信件的间隙里，在一张碎纸片上写下一行诗。你也可以在通勤的地铁上读完两页书，在午休的十五分钟里写下一段话。日常不是平庸，是你还没有发现其中的神性。把今天做好，意义会自己来找你。',
    '你觉得自己受过的伤太多太多了。小时候被忽视，上学时被孤立，恋爱时被背叛，工作时被压榨。你觉得自己的心已经老得像一块千疮百孔的破布，没有什么价值可以再被任何人珍惜。莱奥帕尔迪一辈子体弱多病，被家庭束缚，被世人冷落。他在一首诗里写：寂寥的村落，漫漫长夜，我独自一人。但他把这些伤痛写成了意大利文学史上最美丽的诗篇。人生如逆旅——你是行人，但你不是两手空空的行人。你身上每一个伤疤都是一个故事，每一处针脚都是你在暗夜里自己缝的。你的价值不在你的伤痕里，在你把这些伤痕变成你能理解自己、理解别人、理解这个世界的基础。你没有被打碎，你只是被重新拼贴过。每一道裂缝里都渗进过光。拿出纸笔，把你最痛的一件事写下来。不是给别人看，是把它从你心里请出来，放在纸上看它。你会发现：它还在，但它已经不能控制你了。',
    '你常常为自己的渺小感到绝望。你在数字里是一个不起眼的学号，在城市里是一个不被记住的过客，在浩瀚的宇宙里是一粒连名字都没有的尘埃。你觉得这样的存在不值一提。威廉·布莱克说：一沙一世界，一花一天堂。他不是在比喻，他是在告诉你：你的渺小里装着一整个无限。一粒沙是一个完整的世界，一朵花是一座完满的天堂。你的价值不需要庞大来证明。你不是宇宙里可有可无的尘埃，你是一粒沙里的整片海滩。你此刻坐着的这个角落，你正在过的这一分钟，你此刻心里翻涌的这个念头——它们都是无限的入口。把注意力从宏大的虚无里收回来，放到眼前最小的一件事情上：你的呼吸，你的手，你杯子里水的温度。当你真的进入这粒沙，你会发现，你要找的意义一直就在这里。渺小不是缺陷，是你通向无限的秘道。',
    '你被别人的期望层层裹住。父母希望你稳定，伴侣希望你陪伴，老板希望你拼命。你在所有人的期望里疲于奔命，却找不到自己在哪里。易卜生写《玩偶之家》，娜拉一直是父亲的玩偶、丈夫的玩偶，直到有一天她摔门而去。她对丈夫说：首先，我是一个人，和你一样的人。不畏浮云遮望眼——那些期望就是浮云，它们遮住了你看见自己的视线。你必须在这些浮云里找到你自己的眼睛。你今天不需要像娜拉那样离家出走，但你可以在心里划出一个空间：这件事是我自己想做的，不是为了让任何人满意。哪怕很小——读一本别人觉得无用的书，学一个别人觉得没用的技能，去一个别人觉得没意思的地方。你自己的选择，是你的价值最坚实的底座。当别人问你为什么，你不需要解释。你的回答只需要六个字：因为我喜欢。这六个字，是娜拉在门关上之后，对自己说出的第一句话。',
    '你焦虑自己还没有到达。还没有找到好工作，还没有遇到对的人，还没有成为自己想成为的人。你觉得到达不了就是一场失败。卡瓦菲斯写伊萨卡，奥德修斯花了十年才回到家。但他说：伊萨卡给了你漫长的旅途。如果没有那座岛屿，你就不会出发。它给你的，就是这段路本身。莫愁前路无知己——你现在还没有到达，但你已经不是出发时的你了。你在这段路上学会的本事、遇到的人、克服过的恐惧，才是你真正的获得。不要只盯着那个还没到的终点。回头看一下你已经走了多远。你在路上遇到的每一个“知己”，都是价值的一部分。终点当然重要，但没有这漫长的、有时让你怀疑自己的路，终点根本不值得抵达。祝你的路漫长。祝你在找到你要的东西之前，先成为可以配得上它的那个人。',
    '你觉得自己的世界太小了。没有出过国，没有见过大的世面，视野狭窄，格局不大。你在和人比较时，总觉得自己是一口井底之蛙。米沃什一生经历了流亡、战争和失去故乡，但他晚年说：我在最小的角落里找到了最广阔的风景。他写苹果树下的光影，写家乡的一条河，那些小得不能再小的东西，在他的诗里变成了全人类都能看懂的画面。海内存知己，天涯若比邻——你的世界不在地图上，在你的感受里。你不需要走遍世界才能拥有大格局，你需要的是深入地、真诚地、不敷衍地理解和表达你自己的生活。你的小世界里藏着的悲欢离合，和任何一部伟大的戏剧没有区别。你的井底，也可以是一整片天空的倒影。不要用别人的坐标丈量自己的大小。你在这个狭小空间里长出的每一根触须，都通向人类共同的情感。你的小，就是你的全部。全部就是最真的。',
    '你觉得自己被过去的一段经历弄碎了。可能是失恋，可能是失败，可能是一次被最信任的人背叛。你觉得碎掉的自己是残缺的，残缺的自己是毫无价值的。尤瑟纳尔写哈德良皇帝，在生命的尽头回顾自己的一生。他拥有过一切，也失去过一切。他说：我开始看见自己生命最完整的轮廓。这轮廓里包括他所有的伤。人有悲欢离合——你不是被弄碎了，你是被重新雕刻了。月亮的阴晴圆缺不是缺陷，是它的完整。你的悲欢离合也组成了你的完整。那道你以为的裂痕，是你和别人不一样的证明。你没有碎，你只是变成了一个更复杂的形状。这个形状里有你全部的过去，有你还没有到来的未来。把你那道最深的伤拿出来，看看它。它现在还在疼，但有一天，它会变成你最独特的纹理。不是掩饰它，是把它镶嵌进你的自我画像里，成为最有力的那一笔。',
    '你觉得被生活困住了。被经济困住了，被学历困住了，被家庭困住了。你觉得自己的价值被这些看不见的墙囚禁，无法施展。索尔仁尼琴在古拉格群岛的集中营里蹲了很多年。那个地方没有任何自由——不能自由说话，不能自由写作，不能自由活着。但他发现了一种无法被剥夺的自由：他仍然可以选择自己面对这一切的态度。他可以在心里写诗，在脑子里排练戏剧，在被押解的路上观察一片云的形状。山重水复疑无路——你的困境是真的，但你的内心没有被困住。你可以在任何处境下选择看待它的角度，选择应对它的方式。这不是阿Q精神，这是一个集中营囚徒用生命验证过的真理：外界可以剥夺你的一切，但无法剥夺你在心里为自己保留的最后一块领地。在那块领地上，你是自由的，你仍然可以播种、浇水、等花开。守住这块领地，这是你一切价值的最底层地基。',
    '你觉得这个世界对你不公。你努力了没有得到回报，你善良了没有得到善待。你开始怀疑：做一个好人是不是最亏的买卖。普里莫·莱维从奥斯维辛活着出来，他没有变成一个仇恨的人。他在书里写那些在集中营里依然分面包给别人的人——在人类道德最不可能存在的地方，依然有人选择了善良。己所不欲，勿施于人——在最极端的环境里，这句话不是道德教科书上的空话，是一个人为自己保留最后一点人的尊严的唯一方式。你选择继续善良，不是因为你傻，不是因为你不懂这个世界有多残酷，是因为你在残酷里依然拒绝变成你讨厌的那种人。这本身就是你作为一个人的最高价值。不要被“好人没好报”这句话骗了。好的报应不是立刻兑现的，但它会在你最意想不到的时候，以你想不到的方式回来。即使不回来，你也没有输。你在最艰难的时候守住了自己，这已经是赢了。',
    '你觉得自己的脑子很乱，什么事都想不清楚。计划永远赶不上变化，目标模糊，方向不清。你觉得自己连自己都管不好，还谈什么价值。曼德尔施塔姆的诗句常常被认为晦涩难懂，他的意象跳跃，逻辑断裂，像一个脑子里塞满了太多东西、无法整理的人。但他不整理。他说：我的诗是失序的，因为我的时代是失序的。问君何能尔，心远地自偏——你不需要把一切都理清楚才能活。你可以带着混乱往前走。那些你暂时想不明白的事，可以先把它们放在一边。你心里的地是偏的、乱的、没有条理的，没关系。你不需要向任何人交出一份整洁的人生规划书。你的价值不在你的条理性里，在你愿意在混乱中继续往前走这件事里。走一步，看清一点。看不清也没关系，继续走。答案不是在起点想出来的，是在路上碰到的。',
    '你对自己太苛刻了。一件事做到八十分，你盯着扣掉的二十分不放。你觉得自己不够好，不够完美，总是在关键时候掉链子。蒙田写了厚厚一部随笔集，从头到尾都在做一件事：坦坦荡荡地展示自己的不完美。他说他记性不好，说他优柔寡断，说他个子矮，说他有各种毛病。但他不是在检讨，他是在说：看，我不完美，但我依然值得被认真对待。金无足赤，人无完人——这句话不是让你降低标准，是让你把自己当人看。你不是机器，不是程序，不是可以无限优化的产品。你会犯错，会偷懒，会在重要场合说错话。这些都是你作为人的一部分。从今天开始，允许自己每天犯一个错误。犯错不是你价值的折扣，是你人性的完整。把对完美的苛求换成对完整的追求。完整的人比完美的人更有价值，因为完整里有温度，完美里只有冷冰冰的标准。',
    '你觉得这个世界太功利了。你的理想没有人理解，你的坚持被人笑话，你做的事情在别人眼里没有半点“用处”。你开始动摇：是不是我错了，是不是我真的太天真。奥登在二战前夕写下“我们必须相爱，否则就会死去”。后来他自己把这句话划掉了，说诗不能让人发生任何事。但他还是继续写诗，写了一辈子。贫贱不能移——你守着的那个别人觉得没有用的东西，是你之所以是你的理由。你做的不需要有用，不需要变现，不需要被所有人理解。你喜欢就够了。奥登的那句诗最终流传了下来，被无数人引用，但他自己或许并不在乎。你的价值不在你的坚持有没有得到认可，在你还在坚持。在一个什么都要“有用”的时代，做一件“没用”但你自己喜欢的事，就是最有力的抵抗。守住它，像守着一盏只有你能看见的灯。',
    '你觉得自己分不清什么是自己真正想要的，什么是别人告诉你该想要的。你觉得自己像一只有太多方向而不知道该往哪飞的蝴蝶。卡尔维诺写《看不见的城市》，马可·波罗对忽必烈可汗描述那些不存在的城市。每一座城市都是一个人内心的投射——有的城市是欲望的形状，有的城市是记忆的形状，有的城市是恐惧的形状。庄生晓梦迷蝴蝶——你不知道是你在追梦想，还是梦想在追你。这不重要。重要的是你一直在描述，在建造，在想象。你不需要现在就分清什么是真实、什么是虚幻。你可以用很多年来建造你心里的那些城市，然后有一天，当你不再需要问自己“我是谁”的时候，你就到达了其中的一座。停下来看你自己正在建造的那座城。它可能还很乱，还在施工，但它是你的。继续造，总有一天你会在里面醒来，发现自己就是那座城。',
    '你觉得自己被这个时代放逐了。你热爱的东西已经过时了，你坚守的东西没人再在意。你在一个推崇速度和效率的时代里，坚持着一种缓慢、不流行、甚至被人嘲笑的生活方式。托马斯·曼在纳粹上台后被迫离开德国，他流亡国外，失去了读者，失去了国籍，失去了他曾经拥有的一切。但他继续写。他在异国的旅馆里、在陌生的语言包围中，写出了他一生最重要的作品。富贵不能淫，贫贱不能移——你的价值不依附你所在的时代。时代会变，潮流会改，但有些东西——你守住的诚实、你坚持的品质、你不肯妥协的原则——它们会穿越时间。你现在可能是被放逐的少数，但放逐也是你价值的一部分。它让你和那些顺应潮流的人不一样。你不是过时了，你是超前了。或者你根本不在乎过时还是超前，你只是在自己选的那条路上走。继续走。放逐是你和这个时代的距离，这段距离，刚好够你长成你自己。',
    '你对自己感到失望。在某个关键时刻你退缩了，你没有像你想象的那样勇敢、无私、坚定。你发现自己原来也软弱、自私、会害怕。这个发现让你觉得自己没有那么好了。戈尔丁写《蝇王》，一群孩子在荒岛上脱离了文明社会之后，很快暴露了人性里最阴暗的部分。但有一个孩子——猪崽子，他一直在试图维持秩序，他一直在说“我们不是野人”。他不是完美的，但他没有停止尝试。人之初，性本善——这不是一个事实判断，是一个选择。你在发现自己的阴暗面之后，你选择了什么。你还在为自己的退缩感到羞愧，这说明你还没有变成你不齿的那种人。你的愧疚是你身上最值得珍惜的品质之一。它证明你的良知还在，你的标准还在，你对更好的自己还有渴望。不要因为发现自己会害怕就否定自己。真正的勇气不是不害怕，是害怕之后还在往前走。你已经在走了，这就是你善良的证明。',
    '你离开家乡来到陌生的城市，一个人都不认识。你觉得自己像一条被扔在旱地上的鱼，想念故乡的每一阵风、每一道菜、每一句带着乡音的话。你觉得在这里没有人认识你，你什么都不是。拉克斯内斯写冰岛的渔民，那些在暴风雪里出海的人。他们不是为了什么伟大的理想，只是为了回家能给炉灶添一把火。独在异乡为异客——你现在是异客，你的价值不体现在你融入了什么地方，体现在你为了什么在坚持。你想家，是因为你有家可回；你觉得孤单，是因为你心里有温暖的东西可以对比。你在异乡挣扎的每一天，都是在为你心里那个家添一把火。你不需要在这个陌生城市里立刻成为什么人。你只需要今晚给家里打个电话，明天早上起来继续做你该做的事。家乡的空气不在你身边，但你呼吸的方式还是那里的。你带着家乡在走，你不是孤身一人。',
    '你被人贴上了很多标签：内向、敏感、不合群、书呆子。你试图撕掉这些标签，但它们像口香糖一样粘在你身上，越撕越狼狈。最后你开始怀疑：是不是他们说的都对。艾米莉·狄金森一辈子没有结婚，几乎足不出户，穿着一身白裙子在她父亲的房子里写了将近两千首诗。整个镇子的人都觉得她是个古怪的老姑娘。她不在乎。她写：我谁都不是，你是谁。我辈岂是蓬蒿人——她用一整生回答了这个问题：你不是他们嘴里的任何名字，你是你自己。那些给你贴标签的人，他们只是需要用一个简单的词来理解你。但你不需要用一个简单的词来理解自己。你是复杂的、矛盾的、不断变化的。你不是内向，你是喜欢深度；你不是敏感，你是比别人更早感知到温度的变化；你不是不合群，你是还没有找到你的那群人。把标签扔掉。不对，把它们还回去。那是他们的标签，不是你的名字。',
    '你觉得前途一片漆黑。不知道自己要去哪里，不知道脚下的路是不是对的，不知道再往前走会不会掉进深渊。你觉得自己在瞎摸，浪费了时间，也浪费了自己。萨拉马戈写《失明症漫记》，整座城市的人一夜之间都瞎了。只有一个女人还看得见。她带着一群盲人在废墟里找食物、找水、找活下去的路。她也害怕，她也不知道明天会怎样，但她没有闭眼。盲人骑瞎马，夜半临深池——你现在感受到的就是这种恐惧。但你还能看见自己的恐惧，这说明你没有瞎。你还有视力，你还能带着那个盲目的、不知道往哪走的自己继续摸索。你的价值不在你看得清楚，在你是那个还睁着眼睛的人。在一片黑暗里，睁着眼睛本身就是一种光。继续睁着，为你自己，也为那些和你一样在黑暗中摸索的人。你不知道出口在哪里，但你还在找，这已经是你最了不起的价值。',
    '你偶尔会在某个无所事事的下午忽然感到一阵虚无。你问自己：我做这些到底有什么意义。你给不出答案，然后你会慌，会想自己是不是在浪费生命。谷川俊太郎写诗写了几十年，他说：我活着，这件事本身就是一个奇迹，不需要任何意义来证明。采菊东篱下，悠然见南山——陶渊明不是在做什么有意义的事，他只是在采菊花、看山。但他写出了一千多年来无数人最向往的画面。你不需要每时每刻都为自己的存在找到理由。有些时刻就是用来发呆的，就是用来无所事事的，就是用来感受一阵风、看一片云、喝一杯白水的。这些时刻不是浪费，是你给自己留的呼吸。你的价值不在你产生了多少效益，在你是一个会思考“意义”这个问题的人。你会问意义，说明你还活着，还在感受，还在思考。这个问题本身比任何答案都更值得珍惜。今天下午，允许自己不看山不采菊，只是坐着。66· 不完整的圆（原创，融合赫尔曼·黑塞的对立统一与里尔克的诗性哲思）——“世界上任何一本书都不能带给你好运，但它们能让你悄悄成为你自己。”——赫尔曼·黑塞你一直觉得自己缺了什么——缺那份从容，缺那份笃定，缺那种与生俱来的自信。你像一张缺了一角的圆，在人群中滚动时总是被那个缺口绊住，你把这缺口叫做“我不够好”。但黑塞在《纳尔齐斯与歌尔蒙德》里让两个截然相反的人成为彼此完整的另一半——一个代表理性与秩序，一个代表感官与流浪。他们不是互相填补，是互相证明：完整从来不等于没有缺口。里尔克在写给青年诗人的信中说：让一切发生。你的缺口也是你的一部分，它不是需要被填平的缺陷，是你这个圆唯一的特征。一个没有缺口的圆会在人群中滚得最快，但它到哪里都只是另一只圆。你的缺口让你在某个地方停下来——停在别人注意不到的角落，停在只有你会弯腰看的裂缝，停在你自己的深处。那缺口是你与这个世界接触的界面，是你用来接住那些只有你能接住的东西的手掌。今天，不要再用“我不够好”命名你的缺口，用“我还没结束”。一本书不会因为缺了一页就变成废纸，它是一本还在写的第一版。你的价值不是由一个没有缺口的完美圆形决定的，是由你带着这个缺口、在你不完美的轨道上、仍然一圈一圈往前滚的全部旅程决定的。你不是缺角的残次品，你是被缺口塑形的手稿。继续写，你还在成为你自己。'
];

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

window.onload = function(){
  showQuote();
  showDate();
};
