/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你觉得自己力量太小，学历不够硬，经验不够多，资源不够丰富。你站在巨大的职业困境面前，觉得自己像一只蚂蚁想撼动一棵树。阿基米德没有用神力去搬石头，他找到了杠杆和支点。给我一个支点，我就能撬动地球。你不需要一开始就有撬动地球的力量，你只需要找到你自己的支点。你的支点是什么——是你比别人多一点的对某个小众领域的了解，是你从失败里积累起来的对某个行业痛点的直觉，是你认识的那个能给你第一手信息的人。今天，找到你的支点。它可能很小，小到你一直没有注意过它。但它就在你已有的经验里——在你做过的那份不起眼的实习里，在你为了兴趣自学的那个技能里，在你花了很多时间研究的那个问题里。你不需要撼动整个职场，你只需要在今天把杠杆放在支点上，压下去一厘米。蚂蚁不会变成巨人，但杠杆可以。你的支点是你已经拥有的东西，用它。',
    '你觉得自己的职业规划已经变成了一片废墟。大学选的专业找不到对口工作，实习时积累的经验在新行业里被清零，你曾经相信的那条路已经断了。德国作家塞巴尔德用一生写废墟——被轰炸的城市，被遗忘的村庄，被历史碾过的普通人。他说，废墟不是历史的终结，是记忆的另一种形式。你的职业废墟也不是你的终结，是你经验的新形态。你过去的专业训练不是你白费的青春，是你现在思维方式的底层代码。你实习时积累的经验不是被清零的积分，是你对工作这件事已经建立起来的肌肉记忆。今天，重新盘点你废墟里的资源——不是从零开始，是从你已有的经验里找到能被迁移的部分。废墟是记忆的另一种形式，你的过去没有白费，它们只是需要被重新组合。塞巴尔德把废墟写成杰作，你也可以把你断掉的路径重新接上。你不是从零开始的失地者，你是带着全部经验重新出发的重建者。',
    '你觉得自己在职业的浅水区挣扎了很久，一直不敢往深处走。你想转行，想学新技能，想试试那个你真正感兴趣的领域，但你怕深处没有光，怕自己一跳下去就再也上不来。库斯托是海底探险家，他发明了水肺，第一个拍到了深海发光的生物。他在海洋最深处发现了光——不是阳光，是生物自己发出的、不需要任何外部光源的光。你的深处也有这样的光。你真正感兴趣的那个领域，你一直想尝试的那个方向，它们可能不像热门行业那样被所有人看见，但它们有你自己的生物光。今天，花一个小时，往你感兴趣的深处潜一次——查一个相关岗位的要求，找一个在那个领域工作的人聊聊，读一篇那个方向的入门文章。你不用一开始就辞掉现在的工作，你只需要先潜下去看一眼。库斯托说，深处的光不需要太阳的认可。你的方向也不需要所有人都认可。潜下去，那里有只属于你的光。它一直在深处等你，只是你以前没有潜下去看过它。',
    '你被那些早早成名、年少得志的故事压得喘不过气。你觉得自己已经过了那个可以闪闪发光的年纪，再也没有机会追上去了。乔治·艾略特四十岁才出版第一本小说，在那之前她是被人议论的“老姑娘”、翻译员、乡下牧师的女儿。成为你本来的样子永远不会太晚。你不是在追赶谁的时间表，你是在用你自己的节奏变成那个你还没有完全成为的人。那些早早成功的同龄人走在他们的时区，你有你自己的时区。你今天做的工作、学的技能、熬过的迷茫，都是你还没有写出来的那部小说里必要的章节。艾略特在写出《米德尔马契》之前，花了二十年阅读、翻译、思考。没有人催她，她也没有催自己。今天，不要再拿别人的速度要求自己。你本来的样子还在形成中，而任何时候开始成为它，都是正好。你的那部杰作还在后面，你要先活出它需要的所有篇章。',
    '你觉得自己被推着走——被父母的期望推着考公，被就业压力推着找自己不喜欢的工作，被房贷推着不敢辞职。你觉得你做的每一个选择都不是你自己的，你没有自由。萨特说：人注定是自由的。你不是被推着走，你是在每一个你觉得自己没有选择的时刻，都选择了顺从。你不需要今天就把所有责任重新扛起来，但你可以在今天做一个小到不能再小的、完全属于你自己的选择——在别人都点奶茶时点一杯你想喝的柠檬水，在群聊里对那个你其实不认同的说法说出你的真实想法。萨特说，你不只是对你选择的事负责，你也对你没有选择的事负责。你今天的工作可能是你为了生活做出的妥协，但你在工作之外还有属于你自己的两个小时。那两个小时是你完全的自由。用它做一件你真正想做的事。你的自由不在辞职信里，在你每天那两个小时的坚持里。你一直在选择，只是你忘了你也有选自己的权利。',
    '你看着别人一个个转行成功、找到方向、活得越来越笃定，只有你还在犹豫不决。你觉得自己像一只困在茧里的虫，不知道什么时候才能出来，不知道自己会变成什么样子。E.B.怀特写了《夏洛的网》，也写了《风格的要素》。他每天早晨在纽约客的办公室坐下来，都要重新说服自己一次。不是因为他没有才华，是因为每一天的写作都是新的开始，昨天的自信不能用到今天。你的犹豫不是你的弱点，是你每一天都在重新做出选择。你不需要一下子变成蝴蝶。你只需要今天还在茧里，今天还在动。怀特每天早上说服自己，你每天早上也从床上爬起来继续面对不确定的未来。这不是原地踏步，是你每一天重新站到选择的节点上。今天，对着镜子里那个还在茧里的人说：我不需要今天就知道全部答案。我只需要今天还在。怀特写了一辈子，每天早上都重新说服自己。你也是，你不是停滞，是还在持续地选择继续。',
    '你觉得在职场里自己只是一个小角色，学历一般，技能普通，做的决策影响不了什么。你觉得自己可有可无。托尔金写《魔戒》，让一个身高只有正常人一半的霍比特人去完成摧毁魔戒的任务。弗罗多不是什么英雄，他只是一个喜欢安静、爱喝下午茶的普通霍比特人。但在最关键的时刻，他往前迈了一步。即使是小人物，也能改变未来的进程。你现在做的每一件小事——把数据整理得比别人更清晰，在邮件里多写了那句关键的信息，在开会时补上的那个别人没想到的细节——都是在为以后更大的时刻做准备。你不是在跑龙套，你是在扮演只有你才能演的角色。今天，在最小的任务里把它做到最好。不是因为它小，是因为你是那个认真对待它的人。弗罗多也没有魔法，他只是往前走了一步。你今天迈出的这一步，可能是你未来的全部转折。小人物的每一步，都在改变未来的进程。',
    '你被“内卷”的文化裹挟着往前跑，每个人都告诉你必须比别人更强、更快、更能吃苦。你把职场当成了一片需要征服的荒野，觉得自己如果不把这荒野踩在脚下，就会被它吞没。加里·斯奈德是垮掉派诗人，也是禅宗修行者，他一辈子在北加州的山林里做护林员。他说，自然不是要被征服的，是要被理解的。你的职场也不是荒野，是一片需要被你理解的生态。你不是来打仗的，你是来观察、适应、共生的。那些比你快的同事是鹿，那些比你强的对手是鹰，而你可能是另一种动物——也许是一只慢慢挖洞的獾，也许是一棵不急不慢长着的树。今天，不要逼自己去征服谁。观察一次你所在的“生态”——你老板的节奏，同事的压力，客户的需求。你不需要变成最强的掠食者，你只需要找到你在其中的位置。自然不偏爱谁，它只是运行着。理解了它的运行，你才能在其中找到自己的活法。斯奈德的山林不是战场，你的职场也可以不是。',
    '你觉得自己被卡住了——专业不对口，经验不够，好工作全要求“三年以上相关经验”。你觉得自己像一颗被压在石头下面的种子，找不到任何向上的缝隙。纳丁·戈迪默是南非作家，诺贝尔文学奖得主。她在种族隔离最严酷的年代写作，她的书被禁，她的人被监视，但她从石头般的制度里找到了一道裂缝，把种子种了下去，然后开出了花。你的裂缝可能是那个没有人愿意接的项目，可能是那个被忽视的小众需求，可能是你比别人多懂一点的那个小技能。把种子种进那道缝里，每天浇一点水。不需要破石而出，先在里面扎下根。石头还在，但种子已经在长。今天，找你行业里一道还没有被填满的缝——一个别人嫌小不做的领域，一个被忽略的用户需求，一个你觉得可以做得更好的细节。那就是你的裂缝。戈迪默的种子从石头里开出了花，你的也是。石头不是你的敌人，是你保护种子最初的屏障。',
    '你被这个快速运转的时代裹挟着向前，觉得自己必须快点、再快点，否则就会被同龄人远远抛下。你把人生的全部希望都寄托在下一个目标上，像一台永不停机的马达。卡尔维诺在《看不见的城市》里写马可·波罗与忽必烈汗的对话，让一个威尼斯商人在蒙古帝国的宫殿里，慢慢描述那些不存在的城市。要慢慢来，如果你急着到达，就会错过所有你应该停下来的地方。你的职业之路也是一座需要慢慢描述的城市。你今天停下来的地方——那个被拒绝的面试，那份让你委屈的工作——都是这座城市里不可替代的建筑。不要只盯着终点的城门。今天，在你急着赶路的时候，停下来看一眼你现在所在的位置。它不是你的终点，但它有你还没有发现的细节。卡尔维诺的城市不会因为你急着离开就不再美丽。你的职业之城也在建造中。不要跑得太快，那些被错过的细节，是你以后复盘时最宝贵的材料。',
    '你觉得自己被边缘化了——进不了大厂，拿不到好offer，不在那些被所有人羡慕的行业里。你觉得自己是一个被职场主流抛弃的流亡者。爱德华·萨义德是巴勒斯坦裔学者，他在美国最顶尖的大学里教书，但他一生都觉得自己是局外人。他把这种体验写成了一本书——《知识分子论》。他说，流亡是最接近自由的体验。你在边缘的位置给了你一种自由——你不用被主流的规则绑住，不用害怕失去你已经不在其中的东西。你可以尝试那些大厂员工不敢试的方向，你可以打破那些在主流圈子里被奉为真理的职业教条。今天，用一次你的“边缘特权”——做一件主流规则里觉得“没用”的事：读一本和工作无关的书，学一个暂时用不上的技能，探索一个别人觉得没前途的方向。萨义德的流亡不是他的缺陷，是他能看见主流看不见的盲点的原因。你的边缘也是。你不是被抛弃，你是拥有了观察中心的距离。',
    '你觉得自己的工作毫无意义，每天都像在同一个圈子里打转。你羡慕那些换行成功的人，觉得他们去了新大陆，只有你还困在旧风景里。普鲁斯特哪里都没有去，他只是躺在一个密不透风的房间里，用全新的眼睛重新看了一遍自己的整个一生。真正的发现之旅不在于寻找新的风景，而在于拥有新的眼睛。你不需要辞职才能发现你现在工作的价值。你需要的是把那些你习以为常的工作，用新的眼睛重新看一遍。你今天打的每一个字、做的每一张表、沟通的每一个客户，都可能藏着你还没有发现的经验碎片。今天，拿你工作里最普通的一件事，用普鲁斯特的方式重新描述一遍——不是用述职报告的词汇，是用你自己的感受。你会在里面找到你以前从来没有注意到的细节。发现之旅不在下一份工作里，在你开始用新眼睛看今天这份工作的那一瞬间。',
    '你觉得自己被工作异化了——每天像机器一样运转，做着毫无创造性的重复劳动。你觉得自己不是人，是生产线上随时可以被替代的一个环节。汉娜·阿伦特在《人的境况》里把人的活动分成三种：劳动、工作、行动。劳动让你生存，工作让你建造一个持久的世界，行动让你成为你自己。你今天做的不全是劳动，你中间那些创造性的瞬间——你改进了一个流程，你教会了新同事一个技巧，你在会上发表了一个没有被要求但你自己想说的观点——都是行动。你不仅是劳动的奴隶，你是可以在任何时候切换到“行动”模式的人。今天，在你最重复的劳动里，找到一次可以行动的机会——改进一个小细节，输出一个你自己的观点，主动帮助一个同事。阿伦特说，行动不需要被授权。你不需要等到换了工作才开始成为人。你今天就可以。劳动是必要的，但你可以在劳动里一直保留行动的能力。你不是机器，是随时可以选择行动的自由人。',
    '你觉得自己所有的努力都没有得到回报。投的简历石沉大海，做的项目不被看见，熬的夜没有人知道。你觉得自己是一颗被埋得太深的种子，已经没有力气再往上拱了。古埃及《亡灵书》是写在纸莎草上陪葬死者的经文，里面有一句话：我是一颗种子，我将再次发芽。它不是写给活人的，是写给死者在来世的。但一颗在金字塔里埋了几千年的种子，今天被考古学家挖出来还能发芽。你的努力不是没有回报，是你还没有看到它在土壤下面的全部生长。根在地下的时候，没有人看得见，但它比地面上的茎叶更长、更密、更耐得住干旱。今天，看看你自己埋下了哪些种子——你学过的技能，你认识的人，你做过的失败项目。它们都在地下长根。你不知道哪一天哪一颗会发芽，但它们没有一颗是死的。《亡灵书》的种子等了几千年，你的不会等那么久。继续埋，继续浇。你的春天不是不到，是还在路上。',
    '你被铺天盖地的就业信息、行业趋势、职场干货淹没，每天刷手机到深夜，越刷越焦虑。你觉得所有的信息都在告诉你：你不行，你落后了，你选错路了。克劳德·香农是信息论之父，他定义了“信息”这个词——信息不是什么都接收，是消除不确定性的东西。你每天刷到的大部分内容不是信息，是噪音。它们增加你的焦虑，但不消除你的迷茫。今天，取关三个让你焦虑但没有给你任何实际帮助的账号，删掉那些反复推送同质化焦虑新闻的APP。你需要的不是更多的噪音，是更少但更准确的信息——一个真正在你目标行业里工作的人给你的建议，一份真实的行业报告，一个你能立刻用上的技能教程。香农说，信息消除不确定性。噪音增加不确定性。你不需要被噪音喂大，你需要被信息校准。今天，用香农的标准衡量你每一条接收的内容：它在消除我不确定的事，还是在增加我的焦虑。前者留着，后者删掉。你不是信息落后的受害者，是噪音过载的承担者。关掉噪音，信号会自己浮现。',
    '你被未来的不确定性压得无法呼吸。你不知道五年后自己的行业还在不在，不知道AI会不会取代你，不知道自己现在学的技能到时候是不是已经作废。狄更斯写《圣诞颂歌》，让吝啬鬼斯克鲁奇在一夜之间看到自己的过去、现在和未来。过去的已经过去了，未来的还没有来，只有今天能改变。我只有今天能确定。你不需要解决五年后的所有问题，你只需要在今天，在你的能力范围内，做一件今天能做的事——更新一行简历上的字，学会一个新技能的最基础部分，和一个在你想去的行业里工作的人聊十分钟。未来是不确定的，但你今天的行动是确定的。狄更斯让斯克鲁奇在圣诞节早晨醒来，发现一切还来得及。你今天醒来，也是一切还来得及。未来在你今天的行动里被塑造，不需要在今天解决明天的问题。把明天的焦虑留给明天，今天的你只需要做今天的事。斯克鲁奇变了，不是因为他看到了未来，是因为他在今天早上决定了改变。',
    '你觉得自己被卡在一个太窄的入口前面——门槛太高，竞争者太多，你的资历不够。你觉得那扇门是你唯一的出路，而你挤不进去。加拿大诗人安妮·卡森是古典学教授，也写最前卫的诗。她翻译古希腊悲剧，把那些被命运卡在绝境里的人重新带到现代读者面前。有时候最窄的门通向最宽的厅堂，这是她的诗句。你现在挤不进去的那扇窄门，也许后面并不宽敞。也许你需要找另一扇属于你的门——可能它不是最热的行业，不是最被看好的岗位，不是最光鲜的公司。但它可能通向更宽的地方。今天，在你挤不进去的那扇门旁边，找一扇你可能以前没有注意到的侧门——一个相关但不那么热门的岗位，一个你从来没有考虑过的细分领域，一个别人嫌麻烦不愿意做的方向。窄门后面不一定是宽厅，你的侧门可能通向整片旷野。卡森说最窄的门通向最宽的地方，是因为走窄门的人最少，里面的空间最充裕。你的门不需要和别人一样窄。找你的侧门，里面可能比所有窄门加起来都更宽敞。',
    '你看着招聘要求上那一行“年龄限制”，觉得自己的职业生涯已经被判了死刑。你觉得晚了——转行晚了，重新开始晚了，和那些刚毕业的年轻人竞争晚了。歌德二十四岁写出了《少年维特之烦恼》，名震欧洲。但他没有停在那里，他用剩下的六十年继续学习、写作、研究光学、管理剧院、当部长。他在临死前还在修改《浮士德》第二部。成为你自己，永远不会太晚。歌德的“自己”不是一个在二十四岁就已经完成的成品，是他用一生不断重写、不断修改的手稿。你现在的职业也不是成品，是草稿。转行是你在改稿，重新开始是你在重写开头，和年轻人竞争是你在给自己加新的章节。你没有迟到，你只是还在写作中。今天，把自己当成一部还没有完成的长篇小说——你已经写好的章节没有白费，它们是你现在能继续往下写的全部底气。歌德用一生重写自己。你也可以。你的下一章，现在就可以开始写。',
    '你被困在格子间里，每天做着自己不喜欢的工作，觉得人生被浪费了。你羡慕那些自由职业者、数字游民、敢于辞职去大理的人。你觉得他们活在你永远也到不了的旷野。安妮·迪拉德在《溪畔天问》里写自己住在弗吉尼亚的溪谷边，每天观察同一片树林、同一只螳螂、同一条溪水。她哪里都没有去，但她用一整本书证明了：旷野不在远方，在你度过每一天的方式里。你今天的工作不是旷野的反面，是你还没有在里面找到属于你的“溪畔”。那只螳螂是你工作中的某个细节，那条溪水是你每天重复但可以越做越深的技能。今天，在你觉得被困住的日常里，找一个可以让你停下来观察的细节。不是辞职信，是你在现在的工作里，用迪拉德的眼睛重新看一遍你做了无数遍的事。你不需要搬到旷野，旷野在你观察它的方式里。你怎样度过今天，就会怎样度过这被困住却仍然可以属于你的一生。',
    '你觉得自己是一个失败者。创业失败了，被裁员了，考公落榜了。你把“失败”这两个字写在简历上，觉得它就是你的全部判词。奥登在二战后写诗，欧洲一片废墟，他的很多朋友死了，他离开英国去了美国。有人问他为什么离开，他说：如果我不能，至少我试过。他写诗写到晚年，面容被皱纹和酒精摧毁，但他还在尝试。失败不是你的判词，是你试过的证据。你今天看到的那些成功者，他们也有你没有看到的失败版本。那些版本没有被发在朋友圈里，没有写在简历上，但它们存在过。你今天的失败不是终点，是你“至少试过”的全部证据。今天，把你的失败写成一份“尝试清单”——你尝试过什么，你在尝试中学到了什么。它不需要被任何HR看到，它只需要被你自己看到。奥登说，至少我试过。这句话不是自我安慰，是失败者独有的尊严。你试过了，你还在试。这就是你还没有被打败的全部原因。',
    '你被“三十岁之前必须做到什么”的闹钟追着跑，每天都在焦虑中醒来。你觉得时间不够用，机会不等人，你必须快一点再快一点，否则就被所有人抛在后面。詹姆斯·索特写《光年》，用了一生。他的句子短得像被斧头劈过的木头，每一个词都经过了漫长的等待。他不在乎谁跑到前面去了，他只用他在乎的方式写他真正想写的句子。生活是一道太短的桥，不值得匆忙。你不需要在三十岁之前完成所有事。你不需要在今天解决五年后的全部问题。你只需要在今天，在你最在乎的那件事上，往前挪一小步——读两页相关的书，写一段只有你自己会看的计划，在你想去的方向看一眼别人的经验。桥很短，但你走得太快会错过桥上的全部风景。索特说，不需要匆忙。你的职业不是一场百米赛，是你还在走、还来得及看的全部桥面。走慢一点，风景比终点更值得你花时间。',
    '你觉得自己被磨平了。刚毕业时的热情被加班磨平了，被拒绝信磨平了，被生活中那些不太好的小事情磨平了。你觉得自己心里的火已经灭了。斯坦贝克在写《伊甸之东》时，每天都在日记里和自己对话。他写到崩溃，写到怀疑自己，但他每一天都在日记里写同一句话：我现在还活着，这就是全部。他不是在自我麻醉，他是在告诉自己：只要还活着，火种就没有完全熄灭。你今天觉得被磨平的，不是火种，是包在火种外面那层太容易烧尽的浮躁。火种还在，在你的核心里。在你今天忍不住又点开了那个你想去的行业的网页，在你还在看这段文字而不是彻底放弃，在你还在寻找答案的此刻。今天，做一件小事证明你的火种还在——给一年后的自己写一段话，不用长，就告诉他你现在还没有放弃。斯坦贝克在日记里对自己说了无数次“我还活着”。你今天也是。火种不需要烧得很大才值得被保管，它只需要还在。你还在，你的火种也是。',
    '你被行业寒冬、学历贬值、AI替代这些词压得喘不过气。身边的人都在劝你现实一点，别挑了，有个工作先干着。你觉得自己像在黑暗里走路，看不见出口。狄兰·托马斯对着他临终的父亲喊：不要温和地走进那个良夜。他不是在咒骂黑暗，他是在咒骂放弃。你可以接受现在的工作只是权宜之计，但不代表你要放弃自己真正想去的方向。良夜是温和的，它劝你算了，就这样吧，别再折腾了。你的愤怒、你的不甘、你在深夜里还在想“我本该更好”的那个念头，就是你不温和的全部证据。今天，不要温和地接受那些让你放弃的建议。在你暂时做着的这份工作之外，保留一个只属于你自己的方向——每天为它做一点事，哪怕只是看十分钟相关的书。狄兰·托马斯喊的不是对死亡的恐惧，是对生命的固执。你也一样。你的良夜还没有到，你还在白天里挣扎。那就继续挣扎。不要温和，不要平静，不要在还没有试过所有可能之前就走进那个劝你算了的良夜。',
    '你被各种职业选择的建议淹没——有人叫你考公，有人叫你考研，有人叫你去大厂，有人叫你创业。每一个建议听起来都有道理，但你没有分身术。你觉得选哪一个都会后悔。以赛亚·伯林是二十世纪最伟大的政治哲学家之一，他提出“两种自由”——消极自由是不被别人强迫，积极自由是知道自己该做什么并且有能力去做。你被建议淹是因为你还没有找到你的积极自由。你今天不需要把所有门都试一遍才能决定，你只需要知道一件事：在这些纷乱的建议里，哪一个方向是你心甘情愿付出的。不是你父母心甘情愿，不是你朋友心甘情愿，是你。今天，找一个安静的时间，问自己一个问题：如果没有人会对我的选择失望，我会去做什么。不需要立刻有答案，但你的耳朵需要开始听自己的声音。伯林说，自由是知道什么是必须做的。你的自由不在那些建议里，在你开始听到自己声音的那一刻。那是你的积极自由。',
    '你觉得自己的职业痛苦是独一无二的，别人都找到了方向，只有你还在黑暗中摸索。你觉得自己是唯一一个被卡住的人。苏珊·桑塔格写过一本《旁观他人之痛苦》，她写战争、疾病、流亡。她的方法是把镜头从“我”身上挪开，去认真看别人的痛苦。当你开始观察别人的挣扎，你自己的痛苦会变得可以理解。你现在不是唯一的受困者。那些看起来成功的人，他们也在自己看不到的地方煎熬。今天，试着做一次桑塔格式的旁观——不是去看别人光鲜的表面，是去理解一个和你一样在挣扎的人。他可能是你的同事，可能是你社交网络上的陌生人，可能是你身边那个从来不说自己有多难的朋友。在理解他的过程里，你的痛苦会找到参照系。你不是孤立的个案，你是这个时代无数在职业困境里挣扎的普通人之一。桑塔格的旁观不是为了冷漠，是为了理解。你理解了别人的痛苦，你的就不再是无法承受的孤例。你们是同一片战场上不同战壕里的战友，痛苦不是你的软肋，是你们共同的连接点。',
    '你觉得自己的职业毫无创造性，每天都是重复劳动。你觉得自己像卓别林电影里拧螺丝的工人，拧到肌肉记忆已经不需要大脑参与。普雷维尔是法国超现实主义诗人，他的诗像儿歌一样简单，但每一首都把你熟悉的日常变成了你从没见过的样子。他说，在巴黎的每一个早晨，我都要重新发明一次早餐。他写的不是大创造，是在最普通的日常里持续进行微小的抵抗。你今天最重复的那件工作里，也藏着一个可以被你重新发明的细节——一份报表的排版，一封邮件的开头，一次和同事的日常对话。你不需要变成乔布斯才能创造，你只需要在你的重复里加进你自己。今天，重新发明一次你工作里的“早餐”——可以是任何一件你已经做了无数遍的小事，但今天用你自己的方式做一遍。普雷维尔用最简单的词写出了最不简单的诗。你也可以在你最重复的工作里，找到只属于你的微小抵抗。创造不是离开重复才能做的事，是在重复里持续注入属于你自己温度的动作。',
    '你在深夜崩溃了。一个人在出租屋里，对着天花板，觉得自己所有努力都没有用。你想放弃，但明天还要上班。你想继续，但不知道继续还有什么意义。贝克特一生都在写绝境里的人。他用三段话总结了人类的全部处境：你必须继续，我不能继续，我将继续。这三句话不是递进的鼓励，是矛盾的共存。你必须在社会要求下继续活着，你在内心深处觉得自己一步也走不动了，但你在说完“我不能继续”之后，还是会在明天早晨从床上爬起来。这就是“我将继续”。它不需要信念，不需要希望，它只需要你还没有倒下。今天，你不需要告诉自己一切都会好起来。你只需要知道，你不能继续的那部分是真的，你将不得不继续的那部分也是真的。它们在今天夜里可以同时存在。贝克特写的不是英雄，是在绝境里还能继续呼吸的普通人。你也是。躺一会儿，然后明天继续。不是因为你相信什么，是因为你还没有走到最后一页。我将继续，不是宣言，是你今天还在呼吸的全部事实。',
    '你被眼前的每一次失败压得喘不过气，觉得自己永远也翻不了身。布罗代尔是法国年鉴学派历史学家，他把历史分成三种时间：短时段是事件，中时段是周期，长时段是结构。你今天被拒的那封邮件是短时段，这个行业的兴衰是周期，你这个人——你的韧性、你的学习能力、你在无数次失败里还没有熄灭的探索欲——是长时段。历史不取决于某一天发生的事，结构比事件更持久。你今天的失败只是事件，它不能定义你的长时段。今天，用布罗代尔的眼睛看你现在的职业困境：你被拒是事件，你的能力在积累是周期，你还在往前走是结构。事件会过去，周期会轮转，结构会持续。你不是被每一天的成败定义的，是被你的长时段——你还在学习，你还在调整方向，你还没有放弃——定义的。历史是长时段的结果，你的职业生涯也是。今天的事件不是你的全部结局，它只是你还没有写完的长篇历史里很薄的一页。继续写，长时段在你这边。',
    '你迟迟不敢投那份简历，因为你觉得自己的技能还差一点，工作经验还不够，学历还不够硬。你把简历改了又改，就是按不下发送键。奥威尔在写《一九八四》时已经病得很重，他在苏格兰的朱拉岛上，独自面对稿纸。他知道自己可能活不到这本书出版，但他还是把它写完了。完成比完美更重要——不是因为他觉得这本书已经完美了，是因为他知道不完成的完美只是空白。你的简历也是一本还没有完成的小说。你不发送，它永远是一叠被反复修改的草稿。今天，把它发送出去，不是因为它完美了，是因为你需要完成这个动作。奥威尔的手稿上有很多划掉的字，你的简历也不会是最终的版本。你不需要在发送之前解决所有缺陷，你只需要完成发送。完成比完美更重要，不是因为完美不重要，是因为完成是完美的唯一路径。你不可能通过不发送来发送一份完美简历。把草稿送出去，然后在下一个版本里改进它。奥威尔用病危之躯写完了书，你也用你还没有完全准备好的状态完成今天最需要完成的事。',
    '你觉得自己什么都不会，简历上那些技能每一项都不敢写“精通”，你觉得自己没有什么是自己真正擅长的。蒙田是十六世纪的法国思想家，他一辈子都在读书，在书里引用前人的话。但他不是在炫耀博学，他是在用别人的话找到自己的声音。我引用别人是为了更好地表达自己。你现在觉得自己什么都不会，是因为你还不习惯把你已经知道的东西变成你自己的表达。你简历上那些被你认为“还不够好”的技能，是你在不同阶段学到的知识碎片。今天，用蒙田的方法做一次自我梳理：把你从大学到现在学到的所有东西列出来——不是用简历的标准，是用你自己的标准。然后在每一项旁边写一句你自己的评价，不是“精通”“熟练”“了解”，是你真正怎么用它、怎么理解它。蒙田在引用里找到了自己，你也会在你已经掌握的知识碎片里，找到只有你才能表达出来的那个自己。你不是什么都不会，你只是还没有开始用自己的方式组织你已经会的东西。',
    '你每天都后悔当初的选择。如果选了那个专业，如果接了那份offer，如果去了那个城市。你把现在的不顺利都归咎于当初选错了路。弗罗斯特写《未选择的路》，诗里的叙述者站在岔路口选了人少的那条路，多年后他说那个选择改变了一切。但这首诗的标题不是“人少的路”，是“未选择的路”。他在意的不是自己选的路，是那条永远没有办法回去验证的、没有选的路。你后悔的不是当初的选择，是你想象中那条没有选的路。那条路没有被你走过，所以它在你的想象里全是平坦的。它没有坑洼，没有泥泞，没有那些你现在正在经历的具体的难题。它不是好，是你没有走过。今天，停止美化那条你没有选的路。把你现在这条路的好和坏都写下来——真实的好，真实的坏。弗罗斯特说，选择人少的路改变了一切。但他没有说变得更好了还是更坏了，他只是说它改变了一切。你的这条路也改变了你。你不是走错了，你只是走了。那条没有选的路只是你的想象，这条路才是你真实活过的全部人生。',
    '你太想抵达了，想快点有一份好工作，快点升职，快点拥有那些你现在还没有的东西。你把现在当成过渡期，觉得只有抵达才有意义。佩索阿一辈子在里斯本当小职员，他没有去过远方，但他写了无数异名，每个都去了他肉身没有去过的地方。他的旅途不在火车和轮船上，在他每天下班后在纸上的航行。旅途就是一切。你现在的过渡期不是意义的空白，是你整个职业生涯里最不被定义也最自由的一段。你今天在做的每一件小事——你为了省钱自己做饭，你在地铁上用碎片时间读的书，你在深夜对自己说的话——都是旅途本身。你不需要等到抵达才活，你现在就在活。佩索阿说，旅途就是一切。不是抵达，是旅途。你现在的迷茫、不安、所有不确定，都是你旅途里以后会被你反复回忆的章节。今天，像佩索阿那样，把你的日常当成一次航行——你坐的工位是你的船，你做的琐事是你的航标。你已经在旅途中了，不要只盯着还在地平线下的彼岸。你现在就在这里，这就是你全部的意义。',
    '你被职场规则束缚，觉得自己的创造力毫无用武之地，只能按部就班。你觉得所有规则都像墙，把你困住了。毕加索年轻时画得像拉斐尔一样好，然后他用剩下的一辈子学孩子画画。他说，学会规则，然后打破它们。规则不是墙，是你先要知道它在哪里，才能翻过它。你今天在公司学到的所有流程、规范、潜规则，不是你的监狱，是你以后的爆破点。你先学会它——学会怎么写一份标准的方案，怎么开一场常规的会，怎么和不同的人沟通。然后，在某个你觉得可以对它说不的时刻，用你自己的方式重做一次。毕加索打破透视法，不是因为他不懂，是因为他太懂了，所以知道从哪里打破。你也一样。今天，学透一条你以前只是被动遵守的规则。不是要你今天就去打破它，是要你以后知道从哪里打破它。你不是规则的囚徒，是还没有学会规则之前就被迫遵守它的学徒。先学会，再打破。毕加索用了一生学孩子画画，你也可以用一生在你学会的规则上凿出你自己的形状。',
    '你觉得自己的职业痛苦是独一无二的，没有人理解你。你一个人加班，一个人迷茫，一个人在深夜对着手机发呆。村上春树写每一个主人公都是孤独的——在井底，在海底，在另一个世界。他不需要让他们不孤独，他让他们在孤独里找到自己。当你年轻时，以为自己是唯一孤独的人，后来发现所有人都孤独，只是不同形式。你今天在加班时感到的孤独，你对面工位的人也有；你深夜失眠时的不确定，你远在另一个城市的朋友也有。孤独不是你的职业诅咒，是你还没有找到和你频率相同的孤独者。今天，给一个你信任的朋友发一句话——不用求助，不用解释，就说“最近有点累”。村上春树的主人公们不会因为分享孤独就变得不孤独了，但他们会在那一瞬间发现：这口井里不只是自己一个人。你的孤独也是。你不是唯一孤独的人，你是无数孤独的年轻人里，今晚愿意伸出手的那一个。',
    '你觉得自己被束缚了——被房租，被父母期望，被自己不够硬的学历。你觉得自由是辞掉工作、背上包、去远方。鲍勃·迪伦六十年一直在巡演，他的歌被翻唱无数次，他得了诺贝尔奖，但他没有停，他一直在变。没有谁是自由的，连鸟儿都被天空束缚。鸟的自由不是没有天空，是在天空里还能飞往任何一个方向。你被束缚的那些东西——房租、期望、学历——是你的天空，不是你的笼子。你可以在里面飞。你的自由不是没有负担，是在负担里还能选择自己的方向。今天，在你觉得被束缚的日常里，做一个只属于你自己的自由选择——下班后不刷手机，而是读一本书；周末不加班，去一个你想去了很久但一直没去的地方。迪伦说，鸟儿被天空束缚，但鸟儿依然是自由的。你的负担不是你的笼子，是你飞的方向的参照系。你不是被拴住的，你是还在飞的。继续飞，天空是你的，方向也是你的。',
    '你被世界的混乱和未来的不确定性压得喘不过气，觉得自己什么也改变不了。伏尔泰在《老实人》的最后写了一句话：我们必须耕种自己的花园。故事的主人公经历了战争、地震、欺骗和失去全部财富，最后在一个土耳其农场里安顿下来，每天种地。他不再追问为什么世界会这样，他只是在种地。你的花园不是逃避世界的桃花源，是你在不确定的世界里唯一能确定的行动。你今天能耕种的花园很小——手头的工作，正在学的技能，身边几个还在联系的朋友。这些是你现在全部能控制的疆域。今天，耕种你花园里的一小块地——把你今天的工作做好，哪怕它不是你真正热爱的事；把一个你已经拖了很久的小技能学会；给你在乎的人做一顿饭。伏尔泰没有让他的主人公改变世界，他让他改变他脚下那块地。你不需要今天就解决职业的全部不确定性，你只需要在今天耕种属于你的那一小块具体的土地。继续耕种，花园会自己长大。',
    '你觉得自己被这个世界打败了，被学历贬值打败，被AI打败，被内卷打败。你觉得自己再也站不起来了。玛雅·安杰卢从种族隔离、童年创伤中站起来，她写诗，写自传，在总统就职典礼上朗诵自己的作品。她说，你可以用许多方法打败一个人，但你无法打败一个已经决定要站起来的人。打败和站起来的区别，不在外部环境有没有变好，在你做了一个决定。你今天不需要完全站起来，你只需要做那个决定。决定不等于你已经胜利了，决定只是告诉你自己：我还没有结束。今天，在日记本上写一句话：我决定要站起来。不需要写得漂亮，不需要有答案。安杰卢的决定不是在一瞬间完成的，是在无数个被打倒又想放弃的夜晚之后慢慢成型的。你的决定也会经历这个过程。你今天写的这句话可能明天就会失效，但后天的你会重新把它写一遍。你不是被打败的失败者，你是还没有完全站起来但仍然在决定站起来的那个无数次重写决心的人。继续写，每一次重写都在积蓄你真正的决定。',
    '你觉得自己像一个被时代抛弃的固体，困在已经过时的专业和不再被需要的技能里。新行业像湍急的河流从你身边冲过，你站在原地，水淹过脚踝。齐格蒙特·鲍曼用“液态现代性”形容这个时代：一切曾经坚固的东西——职业、身份、承诺——都融化了，变成流动的、暂时的、不确定的液体。你不需要把自己变成石头才能不被冲走。液态的时代需要液态的能力——不是某一项可以用一辈子的技能，是你学习新东西的速度，是你从一份工作切换到另一份工作的柔韧，是你在一行做不下去时敢于换另一行的勇气。今天，盘点你身上那些可以流动的东西：不是你的专业名称，是你从专业里训练出的思维方式；不是你目前的岗位，是你在岗位上练出的沟通、组织、解决问题的能力。这些东西不会被融化，它们会跟着你流到下一个河道。鲍曼说，液态不是诅咒，是现实。你的现实不需要你变成石头，它需要你变成水。水不抗拒流动，水本身就是流动。你已经在河里了，不需要上岸。',
    '你把职场当成一片你死我活的丛林，每个同事都是抢你阳光的竞争对手。你把自己逼成孤立的树，拼命往上长，怕被任何人超过。彼得·沃莱本是德国林业员，他发现树木不是竞争者，是通过地下真菌网络互相传递养分、互相警告虫害的共生体。老树用根供养幼树，受伤的树通过菌丝网络接受邻居的糖分。森林不是战场，是互助社区。你的职场也可以不是丛林。那些比你强的同事不是抢你养分的敌人，可能是你还没有联上的真菌网络。今天，试着和一位你以前当作竞争对手的同事，建立一次非竞争性的互动——问一个你真正想知道的问题，分享一个你觉得对他有用的信息。你不需要变成所有人的朋友，但你可以在森林里找到属于你的菌丝网络。树木不是靠单独长高活下来的，是靠和其他树连在一起。你的职业也不是单打独斗的生存游戏，是你还没有发现地下那些可以让你扎根更深的联结。伸出根须，你不会因此变弱。',
    '你觉得自己是一个彻底的失败者。你曾经相信的“努力就有回报”在现实面前碎了一地。卡夫卡一辈子都在保险公司当小职员，他活着时几乎没有发表什么作品，死前嘱托朋友烧掉所有手稿。他没有在职场成功过，没有在生前成为伟大作家。但他每晚从办公室回到房间，伏在桌上写那些后来被全世界阅读的小说。他在自己的斗争里，既是胜者也是败者，但他没有停止。你的失败和卡夫卡的失败是同一个词，但意思不同。你不是没有成功，你是还在斗争。今天，把“失败”这个词从你的自我描述里暂时拿掉，换成“还在斗争中”。卡夫卡不知道自己死后会成为文学巨人，他只知道今晚必须写完这篇小说。你也不知道你现在做的这些事以后会通向哪里，你只需要知道今天必须做完它。斗争本身不需要胜利来证明它的价值。你还在斗争，就是你还没有被失败定义的唯一原因。',
    '你被突然的变故击倒了：被裁员、项目被砍、行业震荡。你的第一反应是恐慌、愤怒、绝望。你觉得这些反应就是你的全部，你没有任何选择。维克多·弗兰克尔从集中营幸存后写出《活出生命的意义》，他提出人类最后的自由——在刺激和反应之间那个微小的空间里，你有选择如何回应的自由。被裁员是刺激，你无法控制；恐慌是自动反应，你也无法控制。但在刺激和自动反应之间，有一个暂停，那个暂停里你可以选择下一步做什么。今天，在你最焦虑的那件事上，练习一次“暂停”——不立刻做出反应，不急着刷新招聘软件，不在愤怒里给前同事发消息。先停一下，深吸一口气，然后从那个暂停里问自己：我现在能做的第一件具体的事是什么。弗兰克尔在集中营里无法选择外界发生的事，但他选择了如何回应。你的空间比他大得多。在被裁员的刺激和恐慌的反应之间，你还有一片没有被任何人占领的缝隙。那是你最后的自由。',
    '你被职业里所有悬而未决的问题折磨着——不知道要不要转行，不知道现在的工作有没有前途，不知道要不要辞职考研。你急于找到答案，但每一个答案都在你想抓住时滑走。里尔克是二十世纪最伟大的德语诗人之一，他在《给青年诗人的信》里对那个焦虑的年轻诗人说：要有耐心，对你心里所有尚未解决的问题。不要寻找答案，要学着去爱问题本身。你的职业困惑不是你的敌人，是你正在变成更成熟的人的全部证据。问题不需要被立刻解决，它需要被你认真地经历。今天，选一个你最焦虑的问题，不试着解决它，只是把它写在纸上，然后在下面写一句话：我还在经历你。里尔克说，活在问题里，也许有一天你会不知不觉地活进答案。你的问题不是考试题，不需要在规定时间里答完。它是一场漫长的雨季，你不需要跑出雨，你只需要在雨里继续走。雨会停，但你不会因为淋了雨就减少一分。你还在经历它，这已经是答案的一部分。',
    '你被各种选择压得动弹不得。每一个选择都有致命的缺点，每一个方向都被你自己否定了一遍。你觉得自己困在选择困难症里。多丽丝·莱辛在非洲长大，没有受过什么正规教育，她做过保姆、接线员、打字员，三十岁带着孩子离开婚姻独自写作。她得了诺贝尔奖。无论你做什么，只要是你自己决定的，就是对的。不是因为你的决定一定正确，是因为这是你自己的决定。你今天需要做的不是找到一个完美的选择，是在现有的选项里，选一个你最不排斥的，然后把它变成你自己的决定。决定本身没有魔法，是你在决定之后的行动，让它慢慢变成对的。今天，在你最纠结的那个选择上，做一个小小的决定——不是辞不辞职，不是转不转行，是今天下班后花半小时去了解其中一个方向。莱辛说，你自己决定的，就是对的。不是因为你的判断力比别人强，是因为只有你的决定，你会负责任地把它走完。把选择从恐惧里拿出来，变成你今天可以开始行动的第一步。',
    '你觉得自己的职业规划已经是一片废墟。贾曼是英国电影导演、画家、园艺家，他在确诊艾滋病之后，在海边买下一座废弃的渔民小屋，在一片碎石和荒草里，用捡来的浮木和鹅卵石建了一座花园。他说，如果一座花园不种在废墟上，它就不是真正属于你的花园。贾曼的花园不在土壤肥沃的庄园里，在海风、盐碱和死亡面前。你的职业重生也不需要等到一切条件都好了再开始。废墟是你最好的地基——它已经不能再坏了，所以每一朵花都是你亲手种出来的。今天，在你职业废墟里找一块可以种花的地方——也许是你已经荒废的专业里一个你还喜欢的方向，也许是你被拒无数次之后依然还在坚持的那件事。贾曼在他生命最后几年种下了那些花，他知道自己可能看不到它们长大，但他还是种了。你不需要等到废墟清理干净，不需要等到一切都准备好了。就在现在，把第一颗种子扔下去。废墟是最好的土壤，因为它只属于你。',
    '你觉得自己在大学学的东西全无用处，工作中需要的能力大学没有教，大学教的在工作中永远用不上。你觉得那四年是白费的。纽曼是十九世纪的教育家，他在《大学的理念》里说：大学不是填满一个桶，是点燃一把火。你在大学被点燃的是你的心智能力——你分析一个问题的逻辑，你写一篇论文的结构，你从一本书里提炼观点的速度。这些东西没有写进招聘需求里，但它们是你现在学任何新技能都比别人快的原因。你的大学不是白读的，是你还没有意识到它在你的思维底层装了什么。今天，把你现在正在学的一项新技能，和你大学学过的一门课做一次关联——不是内容上的关联，是方法上的。你大学训练出的逻辑，现在在帮你拆解新领域的知识结构。纽曼说，心智一旦被训练，它会在任何领域里找到自己的燃料。你没有被浪费的四年，它们在你每一次快速学习时都在替你工作。你不是从零开始的初学者，你是带着整座心智装备转场的旅人。',
    '你觉得那些热门的、高薪的、被所有人看好的行业已经不属于你了。你觉得好位置早就被占了，门槛早就被踏平了。凡尔纳在《海底两万里》里让尼摩船长驾驶鹦鹉螺号潜入深海，那里没有被人占领的海域，没有被人标记过的宝藏。海洋不属于任何人，但它属于所有敢于潜入的人。那些被所有人谈论的热门领域只是海面的泡沫，你需要的不是加入泡沫的争夺，是找到属于你自己的深度。今天，在你自己的领域里找一个还没有被太多人注意到的细分方向——就像尼摩船长在深海里发现的亚特兰蒂斯。你不需要和人抢海面上的泡沫，你只需要潜下去。凡尔纳说，海洋属于敢于潜入的人。你的职业深海也在等你。那些泡沫会破，但深海的宝藏不会被任何人抢走。你不需要比别人更会游泳，你只需要比别人更愿意往下潜。你的鹦鹉螺号不是别人的船，是你自己的好奇心。用它，往下潜。海底有两万里的宝藏，你只看了海平面。',
    '你被未来的不确定性压得焦虑不堪。你不知道现在的努力会不会有回报，不知道自己的方向是不是对的，不知道自己会不会在某一天后悔。托马斯·默顿是二十世纪最重要的灵性作家之一，他在修道院里写：种子不需要知道它会变成什么，它只需要在土里。你不需要现在就看见整棵树。你只需要知道，你现在做的每一件小事——你今天学会的一个小技能，你今天认真完成的一项工作，你今天在疲惫时仍然坚持的那几分钟——都是一颗种子。它们在地下的部分你看不见，但它们没有一颗是死的。今天，不必站在地上焦虑地下的事。做好你今天能做的那件小事，然后信任土壤。种子在黑暗里发了芽才会破土，你的职业方向也一样。在你看不见的土壤里，你的根正在形成。默顿说，种子只需要在土里。你也是。你不需要提前知道全部答案，你只需要还在土里，还在生长。光会来的，但不是现在。现在，只需要继续在土里。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}
