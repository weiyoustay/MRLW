<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
let mouseX = 0, mouseY = 0;

function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

class Particle {
    constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.s = Math.random() * 1.6 + 0.4;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.o = Math.random() * 0.5 + 0.2;
        this.hue = 120;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        this.x += dx * 0.0012;
        this.y += dy * 0.0012;

        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, ${this.o})`;
        ctx.fill();
    }
}
function init() {
    particles = [];
    for (let i = 0; i < 130; i++) particles.push(new Particle());
}
init();
function anim() {
    ctx.clearRect(0,0,w,h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(anim);
}
anim();

const dayBackgrounds = {

function editName(){
    location.href = 'create-identity.html?edit=1';
}

function getAutoUnlockedDay() {
    const startStr = localStorage.getItem('startDate');
    let start;
    if (!startStr) {
        start = new Date();
        start.setHours(0, 0, 0, 0);
        localStorage.setItem('startDate', start.getTime());
    } else {
        start = new Date(parseInt(startStr));
    }
    const now = new Date();
    const nowDay = new Date(now.setHours(0, 0, 0, 0));
    const diffTime = nowDay - start;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    const autoDay = Math.min(diffDays + 1, 7);
    return autoDay;
}

function getUnlockedDays() {
    const autoDay = getAutoUnlockedDay();
    const arr = [];
    for (let i = 1; i <= autoDay; i++) arr.push(i);
    return arr;
}

function isDayUnlocked(day) {
    return getUnlockedDays().includes(day);
}

function canAccess(day) {
    return isDayUnlocked(day);
}

function getCurrentDay() {
    return getAutoUnlockedDay();
}

function checkPosterUnlock() {
    const unlocked = getUnlockedDays();
    const posterCard = document.getElementById('posterCard');
    if (unlocked.includes(7)) {
        posterCard.classList.add('show');
    } else {
        posterCard.classList.remove('show');
    }
}

function renderCards() {
    const c = document.getElementById('cardContainer');
    c.innerHTML = '';
    const currentDay = getCurrentDay();
    dayList.forEach((item, index) => {
        const a = document.createElement('a');
        a.className = `day-card ${isDayUnlocked(item.day) ? 'unlocked' : 'locked'}`;
        a.style.animationDelay = `${0.1 + index * 0.08}s`;
        
        const bgImage = dayBackgrounds[item.day];
        const baseGradient = 'linear-gradient(135deg, rgba(26,26,46,0.4) 0%, rgba(32,32,54,0.45) 100%)';
        const hoverGradient = 'linear-gradient(135deg, rgba(32,32,54,0.45) 0%, rgba(38,38,62,0.5) 100%)';
        const lockedGradient = 'rgba(20,20,35,0.3)';
        
        a.style.background = `${baseGradient}, url('${bgImage}')`;
        a.style.backgroundSize = 'cover';
        a.style.backgroundPosition = 'center';
        a.style.backgroundBlendMode = 'overlay';

        a.addEventListener('mouseenter', () => {
            if (a.classList.contains('unlocked')) {
                a.style.background = `${hoverGradient}, url('${bgImage}')`;
                a.style.backgroundSize = 'cover';
                a.style.backgroundPosition = 'center';
                a.style.backgroundBlendMode = 'overlay';
            }
        });
        a.addEventListener('mouseleave', () => {
            if (a.classList.contains('unlocked')) {
                a.style.background = `${baseGradient}, url('${bgImage}')`;
                a.style.backgroundSize = 'cover';
                a.style.backgroundPosition = 'center';
                a.style.backgroundBlendMode = 'overlay';
            }
        });
        if (a.classList.contains('locked')) {
            a.style.background = `${lockedGradient}, url('${bgImage}')`;
            a.style.backgroundSize = 'cover';
            a.style.backgroundPosition = 'center';
            a.style.backgroundBlendMode = 'overlay';
        }
        
        let badge = '';
        if (canAccess(item.day) && item.day === currentDay) {
            badge = '<div class="current-badge">当前</div>';
        }
        if (canAccess(item.day)) a.href = `day${item.day}.html`;
        
        a.innerHTML = `
            ${badge}
            <div class="info">
                <div class="num">第 ${item.day} 天</div>
                <div class="title">${item.title}</div>
                <div class="desc">${item.desc}</div>
            </div>
            <div class="status">${canAccess(item.day) ? '可进入' : '未解锁'}</div>
        `;
        c.appendChild(a);
    });
}

function renderUserInfo() {
    const playerName = localStorage.getItem('playerName');
    const unlocked = getUnlockedDays();
    const count = unlocked.length;
    const startStr2 = localStorage.getItem('startDate');
    let journeyDay = count;
    if(startStr2){
        const start = new Date(parseInt(startStr2));
        const now2 = new Date(); now2.setHours(0,0,0,0);
        start.setHours(0,0,0,0);
        journeyDay = Math.min(Math.floor((now2-start)/(1000*60*60*24))+1, 7);
    }
    if(playerName){
        document.getElementById('welcomeText').innerHTML = `欢迎回来，${playerName}！ <span style="font-size:0.7em;opacity:0.5;">✎</span>`;
        const subs = [
            '一切才刚刚开始，迈出第一步最重要。',
            '第二天了，你已经走在大多数人前面。',
            '三分之一的路程，蜕变正在发生。',
            '过半了！坚持的力量已经开始显现。',
            '第五天，新习惯正在取代旧模式。',
            '只剩两天，你已经不是原来的自己。',
            '最后一天，崭新的你即将诞生。'
        ];
        document.getElementById('journeySub').innerText = subs[journeyDay-1] || subs[6];
    }
    document.getElementById('progressText').innerText = `第 ${journeyDay} 天 · ${count}/7 已完成`;
    document.getElementById('progressFill').style.width = `${(count / 7) * 100}%`;
}

// 仅修改这里：日期星期改为英文显示
function renderDate() {
    const now = new Date();
    const opt = { year:'numeric', month:'long', day:'numeric', weekday:'long' };
    document.getElementById('dateDisplay').innerText = now.toLocaleDateString('en-US', opt);
}

window.addEventListener('DOMContentLoaded', () => {
    renderUserInfo();
    renderCards();
    renderDate();
    checkPosterUnlock();
});
</script>
