(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

    '你被一个决定困住了。两个选项反复权衡，每一个都有致命的缺陷，每一个都让你在深夜里反复翻转。你觉得自己像被钉在十字路口的囚徒，哪条路都不敢走。萨特说：人注定是自由的。这句话听起来像诅咒——如果你注定自由，那你所有的不选择，其实也是一种选择。你不是被困住了，你是用“无法选择”来逃避选择之后的未知。自由是沉重的，因为你要为你选的每一条路负全责。但自由也是你唯一无法被剥夺的东西。今天，在你最纠结的那个决定上，做一个最小的选择——不是选A还是选B，是选“今天我要花半小时认真了解A”。这不是最终的判决，是你从自由的旁观者变成行使者的第一个动作。萨特说，人被抛到世界上，然后通过选择成为自己。你不是被判决的囚徒，你是那个握着选择权却还在犹豫要不要使用的自由人。今天，用一次微小的选择，行使你的自由。',
    '你觉得自己太软弱了。动不动就情绪崩溃，遇到压力就想逃避，被别人一句话就伤到体无完肤。你羡慕那些内心强大的人，恨自己为什么不能像他们一样。日本作家远藤周作一生都在写软弱。他笔下的神父在迫害面前弃了教，他笔下的信徒在死亡面前选择了妥协。他从不嘲笑他们的软弱，他让基督陪伴在这些最软弱的人身边。他在《沉默》里写：基督不是来拯救强者的，是来陪伴弱者的。你的软弱不是你该羞愧的东西，是你还能被触动、还知道疼、还没有麻木的证明。那些看起来强大的人，也有他们的软弱，只是他们把它藏到了你看不见的地方。今天，不要再用别人的强大打压自己的软弱。你的软弱不需要被消灭，它需要一个不审判它的人来陪伴。那个人可能就是你此刻正在读的这段话，可能是你身边一个你信任的朋友，可能就是你自己。陪伴你的软弱，比假装它不存在需要更大的勇气。',
    '你觉得自己被困在一个没有出口的房间里。每天都在想同样的问题，绕同样的圈子，找不到任何突破的裂缝。卡夫卡的《城堡》里，土地测量员K用尽一生想要进入那座近在咫尺却永远无法抵达的城堡。卡夫卡没有写他成功，也没有写他放弃。他写的是：道路是无穷的。你看不见出口不代表它不存在，只代表你现在的视角还看不到它。今天，不要强迫自己找到出口。你只需要在墙上画一扇窗——它不是真实的出口，但它是你还没有放弃寻找出口的证明。在你画窗的时候，你会想起自己还有画窗的能力。卡夫卡说，道路是无穷的。你的出口可能不在你今天找的方向，但每一个你排除的方向，都让你离真正的出口更近了一步。今天画一扇窗，明天也许就能看到一条缝。无穷不是惩罚，是你还有无穷的可能没有试过。',
    '你被情绪困在脑子里，想了一天想不通，晚上又失眠，继续想。你的脑子在空转，你的身体被完全忽略了。劳伦斯一辈子都在对抗过度理性。他说，身体是灵魂的可见版本。你的情绪不只在你的脑子里，也在你的肩膀、后背、胃里。你今天的内耗，是你把全部注意力都给了脑子里那台空转的机器，却忘了你的身体也在承担这些情绪。今天，停下脑子里的辩论，做一次身体扫描——闭上眼睛，感受你肩膀的紧绷，感受你咬紧的牙关，感受你胸口那块压着的石头。不需要解决它们，只需要感受到它们的存在。劳伦斯说，身体知道答案。你的身体已经替你承担了一整天的情绪，它需要被你注意到。深呼吸一次，把注意力从脑子里那团乱麻，转移到你此刻呼吸起伏的腹部。你不是一台只会空转的大脑，你是一整个需要被倾听的身体。',
    '你把自己逼得太紧了。每天的生活都是任务清单——完成工作、处理琐事、应对社交。你把所有的时间都用来解决问题，忘了怎么玩耍。英国精神分析学家温尼科特说：健康不是没有问题，是有能力玩耍。他不是让你逃避问题，他是在说，玩耍是你内心最深的治愈力——不是手机游戏，不是刷视频，是你完全沉浸在一件和任何功利目的都没有关系的事情里。你小时候会蹲在地上看蚂蚁搬家，会在纸上画莫名其妙的涂鸦，会对着窗外哼自己编的歌。这些能力没有消失，只是被你忘了。今天，给自己十分钟什么都不为的时间。画画，唱歌，趴在地板上看猫，或者就只是发呆。不是为了解决任何问题，就只是为了玩耍。你内心的内耗不只是缺少答案，更是缺少玩耍。把你的玩耍能力找回来，不是逃避现实，是让你的内心从空转里解放出来，重新和那个还没有被责任压垮的自己连接上。',
    '你在最深的绝望里，觉得希望是一个过于奢侈的词。你觉得自己已经很久没有感受到它了。艾米莉·狄金森一辈子足不出户，穿着白裙子在父亲的房子里写诗。她写：希望是有羽毛的东西，它栖息在灵魂里，唱着没有词的歌，永不停息。她没有说希望会改变你的处境，她说希望栖息在你的灵魂里——它不需要喂养，不需要证据，不需要外部条件的许可。你今天没有感受到它不是因为它不在，是因为你的风暴太大，听不到它在唱歌。今天，不要逼自己去相信明天会更好。你只需要承认：在风暴里，有一只鸟还在你灵魂的某个角落栖息着。它不要求你立刻听到它的歌声，它只需要你知道它还没有飞走。狄金森说，希望永不停息。你的也是。它不需要你今天就看见光，它只需要你在风暴里，还愿意相信光有可能存在。',
    '你对着镜子看自己——眼袋、乱发、写满疲惫的脸。你觉得今天比昨天更糟糕，自己像一件越穿越破的旧衣服。果戈理写《外套》，一个穷困的小公务员省吃俭用做了一件新外套，然后它在第一天晚上就被抢走了。他死了，变成了鬼魂在城里游荡。这故事很惨，但果戈理是用笑写出来的——不是嘲笑，是含泪的、看透了一切真相之后的笑。笑吧，趁你还有笑的力气。你今天觉得一切都在往下掉，但你刚才是不是在看到镜子里那张疲惫的脸时，嘴角动了一下。那个微小的弧度，是你今天还没有被打败的全部证据。果戈理的笑不是否定痛苦，是在痛苦里依然能抽身出来看见荒诞。你今天的一切不堪，在几年后回头看，也许会变成一个你讲给朋友听时两个人一起笑的故事。现在笑不出来没关系，但你还有笑的力气——那个镜子里的你，他还在呼吸，他还在。',
    '你觉得自己被一种看不见的加速度推着走。信息要秒回，任务要秒完，情绪要秒好。你觉得自己慢不下来，一慢就焦虑，一停就恐慌。昆德拉在《慢》里写：速度是技术革命送给人类的迷醉礼物。当一切都变快时，慢变成了一种罪过。但他说，速度与记忆成反比——越快的东西，忘得越快。你今天在高速运转中反复内耗的那些念头，它们之所以反复出现，恰恰是因为你从不停下来真正面对它们。它们像被快车甩在后面的乘客，一次次追上来拍你的车窗。今天，试着做一件慢到极致的事：用五分钟喝完一杯水，用十分钟走一段平时五分钟走完的路，用半小时读十页书。不是效率，是存在。昆德拉说，慢下来是为了让记忆追上你。你的那些没有被处理过的情绪，需要你慢下来才能被看见。你不是效率的奴隶，你是一个需要被自己认真对待的人。慢是你的权利，不是你的罪过。',
    '你觉得自己被一次又一次的打击磨光了所有棱角。每一次觉得快好起来了，又摔回原点。你觉得自己在被反复碾压。尼采写《瞧，这个人》时已经濒临精神崩溃的边缘。他没有被治愈，但他把所有的痛苦都变成了思想。那杀不死我的，必使我更强大——不是因为他比痛苦更强壮，是因为他没有在痛苦面前停止思考，停止感受，停止成为自己。你今天没有被杀死，不是因为你运气好，是因为你还在。你每一次从原点重新爬起来，都不是回到零，是带着上一次摔倒的全部经验，重新站在了比原来高一点的地方。今天，不要用“我又回到了原点”来否定自己。把手放在胸口上，感受心跳。这颗心被碾过很多次，但它还在跳。尼采没有说强大是刀枪不入，他说强大是不被杀死。你还在，这就已经是你的强大最不可辩驳的证据。',
    '你被四面八方涌来的情绪压得喘不过气——对自己的不满，对别人的愤怒，对未来的恐惧。你在情绪的洪流里挣扎，觉得自己快被淹死了。一行禅师是越南僧人，他在越战期间救助难民，被流放，在欧洲和北美传播正念。他教人最简单的呼吸：吸气，我平静我的身体；呼气，我微笑。你不是要和情绪的洪流对抗，你是要找到洪流里那一根可以让你抓住的呼吸。今天，在你快被淹没的时候，停下来。不要解决任何问题，不要分析任何原因。把一只手放在小腹上，感受吸气时它鼓起来，呼气时它沉下去。就做三次，不用多。一行禅师说，呼吸是连接身体和心灵的桥梁。你的内耗在脑子里肆虐，但你的身体还在呼吸。这根桥没有被洪水冲走，它就在你的每一次呼吸里。今天，用这根桥从脑子回到身体。洪水还在，但你已经不是被卷在水里的碎片，你是站在桥上看着洪水的人。',
    '你总是把焦虑当成敌人，觉得自己不应该这么紧张、这么不安。你花大量精力去对抗它，结果越对抗越耗竭。阿兰·德波顿把哲学从学院里搬到日常生活中。他写焦虑、写工作、写旅行。他说，焦虑不是你的敌人，是你还没有被翻译成行动的潜力。你今天的心跳加速、手心冒汗、脑子里停不下来的念头，是你身体在告诉你：我有能量，但这能量还没有找到出口。你的焦虑不是一堆需要被倒掉的垃圾，是一堆还没有被分类的资源。今天，把让你焦虑的事情列出来，不是为了一一解决，是为了看清这些焦虑里藏着哪些你真正在乎的东西。你焦虑被拒绝，是因为你在乎被认可；你焦虑未来，是因为你在乎自己还有可能性。德波顿说，焦虑是潜力的另一种形态。你不是被焦虑困住了，是你还没有把你的在乎变成方向。把焦虑从敌人变成地图，它会告诉你你真正想去哪里。',
    '你一直在等自己变好——等自己更自信、更成熟、更不内耗。你觉得只有准备好了才能开始，可你永远觉得还没有准备好。斯坦贝克在写《愤怒的葡萄》时，每天在日记里和自己对话。他写：我不完美，今天写的也不完美，但我写完了今天的部分。现在不完美，以后也不会完美，但我们现在可以开始。你不需要等到自己不焦虑了再去生活，不需要等到自己变好了再去尝试。你可以带着全部的不确定、全部的自卑、全部还没有解决的旧问题，在今天做一件你今天该做的小事。不是因为你终于准备好了，是因为你决定不再等了。斯坦贝克的手稿上全是修改痕迹，你的生活也是。今天，用你不完美的状态做一件不完美的事——投一份不够完美的简历，发一句你想了很久但一直不敢说的话，写下你今天的感受哪怕只是几行没有逻辑的句子。不完美的开始比完美的等待多走了一步，这一步就是你全部需要的勇气。',
    '你的内心里塞满了各种声音——对自己的苛责、对未来的担忧、对过去的懊悔。它们像一群不请自来的客人，在你心里开派对，你赶不走它们。老子在《道德经》里说：致虚极，守静笃。虚不是空，是你愿意把那些占满内心的杂物暂时请出去；静不是没有声音，是你在所有声音里还能找到那个最深处、最稳定、最不被外界搅动的内核。你没有静，不是因为你天生多虑，是因为你太久没有给自己清空过。今天，找一个十分钟，把手机放在另一个房间。坐下来，闭上眼，不要想任何目标。就是听窗外的车声、自己的呼吸，或者什么也不听。那些客人还在，但你已经不在它们的派对里。老子说，归根曰静。你的静不来自消灭所有噪音，来自回到你自己最深的根系。在那里，派对还在开，但你已经在隔壁房间里。那不是逃避，是你重新找回自己的节奏。',
    '你反复回想自己犯过的错——面试时说错的那句话，工作中做错的那件事，关系里搞砸的那一次。你觉得这些错误定义了你。乔伊斯用整本《尤利西斯》写一个普通人在都柏林一天之内的全部意识，里面充满了混乱、错误、不体面的念头。但他让这个最普通的人变成了文学史上最重要的人物之一。错误是发现新大陆的入口。你犯的错不是你的污点，是你还没有被发掘的新大陆。今天，拿出一个你反复自责的错误，用乔伊斯的眼光重新看它一次——不是作为需要被删除的错误，是作为你了解自己的一个入口。这个错告诉了你什么？是你太着急，是你太在意，还是你在那一刻做出了你当时能做出的最好的决定。你的错误不是你的终审判决，是你还没有被完全解读的密码。乔伊斯把最混乱的一天变成了文学，你也可以把你最混乱的错误，变成你了解自己的地图。新大陆不在完美的航线上，在错误的偏航里。',
    '你紧紧抓着已经过去的事不放。抓着那个人说过的话，抓着那次失败的面试，抓着那段已经变质的关系。你觉得放手就是认输，就是承认自己错了。阿内丝·尼恩是日记作家，她用几十年的时间记录自己内心的全部挣扎、欲望与痛苦。她写：我们不能从紧握的拳头里接住任何东西。你抓得越紧，手里越是什么都进不来。放手不是认输，是把拳头松开，让那只手重新变成可以接受礼物的容器。今天，找到一件你紧抓了很久、已经对你没有任何帮助的事——一个旧怨，一次旧伤，一句旧话——把它写在纸上，然后在心里对那张纸说：我放你走，不是因为你没有伤害过我，是因为我不想让你继续占据我手心里本来可以装下新东西的空间。尼恩说，紧握的拳头什么也接不住。松手的那一刻，你的手里空了，但空意味着无限的可能性。你不是在失去，你是在为自己腾出接住未来的手。',
    '你觉得自己的人生已经被写坏了。开了一个不好的头，写了太多后悔的章节，现在的你已经无法被修改。卡尔维诺在《如果在冬夜，一个旅人》里写了十个只有开头没有结尾的故事，每一次读者以为故事要继续时，故事就中断了，然后开始一个新的开头。他用这种方式告诉你：每一个故事都可以被重写，每一个开头都不是终点。你的内耗不是因为你的人生被写坏了，是因为你一直停在某个你以为无法重写的段落里。今天，在你觉得“我已经写坏了”的那个章节旁边，写下两个字：修订。你不是要撕掉前面所有的篇章，你是要在这一页的空白处，写下第一个修订的标记。卡尔维诺说，阅读是不断重新开始。你的人生也是。你不是被困在已经印好的书页里，你是手里还握着笔的作者。修订不需要一次写完，它从今天你决定重新下笔的那个瞬间开始。你的故事没有剧终，只是翻到了可以重写的一页。',
    '你被分不清的事情折磨着——不知道自己该努力还是该放弃，该争取还是该接受。你把这两者混在一起，既不能平静接受，也没有勇气改变，在最中间的地带反复折磨自己。美国神学家尼布尔在二战最黑暗的时期写下这篇祷告，后来被无数人抄在日记本上：愿我有宁静，接受我不能改变的；有勇气，改变我能改变的；有智慧，分辨这两者的区别。你不需要今天就有全部答案，你只需要在今天分清楚一件事：你内耗的对象里，哪些是你不能改变的，哪些是你能改变的。你不能改变已经发生的事，不能改变别人对你的看法；但你能改变你今天对待自己的方式，能改变你在下一刻做出的选择。今天，在纸上画一道线，左边写你不能改变的，右边写你能改变的。左边的，试着在今天让它们待在左边，不再为它们耗费你今天的力气。右边的，挑一件最小的，从今天开始改变。尼布尔的祷告不是一次性解决，是每一天的练习。你的智慧也在每一天的练习里，慢慢从分辨不清，到分辨得清。',
    '你反复在脑子里预演各种最坏的可能——辞职了找不到工作怎么办，分手了再遇不到合适的人怎么办，拒绝别人之后被讨厌怎么办。你在脑海里模拟了上百次风暴，却一步也没有离开海岸。福克纳在《我弥留之际》里让一家人冒着洪水、大火和死亡，把母亲的遗体运回老家。旅程结束后，每个人都失去了什么，但他们都到达了。你无法游向新的地平线，除非你有勇气离开海岸。不是因为你准备好了，是因为地平线不会自己朝你游过来。今天，选一件你反复想了很久却不敢做的事——不是辞职，不是分手，是比它们小得多的一件事：发那条你编辑了好几次却不敢发的消息，报那个你看了很久却一直没报的课程，对那个你一直想认识的人说第一句话。这不是鲁莽，是你从脑子里那场无止境的模拟里走出来，用真实的行动替代虚幻的恐惧。海岸是安全的，但你的地平线不在这里。离开海岸，水会托住你。',
    '你被一次失败困住了。被拒的那封邮件，错过的那次机会，说错的那句话。你盯着这扇关上的门看了太久，久到你已经忘了还有其他门存在。海伦·凯勒在黑暗与寂静里活了一生，她比任何人都更知道关闭是什么意思。当一扇门关闭时，另一扇门会打开。她不是在写乐观的安慰，她是在写注意力的方向。你一直盯着关上的门，那扇已经打开的门就在你身后，你却一次也没有回头。今天，把你盯着的那扇关上的门写下来，承认它已经关了。然后转过身，看看还有哪些你以前没有注意到的门——可能是一个你以前没想过的方向，一个你以前忽略的机会，一个你以前不敢尝试的新技能。你不是被困在关上的门前，你是还没有转身。另一扇门不需要你推开，它已经开了。你只需要转身，走过去。你不是失去了全部可能性，你只是站错了方向。',
    '你在情绪内耗里一个人困着，觉得没有人能真正理解你的感受。你把孤独当成必须独自承受的酷刑，把所有想倾诉的话压在心里，越压越重。玛丽·雪莱在十八岁那年，在一个暴风雨的夜晚和几个朋友比赛写恐怖故事。她梦见了一个科学家用电流造出了一个活人，然后她写出了《弗兰肯斯坦》。她在孤独、丧子、流亡里继续写作。创造是孤独的解药，不是因为它能让你不再孤独，是因为你在创造里可以把孤独变成作品。你今天不需要写出一部小说。你可以用手机备忘录写一段只有你一个人会读的话，用笔在餐巾纸上画一个你脑海中乱七八糟的念头，用你的手在吉他上拨一个你随便按下的和弦。你不是在孤独里熬着，你是在孤独里创造。雪莱的弗兰肯斯坦是孤独的怪物，但他的创造者用孤独写出了不朽。你的孤独也可以变成作品——不是给别人看的，是给你自己看的。创造是你孤独里那扇唯一不需要别人就能打开的窗。',
    '你困在自己的痛苦里，觉得全世界只有你一个人在经历这些。你把别人的轻松当成他们没有受伤的证据，把自己的内耗当成自己天生残缺的标签。苏珊·桑塔格写过一本《旁观他人之痛苦》。她写战争照片，写那些被历史记录下来的苦难。她说，旁观不是为了冷漠，是为了理解。你对自己的痛苦也需要一次苏珊·桑塔格式的旁观。今天，试着像旁观一个陌生人那样，旁观你今天一整天经历的情绪——不是沉浸在里面，不是被它们淹没，是坐在观众席上看着它们发生。那个人很焦虑，那个人被一句话伤到了，那个人在深夜里还在想白天的事。他不是你，他是你今天观察的对象。当你把镜头从“我”身上拉远，你会发现你的痛苦不是你的全部。它只是你今天这部长纪录片里的一段素材。桑塔格旁观了世界上最重的痛苦，她没有变得冷漠，她变得更理解。你旁观自己的痛苦，不是为了不痛，是为了理解。',
    '你觉得自己承受的一切已经超过了极限。焦虑、迷茫、孤独、自我否定，它们同时压在你身上，你觉得自己快被压碎了。特蕾莎修女在加尔各答的贫民窟里守了一辈子临终者的死亡。她用一生写了一句话：上帝不会给你超过你能承受的，但我只希望他不要这么信任我。这不是抱怨，是幽默。在最深的痛苦里，还能用幽默看自己一眼，这是她最被低估的力量。你今天也可以这样看自己。你被信任了——不是被上帝，是被生活。生活给了你这些重量，不是因为你在受苦，是因为你还在承受。你还没有倒下，还在读这段话，还在找答案。今天，对自己说一句特蕾莎式的话：生活，你太信任我了。这不是认输，是你终于承认：你已经在承受你以为承受不了的东西。你不是快被压碎了，你是在用你还没有意识到的力量在撑着。撑到今天，你已经比你以为的更强大。幽默是你最后的武器，也是你还能笑出来的全部理由。',
    '你讨厌自己反复无常。今天想通了，明天又堵上。今天觉得自己可以面对一切，明天又被一件小事击垮。你觉得自己是分裂的，不确定的，没有固定形状的。黑塞笔下的每一个人都在变。悉达多从苦行僧变成商人，从赌徒变成摆渡人。他每一次变化都不是背叛从前的自己，是把从前的自己带到了新的形态里。我们在变化中成为自己。你不是反复无常，你是在不同的时刻用不同的形态面对不同的困难。昨天的你想通了一个问题，那是因为昨天你只需要面对它；今天的你又堵上了，是因为今天又来了新的问题。你的变化不是你的不坚定，是你还在用活的、流动的方式继续面对生活。今天，不要把“今天又堵上了”当成失败。把它当成你在今天的形态。你今天不需要是昨天的你，明天也会是另一个你。黑塞说，成为自己是不断变化的过程。你不是分裂的碎片，你是正在流动的整体。',
    '你在大城市漂着，没有归属感。你觉得自己是无根的人，风一吹就散。薇拉·凯瑟写美国中西部的拓荒者，那些从欧洲来的移民在荒原上扎下根，把陌生的土地变成了家乡。她说，在你的家乡，你永远不需要解释自己。你的家乡不一定是你出生的地方，是你不需要解释自己的地方。那是你心里的一片保留地——在那片土地上，你不用解释你为什么内耗，不用解释你为什么不开心，不用解释你为什么和别人不一样。今天，找到你心里那片不需要解释的“家乡”。它可能是一个人，一个地方，一段音乐，一个你从小就喜欢做的小事。在里面待一会儿。你不需要在那里解决任何问题，你只需要在那里是你自己。凯瑟说，家乡是你不需要解释自己的地方。你的内耗有一大部分来自你每天都在和世界解释自己。今天，给自己放一天假，在你不需解释的家乡里，做那个不需要被理解的自己。',
    '你在崩溃的边缘，觉得自己一步也走不动了。你坐在床边，看着天花板，觉得自己所有力气都用完了。贝克特用三段话总结了人类的全部处境：你必须继续，我不能继续，我将继续。它们不是递进的励志口号，是矛盾的同在。你必须在社会的期待下继续，你在内心深处觉得自己一步也走不动了，但你在说完“我不能继续”之后，还是会在明天早上从床上爬起来。贝克特写的不是英雄，是在绝境里还能继续呼吸的普通人。你不需要在今天解决所有问题，你只需要在今天承认：这三句话都适用于你。你必须继续是真的，你不能继续也是真的，你将不得不继续，更是真的。今天，不需要强迫自己振作，你只需要接受你还在矛盾里呼吸。贝克特说，我将继续。不是因为你相信未来，是因为你还没有走到最后一页。躺一会儿，然后明天继续。',
    '你整天都在为别人的情绪负责——父母的期待，朋友的倾诉，同事的情绪。你吸收了所有人的负面能量，自己变成了一块被拧干的抹布。一行禅师在越战期间救助难民，被流放，在欧洲和北美传播正念。他教人的不是逃离，是回到自己。吸气，我回到我自己；呼气，我放下。你不需要解决所有人的问题。今天，你只需要在每一次吸气时，把被你散落在别人身上的注意力收回来；在每一次呼气时，把你背负了一整天的、不属于你的情绪吐出去。你的内耗有一半是别人的，是你以为你需要负责但其实不需要的东西。一行禅师说，呼吸是一座桥。今天用呼吸把自己从别人的情绪里渡回来。你不是任何人的情绪垃圾桶，你是你自己的呼吸。吸，回来；呼，放下。',
    '你觉得自己的内耗是一种见不得人的笨拙——别人都从容优雅，只有你跌跌撞撞。你在社交场合说错话，在重要时刻掉链子，在所有人都谈笑风生时一个人别扭地站在旁边。村上春树笔下的每一个主人公都是笨拙的。他们不会社交，不会表达，在世界上找不到位置。但他们一直在跑，在听爵士，在井底孤独地和自己对话。你年轻时，以为自己是唯一笨拙的人。后来发现，所有人都笨拙，只是不同形式。你羡慕的那些从容的人，他们在你看不见的地方也有自己的笨拙。今天，不要再用别人的表面和自己的内里比较。你笨拙的地方不是你的缺陷，是你和别人不一样的具体形态。它们不会让你出局，只会让你在那些也觉得自己笨拙的人眼里，变得可以接近。村上的主人公从来不因为笨拙而停止生活，你也是。笨拙是你的起点，不是你的终点。',
    '你觉得自己被某段关系、某次失败、某个来自过去的创伤永久损坏了。你觉得现在的自己是原来那个完整的自己被打碎之后拼不回去的残次品。格丽克用一生写创伤。她写童年，写家庭，写爱和失去。她的诗里充满了被打碎的人，但她让他们在碎片里继续生活。我们被伤害，但我们没有被毁灭，我们只是被改变了。你不是原来那个你没有被打碎之前的版本，你是一个被经历重新塑造过的人。你的裂痕不是你的贬值，是你改变的地貌。今天，不要再用“完整的过去”审判“破损的现在”。你不需要回到受伤之前的样子，你只需要承认你被改变了。格丽克把创伤写成了诗，你也可以把你的改变，当成你重新认识自己的入口。你没有被毁灭，你只是被改变了。改变不是惩罚，是你还在继续活着的全部证据。从今天起，以改变之后的身份，继续走。',
    '你被脑子里停不下来的声音折磨着——各种自我评价、各种后悔、各种预设。你想用更多的话去堵住它们，可越说越乱。墨西哥诗人帕斯在《孤独的迷宫》里写：寂静是语言停止的地方，是另一种语言的开始。你的内耗是你现在掌握的语言——用分析、自我批判、焦虑组成的话。但这不是你唯一能说的语言。在你说累了的时候，寂静就是你的第二语言。它不需要任何词汇，不需要任何逻辑，不需要任何解释。今天，用十分钟的时间放弃你习惯的语言。不要和自己辩论，不要在心里写检讨。只是安静。帕斯说，寂静是另一种语言的开始。当你的内在噪音终于消停时，你会听见另一种声音——不是用话说出来的，是你身体自己的呼吸，是你心里那个不需要被语言翻译的自己，终于在寂静里重新开口。',
    '你觉得自己的问题太大了，大到没有解决的希望，大到整个未来都被它压垮了。英国诗人布莱克说：一沙一世界，一花一天堂。他不是在比喻，他在告诉你，你的每一个被无限放大的焦虑，都可以在一粒沙里找到它的边界。今天，把你最焦虑的那件事从“我的一生”缩小到“今天下午”。你不需要解决整个人生的问题，你只需要在今天下午做一件能让你离解决它更近一小步的事。布莱克说，把无限握在掌心。你不是在和一头看不见边的巨兽搏斗，你是在和自己对无限的想象搏斗。把它从未来拉回到现在，从整个命运的审判缩小到今天下午的具体行动。你的焦虑在无限里膨胀，在有限里瓦解。今天，把你的全部注意力放在这粒沙、这朵花、这一分钟里。永恒在别处，你在此刻。把此刻握好。',
    '你觉得自己是最孤独的内耗者——没有人理解你，没有人懂你的挣扎。你把自己关在只有你一个人知道的监狱里，拒绝任何探访。卡尔维诺说，阅读是孤独的反面。不是因为它能消除孤独，是因为你在别人的故事里认出了自己。你的内耗不是你独一无二的缺陷，是人类共同经验里被无数人写过、哭过、熬过的旧战场。今天，找一本你一直想看但没时间看的书，读一章。不是工具书，不是职场指南，是一本小说，一本诗。你在里面找的不是答案，是和你一样的人。卡尔维诺说，你在别人的孤独里认出了自己。当你在读到的某一行里，忽然觉得“这就是我的感受”时，你的孤独就不再是孤立的。它被另一个人——也许已经死了几百年——理解过。你不需要独自扛着，在你的孤独里，你已经和无数读过同一本书的孤独者，共享了同一种语言。',
    '你每天看着同样不够好的自己，在同样的镜子里，从同样的角度，用同样的挑剔目光。你觉得看腻了，但你没想过，可能不是风景的问题，是你的眼睛。普鲁斯特哪里都没去，躺在一个密不透风的房间里，用全新的眼睛重新看了一遍自己的整个一生。我们需要的不是新的风景，而是新的眼睛。你今天对自己的看法，是你被训练出来的习惯，不是你唯一可以看到的东西。今天，换一双眼睛看自己——不是你自己的眼睛，是你最好的朋友的眼睛，是那个一直相信你的人的眼睛，是一个完全陌生但善意的旁观者的眼睛。用他们的眼光看自己一次。你会发现，那些你觉得无法容忍的缺点，在他们眼里可能根本不存在；那些你觉得太平凡的地方，在他们眼里可能是你最可爱的地方。普鲁斯特说，发现之旅不在于寻找新风景，而在于拥有新眼睛。你今天不需要改变自己，只需要换一双眼睛。',
    '你被社交内耗折磨着——总是在想别人怎么看你，总是在担心自己是不是说错了什么。你把所有的注意力都放在别人投来的目光上，忘了你也有自己想看向的方向。圣-埃克苏佩里在沙漠里迫降，在夜航中看到地面上的灯塔，写下：爱不是互相凝视，而是一起看向同一个方向。你不需要让所有人都喜欢你，你只需要找到那个和你看往同一个方向的人。今天，不要盯着别人的表情分析自己的表现。抬起头，找到你今天工作、生活中真正值得你专注的那个方向——一个你想做好的项目，一本书，一个你真正在乎的人。那些和你看向同一个方向的人，不需要你的解释，不需要你的完美。他们只需要你在他们身边，一起看。圣-埃克苏佩里的灯塔不为任何一艘船单独亮着，它只是在那里，照着所有朝它驶来的人。你也是。专注你自己的方向，对的人会在路上找到你。',
    '你被一件已经发生的事反复折磨——你说错的话，做错的决定，失去的机会。你回放了一万遍，每一遍都得出相同的结论：你本应该做得更好。两千年前，斯多葛学派的哲学家爱比克泰德说：让我们不安的不是事物本身，而是我们对事物的看法。他不是在否定你的痛苦，他是在告诉你：那件事已经发生完了，它现在只存在于你对它的看法里。你的看法是可以被重新选择的。今天，拿出那件反复折磨你的事，用爱比克泰德的公式做一次练习：这件事本身是什么；我对这件事的看法是什么；我能选择另一种看法吗。不是强迫自己原谅，不是假装没发生过，是承认你对自己的看法有选择权。你不需要改变过去才能获得安宁，你只需要改变你现在对过去的回应。爱比克泰德自己是个奴隶，他不能改变被奴役的事实，但他改变了如何看待它。你比一个奴隶拥有更多的选择。今天，用一次选择，重新看待你回放了一万遍的过去。',
    '你觉得自己每天都在重复昨天的内耗。想同样的事，绕同样的圈。你觉得今天的自己和昨天没有区别，明天的自己也不会好起来。梭罗在瓦尔登湖边每天观察同一片湖水、同一片树林。他发现湖水的颜色每天都不一样，树影的倾斜角度每天都在变。太阳每天都是新的，我也是。你不是在重复昨天，你是在被每一个今天微调。你今天可能没有比昨天更快乐，但你今天读到这段话——这就是昨天没有发生的事。今天你的内耗里混进了新的东西，只是它太小了，你还没有注意到。今天，找一件今天和昨天不一样的事——你换了新的床单，你走了另一条路，你和一个人多说了两句话。这些不是翻天覆地的变化，但它们是你正在被微调的全部证据。梭罗说，太阳每天都是新的，我也是。你不是被困在昨天里，你是在被今天慢慢改变。新不是蜕变，是日出。明天的日出，你也会在。',
    '你觉得自己太软弱了——容易受伤，容易被打倒。你觉得在这个弱肉强食的世界里，你需要更强硬、更冷漠才能活下来。老子说：天下莫柔弱于水，而攻坚强者莫之能胜。你不需要变成石头才能不被冲走。你的内耗不是你太弱，是你一直在用石头的标准对待自己。你是水，你不与石头硬碰硬，你绕过它，渗过它，用时间把它磨成光滑的卵石。你的柔软不是你的弱点，是你还没有学会使用的力量。今天，在你遇到阻力时，不要像石头那样硬碰上去。像水那样，绕过去。不能绕过去的，就停下来渗下去。你不需要在今天就冲破所有障碍，你只需要在今天继续流。老子说，水不争，但万物莫能与之争。你的柔软，是你在这个坚硬世界里最不需要被解释的优势。继续流，你的力量不在冲击里，在持续的流动里。',
    '你被情绪压得喘不过气，你的全部注意力都给了那些让你痛苦的念头。你把注意力当成必须消耗的资源，觉得自己快要被榨干了。法国神秘主义哲学家西蒙娜·薇依说：注意力是最纯粹的慷慨。注意不是你被迫消耗的东西，是你主动给予的礼物。你给焦虑的注意力，是你自己送给它的能量。今天，试试把注意力从那些让你痛苦的事上，主动赠予一件你真正在乎的事——不是因为它能解决你的问题，是因为你选择把它放在那里。读一首诗，听一首歌，看窗外那棵你每天路过但从来没认真看过的树。你不是在逃避，你是在行使赠予的权利。薇依说，注意力是慷慨，不是消耗。你的内耗不是注意力不够用，是你把全部注意力都给了不需要你慷慨的念头。今天，把你的注意力当成一份礼物，郑重地送出去——给一本书，给一顿饭，给一段没有目的的安静。你不是被消耗殆尽的，你是可以选择赠予方向的。这就是你重新获得力量的开始。',
    '你觉得自己在情绪的海里被反复淹没——刚浮出水面喘一口气，下一个浪又把你拍下去。你觉得自己永远游不到平静的岸边。伍尔夫在《海浪》里用六个人的独白写尽了一生。她的海浪不是敌人，是时间本身——每一天都不同，每一天都是永恒的一部分。你的情绪波浪也不是来淹死你的，是来告诉你：你还活着，你还在感受，你还没有被磨平。每一次浪来的时候你都会怕，但每一次浪退之后你还在。今天，不要和浪对抗。让它来，让它退。你不是被浪卷走的碎片，你是整片海。浪在你的表面上翻涌，但你的深处始终是安静的。伍尔夫说，波浪每一天都不同。你今天的浪和昨天的也不一样，只是你还把它们当成同一个敌人。在下一个浪来的时候，试着对它说：我认识你，你是新的。你的波浪不是你反复溺水的同一个地方，是你每一天都在不同的深度里练习游泳。',
    '你急着想从内耗里走出来，急着想变成一个不再焦虑的人。你每天都在检查自己有没有进步，有没有比昨天更好一点。歌德在意大利旅行时，在西西里的植物园里看着一棵棕榈树，忽然明白了：树木不急，但它每天都在长。没有什么比看到一棵树更让人安心的了。它不急着开花，不急着结果，不急着比旁边的树更高。它只是在生长。你对自己的要求，比一棵树对自己的要求苛刻得多。你要求自己今天就变好，要求自己不再反复。但树的生长是看不见的，你的也是。今天，把你对自己的期待从“今天”挪到“今年”。你不需要在今天解决所有的问题，你只需要在今天像一棵树那样，继续扎根。歌德说，树木让他安心。你的成长也不需要每天都看得见。急什么，树还在长，你也是。',
    '你觉得自己是一堆再也拼不回去的碎片——过去的创伤，现在的焦虑，未来的恐惧。你把碎片堆在角落里，觉得自己永远也不会完整了。法裔美国艺术家布尔乔亚用一生把创伤做成艺术。她的大蜘蛛、她的细胞房间、她用布料缝补的雕塑，都是用碎片做成的。她说：我是破碎的，但我是用我的碎片做成的。你的碎片也不需要被拼回原来的样子。你不是在变完整，你是在用碎片做成只有你才能做成的形状。今天，拿出一张纸，把你觉得自己“碎掉”的部分写上去——那些你失去的、被伤害的、无法弥补的。然后在旁边画一个圆，把这些碎片全部放进去，不要拼，就让它们待在一起。布尔乔亚说，碎片不是你的废墟，是你的材料。你不是等着被修好的旧物，你是在用碎片创作的新作品。继续缝，继续拼。你的形状不需要像任何人，只需要像你自己。',
    '你被说不清的情绪堵着，想表达却找不到合适的词。你觉得自己被困在一种无法被命名的状态里，孤独又沉重。海德格尔说：语言是存在之家。你找不到词，不是因为你没有感受，是因为你的感受还没有找到属于它的家。那些被你堵在胸口的情绪，它们不是见不得人的怪物，它们是无家可归的流浪者。今天，试着给你的情绪一个名字——不一定是一个正确的词，可以是任何你觉得接近的词。灰蓝色的，毛玻璃质地的，像某个雨天下午的。给它一个名字，哪怕这个名字只有你自己懂。海德格尔说，语言是家。当你终于用一个词把那种说不清的感觉装进去时，它就不再是流落在外的怪物，是你收留了它的主人。你的内耗有一半来自你那些没有被命名的情绪。今天，给其中一个建一个家。不需要豪宅，一个词就够了。你的情绪需要一个住址，给了它，它就不再流浪，你也不再被它追着跑。',
    '你一直在等自己“好起来”。等哪天不再焦虑，不再敏感，不再被过去的事情触动。你觉得愈合就是伤口消失，像从来没有受过伤一样。爱丽丝·沃克在《紫色》里写被家暴、被歧视、被剥夺一切的黑人女性如何重新站起来。她们没有忘记，她们只是学会了用受伤的部分继续活。愈合不是忘记，是重新学会使用受伤的部分。你的敏感、你的易碎、你反复想起的那些事，它们不是没有愈合，是你还没有学会使用这些已经愈合但留下疤痕的部分。今天，不要再用“好起来”的标准检验自己。你不是在等伤口消失，你是在学习用带着伤痕的手继续做事。沃克笔下的西莉最后没有变成没有受过伤的人，她变成了可以用伤疤帮助别人的人。你的伤疤也是。愈合不是忘记，是有一天你能用这只受过伤的手，去拉另一个还在痛的人。你的伤口是你的资格证，不是你的缺陷。',
    '你觉得自己陷在一片情绪的沼泽里——走不动，拔不出，越挣扎越下沉。梭罗在瓦尔登湖边不只是晒太阳，他也走进沼泽。他观察泥炭藓怎样在死水里生长，蜻蜓怎样在腐草上产卵。沼泽不是死地，是最肥沃的生态系统。他的“活得深刻”是在沼泽里发现的——不是避开泥泞，是在泥泞里看到生机。你的情绪沼泽也有它的生态。你陷在里面的不是死水，是你还没有学会辨认的滋养。你的焦虑在告诉你你在乎什么，你的悲伤在告诉你你失去了什么，你的愤怒在告诉你什么对你来说是重要的。今天，不要再挣扎着从沼泽里爬出来。坐下来，像梭罗观察沼泽那样，观察一次你的情绪——不评判，不逃跑。你会在里面发现你以前没有注意到的生命迹象。沼泽不是你的困境，是你的深度。梭罗说，吸取生命所有的精华。精华不在干燥的高地上，在沼泽最深处。',
    '你只想要光明——快乐，平静，笃定。你把所有黑暗的情绪当成必须被驱散的敌人。谷崎润一郎在《阴翳礼赞》里写：美不存在于物体本身，而存在于物体与物体之间的阴影里。他写漆器在昏暗烛光下深沉的反光，写能剧面具在阴影里变幻的表情。你的内耗是你心里的阴影。你不是要被光明完全填满的空白页，你是需要阴影才能显出深度的漆器。那些难过的、不安的、说不清的情绪，不是你要驱散的敌人，是你整个人这件漆器上被岁月磨出的包浆。今天，不要开所有的灯。留一盏，让阴影在你的房间里存在。在阴影里坐一会儿，你会发现，你不是被黑暗吞噬，你是被阴影成就。谷崎说，美在阴影里。你的深度也在那些你不愿意给别人看、甚至不愿意给自己看的阴影里。接受阴影，就是接受你完整的全部光泽——不是抛光的亮，是被阴影衬托的、有层次的、只有时间才能磨出的光泽。',
    '你看了无数解决内耗的方法，收藏了无数篇干货，转发了无数条金句。你的收藏夹满了，你的脑子更乱了。你知道得越多，越觉得自己做不到，越焦虑。歌德在《浮士德》里写：知道是不够的，我们必须应用；意愿是不够的，我们必须行动。浮士德不是坐在书斋里想通了，他走出去，填海造地。你的内耗有一半来自你知道得太多、做得太少。今天，把你收藏的所有关于解决内耗的内容关掉，就用你今天已经知道的一个方法——深呼吸也好，写日记也好，出去走路也好——就一个，今天就用。不用做到完美，不用坚持一辈子。就今天，就一次。歌德说，行动才是一个人真正知道的全部证明。你不需要知道更多，你只需要把你已经知道的用出来。一次就够了。行动不是知道了之后才做的事，是你还在迷茫、还在不确定、还在害怕时，依然可以跨出的一步。今天用一次，你的知道就会变成你的力量。',
    '你觉得自己被生活压得太重了——工作的压力，人际关系的疲惫，未来的迷茫。你觉得这些负担是阻碍你飞起来的石头，让你只能贴着地面爬行。昆德拉说：负担越重，我们的生命越贴近大地，它就越真切实在。他写“不能承受的生命之轻”时，不是在赞美轻，是在警告轻的危险——轻飘飘的人生没有重量，风一吹就散了。你的内耗是你的重量。它让你累，但它也让你真切。你不是被负担压得飞不起来的鸟，你是因为有重量所以不会被风吹走的人。今天，不要诅咒你的负担。它让你贴近地面，让你每一步都踩得实实在在。那些看起来轻松的人，他们可能只是还没有遇到能让他们落地的重量。昆德拉说，负担让生命贴近大地。你的重量是你活着的证据，不是你的惩罚。你不需要飞起来才能证明你活着，你已经在用双脚踩着自己的路，每一步都是真的。',
    '你被信息淹没了——碎片化的知识，矛盾的言论，让你更加迷茫。博尔赫斯是图书馆员，后来成了阿根廷国家图书馆的馆长。他中年失明，再也无法阅读，但他仍然在脑子里继续建造他的图书馆。他说：我总是在想象天堂是一座图书馆。他不是在想象无穷无尽的信息，他是在想象一个每一本书都有它的位置、每一个位置都有它被找到的可能的秩序。你的内耗不是你读得不够多，是你还没有把你读过的东西放进属于它们的位置。今天，从你的脑子里选一本你读过的、对你有启发的书——不是碎片信息，是一本完整的书——在纸上写下你从这本书里得到的最重要的一个想法。博尔赫斯的图书馆不在外面，在他心里。你的也是。你不是被信息淹没的溺水者，你是还没有开始整理自己图书馆的馆长。翻开你的目录，写下一个条目。天堂不在别处，在你开始整理自己的那一刻。',
    '你太想“治好”自己了。太想快点从内耗里走出来，快点变成一个“正常”的人。你把内耗当成疾病，把治愈当成必须抵达的目的地。史蒂文森一生体弱多病，在病床上写了《金银岛》。他不能远行，但他让笔下的角色替他走遍了全世界。他说：充满希望的旅行比到达目的地更好。你的内耗不是一场需要被治愈的疾病，是你还在旅途中的标记。你不是在等到达的那一天才开始活，你在旅途中的每一天都在活。今天，不要再用“我还没有好”否定自己。你还在路上，这就是你还在走的全部证据。史蒂文森说，旅行比目的地更好。你的内耗之旅也是——你在这段路上学到的东西、感受到的深度、对自己日渐增长的了解，是你到达“治愈”之后可能再也体会不到的。不是因为你病着，是因为你正在穿过只有这一段路才有的风景。珍惜这段旅程。目的地会到，但不是现在。现在，看路上的光。',
    '你把自己的痛苦归咎于外界——是这份工作让我焦虑，是这个人让我内耗，是这个环境让我喘不过气。你觉得只要换了环境，一切都会好起来。弥尔顿在双目失明、政治理想破灭、被投入监狱之后，写下《失乐园》——一部关于人类失去天堂的史诗。他写：心灵是它自己的居所，能把地狱变成天堂，天堂变成地狱。这不是要你否认环境的恶劣，是告诉你：你无法控制外界发生的事，但你可以决定它们在你心里长成什么。你的内耗有一部分确实来自外界，但你能决定它在你这片土壤里是长成荆棘，还是慢慢开出只有你才有的花。今天，不要只盯着外界那些让你痛苦的东西。看看你心里那块地——它还能长东西，还没有变成荒地。弥尔顿在地牢里写出天堂，你也可以在你现在的困境里，种下第一个属于你自己的念头。心灵的居所不依赖外界，它依赖你怎么打理它。',
    '你总想一口吃成胖子，想一次把所有的内耗都解决掉。你给自己制定宏大的自我改造计划，然后因为这些计划无法完成而更加焦虑。杜甫写春雨，他写：随风潜入夜，润物细无声。春雨不是暴雨，不打雷，不喧哗，它在夜里悄悄渗透，第二天早上你会发现泥土松软了，嫩芽从土里钻出来。你的改变也不是靠一场轰轰烈烈的自我革命。它是在你不知不觉中，被你每天的坚持悄悄渗透的土壤。今天，不要制定任何宏大的改造计划。就做一件极小的、你不会失败的事：今天比昨天早睡十分钟，今天喝够三杯水，今天在镜子前对自己笑一下。这件事太小了，小到它不会引起任何抗拒，但它就是你的春雨。杜甫说，润物细无声。你的改变也不需要声张。在每一个今天，用一件小到不会被内耗发现的事，渗透你自己。雨不大，但土在变软，芽在长。你不知道哪一天会破土，但你不用知道，你只需要继续润。',

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];
function resize() { 
    w = innerWidth;
    h = innerHeight;
    canvas.width = w;
    canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.s = Math.random() * 1.6 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.32;
    this.vy = (Math.random() - 0.5) * 0.32;
    this.o = Math.random() * 0.4 + 0.22;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > w) this.vx *= -1;
    if(this.y < 0 || this.y > h) this.vy *= -1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(120,92%,76%,${this.o})`;
    ctx.fill();
  }
}

for(let i = 0; i < 130; i++){
    particles.push(new Particle());
}
function anim(){
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(anim);
}
anim();

function showDate(){
  const now = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  
  const month = months[now.getMonth()];
  const day = now.getDate();
  const year = now.getFullYear();
  const weekDay = weekDays[now.getDay()];
  
  const str = `${month} ${day}, ${year} ${weekDay}`;
  document.getElementById('brandDate').innerText = str;
}

  showQuote();

};
