<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>You NianGuang | 7天重塑人生</title>
<link rel="preload" as="image" href="sengling.webp" fetchpriority="high">
<meta name="view-transition" content="same-origin">
    <style>
        :root {
            --accent: #A8E600;
            --accent-light: rgba(168,230,0,0.2);
            --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            color: #ffffff;
            cursor: default;
            position: relative;
            transition: opacity 0.8s var(--ease-in-out);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);

        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0) 0%,
                rgba(0,0,0,0.1) 40%,
                rgba(0,0,0,0.15) 70%,
                rgba(0,0,0,0.25) 100%
            );
            z-index: 1;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 998;
            opacity: 1;
        }

        .scan-lines {
            position: fixed;
            inset: 0;
            z-index: 997;
            pointer-events: none;
            opacity: 0.012;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,25,0.01) 2px,
                rgba(255,255,255,0.01) 4px
            );
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 996;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: noiseShift 1s linear infinite;
        }
        @keyframes noiseShift {
            0% { background-position: 0 0; }
            100% { background-position: -50px -30px; }
        }

        .breath-dot,
        .container,
        .overlay,
        .footer-text {
            position: relative;
            z-index: 4;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .breath-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
            border-radius: 50%;
            animation: breath 4s ease-in-out infinite, dotFadeOut 1.2s ease 3.5s forwards;
            will-change: opacity, transform;
            box-shadow: 0 0 20px rgba(168,230,0,0.25), 0 0 60px rgba(168,230,0,0.08);
        }
        @keyframes breath {
            0%,100% { opacity: 0.06; transform: translate(-50%, -50%) scale(0.6); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.4); }
        }
        @keyframes dotFadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            will-change: opacity, transform, filter;
            flex: 1;
            position: relative;
        }
        .container.fade-out {
            animation: fadeOutAll 1.5s var(--ease-in-out) forwards;
        }
        @keyframes fadeOutAll {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(0.92); filter: blur(8px); }
        }

        .logo {
            font-size: 34px;
            letter-spacing: 6px;
            font-weight: 300;
            white-space: nowrap;
            position: relative;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.15);
            margin-bottom: 4px;
        }
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) translateX(-6px);
            filter: blur(10px);
            animation: charIn 1.4s var(--ease-out) forwards, textBeat 2.8s ease-in-out infinite 6s;
            will-change: opacity, transform, filter;
        }
        @keyframes charIn {
            0% {
                opacity: 0;
                transform: translateY(20px) translateX(-6px);
                filter: blur(10px);
                text-shadow: 0 0 20px rgba(168,230,0,0.4), 0 0 40px rgba(168,230,0,0.15);
            }
            60% {
                opacity: 0.7;
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0);
                filter: blur(0);
                text-shadow: 0 0 4px rgba(255,255,255,0.2);
            }
        }

        @keyframes textBeat {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-1.5px) scale(1.015); }
        }

        .logo::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 20%, rgba(168,230,0,0.15) 45%, rgba(255,255,255,0.07) 55%, rgba(168,230,0,0.12) 70%, transparent 100%);
            animation: lightSweep 4.5s var(--ease-in-out) 5.5s forwards;
            will-change: left;
        }
        @keyframes lightSweep {
            to { left: 120%; }
        }

        .progress-wrap {
            width: 280px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            opacity: 0;
            animation: wrapIn 1s ease 6.5s forwards;
            will-change: opacity;
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
            margin: 4px 0;
        }
        @keyframes wrapIn { to { opacity: 1; } }

        .loading-tip {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-top: 2px;
            opacity: 0;
            animation: tipFade 1s ease 6.7s forwards;
            text-transform: uppercase;
            font-weight: 300;
        }
        @keyframes tipFade { to { opacity: 1; } }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            border-radius: 99px;
            animation: progress 12s cubic-bezier(0.08, 0, 0.04, 1) 7s forwards;
            position: relative;
            will-change: width;
            box-shadow: 0 0 8px rgba(255,255,255,0.25);
        }
        @keyframes progress {
            0%   { width: 0%; }
            100% { width: 100%; }
        }

        .phrase {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2px;
            opacity: 0;
            min-height: 16px;
            animation: phraseIn 1.2s ease 8s forwards;
            text-align: center;
            transition: opacity 0.6s ease, transform 0.6s var(--ease-out);
            will-change: opacity, transform;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            margin-top: 2px;
        }
        @keyframes phraseIn { to { opacity: 1; } }

        .loading-text {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            opacity: 0;
            animation: textIn 1s ease 7.5s forwards;
            min-height: 16px;
            will-change: opacity;
            font-weight: 300;
            margin-top: 2px;
        }
        @keyframes textIn { to { opacity: 1; } }

        .ready-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .ready {
            font-size: 14px;
            color: var(--accent);
            opacity: 0;
            transform: translateY(12px);
            animation: ready 1.6s var(--ease-out) 13s forwards, readyPulse 3.5s ease 14.6s infinite;
            text-shadow: 0 0 8px rgba(168,230,0,0.35), 0 0 30px rgba(168,230,0,0.1);
            will-change: opacity, transform;
            letter-spacing: 3px;
            font-weight: 400;
        }
        @keyframes ready {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes readyPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(168,230,0,0.35), 0 0 30px rgba(168,230,0,0.1); }
            50% { text-shadow: 0 0 14px rgba(168,230,0,0.5), 0 0 50px rgba(168,230,0,0.18); }
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 15px;
            background: var(--accent);
            opacity: 0;
            animation: cursorOn 1.6s ease 13s forwards, blink 1.2s step-end 14.6s infinite;
            box-shadow: 0 0 8px rgba(168,230,0,0.4), 0 0 20px rgba(168,230,0,0.15);
            border-radius: 1px;
        }
        @keyframes cursorOn { to { opacity: 1; } }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 100%);
            opacity: 0;
            pointer-events: none;
            will-change: opacity;
            z-index: 5;
        }
        .overlay.fade-in {
            animation: overlayIn 1.5s var(--ease-in-out) forwards;
        }
        @keyframes overlayIn {
            to { opacity: 1; }
        }

        .footer-text {
            position: absolute;
            bottom: 80px;
            text-align: center;
            width: 100%;
            z-index: 4;
        }

        .footer-name {
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(90deg, #00A8E8, #00FFAA, #00A8E8);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientFlow 15s linear infinite;
            letter-spacing: 2px;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px rgba(0, 168, 232, 0.3));
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .footer-date {
            font-size: 11px;
            color: rgba(255,255,255,0.75);
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        .buttons-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
            pointer-events: none;
        }
        .buttons-wrap.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .action-btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #D9FF70, #29E63E);
            border: none;
            color: #1a3a00;
            border-radius: 22px;
            font-size: 14px; font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s var(--ease-in-out);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 16px rgba(41,230,62,0.2);
            touch-action: manipulation;
            white-space: nowrap;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(41,230,62,0.35);
        }
        .action-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(41,230,62,0.2);
        }

        .skip-intro .breath-dot { display: none; }
        .skip-intro .logo span {
            animation: none !important;
            opacity: 1;
            transform: translateY(0) translateX(0);
            filter: blur(0);
        }
        .skip-intro .logo::after { animation: none !important; display: none; }
        .skip-intro .progress-wrap,
        .skip-intro .loading-tip,
        .skip-intro .phrase,
        .skip-intro .loading-text,
        .skip-intro .ready,
        .skip-intro .cursor-blink {
            animation: none !important;
            opacity: 1;
        }
        .skip-intro .progress-bar { animation: none !important; width: 100%; }
        .skip-intro .ready { transform: translateY(0); }
        .skip-intro .buttons-wrap {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }
body { animation: pageIn 0.1s ease; will-change: transform, opacity; }
body.no-page-anim { animation: none !important; }
@keyframes pageIn { from { opacity: 0.7; transform: translate3d(15px,0,0); } }

/* 背景图模糊加载：瞬间显示极小占位符→清晰图淡入 */
.bg-loader {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  z-index: -1;
  filter: blur(20px);
  transform: scale(1.1);
  transition: filter 0.8s ease-out, transform 0.8s ease-out;
  background: #0a0a14;
}
.bg-loader.loaded {
  filter: blur(0);
  transform: scale(1);
}

	/* ===== 日历按钮 ===== */
	.cal-btn {
	    position: fixed; top: 24px; right: 20px; z-index: 1000;
	    display: flex; align-items: center; gap: 6px;
	    padding: 8px 16px; border-radius: 24px;
	    background: linear-gradient(135deg, #3DB008, #E9F8BC, #E0FE44);
	    border: none; color: #1a3a00; font-size: 0.78rem; font-weight: 700;
	    letter-spacing: 1.2px; cursor: pointer;
	    box-shadow: 0 2px 12px rgba(61,176,8,0.3);
	    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
	}
	.cal-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(61,176,8,0.45); }
	.cal-btn:active { transform: scale(0.94); }
	.cal-dot { width: 7px; height: 7px; border-radius: 50%; background: #1a3a00; }

	/* ===== 日历弹窗 ===== */
	.cal-overlay {
	    position: fixed; inset: 0; z-index: 2000;
	    background: transparent;
	    
	    display: flex; align-items: flex-start; justify-content: center; padding-top: 50px;
	    opacity: 0; pointer-events: none; transition: opacity 0.15s ease, visibility 0s 0.15s;
	    
	}
	.cal-overlay.show { opacity: 1; pointer-events: auto; visibility: visible; transition: opacity 0.15s ease, visibility 0s 0s; }
	.cal-card {
	    position: relative; width: 380px; max-width: 94vw; max-height: 80vh;
	    padding: 28px 22px 22px; border-radius: 28px;
	    background: linear-gradient(145deg, #3DB008 40%, #E9F8BC 55%, #E0FE44);
	    box-shadow:
	        0 6px 24px rgba(0,0,0,0.07),
	        0 1px 0 rgba(255,255,255,0.5) inset,
	        0 0 0 1px rgba(255,255,255,0.7);
	    transform: translateY(24px) scale(0.96);
	    transition: transform 0.42s cubic-bezier(0.25,0.1,0.25,1);
	    overflow: hidden; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
	    font-family: -apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC',sans-serif;
	}
	.cal-card::-webkit-scrollbar { display: none; }
	}
	.cal-card::before {
	    content: ''; position: absolute; inset: 0; border-radius: 28px;
	    background-image: radial-gradient(rgba(0,0,0,0.03) 0.4px, transparent 0.4px);
	    background-size: 5px 5px; pointer-events: none; z-index: 0;
	}
	.cal-card::after {
	    content: ''; position: absolute; inset: 0; border-radius: 28px;
	    background: rgba(255,255,255,0.12); pointer-events: none; z-index: 1;
	}
	.cal-overlay.show .cal-card { transform: translateY(0) scale(1); }
	.cal-card > * { position: relative; z-index: 2; }

	.cal-close {
	    position: absolute; top: 14px; right: 18px; z-index: 3;
	    width: 30px; height: 30px; border-radius: 50%;
	    background: rgba(0,0,0,0.14); border: none;
	    color: rgba(26,58,0,0.7); font-size: 1rem; cursor: pointer;
	    display: flex; align-items: center; justify-content: center;
	    transition: all 0.2s;
	}
	.cal-close:hover { background: rgba(0,0,0,0.24); color: #1a3a00; }

	.cal-title { font-size: 0.7rem; color: rgba(26,58,0,0.55); letter-spacing: 3px; text-align: center; margin-bottom: 2px; font-weight: 700; }

	/* 月份导航 */
	.cal-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
	.cal-month-nav button {
	    width: 32px; height: 32px; border-radius: 50%; border: none;
	    background: rgba(0,0,0,0.1); color: rgba(26,58,0,0.75);
	    font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
	    transition: all 0.2s; font-weight: 600;
	}
	.cal-month-nav button:hover { background: rgba(0,0,0,0.25); visibility: hidden; color: #1a3a00; }
	.cal-month-label { font-size: 1rem; font-weight: 700; color: #1a3a00; letter-spacing: 0.5px; }

	/* 星期头 */
	.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; margin-bottom: 6px; }
	.cal-weekdays span { font-size: 0.65rem; color: rgba(26,58,0,0.55); font-weight: 700; letter-spacing: 1px; padding: 4px 0; }

	/* 日期网格 */
	.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
	.cal-day {
	    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
	    border-radius: 12px; font-size: 0.8rem; color: #1a3a00; font-weight: 500;
	    cursor: pointer; transition: all 0.15s ease; position: relative;
	}
	.cal-day:hover { background: rgba(0,0,0,0.1); }
	.cal-day.today { background: #1a3a00; color: #E0FE44; font-weight: 700; }
	.cal-day.selected { background: rgba(26,58,0,0.22); font-weight: 700; }
	.cal-day.today.selected { background: #1a3a00; color: #E0FE44; }
	.cal-day.other-month { color: rgba(26,58,0,0.18); pointer-events: none; }
	.cal-dot-indicator {
	    width: 5px; height: 5px; border-radius: 50%; background: #1a3a00;
	    position: absolute; bottom: 4px; opacity: 0.9;
	}
	.cal-day.today .cal-dot-indicator { background: #E0FE44; }
	.cal-day.has-event {
	    background: rgba(15,130,125,0.7);
	}
	.cal-day.has-event:hover {
	    background: rgba(15,130,125,0.85);
	}
	.cal-day.has-event .cal-dot-indicator { background: #38B2AC; }

	/* 选中日期详情 */
	.cal-detail { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.14); }
	.cal-detail-date { font-size: 0.8rem; color: rgba(26,58,0,0.7); font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
	.cal-task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; max-height: 140px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
.cal-task-list::-webkit-scrollbar { display: none; }
	.cal-task-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 12px; background: rgba(0,0,0,0.08); transition: all 0.2s; }
	.cal-task-row:hover { background: rgba(0,0,0,0.14); }
	.cal-task-cb {
	    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
	    border: 2px solid rgba(26,58,0,0.5); background: transparent;
	    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
	    font-size: 0.6rem; color: transparent;
	}
	.cal-task-cb.done { background: #1a3a00; border-color: #1a3a00; color: #E0FE44; }
	.cal-task-text { font-size: 0.82rem; color: #1a3a00; font-weight: 600; flex: 1; }
	.cal-task-text.done { text-decoration: line-through; opacity: 0.45; }
	.cal-task-type { font-size: 0.6rem; padding: 2px 8px; border-radius: 8px; font-weight: 600; letter-spacing: 0.5px; flex-shrink: 0; }
	.cal-task-type.task { background: rgba(26,58,0,0.16); color: rgba(26,58,0,0.75); }
	.cal-task-type.event { background: rgba(224,254,68,0.45); color: #1a3a00; }
	.cal-task-del {
	    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
	    background: rgba(0,0,0,0.1); border: none; color: rgba(26,58,0,0.48);
	    cursor: pointer; font-size: 0.7rem; transition: all 0.2s;
	    display: flex; align-items: center; justify-content: center;
	}
	.cal-task-del:hover { background: rgba(220,50,50,0.2); color: #dc3232; }

	/* 添加表单 */
	.cal-add-row { display: flex; gap: 6px; margin-top: 6px; }
	.cal-add-input {
	    flex: 1; background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.18);
	    border-radius: 12px; padding: 8px 12px; color: #1a3a00; font-size: 0.8rem;
	    outline: none; font-family: inherit; font-weight: 500;
	}
	.cal-add-input::placeholder { color: rgba(26,58,0,0.4); }
	.cal-add-input:focus { border-color: rgba(26,58,0,0.5); background: rgba(0,0,0,0.14); }
	.cal-add-type { display: flex; gap: 4px; margin-bottom: 6px; }
	.cal-type-btn {
	    padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18);

    // 只响应真实图片的加载（跳过初始LQIP base64）

      img.classList.add('loaded');

  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

<script>
// ===== 日历打卡 =====
(function(){
    var DATA_KEY='calData',CHECKIN_KEY='calCheckins',calData={},checkins={},calYear,calMonth,calSelected=null,calType='task';
    function K(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    function L(){try{calData=JSON.parse(localStorage.getItem(DATA_KEY))||{}}catch(e){calData={}}}
    function S(){localStorage.setItem(DATA_KEY,JSON.stringify(calData))}
    function LC(){try{checkins=JSON.parse(localStorage.getItem(CHECKIN_KEY))||{}}catch(e){checkins={}}}
    function SC(){localStorage.setItem(CHECKIN_KEY,JSON.stringify(checkins))}
    L();LC();

    function calcStreak(){
        var streak=0,today=new Date(),d=new Date(today);
        while(true){
            var key=K(d);
            if(checkins[key]){streak++;d.setDate(d.getDate()-1)}
            else break}
        return streak}

    var calOverlay=document.getElementById('calOverlay'),calGrid=document.getElementById('calGrid'),calMonthLabel=document.getElementById('calMonthLabel'),calDetail=document.getElementById('calDetail'),calDetailDate=document.getElementById('calDetailDate'),calTaskList=document.getElementById('calTaskList'),calAddInput=document.getElementById('calAddInput'),calCheckinWrap=document.getElementById('calCheckinWrap'),calCheckinBtn=document.getElementById('calCheckinBtn'),calStreak=document.getElementById('calStreak');

    function renderCalendar(){
        var today=new Date();calMonthLabel.textContent=calYear+'年 '+(calMonth+1)+'月';
        var firstDay=new Date(calYear,calMonth,1).getDay();
        var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
        var daysInPrev=new Date(calYear,calMonth,0).getDate();
        var html='';
        for(var i=firstDay-1;i>=0;i--){html+='<div class=\"cal-day other-month\">'+(daysInPrev-i)+'</div>'}
        for(var d=1;d<=daysInMonth;d++){
            var dateKey=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
            var cls='cal-day';
            if(calSelected===dateKey)cls+=' selected';
            if(K(today)===dateKey)cls+=' today';
            if(checkins[dateKey])cls+=' checked-in';
            var items=calData[dateKey]||[];
            var hasTask=items.some(function(x){return x.type==='task'&&!x.done});
            var hasEvent=items.some(function(x){return x.type==='event'});
            if(hasTask)cls+=' has-task';
            if(hasEvent)cls+=' has-event';
            var indicator='';
            if(hasTask||(hasEvent&&!hasTask))indicator='<span class=\"cal-dot-indicator\"></span>';
            html+='<div class=\"'+cls+'\" data-date=\"'+dateKey+'\" onclick=\"selectCalDay(\''+dateKey+'\')\">'+d+indicator+'</div>'}
        var remaining=7-((firstDay+daysInMonth)%7);if(remaining===7)remaining=0;
        for(var d=1;d<=remaining;d++){html+='<div class=\"cal-day other-month\">'+d+'</div>'}
        calGrid.innerHTML=html}

    function renderDetail(){
        if(!calSelected){calDetail.style.display='none';return}
        calDetail.style.display='block';
        var today=new Date(),todayKey=K(today),isToday=(calSelected===todayKey);
        calCheckinWrap.style.display=isToday?'flex':'none';
        if(isToday){
            var checked=!!checkins[todayKey];
            calCheckinBtn.classList.toggle('checked',checked);
            calCheckinBtn.querySelector('.cal-checkin-text').textContent=checked?'已打卡 ✓':'今日打卡';
            var streak=calcStreak();calStreak.textContent=streak>0?'连续 '+streak+' 天':'';
        }
        var parts=calSelected.split('-');calDetailDate.textContent=parts[0]+'年'+parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
        var items=calData[calSelected]||[];
        if(items.length===0){calTaskList.innerHTML='<div class=\"cal-empty\">这天还没有安排</div>'}
        else{
            calTaskList.innerHTML='';
            items.forEach(function(item,i){
                var row=document.createElement('div');row.className='cal-task-row';
                row.innerHTML='<div class=\"cal-task-cb'+(item.done?' done':'')+'\" onclick=\"toggleCalItem(\''+calSelected+'\','+i+')\">'+(item.done?'✓':'')+'</div><span class=\"cal-task-text'+(item.done?' done':'')+'\">'+item.text+'</span><span class=\"cal-task-type '+item.type+'\">'+(item.type==='event'?'事件':'任务')+'</span><div class=\"cal-task-del\" onclick=\"deleteCalItem(\''+calSelected+'\','+i+')\">&times;</div>';
                calTaskList.appendChild(row)})}}

    window.selectCalDay=function(dateKey){calSelected=dateKey;renderCalendar();renderDetail()}
    window.toggleCalItem=function(dateKey,i){calData[dateKey][i].done=!calData[dateKey][i].done;S();renderCalendar();renderDetail()}
    window.deleteCalItem=function(dateKey,i){calData[dateKey].splice(i,1);if(calData[dateKey].length===0)delete calData[dateKey];S();renderCalendar();renderDetail()}
    window.setCalType=function(t,el){calType=t;var btns=document.querySelectorAll('.cal-type-btn');btns.forEach(function(b){b.classList.remove('active')});el.classList.add('active')}

    window.doCheckin=function(){
        var today=new Date(),key=K(today);checkins[key]=true;SC();
        var streak=calcStreak();
        calCheckinBtn.classList.add('checked');
        calCheckinBtn.querySelector('.cal-checkin-text').textContent='已打卡 ✓';
        calStreak.textContent='连续 '+streak+' 天';
        if(navigator.vibrate)navigator.vibrate(50);
        renderCalendar()}

    window.addCalItem=function(){
        var text=calAddInput.value.trim();if(!text)return;
        if(!calSelected){var today=new Date();calSelected=K(today);renderCalendar()}
        if(!calData[calSelected])calData[calSelected]=[];
        calData[calSelected].push({text:text,type:calType,done:false});S();
        calAddInput.value='';renderCalendar();renderDetail()}

    calAddInput.addEventListener('keydown',function(e){if(e.key==='Enter')addCalItem()});

    window.prevMonth=function(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar();renderDetail()}
    window.nextMonth=function(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar();renderDetail()}

    window.showCalendar=function(){
        var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
        calSelected=K(now);L();LC();renderCalendar();renderDetail();calOverlay.classList.add('show')}
    window.closeCalendar=function(){calOverlay.classList.remove('show')}
    calOverlay.addEventListener('click',function(e){if(e.target===calOverlay)closeCalendar()});
})();
</script>
