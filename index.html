<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>You NianGuang | 7天重塑人生</title>
<link rel="preload" as="image" href="sengling.webp" fetchpriority="high">
<meta name="view-transition" content="same-origin">
    <style>
        :root {
            --accent: #A8E600;
            --accent-light: rgba(168,230,0,0.2);
            --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            color: #ffffff;
            cursor: default;
            position: relative;
            transition: opacity 0.8s var(--ease-in-out);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);

        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0) 0%,
                rgba(0,0,0,0.1) 40%,
                rgba(0,0,0,0.15) 70%,
                rgba(0,0,0,0.25) 100%
            );
            z-index: 1;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 998;
            opacity: 1;
        }

        .scan-lines {
            position: fixed;
            inset: 0;
            z-index: 997;
            pointer-events: none;
            opacity: 0.012;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,25,0.01) 2px,
                rgba(255,255,255,0.01) 4px
            );
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 996;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: noiseShift 1s linear infinite;
        }
        @keyframes noiseShift {
            0% { background-position: 0 0; }
            100% { background-position: -50px -30px; }
        }

        .breath-dot,
        .container,
        .overlay,
        .footer-text {
            position: relative;
            z-index: 4;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .breath-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
            border-radius: 50%;
            animation: breath 4s ease-in-out infinite, dotFadeOut 1.2s ease 3.5s forwards;
            will-change: opacity, transform;
            box-shadow: 0 0 20px rgba(168,230,0,0.25), 0 0 60px rgba(168,230,0,0.08);
        }
        @keyframes breath {
            0%,100% { opacity: 0.06; transform: translate(-50%, -50%) scale(0.6); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.4); }
        }
        @keyframes dotFadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            will-change: opacity, transform, filter;
            flex: 1;
            position: relative;
        }
        .container.fade-out {
            animation: fadeOutAll 1.5s var(--ease-in-out) forwards;
        }
        @keyframes fadeOutAll {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(0.92); filter: blur(8px); }
        }

        .logo {
            font-size: 34px;
            letter-spacing: 6px;
            font-weight: 300;
            white-space: nowrap;
            position: relative;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.15);
            margin-bottom: 4px;
        }
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) translateX(-6px);
            filter: blur(10px);
            animation: charIn 1.4s var(--ease-out) forwards, textBeat 2.8s ease-in-out infinite 6s;
            will-change: opacity, transform, filter;
        }
        @keyframes charIn {
            0% {
                opacity: 0;
                transform: translateY(20px) translateX(-6px);
                filter: blur(10px);
                text-shadow: 0 0 20px rgba(168,230,0,0.4), 0 0 40px rgba(168,230,0,0.15);
            }
            60% {
                opacity: 0.7;
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0);
                filter: blur(0);
                text-shadow: 0 0 4px rgba(255,255,255,0.2);
            }
        }

        @keyframes textBeat {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-1.5px) scale(1.015); }
        }

        .logo::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 20%, rgba(168,230,0,0.15) 45%, rgba(255,255,255,0.07) 55%, rgba(168,230,0,0.12) 70%, transparent 100%);
            animation: lightSweep 4.5s var(--ease-in-out) 5.5s forwards;
            will-change: left;
        }
        @keyframes lightSweep {
            to { left: 120%; }
        }

        .progress-wrap {
            width: 280px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            opacity: 0;
            animation: wrapIn 1s ease 6.5s forwards;
            will-change: opacity;
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
            margin: 4px 0;
        }
        @keyframes wrapIn { to { opacity: 1; } }

        .loading-tip {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-top: 2px;
            opacity: 0;
            animation: tipFade 1s ease 6.7s forwards;
            text-transform: uppercase;
            font-weight: 300;
        }
        @keyframes tipFade { to { opacity: 1; } }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            border-radius: 99px;
            animation: progress 12s cubic-bezier(0.08, 0, 0.04, 1) 7s forwards;
            position: relative;
            will-change: width;
            box-shadow: 0 0 8px rgba(255,255,255,0.25);
        }
        @keyframes progress {
            0%   { width: 0%; }
            100% { width: 100%; }
        }

        .phrase {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2px;
            opacity: 0;
            min-height: 16px;
            animation: phraseIn 1.2s ease 8s forwards;
            text-align: center;
            transition: opacity 0.6s ease, transform 0.6s var(--ease-out);
            will-change: opacity, transform;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            margin-top: 2px;
        }
        @keyframes phraseIn { to { opacity: 1; } }

        .loading-text {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            opacity: 0;
            animation: textIn 1s ease 7.5s forwards;
            min-height: 16px;
            will-change: opacity;
            font-weight: 300;
            margin-top: 2px;
        }
        @keyframes textIn { to { opacity: 1; } }

        .ready-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .ready {
            font-size: 14px;
            color: var(--accent);
            opacity: 0;
            transform: translateY(12px);
            animation: ready 1.6s var(--ease-out) 13s forwards, readyPulse 3.5s ease 14.6s infinite;
            text-shadow: 0 0 8px rgba(168,230,0,0.35), 0 0 30px rgba(168,230,0,0.1);
            will-change: opacity, transform;
            letter-spacing: 3px;
            font-weight: 400;
        }
        @keyframes ready {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes readyPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(168,230,0,0.35), 0 0 30px rgba(168,230,0,0.1); }
            50% { text-shadow: 0 0 14px rgba(168,230,0,0.5), 0 0 50px rgba(168,230,0,0.18); }
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 15px;
            background: var(--accent);
            opacity: 0;
            animation: cursorOn 1.6s ease 13s forwards, blink 1.2s step-end 14.6s infinite;
            box-shadow: 0 0 8px rgba(168,230,0,0.4), 0 0 20px rgba(168,230,0,0.15);
            border-radius: 1px;
        }
        @keyframes cursorOn { to { opacity: 1; } }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 100%);
            opacity: 0;
            pointer-events: none;
            will-change: opacity;
            z-index: 5;
        }
        .overlay.fade-in {
            animation: overlayIn 1.5s var(--ease-in-out) forwards;
        }
        @keyframes overlayIn {
            to { opacity: 1; }
        }

        .footer-text {
            position: absolute;
            bottom: 80px;
            text-align: center;
            width: 100%;
            z-index: 4;
        }

        .footer-name {
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(90deg, #00A8E8, #00FFAA, #00A8E8);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientFlow 15s linear infinite;
            letter-spacing: 2px;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px rgba(0, 168, 232, 0.3));
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .footer-date {
            font-size: 11px;
            color: rgba(255,255,255,0.75);
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        .buttons-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
            pointer-events: none;
        }
        .buttons-wrap.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .action-btn {
            padding: 12px 24px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 4px;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s var(--ease-in-out);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-shadow: 0 0 8px rgba(168,230,0,0.2);
            box-shadow: 0 0 10px rgba(168,230,0,0.1), inset 0 0 15px rgba(168,230,0,0.05);
            touch-action: manipulation;
            white-space: nowrap;
        }
        .action-btn:hover {
            background: rgba(168,230,0,0.1);
            box-shadow: 0 0 15px rgba(168,230,0,0.3), inset 0 0 20px rgba(168,230,0,0.1);
            transform: translateY(-2px);
        }
        .action-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 8px rgba(168,230,0,0.2), inset 0 0 12px rgba(168,230,0,0.08);
        }

        .skip-intro .breath-dot { display: none; }
        .skip-intro .logo span {
            animation: none !important;
            opacity: 1;
            transform: translateY(0) translateX(0);
            filter: blur(0);
        }
        .skip-intro .logo::after { animation: none !important; display: none; }
        .skip-intro .progress-wrap,
        .skip-intro .loading-tip,
        .skip-intro .phrase,
        .skip-intro .loading-text,
        .skip-intro .ready,
        .skip-intro .cursor-blink {
            animation: none !important;
            opacity: 1;
        }
        .skip-intro .progress-bar { animation: none !important; width: 100%; }
        .skip-intro .ready { transform: translateY(0); }
        .skip-intro .buttons-wrap {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }
body { animation: pageIn 0.1s ease; will-change: transform, opacity; }
body.no-page-anim { animation: none !important; }
@keyframes pageIn { from { opacity: 0.7; transform: translate3d(15px,0,0); } }

/* 背景图模糊加载：瞬间显示极小占位符→清晰图淡入 */
.bg-loader {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  z-index: -1;
  filter: blur(20px);
  transform: scale(1.1);
  transition: filter 0.8s ease-out, transform 0.8s ease-out;
  background: #0a0a14;
}
.bg-loader.loaded {
  filter: blur(0);
  transform: scale(1);
}
    </style>
</head>

    <div class="breath-dot"></div>
    <div class="scan-lines"></div>
    <div class="noise-overlay"></div>

    <div class="container" id="container">
        <div class="logo" id="logo"></div>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="loading-tip">Loading...</div>
        <div class="phrase" id="phrase"></div>
        <div class="loading-text" id="loadingText">INITIALIZING</div>
        <div class="ready-wrap">
            <div class="ready">SYSTEM READY</div>
            <div class="cursor-blink"></div>
        </div>
        
        <div class="buttons-wrap" id="buttonsWrap">
            <button class="action-btn" id="btnGrow">向内生长，向外重塑</button>
            <button class="action-btn" id="btnLight">给我一点光</button>
        </div>
    </div>

    <div class="footer-text">

    <script>
/* 背景图模糊加载：LQIP占位符瞬间显示，WebP加载完成后清晰淡入 */
(function(){
  var img = document.querySelector('.bg-loader');
  if (!img) return;
  var webp = img.getAttribute('data-src');
  if (!webp) return;
  img.onload = function(){
    // 只响应真实图片的加载（跳过初始LQIP base64）
    if (img.src.indexOf('base64') === -1) {
      img.classList.add('loaded');
    }
  };
  img.onerror = function(){
    if (img.src.indexOf('.webp') > -1) {
      img.src = img.getAttribute('data-src').replace('.webp','.png');
    }
  };
  img.src = webp;
  // 缓存命中时 onload 可能不触发
  if (img.complete && img.src.indexOf('base64') === -1) {
    img.classList.add('loaded');
  }
})();

        document.addEventListener('touchstart', function() {}, { passive: true });

        if (sessionStorage.getItem('indexIntroPlayed')) {
            document.body.classList.add('skip-intro');
            document.getElementById('buttonsWrap').classList.add('show');
            document.getElementById('btnGrow').disabled = false;
            document.getElementById('btnLight').disabled = false;
            document.getElementById('loadingText').textContent = 'WELCOME BACK';
            document.getElementById('phrase').textContent = 'Continue your journey.';
        } else {
            sessionStorage.setItem('indexIntroPlayed', 'true');
        }

        const weekArr = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const now = new Date();
        const week = weekArr[now.getDay()];
        const dateStr = now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
        document.getElementById('dateText').innerText = `${dateStr} · ${week}`;

        const skipIntro = document.body.classList.contains('skip-intro');

        const str = "You NianGuang";
        const logo = document.getElementById("logo");
        str.split('').forEach((c, i) => {
            const s = document.createElement("span");
            s.textContent = c;
            s.style.animationDelay = skipIntro ? '0s' : `${2.5 + i * 0.22}s`;
            logo.appendChild(s);
        });

        const phrases = [
            "Transform yourself in 7 days.",
            "Start over, become better.",
            "Growth begins with a decision.",
            "Your future starts now."
        ];
        const phraseEl = document.getElementById("phrase");
        let pIndex = 0;
        function showPhrase() {
            phraseEl.style.opacity = 0;
            phraseEl.style.transform = "translateY(6px)";
            setTimeout(() => {
                phraseEl.textContent = phrases[pIndex];
                phraseEl.style.opacity = 1;
                phraseEl.style.transform = "translateY(0)";
                pIndex = (pIndex + 1) % phrases.length;
            }, 650);
        }
        showPhrase();
        const phraseInterval = setInterval(showPhrase, 4000);

        const loadingTexts = [
            "正在连接你的成长系统",
            "正在加载7天重塑计划",
            "正在准备你的专属空间",
            "正在唤醒你的内在力量"
        ];
        const loadingTextEl = document.getElementById("loadingText");
        let textIndex = 0;
        const textInterval = setInterval(() => {
            textIndex++;
            if (textIndex < loadingTexts.length) {
                loadingTextEl.textContent = loadingTexts[textIndex];
            } else {
                clearInterval(textInterval);
            }
        }, 2000);

        const progressBar = document.getElementById("progressBar");
        const container = document.getElementById("container");
        const overlay = document.getElementById("overlay");
        const buttonsWrap = document.getElementById('buttonsWrap');
        
        const btnGrow = document.getElementById('btnGrow');
        const btnLight = document.getElementById('btnLight');

        if (!skipIntro) {
            btnGrow.disabled = true;
            btnLight.disabled = true;
        }

        progressBar.addEventListener('animationend', (e) => {
            if (e.animationName === 'progress') {
                setTimeout(() => {
                    buttonsWrap.classList.add('show');
                    btnGrow.disabled = false;
                    btnLight.disabled = false;
                    document.querySelector('.cursor-blink').style.animation = 'none';
                }, 2000);
            }
        });

        btnGrow.addEventListener('click', () => {
            container.classList.add("fade-out");
            overlay.classList.add("fade-in");
            setTimeout(() => {
                window.location.href = "shouye.html";
            }, 1500);
        });

        btnLight.addEventListener('click', () => {
            container.classList.add("fade-out");
            overlay.classList.add("fade-in");
            setTimeout(() => {
                window.location.href = "hall2.html";
            }, 1500);
        });
    </script>
